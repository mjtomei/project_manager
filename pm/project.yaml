  description: 'Compute implicit attention signals on the surface side and surface
    them via the protocol''s SignalHistories: dwell time per region (time gaze or
    scroll-position has been within a region''s bounds), saccade entropy (variance
    of gaze movement, used as an attention-quality score — low entropy = focused,
    high = scanning), scroll-stop events (timestamps of scroll-rest moments and the
    region they ended on). When gaze data is available these come from the gaze provider;
    when not, they fall back to scroll/touch event tracking with reduced fidelity.
    All persisted to the archive (no expiry by default) — Claude can ask ''where has
    the user dwelt most over the last month?'' or ''what was the saccade entropy 30
    seconds ago?'' with equal cost. The ''pm context resolve'' command uses these
    histories to break ties more confidently — a region with high recent dwell + low
    saccade entropy is preferred over one merely visible. Tests: dwell accumulation,
    saccade entropy on synthetic gaze tracks, scroll-stop detection from input events,
    archive write integrity under high-rate signals, resolver tiebreaking improves
    with signal histories present vs absent, history-aware queries against the archive
    (e.g. dwell-in-last-30s, dwell-in-last-week) return correct subsets.'

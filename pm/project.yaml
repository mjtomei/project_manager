- id: pr-98f670e
  plan: plan-regression
  title: 'QA scenario quality supervisor: judge artifact depth and amend before next
    run'
  branch: pm/pr-98f670e-qa-artifact-replay-supervisor-detect-and-route-art
  status: pending
  depends_on:
  - pr-b3b8df0
  - pr-6f9301e
  description: "Automated supervisory step inserted between scenario completion and\
    \ the verdict-emit. Judges whether each scenario's produced artifacts (captures,\
    \ logs, test outputs, assertions) actually constitute evidence that the functionality\
    \ works, or whether the scenario took a shortcut. When evidence is shallow, the\
    \ supervisor queries the scenario session about what it did and didn't do, then\
    \ amends instructions / artifact requirements / planner prompts so the next run\
    \ produces real evidence. The verdict does not propagate until the supervisor\
    \ is satisfied or escalates.\n\n## Problem\n\nScenarios reliably produce artifacts\
    \ that work in the session that wrote them but don't actually exercise the functionality.\
    \ The scenario nominally passes because its (thin) assertions hold; the QA verdict\
    \ says PASS; the bug-fix loop moves on; the bug is still there. This is false-PASS,\
    \ not false-NEEDS_WORK, and it is invisible from raw verdicts alone. In supervised\
    \ mode a human reading the artifacts sees \"oh, you just printed the help text\
    \ — that doesn't test the feature.\" In headless mode (pr-6f9301e) nobody catches\
    \ it.\n\n## Shape\n\n- New module hooked into the QA verdict path, before verdict\
    \ propagates to the bug-fix or improvement-fix watchers.\n- Inputs: scenario's\
    \ produced artifacts, scenario instruction text, the diff of the PR under test,\
    \ the QA planner output that generated the scenarios (so the supervisor can amend\
    \ the planner prompt for repeat failure modes).\n- A leader Claude session judges\
    \ artifact depth: did the scenario actually invoke the changed code path? Did\
    \ it observe the side effect it claimed to verify? Are assertions tied to the\
    \ behavior the PR changes, or to incidental output? Does the captured evidence\
    \ distinguish a correct implementation from common wrong implementations?\n- **Scenario\
    \ session interaction**: scenarios remain queryable after their verdict via Claude\
    \ Code --resume (held in the supervisor's working set until release or TTL). The\
    \ supervisor probes for shortcuts: \"what did you actually verify?\", \"what state\
    \ did you check after the action?\", \"did you confirm the change happened or\
    \ only that the command ran?\", \"what could you have asserted that you didn't?\"\
    . Multi-turn allowed.\n- After probing, the supervisor decides:\n  - **Genuinely\
    \ PASS** — verdict propagates as-is.\n  - **Shallow PASS, amendable in place**\
    \ — edit the scenario instruction to require deeper checks; re-run the scenario;\
    \ verdict propagates only after the re-run.\n  - **Shallow PASS, planner-level\
    \ fix needed** — edit the QA planner prompt or the synthesis primitive's instruction\
    \ so future scenarios for similar PRs do not repeat the shortcut. File the planner\
    \ edit as an improvement PR if confidence is below threshold.\n  - **NEEDS_WORK,\
    \ but for the wrong reason** — the scenario noticed something but mis-attributed\
    \ it; amend the assertion and re-run.\n- Per-scenario amendment cap (default 2)\
    \ prevents the supervisor from looping on its own edits.\n\n## Design decisions\
    \ to pin in the PR\n\n1. Coverage: run on every PASS verdict (catch shallow PASS\
    \ — the load-bearing case). Optionally on NEEDS_WORK too (catch shallow NEEDS_WORK\
    \ that should have been INPUT_REQUIRED or PASS). Default: PASS-only initially,\
    \ NEEDS_WORK if real runs show mis-attributed failures.\n\n2. Amendment cap: 2\
    \ per scenario per cycle. After cap, escalate via self-recovery playbook — mark\
    \ the scenario as needs-human-attention, file an improvement PR, do not block\
    \ the verdict indefinitely.\n\n3. Scenario session lifecycle: kept queryable until\
    \ supervisor release or TTL (default 1 hour). Holds container and tmux resources;\
    \ cap total queryable sessions and evict oldest on overflow.\n\n4. Re-run vs descriptive-only:\
    \ when the supervisor amends a scenario, it should re-run the amended scenario\
    \ before propagating verdict. Cost is real (doubles or triples scenario cost on\
    \ amended cases) but the alternative — propagating a verdict from the original\
    \ shallow run — defeats the supervisor. Default: re-run after amend.\n\n5. Planner-prompt\
    \ edits: the supervisor can propose edits to the QA planner prompt (or the synthesis\
    \ primitive's per-task-type instruction in pr-b3b8df0) so future scenarios don't\
    \ repeat the shortcut. These edits are higher-leverage but riskier than per-scenario\
    \ amendments. Default: planner edits go through the improvement-fix watcher (gated\
    \ merge) rather than applying in-place.\n\n## Sequencing\n\nDepends on pr-b3b8df0\
    \ (synthesis primitive — the supervisor's planner-level fixes target the per-task-type\
    \ instructions there) and pr-6f9301e (headless mode is what makes shallow-PASS\
    \ invisible without this supervisor). Independent of pr-ed10ac4 and pr-ca6859f.\n\
    \nThe bug-fix watcher (pr-e3a711c) and improvement-fix watcher (pr-d39a7fb) only\
    \ see verdicts after the supervisor releases them. Shallow-PASS scenarios that\
    \ were amended and re-run produce a verdict the watchers can trust; shallow-PASS\
    \ scenarios that hit the amendment cap produce an improvement PR rather than a\
    \ PASS.\n\n## Manual testing\n\nConstruct a PR whose change is \"make function\
    \ X return the corrected value Y\" and a scenario that only checks \"function\
    \ X is callable without crashing.\" Run the scenario; supervisor should:\n- judge\
    \ the artifact as shallow (no observation of return value),\n- query the session\
    \ about what it checked,\n- amend the instruction to require asserting the return\
    \ value equals Y,\n- re-run the scenario,\n- propagate the resulting verdict.\n\
    Confirm that a deeper scenario (one that actually checks the return value) passes\
    \ the supervisor without amendment. Confirm amendment-cap escalation: a scenario\
    \ that resists amendment 2 times is marked for human attention with an improvement\
    \ PR filed, and the supervisor does not block indefinitely."

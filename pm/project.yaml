- id: pr-0cf3626
  plan: plan-regression
  title: 'Offshoot: exact ProgramBench task as a separate runnable'
  branch: pm/pr-0cf3626-offshoot-exact-programbench-task-as-a-separate-run
  status: pending
  depends_on:
  - pr-e2b7fdf
  - pr-b3b8df0
  description: '## Goal


    Offshoot of `pr-e2b7fdf` (the realistic single-prompt task evaluation): run the
    exact ProgramBench task as defined by the benchmark, for submission to the public
    leaderboard. Inherits the leader prompt and adapter CLI from `pr-e2b7fdf` but
    flips the realism constraints to match ProgramBench''s artificial-but-defined
    shape.


    ## Why this is an offshoot, not the primary goal


    The primary autonomous-loop goal is the realistic version in `pr-e2b7fdf`: internet
    access, written directive, post-run integrity audit. That measures the thing the
    loop should actually be good at. ProgramBench''s offline-only shape is interesting
    as a public benchmark with a leaderboard, but it''s not how the loop will be used
    in practice. Filing it as a separate runnable keeps the realistic version as the
    load-bearing capstone and lets the ProgramBench submission be an opportunistic
    side deliverable.


    ## Differences from pr-e2b7fdf


    | Aspect | Realistic (pr-e2b7fdf) | Exact ProgramBench (this PR) |

    |---|---|---|

    | Internet | Allowed (with audit) | Blocked (iptables network namespace) |

    | Inputs | Directive + provided materials | `/workspace/executable` (chmod 111)
    + docs |

    | Verification | Post-run integrity audit | ProgramBench''s binary-behavior comparison
    |

    | Submission shape | Produced artifact + audit report | `/workspace/` extracted
    as tarball |

    | Base image | Per-task user-specified | `programbench/<task>:task_cleanroom`
    |


    ## Implementation


    - **Adapter CLI variant** — `pm bench programbench --task <id>` runs the task
    in the cleanroom image, with internet blocked at the network-namespace boundary
    except for the model API endpoint.

    - **Reuses from pr-e2b7fdf**: the leader prompt template (specialised slightly
    to drop the internet-permitted hints), the auto-synthesis primitive (`pr-b3b8df0`)
    producing the binary-comparison QA instructions from `/workspace/executable`,
    the headless runtime (`pr-6f9301e`).

    - **ProgramBench-specific**: the network-namespace firewall is stricter (model
    API only); the submission tarball extraction targets `/workspace/` rather than
    a `result/` subdirectory; the QA verdict comes from binary-behavior comparison
    (no integrity audit needed since internet is off).

    - **Reproducibility Dockerfile**: `FROM programbench/<task>:task_cleanroom` layered
    with pm + Claude Code + pinned deps. The submission asset.


    ## Sequencing


    Lands after `pr-e2b7fdf`. Most of the machinery is reused; this PR is the per-benchmark-variant
    skin.


    ## Manual testing


    Run the adapter against a held-back ProgramBench task and inspect the produced
    `/workspace` tarball before submitting to the leaderboard. Confirm no network
    egress beyond the model API endpoint during the run.


    ## Depends on


    - pr-e2b7fdf (realistic single-prompt task — primary capstone; this PR inherits
    its leader prompt and adapter CLI)

    - pr-b3b8df0 (auto-synthesis primitive — produces the binary-comparison QA instructions)


    ## Out of scope


    - Other public benchmark submissions (SWE-Bench, HumanEval, etc.) — separate PRs
    if pursued.

    - Optimizing the leader prompt for ProgramBench''s specific shape — the realistic
    version''s prompt should work; tuning is follow-up.


    ## Related


    - pr-e2b7fdf — the realistic version this PR offshoot from.'

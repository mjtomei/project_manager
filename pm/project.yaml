- id: pr-41be77d
  plan: bugs
  title: 'Bug: auto-start doesn''t advance pre-existing idle impl windows when enabled
    mid-flight'
  branch: pm/pr-41be77d-bug-auto-start-doesn-t-advance-pre-existing-idle-i
  status: pending
  depends_on: []
  description: 'Repro observed 2026-05-01: pr-30588a7''s impl window had already pushed
    work and gone idle ("Sautéed for 4m 6s", at the prompt with no further activity)
    before auto-start was enabled on pr-d60d185. Once auto-start was toggled on for
    pr-d60d185, it propagated through the dep chain and started/advanced multiple
    downstream PRs (pr-47940bc, pr-97ddabf, pr-271cb3a, pr-e84b43c all merged; pr-e58459b
    in_review), but pr-30588a7 stayed in_progress for ~50 minutes despite its impl
    session having pushed and idled.


    Symptoms:

    - Status remains in_progress

    - pm log shows periodic ''gh pr view'' polling every ~5 minutes (so the watcher
    knows about the PR) but no transition to in_review

    - The impl tmux window is alive but idle at the Claude prompt with no further
    engagement


    Hypothesis: the auto-start machinery likely tracks impl-session idle state via
    a PaneIdleTracker or hook event registered when auto-start launches the impl session.
    If the impl window was opened before auto-start was enabled, no tracker was registered
    and the idle/done signal is never observed. Auto-start then sees the PR in in_progress,
    sees the window exists, and assumes work is still happening.


    Manual workaround: select the PR and press zzd to start the review loop manually,
    which advances status.


    Proposed fix:

    - When auto-start is enabled (or each tick), scan for in_progress PRs in the chain
    that have an existing impl window but no idle tracker, and either: (a) register
    a tracker against the existing pane and check transcript for idle-prompt events
    post-hoc, or (b) detect ''commits pushed since started_at and pane idle for >N
    minutes'' and advance regardless.


    Manual testing during review: reproduce by starting an impl session manually (pm
    pr start), letting it complete and idle, then enabling auto-start on a downstream
    PR — verify the in_progress PR now advances. Use INPUT_REQUIRED to drive.'

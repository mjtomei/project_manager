  plan: bugs
  title: 'Bug: pm pr close removes the PR entry from project.yaml by default'
  branch: pm/pr-62ad13d-bug-pm-pr-close-removes-the-pr-entry-from-project-
  status: pending
  depends_on: []
  description: 'pm pr close (pm_core/cli/pr.py) currently removes the PR entry from
    project.yaml entirely as part of its default behavior. The help text spells this
    out: ''Removes the PR entry from project.yaml. By default also closes the GitHub
    PR and deletes the remote branch if they exist.'' But this is inconsistent with
    both (a) older closed PRs in project.yaml that retain status: closed (e.g. pr-012,
    pr-013) and (b) how merged PRs are handled — pm pr merge sets status: merged and
    keeps the entry around as historical record.


    Result: closing a PR loses the entry, its notes, its dependencies, its description,
    its workdir reference — everything is just gone from project state. Re-adding
    the same PR later would have to re-establish all of that. There is also no audit
    trail showing ''this PR existed and was closed for these reasons''; the only record
    is the git diff of project.yaml at the close commit.


    Fix: invert the default. pm pr close should set status: closed and keep the entry.
    Add an opt-in --remove (or --purge) flag for callers who really do want the entry
    deleted, mirroring how --keep-github / --keep-branch toggle the side effects on
    the GitHub PR and remote branch. The remove flag is the rarer case (genuinely-mistaken
    PRs that should never have existed); the common case is ''this work is no longer
    relevant, file it under closed.''


    Concretely:

    - Default behavior: set status to ''closed'', preserve the entry and all its fields
    including notes. Still close the GitHub PR and delete the remote branch unless
    --keep-github / --keep-branch are set. Still tear down the workdir.

    - --remove flag: also delete the entry from project.yaml (current default behavior).

    - The status field already supports ''closed'' as a valid value (per pm_core/cli/__init__.py
    status enum), so no schema change is needed.


    Files: pm_core/cli/pr.py (the close command), pm_core/cli/__init__.py if any setting/help
    text references close behavior. Tests: closing a PR by default keeps the entry
    with status=closed and preserves all fields; --remove deletes the entry; --keep-github
    / --keep-branch still work; closing a PR that has dependents (PRs whose depends_on
    includes it) prints a warning naming those dependents, since with status=closed
    they remain blocked indefinitely.


    Motivating example from this session: pm pr close pr-d8cfa16 (#163, batched QA
    scenario execution, superseded by #167) was used to close a PR. The entry was
    removed and the explanatory note added just before close was lost with it. Reconstructing
    the entry from git show HEAD:project.yaml and re-inserting with status=closed
    manually was needed to restore the historical record.'

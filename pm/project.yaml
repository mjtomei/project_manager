    text: 'QA notes for things added beyond the original description:


      ## CLI surface changes


      - New: `pm qa add-instruction|add-regression|add-artifact <name>` (scaffold
      + $EDITOR), `pm qa author-instruction|author-regression|author-artifact <name>`
      (Claude-driven), `pm qa docs` (prints the packaged reference doc).


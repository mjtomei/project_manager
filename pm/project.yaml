- id: pr-e3cf481
  plan: null
  title: Add file-locked read-modify-write helper for pane registry
  branch: pm/pr-e3cf481-add-file-locked-read-modify-write-helper-for-pane-
  status: merged
  depends_on: []
  description: 'The pane registry (pane_registry.py) uses a load→modify→save pattern
    on a shared JSON file with no file locking. When the QA loop spawns many panes
    in parallel, concurrent register_pane/unregister_pane calls race each other —
    the last writer wins, silently dropping data from concurrent writers. This causes
    existing panes (like a claude pane launched with ''c'') to disappear from the
    registry, so pressing ''c'' again launches a duplicate instead of focusing the
    existing one.


    Fix:

    1. Add a generic locked_read_modify_write(path, modifier_fn) helper that uses
    fcntl.flock for cross-process file locking around the load→modify→save cycle.

    2. Convert pane_registry.py save_registry to use atomic write (temp file + rename)
    like store.py already does.

    3. Replace the bare load→modify→save calls in register_pane, unregister_pane,
    kill_and_unregister, and _reconcile_registry with the new locked helper.

    4. Add tests for the locking helper (concurrent writers, timeout behavior).'
  agent_machine: arch-home
  gh_pr: https://github.com/mjtomei/project_manager/pull/154
  gh_pr_number: 154
  created_at: '2026-04-06T18:36:59.216942+00:00'

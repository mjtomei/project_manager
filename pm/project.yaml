- id: pr-51586d2
  plan: plan-regression
  title: Mocks awareness in the new-regression authoring flow
  branch: pm/pr-51586d2-shared-mock-library-scenario-created-mocks-become-
  status: pending
  depends_on:
  - pr-abcf70f
  - pr-9603d04
  - pr-06a96fa
  - pr-2680fbf
  description: '## Context


    The shared mocks library already exists: pr-942aa21 (plan-qa, PR #125, merged
    March 2026) shipped pm/qa/mocks/, the pm qa mocks CLI (list/add/show/edit), a
    YAML frontmatter convention, and loader helpers (qa_instructions.list_mocks, mocks_for_prompt,
    spec_gen.get_spec_mocks_section).


    pr-6be8ee6 (#190, commit 3eb89e6) deliberately stripped the prompt-side wiring
    because indiscriminate injection — Mock Library section in the QA planner, always-on
    ''## Mocks'' block in every scenario prompt — produced noise: scenario workers
    invented mock contracts the diff didn''t need, or followed spec-level mock guidance
    unrelated to what they were driving. The mocks belonged at a different surface
    than the one pr-942aa21 wired them into.


    This PR reconnects the library at the right surface: the new-regression authoring
    flow (pr-2680fbf), not scenario generation.


    ## Why this surface


    After pr-06a96fa (scenarios bind to regression tests) and pr-2680fbf (planner
    authors a new regression when none fits) land, the QA flow''s compounding step
    lives in regression-test authoring. A regression test specifies a flow against
    a surface; that surface may have mocks the test should use (e.g. FakeGitHubBackend
    if the test exercises github-backend behavior, FakeClaudeSession if it drives
    a Claude-spawned subflow). Authoring a regression test is exactly the moment where
    the question ''which mocks apply to this surface?'' is well-posed — the surface
    is being declared in the same act.


    Contrast with the pr-942aa21 era where mocks were shown at scenario planning.
    At that stage the surface a scenario will exercise hasn''t been pinned down yet,
    so the mocks block was either too broad (whole library shown — noise) or too narrow
    (spec mocks section shown — disconnected from what the scenario actually does).
    The new-regression authoring step does not have this problem: the regression-test
    draft is precisely the surface declaration that gates which mocks are relevant.


    ## Constraints (carried over from the prior draft, re-scoped)


    1. **Diff-scoped enumeration.** The mocks block shown to the new-regression authoring
    sub-session lists only mocks whose declared target_surface overlaps with files
    in the PR''s diff. A mock for a surface the diff doesn''t touch isn''t shown.


    2. **No fallback to scenario-prompt injection.** The injection point is the new-regression
    authoring prompt, period. Existing-regression scenarios and INSTRUCTION+ARTIFACT
    fallback scenarios get no mocks injection — the pr-942aa21-era pattern stays gone.


    3. **Authoring a new mock is allowed but explicit.** If the regression author
    finds no fitting mock, the prompt instructs it to file a new mock via pm qa mocks
    add as part of the same PR branch, with frontmatter declaring target_surface.
    Mandatory surface declaration is what makes (1) work going forward.


    ## Scope


    - Audit the kept-but-disconnected machinery (qa_instructions.list_mocks, mocks_for_prompt,
    spec_gen.get_spec_mocks_section, QAScenario.mock_ids, parse_qa_plan MOCKS, parse_new_mocks_from_plan,
    mocks_dir helpers) and decide piece-by-piece what to rewire vs. leave dormant.

    - Add diff-scope filtering to mocks_for_prompt (new parameter: changed_files;
    return only mocks whose target_surface matches one of them). Strengthen the frontmatter
    schema with target_surface if pr-942aa21 didn''t already require it.

    - Add a mocks-aware block to the new-regression authoring prompt introduced by
    pr-2680fbf. The block enumerates diff-scoped existing mocks and provides the new-mock
    authoring instructions.

    - Bootstrap entries for FakeClaudeSession (pr-abcf70f) and FakeGitHubBackend (pr-9603d04)
    land when those PRs merge, with full frontmatter and reference implementations
    as the worked examples future authors look at.

    - Tests: diff-scope filter returns only matching mocks; new-regression authoring
    prompt contains the mocks block when diff-scope returns ≥1 mock; omits the block
    when empty; a new-regression draft that authors a new mock commits the registry
    entry on the PR branch; scenarios that bind to existing regressions get no mocks
    injection.


    ## Out of scope


    - Reintroducing mocks injection at scenario planning or scenario worker prompts
    (that''s exactly what pr-6be8ee6 removed and this PR doesn''t undo).

    - pr-942aa21''s CLI surface (list/add/show/edit already work).

    - Versioning the mocks (follow-up if needed).

    - Auto-detecting duplicate mocks across scenarios (pr-f4dc8a2 QA library auditor''s
    job).


    ## Depends on


    - pr-06a96fa (scenarios bind to regression tests — establishes the surface model)

    - pr-2680fbf (planner authors a new regression when none fits — the prompt this
    PR extends)

    - pr-abcf70f (FakeClaudeSession — first bootstrap entry)

    - pr-9603d04 (FakeGitHubBackend — second bootstrap entry)


    ## Related


    - pr-942aa21 (plan-qa, merged) — built the library and CLI this PR reconnects
    at the new surface. Note note-a1c6f30 has the original design rationale.

    - pr-6be8ee6 (#190, merged) — stripped the prompt wiring at the wrong surface.
    Commit 3eb89e6 has the strip rationale. This PR''s surface choice answers it.

    - pr-b3b8df0 (auto-synthesis primitive) — consumer of the registry at project
    setup time.

    - pr-f4dc8a2 (QA library auditor) — scans for missing fills, dedup duplicates.

    - pr-47940bc (regression-filing wrapper) — regression-test sessions filing findings
    already have a prompt addendum; this PR does not change it (regression-test runners
    just consume mocks, not author them post-hoc).'

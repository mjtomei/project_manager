- id: pr-abcf70f
  plan: plan-regression
  title: 'FakeClaudeSession: scriptable Claude replacement for integration testing'
  branch: pm/pr-abcf70f-fakeclaudesession-scriptable-claude-replacement-fo
  status: merged
  depends_on: []
  description: "Add a fake Claude executable that can be launched in place of real\
    \ Claude for integration tests. The fake session writes realistic-looking output\
    \ and emits a specified verdict, letting tests exercise verdict detection, review\
    \ loop state machines, and QA loop transitions without real API calls.\n\nCLI\
    \ interface:\n  pm fake-claude --verdict PASS [--preamble N] [--delay SECONDS]\
    \ [--body TEXT]\n\nVerdict modes:\n1. Single-line verdicts (PASS, PASS_WITH_SUGGESTIONS,\
    \ NEEDS_WORK, INPUT_REQUIRED): writes optional preamble prose, then emits the\
    \ verdict keyword alone on its own line\n2. Block-style verdicts (FLAGGED_START/FLAGGED_END,\
    \ REFINED_STEPS_START/REFINED_STEPS_END, QA_PLAN_START/QA_PLAN_END, VERIFIED):\
    \ writes optional preamble, then the _START marker, a configurable body (defaulting\
    \ to placeholder text), then the _END marker on its own line\n\nOptions:\n- --verdict:\
    \ which verdict to emit (required); accepts any known keyword\n- --preamble N:\
    \ write N lines of filler text before the verdict block to simulate realistic\
    \ Claude output length (default: 3)\n- --body TEXT: custom content between _START\
    \ and _END markers; defaults to a short placeholder\n- --delay SECONDS: sleep\
    \ before writing the verdict to simulate session duration (default: 0)\n- --stream:\
    \ write output character-by-character with small delays to simulate streaming\
    \ (default: false)\n\nIntegration:\n- Installed as bin/fake-claude so tests can\
    \ point the resolved claude binary at it\n- Usable anywhere launch_claude, launch_claude_print_background,\
    \ or launch_claude_in_tmux is called by overriding the resolved claude binary\
    \ path\n- Companion test fixtures in tests/fixtures/fake_claude/ for common verdict\
    \ scenarios\n\nCovers the main slow-iteration cases: verdict detection polling,\
    \ review loop iteration counting, QA loop scenario worker completion, verification\
    \ pass/fail transitions."
  agent_machine: spark-424d

- id: pr-4eb96ff
  plan: plan-qa
  title: Adversarial review with voting step to balance false positives
  branch: pm/pr-4eb96ff-adversarial-review-with-voting-step-to-balance-fal
  status: pending
  depends_on:
  - pr-ee1ff04
  - pr-e07f72d
  description: 'Add a two-phase review flow that balances thoroughness with accuracy:


    Phase 1 — Adversarial pass: Review with an explicitly adversarial prompt that
    assumes the code has bugs and tries hard to find them. This catches the subtle
    issues that a standard review misses (race conditions, shell injection, stale
    references, edge cases).


    Phase 2 — Voting/validation pass: A second review evaluates the Phase 1 findings,
    filtering out false positives and issues without proper reasoning. Each flagged
    issue must have: (a) a concrete explanation of why it''s wrong, (b) a specific
    scenario where it fails, (c) a proposed fix or test.


    The voting step prevents the over-correction problem where adversarial reviewers
    flag style issues, hypothetical problems, or ''improvements'' that aren''t bugs.
    Only issues that survive both passes become NEEDS_WORK items.


    Configuration: adjustable adversarial intensity, configurable number of voters
    (1-3), threshold for consensus, option to include the oversight watcher (pr-c21e2ed)
    as an additional voter.'
  agent_machine: null

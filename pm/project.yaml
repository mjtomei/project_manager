  description: 'When the watcher detects an issue on a single branch that is already
    paused by a review loop INPUT_REQUIRED, it should NOT report INPUT_REQUIRED itself
    — the review loop already handles branch-level pausing. The watcher''s INPUT_REQUIRED
    should only be used for:


    1. Fundamental issues with the project or plan that should pause ALL progress
    (e.g., broken base branch, plan contradictions, infrastructure failures)

    2. Issues on a branch that is NOT already paused by a review loop (e.g., an in_progress
    implementation that is stuck but has no review loop watching it)


    If a branch is paused by its own review loop''s INPUT_REQUIRED, the watcher should
    note the situation in its summary but output READY, not INPUT_REQUIRED. This prevents
    a single branch needing human input from blocking all other branches in the project.


    Changes needed in the watcher prompt (prompt_gen.py generate_watcher_prompt, around
    lines 600-675):

    - Add explicit guidance distinguishing project-wide blockers from branch-specific
    blockers

    - Tell the watcher to check if a branch already has an active review loop INPUT_REQUIRED
    before escalating

    - Clarify that READY is appropriate when branch-specific issues are already being
    handled by their respective review loops


    Reminder: all associated documentation and prompts should be updated, including
    any references to the watcher''s INPUT_REQUIRED behavior in help text, docstrings,
    or other prompt templates.'

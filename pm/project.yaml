- id: pr-d925d69
  plan: watchers
  title: TUI decision tree explorer for decision point branches
  branch: pm/pr-d925d69-tui-decision-tree-explorer-for-decision-point-bran
  status: pending
  depends_on:
  - pr-848ba9b
  description: 'Upgrade the main TUI tech tree to understand that project state lives
    on branches, not just master. Making decision points first class means the TUI
    reads and aggregates state from multiple branches, which also solves the existing
    problem of the TUI showing stale/forked project state.


    ## View modes


    The TUI supports two aggregation modes for project state, switchable via keybinding:


    - **Aggregate (default)**: Collects project.yaml state from all workdirs on this
    machine by following parent-child workdir links. For each PR, shows the most advanced
    status across all local branches. This is the "what''s actually happening" view
    — it reflects all the work in flight.

    - **Single branch**: Shows project.yaml from one specific branch''s workdir (including
    master). Useful for focusing on a particular decision branch or seeing the canonical
    master state.


    A status bar indicator shows which mode is active. Keybinding toggles between
    aggregate and single-branch; in single-branch mode a selector picks which branch
    (defaulting to master).


    ## Workdir state collection


    Each workdir is a separate directory with its own project.yaml. Workdirs have
    parent-child links tracked in project state (a decision branch created from a
    PR workdir records that relationship). Aggregate mode:

    - Enumerates all known workdirs on this machine

    - Follows parent-child workdir links to understand the branching structure

    - Reads project.yaml from each workdir

    - Merges all collected state using most-recent-activity-wins per PR

    - Handles orphaned or missing workdirs gracefully


    ## Default view: aggregate


    - For each PR, display the status from the most recent branch that started/touched
    it on this machine

    - The tech tree looks like one tree by default — no visual clutter from branching
    unless the user wants it

    - PR nodes indicate when multiple branches exist (e.g. a subtle marker or count)

    - TUI actions (start, review, done) target the most-recent branch by default,
    same as the CLI --branch default


    ## Decision tree visualization


    - Expand a PR node to see its decision branches when multiple exist

    - Decision points shown as fork nodes in the tech tree with branches fanning out

    - Navigate into a branch to see its variant subtree of PRs

    - Compare branches side-by-side: diff summaries, PR status, test results, resource
    usage

    - Collapse/expand branches to manage visual complexity

    - Filter to show only open (unresolved) decisions

    - Pick winner from TUI with confirmation dialog


    ## TUI command targeting


    - TUI actions inherit the branch-aware targeting from pr-848ba9b

    - When pressing start/review/done on a PR, the action targets the most-recent
    branch by default

    - A keybinding to switch which branch a PR node is showing/targeting

    - Visual indicator of which branch is currently targeted for each PR


    ## Scaling to large trees


    - Progressive disclosure: collapsed by default, expand on demand

    - Search/filter within decision trees

    - Breadcrumb navigation showing current position in the tree

    - Summary view: one line per decision showing branch count, status, age


    ## Manual testing needed


    - Aggregate mode collecting state from workdirs via parent-child links

    - Single-branch mode isolating one branch''s state (including master)

    - Mode switching keybinding and status bar indicator

    - TUI actions targeting the correct branch in each mode

    - Branch switching keybinding within aggregate mode

    - Decision branches created from a PR workdir displaying correctly

    - Conflict visualization when branches diverge on the same PR

    - Side-by-side branch comparison view'

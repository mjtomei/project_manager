    \ file already exists; we just need to surface it in the right prompt.\n\n## Code\
    \ paths\n- pm_core/prompt_gen.py:20 (_BUG_FIX_FLOW_BLOCK): primary edit\n- pm_core/prompt_gen.py:106\
    \ (tui_section): could host the conditional TUI-repro pointer, or it could be\

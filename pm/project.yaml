  - id: note-fefa01c
    text: 'RE-IMPLEMENTED ON MASTER (2026-05-23): merged origin/master (1152 commits;
      took master for the re-architected QA subsystem) and rebuilt restart-survival
      to fit master. Approach = resume-on-restart, not relocate-to-status-pane. Each
      in-progress QA run persists a sidecar qa_resume.json (session_id/transcript/pane_id/worktree/verifier
      + verdicts/reasons/verified/finalize) written before+during the poll loop. New:
      qa_loop._execute_and_finalize (extracted run_qa_sync tail, shared), resume_qa_sync/resume_qa_background,
      build_resume_state, _write/_load/clear_resume_file. TUI: qa_loop_ui.poll_qa_state
      now calls _resume_incomplete_qa which scans ~/.pm/workdirs/qa/*/qa_resume.json
      and either re-spawns the loop (incomplete) or feeds _on_qa_complete (overall
      already set, daemon died before TUI processed it); snapshot cleared on processing
      so it never re-fires. Tests: tests/test_qa_resume.py (11). Removed orphaned
      tests/test_qa_status.py (old VerdictPoller). Full suite 2369 pass; 1 pre-existing
      unrelated failure test_hook_events::test_installer_writes_standalone_receiver
      (fails on merge base too).'
    created_at: '2026-05-23T05:38:48Z'
    last_edited: '2026-05-23T05:38:48Z'
  - id: note-3c71860
    text: 'review-loop a327 i1: merged origin/master (+57 fake-claude commits, clean
      auto-merge; finalize call threads project_data). Reviewed resume-on-restart
      design — solid, 165 QA tests pass. Documented two accepted limitations (no code-behavior
      change): EC7 self-driving QA state (app._self_driving_qa) is in-memory only,
      so a resumed run drives lifecycle via the legacy/auto-start path — verdict +
      PASS/NEEDS_WORK transition survive, but consecutive-pass counting and direct
      self-driving review restart do not. EC8 stale qa_resume.json snapshots are bounded
      by _qa_loops/_resumed_qa_pr_ids guards + non-qa cleanup; future hardening: stamp
      active loop_id on the PR and validate on resume.'
    created_at: '2026-05-23T06:46:05Z'
    last_edited: '2026-05-23T06:46:05Z'
  - id: note-d49f9cd
    text: 'QA scenario-1 refiner notes: (1) QA status is a PANE (qa-status) split
      into the main qa-<id> window, not its own window; scenario workers are separate
      windows qa-<id>-s<N>. (2) resume scan is throttled to ~every 5s (runs on first
      tick), so "Resuming QA for <pr> after restart..." appears within ~5s of relaunch.
      (3) keep a run in-flight via per-scenario delay on qa_scenario; cursor advances
      per launch in index order, so a scripted list [{PASS,delay:5},{PASS,delay:30}]
      staggers s1 fast / s2 slow for the EC1 already-verified-skip case. (4) one-shot
      QA = plain t (legacy path, no self-driving); auto-start off => PASS leaves PR
      in qa with exactly one note. (5) qa workdir = ~/.pm/workdirs/qa/<pr>-<loop>/
      with qa_status.json (overall) + qa_resume.json (snapshot, cleared on first completion
      processing). EC1 timing is the fragile part.'
    created_at: '2026-05-24T02:04:46Z'
    last_edited: '2026-05-24T02:04:46Z'
  - id: note-e90cdf4
    text: 'QA scenario-1 setup gotchas (2026-05-24, PASS all 3 triples on real tmux
      surface): (A) SPEC-GATE PREREQ omitted from GIVEN — after the fake planner parses
      scenarios the loop halts INPUT_REQUIRED ("QA spec missing ... planner did not
      generate spec in Step 0", qa_loop.py:3187); real claude writes the spec in Step
      0, fake does not. Pre-seed `pm pr spec <pr> qa` then `z t` to fresh-start. (B)
      CURSOR STAGGER CORRECTION to note-d49f9cd: a 2-entry qa_scenario list does NOT
      stagger the two real scenarios — the interactive Scenario 0 consumes verdict
      entry #0 first, so both real scenarios fall through to the clamped last entry
      (identical delay). For EC1 already-verified-skip you need a 3-entry list e.g.
      [{delay:2},{delay:5},{delay:90}]: entry0→Scenario0, entry1→first real (fast),
      entry2→second real (slow). (C) fresh `z t` runs renumber scenarios (3/4, then
      5/6, ...) and each run legitimately appends its own QA PASS note — count notes
      by loop-dir suffix, not total.'
    created_at: '2026-05-24T02:25:25Z'
    last_edited: '2026-05-24T02:25:25Z'
  - id: note-e9177ee
    text: 'QA scenario refiner (R3 NEEDS_WORK resume): two non-obvious prereqs not
      in qa.md Setup. (1) Spec gate at qa_loop.py:3187 — the fake qa_planning only
      emits QA_PLAN, it does NOT generate a spec, so the first QA run halts at INPUT_REQUIRED
      before launching scenarios (no resume snapshot ever written). Pre-seed the spec
      in GIVEN via `pm pr spec <id> qa`; under fake `_all:{}` this routes to the no-verdict
      mock (launch_claude_print closes stdin so it does not hang) and writes a 3-line
      filler spec that satisfies the gate. (2) Workdir is auto-created by run_qa_sync
      via _ensure_workdir (clones repo, checkout_branch create=True), so no `pm pr
      start` needed — but the throwaway repo MUST have an initial commit on the base
      branch or the clone fails. Keep run in-progress at restart with a `delay` on
      qa_scenario (e.g. NEEDS_WORK delay 25); resume_qa_sync skips planning and re-enters
      _execute_and_finalize. Resume is driven from the TUI poll loop (poll_qa_state),
      so QA must be started via the TUI (t / command-bar /pr qa), not the CLI.'
    created_at: '2026-05-24T02:06:14Z'
    last_edited: '2026-05-24T02:06:14Z'
  - id: note-22a9531
    text: 'QA-refiner (scenario 3, two-concurrent-runs-survive-restart): per-PR verdict
      differentiation CANNOT come from qa_scenario verdicts. fake-claude config is
      session-tag-scoped (both PRs share one tmux session => one tag => one config)
      and the scripted cursor is keyed by session_type only and advances at command-BUILD
      time in the orchestrator (claude_launcher.build_claude_shell_cmd). Scenario
      0 (qa_loop.py:1262 _launch_scenario_0) is built with session_type="qa_scenario",
      so it consumes a qa_scenario cursor slot per PR; with 2 PRs that is 4 qa_scenario
      builds against any scripted [PASS,NEEDS_WORK] => split is unreliable. ROBUST
      approach: make ALL qa_scenario emit PASS (single-entry scripted list, clamp-to-last)
      and split via qa_verification ["VERIFIED","FLAGGED"] (only the 2 real polled
      scenarios are verified; scenario 0 is never verified). Set qa-verify-retries=0
      (pm set) so the single FLAGGED becomes NEEDS_WORK immediately instead of re-prompting
      the pane 3x. WHICH PR gets PASS vs NEEDS_WORK is racy (build order) - verify
      post-hoc, do not assert a fixed assignment. Spec gate (qa_loop.py:3187): pm
      pr spec needs real claude (launch_claude_print, no session_type => fake not
      used), so pre-seed pm/specs/<id>/qa.md directly (bootstrap; content arbitrary,
      fake QA_PLAN is hardcoded to 1 scenario). PR must be in_review before TUI start_qa
      (start_qa only transitions in_review->qa; resume requires status==qa). Put delay
      (~45s) on qa_scenario so panes sleep through the restart window.'
    created_at: '2026-05-24T02:11:23Z'
    last_edited: '2026-05-24T02:11:23Z'
  - id: note-92d09f9
    text: 'QA scenario 4 (stale/historical snapshot no-op) concretizer handoff: A
      qa_resume.json is ONLY ever written by a real run reaching _execute_and_finalize
      (qa_loop.py:3353) AFTER the spec gate passes (get_spec must find a qa spec,
      else the loop returns INPUT_REQUIRED before any snapshot). So to create a lingering
      snapshot you must drive a real fake-claude run to scenario-launch: pre-seed
      spec (pm pr spec <pr> qa), config qa_planning=QA_PLAN + qa_concretize=REFINED_STEPS
      + qa_scenario={} (no verdict) so it launches scenarios, writes the snapshot,
      then hangs in poll_for_verdict (no timeout). Then move the PR out of qa via
      pm pr edit <pr> --status in_review and restart the TUI (ctrl+r = os.execvp re-exec,
      kills the daemon thread). KEY: resume reuses the existing scenario panes (resume_qa_sync
      re-enters polling) rather than launching NEW windows, so "no new windows" is
      NOT the discriminating signal. The discriminating observable for the cleanup
      branch (qa_loop_ui.py:~416) is that qa_resume.json is DELETED from disk (a real
      resume would keep rewriting it), plus no "Resuming QA for <pr> after restart..."
      log, no new QA note (pm pr note list), and status unchanged. The orphan scan
      runs on poll tick 0 and every 5th tick (~5s throttle, qa_loop_ui.py:346).'
    created_at: '2026-05-24T02:10:14Z'
    last_edited: '2026-05-24T02:10:14Z'
  - id: note-d2e1f33
    text: 'QA scenario 4 PASS (2026-05-24, real surface). Setup refinement to note-92d09f9:
      to get a GENUINELY HUNG run (lingering qa_resume.json), the test repo needs
      an initial commit AND the PR must be started (pm push + merge sync branch +
      pm pr start) so the branch/workdir exist. Without that, the QA scenario worktree
      clone fails (Failed to create workdir -> Scenario has no window -> INPUT_REQUIRED),
      the run COMPLETES and clears its own snapshot, so there is nothing lingering
      to test. Also: the pre-restart TUI guards the active in-memory loop so the snapshot
      survives `pm pr edit <pr> --status in_review` until ctrl+r; the FRESH post-restart
      process then runs qa_loop_ui._resume_incomplete_qa, sees pr.status!=qa, calls
      clear_resume_file + continue (no resume_qa_background, no _on_qa_complete) ->
      qa_resume.json deleted, no Resuming-QA log, status/notes unchanged. Leftover
      historical QA (qa_status.json only, no qa_resume.json) is a clean no-op (glob
      misses it). pm pr show does not exist in this build; use pm pr list.'
    created_at: '2026-05-24T02:27:03Z'
    last_edited: '2026-05-24T02:27:03Z'

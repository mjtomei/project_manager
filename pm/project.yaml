- id: pr-b3b8df0
  plan: plan-regression
  title: QA instruction auto-synthesis at project setup
  branch: pm/pr-b3b8df0-qa-instruction-auto-synthesis-at-project-setup
  status: pending
  depends_on: []
  description: 'A setup-time pass run by a leader Claude session that takes a project
    task envelope (binary + docs, repo + task description, or a generic project root)
    and emits pm/qa/instructions/*.md files the existing QA loop already knows how
    to consume. Per-task-type logic plugs in as backends behind a shared interface
    — same probe-and-write shape across consumers, only the per-type heuristics differ.


    ## Why a primitive


    Three concrete consumers of the same shape:


    1. ProgramBench: leader probes /workspace/executable (chmod 111) and the docs
    in the cleanroom, writes pm/qa/instructions/binary-comparison.md describing how
    to compare candidate-build outputs against the reference binary''s behavior.

    2. GAIA-style benchmarks (later): leader reads the task question + attachments,
    writes per-sub-question verification instructions that the QA loop applies to
    candidate answers.

    3. Generic pm projects: leader probes the repo (test framework, conventions, language),
    proposes QA instructions based on what it finds. Lowers activation energy for
    users who today have to author pm/qa/instructions/*.md by hand.


    Pulling the primitive out of the ProgramBench scaffolding PR means each consumer
    is a backend registration, not a fork of the synthesis logic.


    ## Shape


    - Module like pm_core/qa_setup/ with a Protocol that backends implement: probe(envelope)
    -> dict of inferred-context, synthesize(context) -> list of (filename, markdown_body).

    - A registry keyed by envelope type (programbench-task, generic-pm-project, etc.).

    - A driver that loads the right backend, runs probe + synthesize via a leader
    Claude session, writes the markdown files into pm/qa/instructions/.

    - Idempotent: re-running on a project that already has hand-authored instructions
    does not overwrite them; produces a diff for the user.


    Out of scope for this PR — left for follow-ups that consume the primitive:

    - pm init / first-run UX integration that offers auto-proposed instructions to
    the user.

    - Backends for any specific task type (ProgramBench backend lands in pr-e2b7fdf;
    generic-pm-project backend lands as a follow-up improvement; GAIA-style backend
    lands when GAIA work begins).


    ## Sequencing


    Independent of the other Phase 9 PRs (does not depend on self-recovery audit,
    headless mode, or no-progress stop). Can land any time before pr-e2b7fdf (ProgramBench
    scaffolding) which consumes it.


    ## Manual testing


    Stub a backend that probes a known fixture and synthesizes a fixed instruction
    file. Confirm the driver writes the file correctly, registry routing works, idempotency
    check skips overwriting hand-authored files.'

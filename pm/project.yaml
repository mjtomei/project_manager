- id: pr-7d5d036
  plan: plan-regression
  title: 'Bug: pm tui test hardcodes "testing against the pm tmux session" — wrong
    for containers and for non-pm targets'
  branch: pm/pr-7d5d036-bug-pm-tui-test-hardcodes-testing-against-the-pm-t
  status: pending
  depends_on:
  - pr-abcf70f
  - pr-9603d04
  description: "## Symptom\n\n`pm tui test <id>` always prepends a Session Context\
    \ that says:\n\n    You are testing against tmux session: <pm-session>\n\n   \
    \ To interact with this session, use commands like:\n    - pm tui view -s <pm-session>\n\
    \    - pm tui send <keys> -s <pm-session>\n    - tmux list-panes -t <pm-session>\
    \ ...\n    - cat ~/.pm/pane-registry/<pm-session>.json\n\nThat framing assumes\
    \ (a) every regression test drives a tmux session,\nand (b) that session is the\
    \ user's running pm session.\n\nBoth assumptions are wrong:\n\n- A regression\
    \ test running inside a container has no tmux session\n  to target (there isn't\
    \ one in the container).\n- Even outside a container, pointing the test at the\
    \ user's main pm\n  session is the wrong default — it pollutes the user's actual\
    \ work\n  state, can race with whatever the user is doing, and isn't isolated\n\
    \  from one test run to the next.\n\n## Diagnosis\n\n`pm_core/cli/tui.py:574-583`\
    \ builds `full_prompt` with the session\nname interpolated as a hard \"you are\
    \ testing against this session\"\npreamble, plus pm-flavored helpers. `pm_core/cli/helpers.py:_find_tui_pane`\n\
    also forces the runner to bail out if the user doesn't have a pm\nsession up.\n\
    \n## Proposed direction\n\nRegression tests should be like QA scenarios: run in\
    \ their own\nephemeral environment (container or scratch dir) and let the test\n\
    body set up whatever surface it needs.\n\nConcretely:\n- Drop the hardcoded \"\
    testing against tmux session: X\" preamble.\n- Remove the requirement that a pm\
    \ session is running. The test runs\n  wherever the runner is invoked.\n- If a\
    \ test wants to drive a tmux session, it spins one up itself in\n  its body (or\
    \ via an `INSTRUCTION:` reference). Same for any other\n  surface — server, CLI,\
    \ web app.\n- Keep `pm tui send` / `pm tui view` available as helpers for tests\n\
    \  that DO want to drive a pm TUI, but don't bake them into the\n  Session Context\
    \ for every test.\n\n## Out of scope\n\n- Changing the QA scenario runner.\n-\
    \ Adding new driving primitives."

- id: pr-562d71d
  plan: null
  title: 'Bug: selected PR still scrolls under bottom bars after #157''s fix'
  branch: pm/pr-562d71d-bug-selected-pr-still-scrolls-under-bottom-bars-af
  status: pending
  depends_on: []
  description: "## Symptom\nSelecting a PR (programmatically via command bar / shortcut,\
    \ or via tech-tree navigation that requires scrolling) still ends with the selected\
    \ node positioned under the bottom command bar / log line — it's there in the\
    \ layout but visually obscured by the docked widgets.\n\n#157 (pr-177dec0, merged\
    \ today 2026-05-04) attempted to fix this by adding `bottom_padding = 4` to the\
    \ node region and `Spacing(top=1, bottom=2, ...)` to `scroll_to_region` in pm_core/tui/tech_tree.py:982-993.\
    \ That improved the worst case but the bug still reproduces.\n\n## Likely causes\
    \ (need to be confirmed during impl)\n\n1. **Spacing values undersized for current\
    \ layout.** `pm_core/tui/app.py` CSS shows:\n   - StatusBar: height 1 + margin-top\
    \ 1 = 2 rows top\n   - LogLine (id='log-line'): height 1, undocked, sits in vertical\
    \ flow above CommandBar\n   - CommandBar: dock:bottom, height 1, margin-bottom\
    \ 1 = 2 rows\n   \n   Tree-container is inside main-area (height 1fr) which sits\
    \ between StatusBar and LogLine. `Spacing(bottom=2)` may not cover both LogLine\
    \ (1) and CommandBar's overlay/floating behavior when the viewport is short.\n\
    \n2. **Timing race on programmatic select.** `select_pr` (tech_tree.py:141-163)\
    \ calls `self.refresh()` then `self.call_after_refresh(self._scroll_selected_into_view)`.\
    \ If layout hasn't settled (e.g. because main-area was resized concurrently —\
    \ mobile mode, plans pane toggle, terminal resize), the container's `size` reports\
    \ stale dimensions and `scroll_to_region` computes the wrong target. e460dcf reverted\
    \ a speculative `set_timer` fallback; a non-speculative one (chained `call_after_refresh`\
    \ or explicit await of layout) may be needed.\n\n3. **Wrong scroller.** `container\
    \ = self.parent if self.parent else self` (tech_tree.py:985). TechTree's parent\
    \ is `TreeScroll` (id='tree-container') which is correct, but if a future widget\
    \ is inserted between them this assumption breaks silently. Pin the scroller via\
    \ `query_one('#tree-container')` to avoid the silent regression.\n\n## Repro\n\
    1. Have enough PRs in the tree that scrolling is necessary.\n2. From the command\
    \ bar, type `select <pr-id>` (or use any path that goes through TechTree.select_pr)\
    \ for a PR near the bottom of the tree.\n3. Observe: tree scrolls but the highlighted\
    \ node sits under the LogLine / CommandBar.\n\n## Fix candidates\n- Increase `Spacing(bottom=...)`\
    \ until empirically clear (LogLine + CommandBar + margin = at least 3 rows). Consider\
    \ computing it from the actual heights of `#log-line` and `#command-bar` instead\
    \ of hard-coding.\n- Wrap the scroll call in a layout-await: `await self.app.refresh()`\
    \ or use a chained `call_after_refresh` so the second tick sees a settled layout.\n\
    - Add a regression test (Claude-based, via the watcher framework or a textual\
    \ snapshot) so this doesn't regress again — the existing #157 fix didn't catch\
    \ the residual case.\n\n## Code paths\n- pm_core/tui/tech_tree.py:141 `select_pr`\
    \ — call_after_refresh sequencing.\n- pm_core/tui/tech_tree.py:948-1005 `_scroll_selected_into_view`\
    \ — region/spacing math.\n- pm_core/tui/app.py:42-121 — CSS layout to determine\
    \ the correct bottom spacing."

- id: pr-88fdba1
  plan: bugs
  title: Fix shared push proxy using first-scenario workdir for all push and fetch
    operations
  branch: pm/pr-88fdba1-fix-shared-push-proxy-using-first-scenario-workdir
  status: merged
  depends_on: []
  description: 'When QA scenarios share a push proxy (introduced in PR #135), the
    proxy is initialised with the workdir of the first scenario that starts it. All
    subsequent push and fetch requests from other scenarios are executed from that
    same workdir, not from the requesting scenario''\''''s clone.


    Two broken operations:


    1. Push: _local_push fetches from self.workdir (first scenario''\''''s clone)
    into the PR workdir, then forwards to GitHub. Commits made in any other scenario''\''''s
    clone are invisible to the proxy — it reports ''\''''Everything up-to-date''\''''
    while the remote stays at the old HEAD.


    2. Fetch/pull: _execute_read_cmd runs git fetch/pull from self.workdir, so fetched
    changes land in the first scenario''\''''s clone only. Other scenarios that do
    git pull before committing silently pull into the wrong clone and see a false
    success.


    ls-remote is unaffected (read-only, workdir does not matter).


    The docstring at the top of push_proxy.py still says ''\''''One proxy per container
    — no shared state, no routing''\'''' — it was never updated when sharing was added
    in PR #135.


    Fix: include the caller''\''''s workdir in the request JSON. The git wrapper script
    running inside the container can include its working directory. The proxy maps
    this to the host-side clone path (recorded when the container was registered)
    and uses it as the source for push fetch and the target for pull/fetch, falling
    back to self.workdir for backward compatibility with legacy per-container proxies.'

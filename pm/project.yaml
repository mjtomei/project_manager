- id: pr-f74988c
  plan: improvements
  title: 'Improvement: pm pr start auto-commits the PR''s project.yaml entry on master
    if not yet committed'
  branch: pm/pr-f74988c-improvement-pm-pr-start-auto-commits-the-pr-s-proj
  status: in_review
  depends_on: []
  description: '## Goal

    When `pm pr start <pr_id>` fails the ''not committed on master yet'' check (pm_core/cli/pr.py:858-886),
    automatically build a small isolated commit on master containing **just that PR''s
    row** in project.yaml and try to push it, instead of erroring out and asking the
    user to run `pm push` manually. If the auto-commit or push fails, fall through
    to today''s error.


    Concurrent invocations are force-serialized through a process-wide lock so multiple
    agents firing `pm pr start` at the same time can''t race on the project.yaml commit
    and produce churn / merge conflicts.


    ## Why

    The error is useful but mostly costs friction. The PR exists in the local project.yaml
    — the user (or watcher / agent) just hasn''t run `pm push` yet. That manual step
    is the main thing today that makes ''in_progress'' feel like a gate even though
    the surrounding commands (`pr review`, `pr qa`, `pr merge`) are themselves the
    transitions, not gates.


    Removing this friction also has a secondary benefit: the smaller-than-pm-push
    commit scope (one PR''s row only) is safer to auto-create than the broader `pm
    push` commit could be.


    ## Behavior


    In `pr_start` at the spot where today we error:


    1. Detect ''PR exists in working project.yaml but not committed on base_branch''.

    2. Verify the PR''s referenced plan (if any) is **already committed on base_branch**.
    If the plan isn''t committed yet, **don''t** include it in the auto-commit — fall
    through to today''s error and let the user run `pm push` to land the plan + PR
    together. Auto-commit''s contract is *one PR row, no other content*.

    3. Acquire a process-wide lock on `~/.pm/sessions/<tag>/yaml-commit.lock` (file-lock
    via `fcntl.flock`, blocking with a 30s deadline). All concurrent `pm pr start`
    invocations within the same session serialize on this lock so they take turns
    rather than racing into push conflicts.

    4. Inside the lock: re-read base_branch''s project.yaml (state may have changed
    while we waited). If the PR is now present on base_branch, release lock and skip
    to step 8.

    5. Build a synthetic project.yaml that copies the committed version and adds *only*
    this one PR''s working entry. No plan additions, no other PR additions, no status
    changes to other PRs, no metadata fields beyond what `pm pr add` originally wrote.
    The smallest possible diff: one new entry under the `prs:` list.

    6. Verify the diff is exactly that — exclusively additive, exclusively within
    the `prs:` list, exactly one new entry. Bail (release lock, fall through to error)
    on any unexpected difference.

    7. Commit on a fresh branch from base_branch tip with message `pm: add <pr_id>
    entry on <base_branch>`, push, fast-forward base_branch locally.

    8. Release the lock and continue with the original `pr_start` flow.


    If any step fails (commit conflict, push rejection mid-lock, dirty working tree
    we don''t want to touch, network error, plan not committed), release the lock
    and surface a clear error: ''Auto-commit failed (<reason>); run `pm push` manually
    to commit project state.'' Do not leave half-applied state behind.


    ## Lock semantics

    - Path: `~/.pm/sessions/<tag>/yaml-commit.lock`. Per-session so concurrent runs
    in different projects don''t block each other.

    - Acquired via `fcntl.flock(fd, LOCK_EX)` with a 30-second timeout (raise / fall
    through if exceeded).

    - Released on completion or on any error path inside the locked block.

    - Independent of pr-fc6db6a''s per-container-name lock and pr-438028c''s loop-daemon
    pidfiles; separate file at separate path.


    ## Edge cases


    - Plan referenced by the PR isn''t on master yet → fall through to today''s error.
    Don''t try to be clever and bundle the plan; that grows the auto-commit''s scope
    and risks landing plan content the user hasn''t reviewed.

    - Working tree has uncommitted changes to project.yaml *other than* this PR''s
    row → unchanged in the working tree; the synthetic commit pulls only the one new
    PR entry.

    - Working tree has uncommitted changes to non-yaml files → untouched.

    - base_branch advanced remotely while we held the lock → fetch and rebase the
    synthetic commit onto the new tip; if rebase fails, release lock and error.

    - Concurrent `pm pr start` calls for two different PRs → each acquires the lock
    in turn, sees the other''s commit on base_branch when it re-reads, and either
    commits its own row on top or no-ops if its row was somehow already added.

    - Repo backend = local → skip push, still create the commit on base_branch under
    the same lock.


    ## Out of scope


    - Auto-committing on `pm pr add`. Users often add several PRs in a session before
    any is ready to start. Keep manual.

    - Auto-committing plan additions. Bundling plan content widens the commit''s blast
    radius and crosses the ''one row, no other content'' contract. Plans land via
    `pm push` as today.

    - Auto-committing other yaml edits (status changes, dependencies, notes). Those
    go through `pm push`.

    - Cross-host coordination via the lock. fcntl.flock is per-host; cross-host racers
    fall through to the existing push-rejection error path.


    ## Code paths

    - pm_core/cli/pr.py:858-886 — replace the click.echo + SystemExit with a call
    to a new helper, e.g. `pm_core/store_commit.commit_pr_entry_on_base(base_branch,
    pr_id) -> bool`.

    - pm_core/store_commit.py (new) — encapsulates the synthetic-commit-and-push logic
    plus the file-lock acquisition; reusable from any future caller that wants to
    land a single PR''s row.


    ## Test

    - pm pr start on a PR that exists in working yaml only with its plan already committed
    → auto-commits the PR row and starts; `git log` shows a one-line yaml diff.

    - pm pr start on a PR whose plan isn''t committed yet → falls through to today''s
    error (no auto-commit attempted).

    - Two concurrent pm pr start invocations for two different PRs → both succeed,
    base_branch ends up with two clean single-row commits, no rejection.

    - pm pr start when push is rejected → falls through to today''s error.

    - pm pr start with backend=local → commit lands locally, no push.

    - pm pr start on a PR not in working yaml → unchanged ''not found'' error.

    - Lock timeout: simulated stuck holder → clear error after 30s, no hang.'

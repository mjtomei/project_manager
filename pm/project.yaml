  description: 'When the QA loop runs multiple iterations (QA finds bugs → review
    fixes → QA re-runs), the generated test plan and test results should persist across
    iterations rather than being regenerated from scratch each time. This allows:


    - Incremental testing: only re-run tests affected by changes, not the full suite

    - Test history: track which tests passed/failed across iterations to detect regressions
    or flaky behavior

    - Stability detection: the loop termination condition (no changes for N iterations)
    can reference specific test results rather than just ''any changes made''


    Storage could be alongside the QA work directory or as structured data in the
    PR''s QA notes. The format should support both human review and programmatic access
    by the QA agent on subsequent iterations.



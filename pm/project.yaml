- id: pr-8efa789
  plan: bugs
  title: QA verdict detection misses verdict when /loop wakeup adds a no-verdict turn
    after it
  branch: pm/pr-8efa789-qa-verdict-detection-misses-verdict-when-loop-wake
  status: pending
  depends_on: []
  description: '## Symptom


    Scenario 44 of pr-6be8ee6 emitted `INPUT_REQUIRED` as its verdict line, then exited
    the worker. A `/loop` wakeup fired afterwards and the model emitted one more turn
    ("Scenario 44 is complete; verdict already submitted as INPUT_REQUIRED with captures
    pushed. No further work to do — ending the loop.") plus a 4-task list (2 done,
    2 open) at the bottom of the pane.


    The QA verdict detector recorded `verdict: ""` for scenario 44 in `qa_status.json`,
    even though the captures were committed and pushed and the prior turn explicitly
    said `INPUT_REQUIRED`. Other scenarios (38–43) in the same run had verdicts captured
    correctly.


    ## Repro


    - pr-6be8ee6, scenario 44, window `qa-#190-s44`, pane `%1553`.

    - See `/home/matt/.pm/workdirs/qa/pr-6be8ee6-456f8f6d7c28edf5/qa_status.json`
    — entry for index 44 has `"verdict": ""`.

    - See pane scrollback: the verdict `INPUT_REQUIRED` is on its own line, followed
    by `✻ Cooked for 9m 35s`, then `✻ Claude resuming /loop wakeup (May 13 1:49pm)`,
    then a follow-up assistant turn, then a stale 4-task list with 2 open tasks.


    ## Hypothesis


    The verdict detector is keyed off the latest assistant turn (or the final pane
    content). When `/loop` wakes the worker after the verdict has been emitted and
    the worker emits a follow-up "nothing to do" turn that does not contain a verdict
    line, the detector reads the post-wakeup tail and sees no verdict. Open tasks
    at the bottom of the pane may further mask the prior verdict.


    ## Expected


    Once a worker emits a final-line verdict (PASS / NEEDS_WORK / INPUT_REQUIRED /
    FAIL), the verdict should be sticky and not get cleared by subsequent `/loop`
    wakeups or trailing turns. Either:

    - snapshot the verdict at emission time, or

    - detector should scan back through prior assistant turns rather than only the
    latest, or

    - /loop should not re-fire on a worker that has already emitted a terminal verdict.


    ## Files to look at


    - `pm_core/qa_loop.py` (verdict polling / extraction)

    - `pm_core/verdict_transcript.py`

    - Whatever drives `/loop` wakeups for QA scenario workers'

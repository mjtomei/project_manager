- id: pr-315f753
  plan: bugs
  title: 'Bug: review-loop fails with ''Review window not found after launch'' even
    when container created'
  branch: pm/pr-315f753-bug-review-loop-fails-with-review-window-not-found
  status: merged
  depends_on: []
  description: 'EXACT root cause: PR titles containing single quotes (apostrophes)
    or other shell-meta characters break the diff_cmd shell pipeline that pr_review.py:_launch_review_window
    builds for the diff pane. The pane''s command exits or misbehaves on shell syntax
    error; depending on what the broken parse evaluates to, either the whole window
    dies before find_window_by_name sees it, or the diff pane renders garbled content
    but the window survives long enough to confuse downstream code.


    Confirmed reproductions in this session:

    - pr-b56e079 / #187: title contains ''pr merge'' and doesn''t. The broken parse
    turns into ''pr merge'' as an unquoted command. pr is not a binary, the && chain
    shorts, the shell exits, tmux closes the window, find_window_by_name returns None.

    - pr-7b3b639 / #186: title contains ''pr start <new-pr>''. The broken parse turns
    into ''pr start'' with input redirection from a missing ''new-pr'' file. That
    errors but doesn''t kill the chain as cleanly — the window opens but the diff
    pane content is garbled.


    Same root cause (title interpolated raw into a single-quoted echo at pr.py:1242
    / 1251-1264), different observable symptoms depending on what the malformed parse
    executes.


    Mechanism:

    (1) pr.py:1242: header = f''Review: {display_id} - {title}''

    (2) pr.py:1251-1264: diff_cmd builds ''cd <workdir-quoted> && { echo <single-quoted-header>
    && ... }'' — title interpolated raw into the single-quoted echo.

    (3) Title with apostrophe terminates the shell single-quote early; subsequent
    characters become commands or syntax errors.

    (4) tmux new-window -d -c cwd <diff_cmd> succeeds rc=0 (tmux launches whatever
    shell cmd you give it).

    (5) Pane shell hits the syntax error, exits or behaves strangely.

    (6) For fatal exits: default tmux closes the window when its initial cmd exits,
    find_window_by_name returns None, new_window_get_pane returns None, silent click.echo
    + return 0; review_loop raises after its 2s sleep.

    (7) For non-fatal exits (some apostrophe positions): window survives but diff
    pane content is wrong.


    Fix — three pieces:


    (A) PRIMARY: shlex.quote every user-controlled interpolation into shell command
    strings. Titles, workdirs, branch names, plan names — anything a user can write
    that ends up in a shell pipeline gets shlex.quote(). pr.py:1241-1264 is the immediate
    offender. Audit every call site that constructs a shell cmd string and confirm
    user-controlled values are quoted. shlex.quote handles apostrophes by closing
    the surrounding quote, inserting backslash-escaped apostrophe, and reopening —
    fully shell-safe. Apostrophes in titles stay legal because the shell layer handles
    them; no need to restrict the alphabet.


    (B) GUARDRAIL: a small helper in pm_core/shell.py (e.g. shell_quote(value) that
    wraps shlex.quote and a build_shell_cmd(parts) that combines literals + quoted
    values) that becomes the canonical way to construct shell command strings. New
    code that wants raw f-string interpolation into a shell needs to either use the
    helper or explicitly justify why. Optional lint rule grep for f-strings adjacent
    to subprocess/tmux calls; flag for reviewer to confirm shlex.quote is used. Stops
    the same bug class from sneaking back in via a future code path.


    (C) DIAGNOSTIC: log when new_window_get_pane returns None. Today the failure is
    silent (click.echo to a captured-and-discarded stdout). Add _log.warning at pr.py:1276
    with window_name + pm_session + a short hint to check the diff_cmd for unquoted
    user strings. Future similar mysteries become a single grep instead of multi-hour
    trace.


    Title validation (the previously-considered option of disallowing apostrophes/quotes/etc.
    at pm pr add time) is explicitly NOT taken — apostrophes read more naturally in
    human PR titles, and the shell layer handles them safely once shlex.quote is in
    place. Validation would be a workaround for missing quoting, not a real fix.



- id: pr-8fdda09
  plan: plan-qa
  title: Add QA scenario verification step before final verdict
  branch: pm/pr-8fdda09-add-qa-scenario-verification-step-before-final-ver
  status: merged
  depends_on:
  - pr-ee1ff04
  description: 'After all QA scenarios complete and verdicts are collected, add a
    verification step before producing the final overall verdict. A Claude session
    reviews the scenario results and checks:


    1. **All scenarios were properly evaluated** — no scenarios that silently failed,
    timed out, or produced empty/malformed verdicts

    2. **Verdicts are consistent with scenario output** — a scenario claiming PASS
    actually tested what it was supposed to test, not just exiting cleanly without
    doing work

    3. **No scenarios were skipped or lost** — the number of completed scenarios matches
    the number planned


    If issues are found:

    - Attempt to restart failed/incomplete scenarios and re-collect their verdicts

    - If a scenario consistently fails to produce a valid verdict after retry, mark
    it as NEEDS_WORK with an explanation

    - Only produce the final overall verdict after all scenarios have been genuinely
    evaluated


    This prevents false PASS results from scenarios that crashed, hit errors, or ran
    but didn''t actually exercise the test cases they were supposed to.'

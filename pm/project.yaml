- id: pr-b59f0c7
  plan: plan-regression
  title: Capture reason strings for QA / review / watcher INPUT_REQUIRED and NEEDS_WORK
    verdicts
  branch: pm/pr-b59f0c7-capture-reason-strings-for-qa-review-watcher-input
  status: pending
  depends_on:
  - pr-6be8ee6
  description: "## Goal\n\nGeneralize the per-scenario \\`verdict_reason\\` field\
    \ we added for the\nrefiner-rejection path to every place a non-PASS verdict comes\
    \ out\nof an automated loop. Today only the refiner's INPUT_REQUIRED\ncarries\
    \ a parsed reason; main scenario workers, review-loop runs,\nand the watcher all\
    \ emit terminal verdicts whose reasons are\nburied in pane scrollback or only\
    \ readable post-hoc by opening\nthe right transcript.\n\n## Why\n\nA verdict without\
    \ a reason is hard to triage. Users see\n\"INPUT_REQUIRED\" or \"NEEDS_WORK\"\
    \ in a list and have to dig through\npanes / logs / git history to figure out\
    \ what the worker actually\nwanted. With reasons attached:\n\n- The scenarios\
    \ pane (and any future review/watcher status pane)\n  can render a one-line \"\
    ↳ <reason>\" continuation under each\n  non-PASS verdict, like it already does\
    \ for refiner rejections.\n- The per-scenario \\`verdict.md\\` capture (and the\
    \ analogous\n  artifacts review/watcher will gain) includes the reason in the\n\
    \  durable record on the PR branch.\n- Tooling that aggregates verdicts (notes,\
    \ dashboards, downstream\n  planners reading prior runs) has a structured handle\
    \ rather\n  than free-form pane text.\n\n## Scope\n\nFor each loop, extract and\
    \ store the reason at the same point the\nverdict is recognized, mirroring the\
    \ refiner pattern:\n\n### Main scenario workers (qa_loop)\n\n- INPUT_REQUIRED\
    \ from \\`_poll_tmux_verdicts\\`: the worker's tail\n  output already explains\
    \ the blocker. Parse a leading reason from\n  the latest assistant turn after\
    \ the verdict token.\n- NEEDS_WORK: same — the worker typically writes its findings\n\
    \  before the verdict keyword.\n\nBoth should land in \\`state.scenario_verdict_reasons[idx]\\\
    `, which\nalready flows into \\`qa_status.json\\` and \\`verdict.md\\`.\n\n###\
    \ Review loop\n\n- INPUT_REQUIRED / NEEDS_WORK from the review session. Each\n\
    \  iteration's verdict already has explanatory text in the pane;\n  capture it\
    \ and surface alongside the verdict in PR notes and\n  whatever per-PR status\
    \ the review loop writes.\n\n### Watcher\n\n- INPUT_REQUIRED escalations from\
    \ the project watcher / discovery\n  supervisor. Same pattern — capture the reason\
    \ text adjacent to\n  the verdict so the user sees both together.\n\n## Shape\n\
    \nA small, structured marker convention so the parser can pull the\nreason out\
    \ reliably without ambiguity. Two options to evaluate\nduring implementation:\n\
    \n1. **Wrap reasons in markers** (e.g. \\`REASON_START / REASON_END\\`)\n   just\
    \ before the verdict keyword. Robust but asks the prompt to\n   request a specific\
    \ shape.\n2. **Take the assistant text immediately preceding the verdict\n   keyword**,\
    \ up to the previous blank line or section heading.\n   Looser, no prompt change\
    \ needed, more brittle.\n\n(1) is preferred for the user-visible reason; (2) can\
    \ serve as a\nfallback when the marker is missing.\n\n## Out of scope\n\n- Refiner\
    \ reasons (already done in pr-6be8ee6).\n- Reshaping the verdict-aggregation logic\
    \ — verdicts themselves\n  stay short; reasons are parallel data.\n- New UI/TUI\
    \ affordances beyond what the existing scenarios pane\n  already does for refiner\
    \ rejections."

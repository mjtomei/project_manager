  notes:
  - id: note-d0138ec
    text: 'Confirmed-in-the-wild repro on 2026-05-05 in project-manager-c5a1006b:
      pressing zz d on pr-cb2a29d (#183) produced the silent-no-op failure mode that
      this PR''s fix is targeting.


      Evidence:

      - ~/.pm/runtime/pr-cb2a29d.json: file does not exist (no review-loop state was
      ever written for this PR).

      - tmux list-windows: no review-#183 / review-pr-cb2a29d window exists.

      - ~/.pm/debug/project-manager-c5a1006b.log: the only entry mentioning pr-cb2a29d
      during the relevant window is one ''gh pr view pm/pr-cb2a29d-...'' lookup, no
      review-loop activity, no container creation, no push proxy start.


      So the loop never launched at all. This confirms the symptom in the PR description:
      stale terminal state on disk → popup spinner short-circuits → exits before the
      TUI drains the SIGUSR2 queue → no actual launch occurs. The user-visible result
      is ''I pressed zz d and nothing happened'' — no window, no error, no signal
      that the action did anything.


      This makes the fix''s success criterion sharper:

      - After fix, even when prior runtime_state for review-loop says ''done'' or
      ''failed'' (or there''s no state at all but some other bookkeeping is stale),
      pressing zz d MUST produce at least one of: a transition to ''queued''/''launching''/''running'',
      a created tmux window, or a logged error. The current behavior of silently returning
      ''✓ done'' and exiting with no side effects is the broken case.


      Cross-reference: contemporaneous incident on pr-18ac983 (#184) hit the concurrent-launch
      race documented in pr-fc6db6a''s note-80159c9; that''s separate from this stale-state
      issue but shares the trigger (user re-firing zz d when the previous loop is
      in some terminal state).'
    created_at: '2026-05-05T12:27:18Z'
    last_edited: '2026-05-05T12:27:18Z'
  - id: note-21c157c
    text: 'Second concrete repro on 2026-05-05 ~05:52 — different specific failure
      mode than the stale-terminal-state case the PR description targets. Worth widening
      the fix scope to cover this too.


      Setup: zz d on pr-f27b882 (#201) for the FIRST time. No prior review window
      or runtime state for review-loop. fresh=True, initial_window_ids=set().


      Timeline (~/.pm/debug/project-manager-c5a1006b.log + ~/.pm/runtime/pr-f27b882.json):

      - 05:50:12 UTC: loop start. runtime_state: state=running iteration=0.

      - 05:52:41: iteration 1 launcher fires: ''transcript: symlink ... review-pr-f27b882-i1.jsonl''.
      podman rm -f starts.

      - 05:52:51: remove_container''s 10s wait loop confirms gone.

      - 05:52:52: podman run succeeds (id=2eea93fc4067), tmux window @728 ''review-#201''
      created, panes registered.

      - 05:54:53: iteration 1 completes verdict=PASS, state=done.


      User-visible: popup pane stayed showing ''review-loop: running…'' the whole
      time, never switched the user''s client to the new review-#201 window. Spinner
      appeared frozen on ''running'' until the loop completed and the popup eventually
      went away on its own. The user sat on the impl window the entire time.


      Why this isn''t covered by the PR''s stated fix: the stale-terminal-state short-circuit
      only fires when cur_state in (''done'',''failed''). For this incident cur_state
      was ''running'' all the way through. So the spinner skipped the short-circuit
      but ALSO failed to detect the window-open transition that should have fired
      its happy-path exit at session.py:1389-1412.


      Diagnostic asks for the implementing session:

      1. Confirm _find_target_window_ids() returns the new window id at the right
      tick. Possible cause: name-comparison edge case when target_window contains
      a literal ''#'' (e.g. ''review-#201'') vs whatever list_windows returns. Print
      the returned names verbatim and compare bytes.

      2. Confirm consume_suppress_switch isn''t returning True spuriously and silently
      skipping select_window. (Even if it did, the spinner echoes and returns — popup
      would close, not stay on ''running''. But still worth ruling out.)

      3. Confirm the spinner loop is actually ticking after window creation. Add a
      log statement at each tick recording (cur_state, window_open, len(cur_window_ids),
      saw_disappear). If the loop stops ticking before the window appears, the bug
      is elsewhere (some early-exit path, signal handling, blocked tmux call).

      4. Verify the popup process is indeed the one producing the stuck ''running…''
      display. ps -ef showed no live _popup-picker for #201 by the time we investigated;
      either the process exited (and the popup is somehow held visible by tmux without
      the controlling process) or it was running long enough to span the whole loop.


      Suggested broadening: the fix should cover BOTH the stale-terminal-state symptom
      (described in PR body) AND the failed-to-detect-fresh-window symptom (this note).
      Both manifest as ''spinner did not switch user to the review window despite
      the window existing''. They share the same observability gap and probably share
      a fix surface (better state-snapshot + better window-appearance detection).'

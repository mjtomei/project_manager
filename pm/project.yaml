- id: pr-853126a
  plan: bugs
  title: 'Fix race condition: keystrokes after / interpreted as commands before input
    has focus'
  branch: pm/pr-853126a-fix-race-condition-keystrokes-after-interpreted-as
  status: merged
  depends_on: []
  description: 'When typing / followed by characters quickly (e.g. /commit), the initial
    characters after / can be interpreted as TUI keybindings before the command input
    field has focus. For example, typing /commit fast enough could trigger the c keybinding
    before the input appears, because the command palette/input doesn''t capture focus
    synchronously with the / keypress.


    Expected behavior: all keys typed between / and either Enter or Escape should
    end up on the command line. No keystrokes in that window should be interpreted
    as TUI keybindings.


    Fix: buffer or suppress all keystrokes between the / press and the command input
    gaining focus, then replay them into the input field. Alternatively, enter a modal
    state on / that disables all other keybindings until the command input is dismissed.'

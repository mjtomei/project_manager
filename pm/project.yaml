- id: pr-2c060b2
  plan: plan-regression
  title: 'Claude-based regression test: CLI output rendering at varied terminal widths'
  branch: pm/pr-2c060b2-claude-based-regression-test-cli-output-rendering-
  status: pending
  depends_on: []
  description: "## Goal\n\nAdd a Claude-driven regression scenario that exercises\
    \ pm's CLI listing commands at randomly-chosen terminal widths and inspects the\
    \ rendered output for layout bugs.\n\n## Motivation\n\nThis kind of bug is hard\
    \ to catch with unit tests because the buggy behavior depends on (a) the specific\
    \ terminal width relative to the line length, (b) wide-char emoji status icons\
    \ miscounted by len(), (c) interactions between our wrapping and the terminal's\
    \ own edge-wrap behavior, and (d) less or other pagers being in the path. Two\
    \ real bugs from a single session of manual testing motivated this:\n\n1. echo_record\
    \ gated wrapping on isatty(stdout) — silently no-op'd when piped to less.\n2.\
    \ _wrap_record_to_width used len() rather than cell_len(), so lines that were\
    \ one cell over the width (because of a wide emoji icon) slipped past the wrap\
    \ check unwrapped and got mid-word-broken by the renderer. The textwrap.fill fallback\
    \ had the same bug for long lines without good break tokens.\n\nBoth bugs would\
    \ have been caught immediately by a \"render this command at width 94 and verify\
    \ no line exceeds 94 visual cells\" check.\n\n## Scenario shape\n\npm/qa/regression/cli-output-widths.md,\
    \ exercising 'pm pr list', 'pm pr list -t', 'pm pr list -t --workdirs', 'pm pr\
    \ ready', 'pm plan list', and other record-style commands as they are added.\n\
    \n1. Set up: ensure pm has a non-trivial set of PRs in project.yaml (the test\
    \ project's own state is a good sample — many PRs with varying title lengths,\
    \ status icons, deps lists, optional machine/timestamp suffixes).\n\n2. For each\
    \ of N randomly-chosen terminal widths in 60-180 (N ~= 8 plus edge values like\
    \ exactly the threshold the test detects):\n   a. Open a tmux pane resized to\
    \ that width (tmux resize-pane -t <pane> -x <width>).\n   b. Run each listing\
    \ command in that pane and capture via tmux capture-pane -p.\n   c. Hand the captured\
    \ output + the known terminal width to Claude with a prompt asking: are any lines\
    \ visually wider than the terminal? Are any words split mid-word? Are continuation\
    \ lines indented consistently? Does wrapping land at the natural boundary tokens\
    \ we configured (' <- ', ' (', ' [') when those tokens are present? Other layout\
    \ oddities?\n\n3. Aggregate per-width findings into a single PASS/NEEDS_WORK verdict.\
    \ Each finding includes the width, the offending output, and a short description.\n\
    \n4. Probe for improvements: Claude flags layouts that are technically correct\
    \ but ugly or hard to read (e.g. one-character spillover, awkward continuation\
    \ that could break at a better point, emoji not properly cell-counted). These\
    \ file as improvements via pm pr add --plan improvements rather than bugs.\n\n\
    5. Output a summary of findings and verdicts.\n\n6. Seeded RNG so a failure is\
    \ reproducible (width logged in the failure).\n\n## Sequencing\n\nIndependent\
    \ of Phase 10. Lands more usefully after pr-06a96fa (QA scenarios bind to regression\
    \ tests) since downstream QA scenarios that exercise CLI rendering can then bind\
    \ to this regression test via REGRESSION: <id>.\n\n## Manual testing\n\nReview\
    \ the rendered output across the seeded widths to confirm the verdict logic flags\
    \ real layout bugs and ignores acceptable wrapping. INPUT_REQUIRED is appropriate\
    \ for the visual-judgment portion.\n\n## Related\n\n- pr-70d02ed (filed alongside):\
    \ watcher behavior regression coverage. Same Claude-driven regression-test pattern,\
    \ different surface.\n- pr-a1f267a (filed alongside): auto-sequence chain regression\
    \ coverage. Same pattern, different surface.\n- pr-f4dc8a2 (QA library auditor):\
    \ the static counterpart that proposes missing regression tests systematically."

  description: Run QA scenario workers inside containers (e.g. Docker) instead of
    directly on the host. This provides isolation so that scenario workers cannot
    interfere with each other or with the host system during testing - they can safely
    install packages, modify system state, create throwaway projects, and exercise
    destructive test scenarios without risk. Each scenario worker gets its own container
    with the repo mounted or cloned in, Claude installed, and the necessary tools
    available. The QA planner spawns containers instead of bare tmux panes. Container
    lifecycle (create, monitor, collect results, teardown) should be managed by pm.

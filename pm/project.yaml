    and pr_merge. Let git merge attempt to proceed — git already succeeds when dirty
    files don''t overlap with merge changes. If git fails due to dirty file overlap,
    stash the conflicting files and retry the merge, then unstash after. Only lock
    the TUI with an overlay (e.g. ''Merging pr-xxx, please wait...'') if pm/ files
    were among the stashed files, since those are what the TUI reads/writes. Non-pm
    overlap stashes don''t need TUI locking. The vanilla backend pull --rebase path
    needs to switch to fetch + merge since rebase requires a fully clean tree.'

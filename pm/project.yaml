    text: 'Extend the adversarial+voting pattern to unit test generation, not just
      code review. After the scenario workers (pr-7f38bd9) write standard tests, a
      second adversarial pass runs with a prompt that explicitly assumes the code
      has a bug and tries to write a test that exposes it. The voting step then filters
      out tests that are overly strict or testing the wrong thing. This gives two
      distinct adversarial surfaces: finding issues in the code (review) and finding
      gaps in test coverage (test gen).'

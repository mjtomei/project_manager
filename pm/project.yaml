- id: pr-848ba9b
  plan: watchers
  title: Add decision point entity with CLI commands and workdir management
  branch: pm/pr-848ba9b-add-decision-point-entity-with-cli-commands-and-wo
  status: pending
  depends_on: []
  description: 'Decision points as a first-class entity for speculative parallel exploration.
    Writing code is speculative execution — you don''t know the ideal version until
    you''ve explored. Machines can pursue many paths in parallel instead of committing
    to one and backtracking.


    ## Data model


    Decision points stored in project.yaml:

    - id, description, status (open/resolved), resolution, parent (PR or spec)

    - branches: list of named variants, each with its own sub-tree of PRs and workdirs

    - At the plan/PR level: the tech tree forks into variant subtrees with different
    PR structures

    - At the spec level: multiple candidate specs branch from a base (title + short
    description)


    ## Branching mechanism


    Decision branches are implemented as git branches with corresponding workdirs
    — the same mechanism PRs already use, extended to represent alternatives:

    - Each branch of a decision point creates one or more git branches (one per PR
    in that variant''s sub-tree)

    - Each git branch gets its own workdir, as PRs do today

    - A decision point can be created from any workdir (base repo or a PR''s workdir),
    but the new branch always creates a separate workdir — never multiple levels of
    branching within a single directory

    - The parent-child relationship between workdirs is tracked in the data model
    so state can be collected by following these links across workdirs


    ## CLI commands


    - `pm decision add [--parent-pr <id>] [--description "..."]` — create a decision
    point, optionally attached to a PR or spec

    - `pm decision branch <decision-id> [--title "..."]` — add a branch to explore

    - `pm decision resolve <decision-id> <branch>` — pick a winner, archive losers

    - `pm decision list` / `pm decision show <id>` — list-style output for both humans
    and LLMs

    - `pm decision remove <decision-id>` — clean up a decision point and its branches

    - Commands must work correctly regardless of which workdir the user is currently
    in — they resolve the project context by following workdir parent links, not by
    assuming they''re in the base repo


    ## Branch-aware PR commands


    Existing PR commands (start, review, edit, show, etc.) must work across branches
    without requiring the user to manually check out a branch first.


    - **--branch flag**: all PR interaction commands gain an optional `--branch <name>`
    flag to target a specific decision branch

    - **Default targeting**: when no --branch is specified, commands target the most
    recent branch that worked on that PR (most recent start/activity timestamp across
    all branches)

    - **Branch resolution**: `pm pr show <id>` displays which branch it''s resolving
    to and what alternatives exist

    - **Write operations**: `pm pr start`, `pm pr edit`, `pm pr note` operate on the
    targeted branch''s workdir and project.yaml, not master

    - **Read operations**: `pm pr list`, `pm pr show`, `pm pr ready` aggregate across
    branches by default, with --branch to filter


    This means the tool works the same as today for projects with no decision points
    (one branch = master, default targeting picks it). When decision points exist,
    the default behavior naturally follows where the work is happening.


    ## Workdir management


    - Creating a branch auto-creates a new workdir (always a separate directory, never
    nested within the source workdir)

    - Resolving a decision auto-cleans loser branch workdirs

    - Each branch can have its own sub-tree of PRs with independent depends_on chains

    - Workdir parent-child links tracked in project state so the full tree of workdirs
    can be traversed


    ## Design principles


    - Not tied to any prompt — a human can manage decision points entirely through
    CLI

    - Prompts will be made aware separately (different PR)

    - List-style commands optimized for LLM consumption, same commands work for humans

    - Either human or machine can resolve decisions — the interface must make large
    decision trees digestible


    ## Manual testing needed


    - CLI command lifecycle: add → branch → resolve → remove

    - Workdir creation/cleanup on branch/resolve operations

    - Decision point created from within a PR workdir (not base repo)

    - Commands run from a branch workdir correctly resolve project context

    - project.yaml serialization of decision point state

    - PR commands with --branch flag targeting correct workdir

    - Default branch resolution picking most recent activity

    - Backward compatibility: no decision points = identical to current behavior'

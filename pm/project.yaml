- id: pr-cb2a29d
  plan: null
  title: Kill tmux windows and containers for merged PRs on TUI startup
  branch: pm/pr-cb2a29d-kill-tmux-windows-and-containers-for-merged-prs-on
  status: in_progress
  depends_on: []
  description: 'When a PR is merged via the GitHub backend on the project_manager
    repo, _finalize_merge calls kill_pr_windows inside a bare try/except that silently
    swallows failures. The subsequent trigger_tui_restart causes the TUI to reload
    with the status already set to merged, so neither the GitHub sync nor the background
    sync treats it as newly merged — there is no second-chance cleanup.


    Fix: On TUI startup (in _deferred_startup_sync or heal_registry), scan all merged
    PRs and check if they still have live tmux windows (matching the naming patterns:
    {display_id}, review-{display_id}, qa-{display_id}, qa-{display_id}-sN). Kill
    any that exist. Also stop and remove any docker containers whose names match merged
    PR workdir IDs.


    Additionally, remove the bare except Exception: pass around kill_pr_windows in
    _finalize_merge so failures are at least logged.'

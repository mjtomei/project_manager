- id: pr-341100c
  plan: tui-ux
  title: Add per-plan standalone PM sessions within the same project
  branch: pm/pr-341100c-add-per-plan-standalone-pm-sessions-within-the-sam
  status: pending
  depends_on: []
  description: 'Allow users to run separate independent PM sessions focused on different
    plans within the same project.


    ## Behavior

    - pm session --plan <plan_id> starts a TUI session scoped to a specific plan

    - The TUI filters to show only PRs in that plan (and their cross-plan dependencies)

    - Auto-start, watcher, and review loops only operate on PRs in the active plan

    - Multiple plan sessions can run concurrently in separate tmux sessions

    - Each session has its own tmux session name (e.g. pm-project-plan-qa)

    - The default pm session (no --plan flag) shows everything as today


    ## Use cases

    - Focus on one plan without noise from 100+ other PRs

    - Different team members work on different plans simultaneously

    - Run auto-start on a specific plan without affecting others

    - Reduce TUI rendering cost by only showing relevant PRs


    ## Shared state

    - All sessions share the same project.yaml — file locking (PR #109) ensures safe
    concurrent writes

    - PR status changes in one session are visible in others on next poll/refresh'

- id: pr-eb450a0
  plan: plan-regression
  title: 'Bug-fix flow: persist pre-fix repro and post-fix verification evidence as
    artifacts'
  branch: pm/pr-eb450a0-bug-fix-flow-persist-pre-fix-repro-and-post-fix-ve
  status: pending
  depends_on:
  - pr-6be8ee6
  description: 'Make the bug-fix loop''s reproduce / fix / verify steps produce machine-checkable
    artifacts on disk, so the watcher and merge gate can confirm each step actually
    happened (not just that the prompt asked for it).


    ## Motivation


    #190 / pr-6be8ee6 adds a ''did you reproduce on pre-fix code?'' gate to the bug-fix
    prompt, but the gate is purely advisory — nothing attests that the session actually
    performed the repro. For unsupervised runs we need evidence on disk so the watcher
    / verdict can hard-gate on it.


    ## Proposed convention


    Persist evidence under `pm/evidence/<pr_id>/`:


    - `pre-fix.md` — written before the fix is applied. Must include: the sha that
    was checked out for repro (parent / pre-fix), the exact commands or test invocation
    used, and the captured output / log / screenshot path showing the bug occurring.
    The session must produce this file *before* modifying any source.

    - `post-fix.md` — written after the fix is applied on the fix branch. Same structure:
    sha (HEAD of fix branch), commands, captured output showing the bug no longer
    reproduces. Must reference `pre-fix.md` so the diff of behavior is auditable.


    For TUI bugs the captured output is a `pm tui view` snapshot; for CLI bugs it
    is the relevant stdout/stderr; for unit-testable bugs it can be a pytest output.


    ## Watcher / gate behavior


    - Bug-fix implementation watcher (#177) refuses to mark the PR ready-for-review
    unless `pre-fix.md` exists and references a sha != HEAD of the fix branch.

    - Review/QA verdict gate refuses PASS unless `post-fix.md` exists and references
    HEAD of the fix branch (or a descendant sha).

    - If the fix is fundamentally not reproducible (rare), the session writes `pre-fix.md`
    with an explicit ''NOT_REPRODUCIBLE'' marker and a justification; this routes
    to INPUT_REQUIRED instead of silently proceeding.


    ## Code paths

    - pm_core/prompt_gen.py: extend _BUG_FIX_FLOW_BLOCK to instruct writing the artifacts
    and reference the path convention.

    - pm_core/watchers/<bug-fix-impl>: check `pre-fix.md` exists and sha-references
    parent before allowing review handoff.

    - pm_core/qa or review verdict path: check `post-fix.md` references fix-branch
    sha before PASS.

    - pm/evidence/ added to .gitignore? — open question. Probably git-track it so
    reviewers can read the evidence and so it survives workdir cleanup. Decide during
    impl.


    ## Out of scope

    - Auto-generating the artifacts from session output (would be nice, but for now
    the session writes them explicitly).

    - Evidence formats for non-bug PR types.


    ## Depends on

    - #190 / pr-6be8ee6 (introduces the pre-fix repro gate this PR makes machine-checkable)'

- id: pr-5612e43
  plan: improvements
  title: 'Improvement: new ''github-queued'' backend — container is fully isolated
    from GitHub, ops queue up for out-of-container review and execution'
  branch: pm/pr-5612e43-improvement-new-github-queued-backend-container-is
  status: pending
  depends_on:
  - pr-726757e
  description: "## Goal\nA new pm backend that fully isolates the containerized pm\
    \ session from GitHub. The container cannot push, cannot fetch from origin, cannot\
    \ call gh, cannot reach any GitHub endpoint at the network layer. Any operation\
    \ that would normally hit GitHub (git push origin, gh pr create, gh pr merge,\
    \ gh pr ready, pr status sync) is captured by pm's existing push-proxy infrastructure\
    \ and written to a queue. The user reviews and executes queued ops from outside\
    \ the container using new CLI commands.\n\nA defensive firewall layer enforces\
    \ the isolation in case any code path bypasses the queue stubs — egress to github.com,\
    \ api.github.com, ssh-host github.com, etc. is blocked at the network layer.\n\
    \nThis is the natural endpoint of the safety story started in pr-ca19555 (whole-session\
    \ containerization + popup) and pr-726757e (safety profiles with egress allowlists).\
    \ With this backend, even dangerously-skip-permissions running on misbehaving\
    \ code can only poison your local workdir — nothing leaves until you sign off.\n\
    \n## Architecture\n\n### New backend: github-queued\n\nSibling of the existing\
    \ github backend. Selected via `pm init --backend github-queued` or by setting\
    \ `project.backend = github-queued` in project.yaml.\n\nIn-container, every git\
    \ remote operation and every gh call:\n\n1. Captured by the existing push-proxy\
    \ infrastructure (`pm_core/push_proxy.py` — already intercepts git push/fetch/pull/ls-remote\
    \ via the wrapper at `/home/pm/.local/bin/git` inside containers).\n2. Instead\
    \ of forwarding to the host's git, the proxy writes the operation to a queue at\
    \ `~/.pm/queues/<session-tag>/ops.jsonl`. Each entry: op-id (uuid), kind (`git_push`\
    \ / `gh_pr_create` / `gh_pr_merge` / `gh_pr_ready` / `gh_pr_view` / `git_fetch_origin`\
    \ / etc.), the original argv, the PR-id and pm context, timestamp, the in-container\
    \ working directory.\n3. The proxy returns a synthesized success response to the\
    \ agent so it can continue. For reads (gh pr view, git fetch), the proxy may return\
    \ cached or empty results — or the queue can include a `read_request` entry that\
    \ the user fulfills out-of-container by writing the result back.\n\n### Out-of-container\
    \ CLI\n\n- `pm queue list [--session <tag>]` — show pending ops with op-id, kind,\
    \ summary, PR context, timestamp.\n- `pm queue show <op-id>` — full detail: full\
    \ argv, env, in-container workdir, PR's status, what the agent did right before\
    \ queuing.\n- `pm queue execute <op-id>` — run the op against actual GitHub. Confirms\
    \ before destructive ops (push, pr-merge, pr-create). Records the result back\
    \ into the queue entry as executed_at + outcome.\n- `pm queue execute --all` —\
    \ batch-execute pending ops in order, with one combined confirm.\n- `pm queue\
    \ clear <op-id>` — drop without executing.\n- `pm queue diff <op-id>` — for git_push,\
    \ show the diff that would be pushed.\n- `pm queue tui` — TUI surface listing\
    \ pending ops by session/PR, with key bindings for execute/clear/diff.\n\nRead-class\
    \ ops (gh pr view, git fetch) can be auto-executed by a separate daemon outside\
    \ the container if the user trusts read-only as a class — a `pm queue auto-execute\
    \ reads` setting. Writes (push, pr-merge, pr-create) always require explicit user\
    \ action.\n\n### Defensive firewall\n\nEven with the queue mechanism, a misbehaving\
    \ agent might try to call GitHub directly (a raw https request to api.github.com,\
    \ bypassing the proxied git/gh wrappers). Block at the network layer:\n\n- iptables\
    \ / netns rules at session-container start.\n- Egress denied to github.com, api.github.com,\
    \ raw.githubusercontent.com, ssh-github (port 22 to known GH IPs), and any other\
    \ GH-owned endpoints (resolvable list maintained in pm).\n- Egress to the model\
    \ API endpoint stays open (the agent needs to talk to Claude).\n- Egress to git\
    \ mirror / package index hosts allowed if configured in the safety profile.\n\n\
    The firewall composes with pr-726757e's egress-allowlist profiles: github-queued\
    \ backend implies an egress profile that excludes GitHub (a new profile or a flag\
    \ on the existing bounded profile).\n\nThe firewall is the second line of defense.\
    \ The queue stubs are the first. Together: if a code path skips the queue, the\
    \ network refuses the connection; if a code path skips both (impossible in correct\
    \ code, but defending against bugs), nothing reaches the network without the kernel-level\
    \ rule being changed.\n\n### Firewall-setup command with Claude-driven app review\n\
    \nThe firewall is the load-bearing security primitive. Misconfiguration (a forgotten\
    \ allow rule, a wildcard that resolves to too much) silently nullifies the isolation.\
    \ Don't let it be configured by a single command-line flag. Instead, ship an interactive\
    \ setup where Claude reviews the actual project to determine what can be defensively\
    \ blocked.\n\n- New CLI: `pm session firewall setup`. Required before the github-queued\
    \ backend can be activated for the first time on a session-tag. Recommended for\
    \ any non-permissive safety profile.\n- The command launches a Claude session\
    \ (in a dedicated tmux pane, not a one-shot) that:\n  1. **Reviews the app itself**\
    \ — reads the project's code, dependency manifest, test fixtures, CI config, scripts,\
    \ and documentation to identify every network resource the app actually needs.\
    \ Examples: a Python project's `requirements.txt` may pull from `pypi.org` and\
    \ `files.pythonhosted.org`; a Node project needs `registry.npmjs.org`; a project\
    \ that calls a third-party API needs that specific endpoint; tests may hit a local\
    \ DB on a loopback address.\n  2. **Proposes a tight allowlist** scoped to what\
    \ the app demonstrably needs. Everything else is denied. The proposal is presented\
    \ to the user as a structured list: each entry has the source code reference (file:line\
    \ where the dependency on that resource was found), the resource, why it's needed,\
    \ and what category it falls into (package mirror / model API / user-configured\
    \ external API / data source).\n  3. **Identifies things that can be safely blocked**\
    \ — GitHub endpoints (covered by the queued backend), miscellaneous CDNs, telemetry\
    \ endpoints, anything not justified by a code reference.\n  4. **Flags risky configurations**\
    \ before the user accepts: an allowlist that includes `*.github.io` or any wildcard\
    \ that matches GitHub assets; an env-var allow that leaks GH_TOKEN; a dependency\
    \ that pulls from a CDN with no integrity check; a forgotten deny for ssh ports.\n\
    \  5. **Asks the user to confirm each non-trivial rule** with full context (what\
    \ code triggered the allow, what gets through, what gets denied).\n  6. After\
    \ the user confirms, writes the firewall config to `~/.pm/sessions/<tag>/firewall.yaml`\
    \ AND a hash/digest of the config to `~/.pm/sessions/<tag>/firewall.confirmed`.\
    \ The runtime refuses to apply a firewall config whose hash doesn't match the\
    \ confirmed digest — so silent edits to firewall.yaml without re-running the setup\
    \ don't take effect.\n\n- A stale firewall is worse than no firewall, because\
    \ the user assumes protection that isn't there. By gating activation on Claude-reviewed-and-user-confirmed\
    \ config with a digest, drift is caught.\n- Re-running `pm session firewall setup`\
    \ is required after any meaningful change to the app's network surface (new dependency,\
    \ new external API call, new manifest entry) — the review naturally surfaces these\
    \ because step 1 re-scans the project. Also required after a pm release that changes\
    \ the default firewall categories.\n\nThis command is also a natural place to\
    \ re-show the risk text from pr-ca19555's popup — but with explicit confirmation\
    \ of each rule rather than a single dismiss-or-mute action. The popup is a \"\
    you haven't enabled this\" reminder; the firewall setup is \"you're about to enable\
    \ a load-bearing isolation primitive, and here is the exact surface it's protecting\
    \ based on what your code actually needs.\"\n\n## Acceptance criteria\n- `pm init\
    \ --backend github-queued` creates a project that uses the new backend.\n- Activating\
    \ github-queued on a session-tag refuses to start the session until `pm session\
    \ firewall setup` has been completed and `firewall.confirmed` matches the current\
    \ `firewall.yaml` digest.\n- After successful setup, inside a containerized session\
    \ for such a project, `git push origin <branch>` returns success quickly and writes\
    \ a git_push entry to the queue. No network packets leave the container to a GitHub\
    \ endpoint.\n- `gh pr create` inside the container similarly queues, doesn't reach\
    \ GitHub.\n- `pm queue list` from outside the container shows the queued ops.\n\
    - `pm queue execute <op-id>` performs the actual GitHub operation and records\
    \ the result.\n- The defensive firewall blocks a direct `curl https://api.github.com/`\
    \ from inside the container even when the queue mechanism is bypassed.\n- Editing\
    \ `firewall.yaml` without re-running setup → session refuses to start until setup\
    \ is re-run.\n\n## Invariants\n- A queued op MUST NOT mutate any GitHub state.\
    \ Mutation happens only when the user runs pm queue execute.\n- The queue MUST\
    \ be append-only on the write side. Editing a queued op requires pm queue clear\
    \ + re-trigger from inside.\n- The firewall MUST deny by default for GitHub endpoints;\
    \ explicit allowlist for model API + configured non-GH remotes.\n- The queue MUST\
    \ capture enough context to make pm queue show understandable without rejoining\
    \ the in-container session.\n- The queue file format MUST be append-only JSONL.\n\
    - The firewall config MUST be activation-gated by a hash match against the confirmed\
    \ digest. No silent drift.\n\n## Edge cases\n- Container is destroyed (host crash,\
    \ manual kill) with pending ops → ops remain on host disk and can still be executed.\n\
    - Agent runs gh pr view <unrelated-pr> for context → queued as a read request.\
    \ User decides whether to fulfill or stub.\n- pm release upgrades the default\
    \ firewall categories → the digest no longer matches; user must re-run setup.\
    \ Annoying but correct.\n- Multiple session-tags on the same host → each has its\
    \ own firewall.yaml + confirmed digest.\n\n## Verification\n- Inside container:\
    \ `git push origin HEAD` → returns success quickly (queued); tcpdump observes\
    \ no packets egressing to github.com.\n- Inside container: `gh pr create --title\
    \ 'x' --body 'y'` → queued; firewall rule on GH endpoints unreached.\n- Inside\
    \ container: `curl -v https://api.github.com/user` → connection refused by firewall.\n\
    - Inside container: `curl -v https://api.anthropic.com/...` → succeeds.\n- Outside\
    \ container: `pm queue list` shows both ops with full context. `pm queue execute\
    \ <op-id>` for the push → push lands on origin.\n- Tamper check: edit firewall.yaml\
    \ manually, start session → refuses to start; setup must be re-run.\n\n## Out\
    \ of scope\n- A queued backend for non-GitHub git hosts (Gitea, GitLab). The pattern\
    \ is the same; this PR is GitHub-specific. A queued-gitlab or queued-gitea can\
    \ be a follow-up.\n- Operational sandboxing of model-API calls.\n- Cross-host\
    \ coordination of the queue.\n\n## Related\n- pr-ca19555 — whole-session containerization.\
    \ Required.\n- pr-726757e — safety profiles with egress allowlists. This PR adds\
    \ a new effective profile on top of the same firewall primitive.\n- pm_core/push_proxy.py\
    \ — existing infrastructure that already intercepts git remote ops. This PR extends\
    \ it with a queueing mode for the new backend.\n- pm_core/backends/ — where the\
    \ new github-queued backend lives, alongside local, vanilla, github."

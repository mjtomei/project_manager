- id: pr-fbda1a8
  plan: plan-regression
  title: 'Bridge old and new QA flows: tests for merged watchers under Phase 10 model'
  branch: pm/pr-fbda1a8-claude-based-tests-for-watcher-classes-and-prompt-
  status: pending
  depends_on:
  - pr-d60d185
  - pr-06a96fa
  - pr-2680fbf
  - pr-51586d2
  - pr-1d8b2b7
  description: "## Goal\n\nThis PR is the bridge between the old (Phases 1-5) and\
    \ new (Phase 10) QA flows. It fills the testing gaps identified after the regression-loop\
    \ landing AND re-validates every merged feature from Phases 1-5 under the new\
    \ regressions-as-scenarios flow.\n\nThe three concrete watcher classes and their\
    \ prompt builders shipped without direct unit tests — covered only by framework-level\
    \ tests and a live operator markdown. Worse, they shipped *and* were QA'd under\
    \ the old INSTRUCTION+ARTIFACT scenario model that Phase 10 replaces. When Phase\
    \ 10's chain (pr-06a96fa → pr-2680fbf → pr-51586d2) lands, the QA loop's verdicts\
    \ mean something different — the merged features need re-validation against the\
    \ new model.\n\nThis PR adds Claude-based integration tests using FakeClaudeSession\
    \ (pr-abcf70f) and FakeGitHubBackend (pr-9603d04, Phase 10) so the watchers can\
    \ be exercised deterministically, with scenarios bound to (or authoring) real\
    \ regression tests rather than the deprecated INSTRUCTION+ARTIFACT scaffolding.\n\
    \n## Targets\n\n1. **Watcher class tests under the new flow** — new tests/test_discovery_supervisor.py,\
    \ tests/test_bug_fix_impl_watcher.py, tests/test_improvement_fix_impl_watcher.py.\
    \ Each script a sequence of FakeClaudeSession responses for a few ticks, verifying:\n\
    \   - The watcher reads its work log and project state correctly\n   - It writes\
    \ expected entries on each tick\n   - It emits READY / INPUT_REQUIRED at the right\
    \ times\n   - For the discovery supervisor: it launches regression tests via the\
    \ existing launch_qa_item path (mocked to record the call) and reconciles filed\
    \ PRs post-hoc\n   - For the impl watchers: they pick the right PR from their\
    \ plan, invoke pm pr auto-sequence on it, and (for bug-fix) auto-merge on PASS\n\
    \   - **Critically**: the scenarios the watchers consume bind to regression tests\
    \ (via pr-06a96fa) or trigger new-regression authoring (via pr-2680fbf), not INSTRUCTION+ARTIFACT.\n\
    \n2. **Watcher prompt generation tests** — extend tests/test_bug_fix_flow_prompts.py\
    \ patterns to the four new prompt builders in prompt_gen.py (discovery_supervisor,\
    \ bug_fix_impl, improvement_fix_impl, watcher_review_session). Direct prompt-string\
    \ assertions: notes injection works, work-log path is referenced, plan source\
    \ is correct, merge mode (auto vs gated) is encoded, mocks awareness is wired\
    \ at the new-regression authoring surface (pr-51586d2) and NOT at scenario planning.\n\
    \n3. **Auto-sequence integration backstop** — tests/test_pr_auto_sequence_integration.py\
    \ that exercises the three integration paths flagged during pr-e58459b's review\
    \ (O keypress + _stop_before_merge, _check_impl_idle against a real PaneIdleTracker,\
    \ _launch_qa_detached running run_qa_sync from a detached process). FakeClaudeSession\
    \ + the existing TUI test framework (pr-ac3625d) substrate.\n\n4. **Pane_ops behavioral\
    \ tests** — add tests for launch_qa_item's new target_window parameter (pr-97ddabf)\
    \ and the regression filing addendum (pr-47940bc): assert the addendum text appears\
    \ in the wrapped session prompt and that target_window correctly routes to the\
    \ watcher's pane.\n\n5. **End-to-end re-validation of Phases 1-5 under Phase 10's\
    \ flow** (NEW SCOPE):\n   - Discovery supervisor launch + reconcile cycle, exercised\
    \ against regression tests bound via pr-06a96fa\n   - Bug-fix watcher pick-and-advance\
    \ loop, verified that scenarios bind to regression tests (existing or freshly-authored\
    \ via pr-2680fbf)\n   - Improvement-fix watcher gated-merge behavior, verified\
    \ the regression library grows when new-regressions are authored\n   - Auto-sequence\
    \ chain's halt-at-pause-condition handling, verified pauses still fire correctly\
    \ when the scenario stage runs under the new flow\n   - Watcher review session's\
    \ summary-then-chat opening, verified it reads the work logs correctly given the\
    \ new scenario shape\n   - Regression-filing addendum from pr-47940bc, verified\
    \ that regression tests filing bugs still file them with the correct plan routing\
    \ under the new flow\n   - For each of the above, prefer existing regression tests\
    \ (REGRESSION: <id>); use NEW_REGRESSION: <slug> via pr-2680fbf where none exist,\
    \ contributing to the library rather than expanding test scaffolding.\n\n## Why\
    \ this bridges old and new\n\nThe old Phases 1-5 PRs were implemented, reviewed,\
    \ and QA'd against the pre-Phase-10 flow — INSTRUCTION+ARTIFACT scenarios, pre-strip\
    \ mocks injection, no regression-test binding. They merged. Phase 10's chain changes\
    \ the underlying model. Without this PR, there is no checkpoint that confirms\
    \ the merged features still behave correctly under the new model — they could\
    \ regress silently as soon as the new flow becomes the default.\n\nThis PR makes\
    \ that checkpoint explicit: it depends on Phase 10's chain (pr-06a96fa, pr-2680fbf,\
    \ pr-51586d2) so it runs only after those land, and it exercises every Phase 1-5\
    \ feature against the new flow before declaring the regression loop ready for\
    \ unsupervised operation.\n\n## Manual testing during review\n\nRun `pytest tests/test_discovery_supervisor.py\
    \ tests/test_bug_fix_impl_watcher.py tests/test_improvement_fix_impl_watcher.py\
    \ tests/test_pr_auto_sequence_integration.py -v` and confirm all pass. New tests\
    \ should be deterministic — no real Claude calls, no real tmux operations beyond\
    \ what the existing test substrate supports. Additionally, manually verify a single\
    \ end-to-end run of the full watcher chain under the new flow: discovery supervisor\
    \ launches a regression test, test files a bug, bug-fix watcher picks it up, auto-sequence\
    \ runs scenarios that bind to regression tests, verdict propagates, merge happens.\
    \ INPUT_REQUIRED appropriate for the visual / end-to-end validation portions.\n\
    \n## Depends on\n\n- pr-d60d185 — the merged auto-start command this PR's end-to-end\
    \ probe drives.\n- pr-06a96fa — the regressions-as-scenarios binding model; tests\
    \ must exercise it.\n- pr-2680fbf — the new-regression authoring step; tests must\
    \ cover both \"binds to existing\" and \"authors new\" paths.\n- pr-51586d2 —\

- id: pr-418acc2
  plan: plan-cb4ef69
  title: Gated coherence review for plan edits during plan-review conversations
  branch: pm/pr-418acc2-gated-coherence-review-for-plan-edits-during-plan-
  status: closed
  depends_on: []
  description: 'Superseded by plan-984dfeb (Living artifacts: plans and PRs as negotiating-task
    workspaces).


    The gated-edit framing assumed two things that the user has since reframed:


    1. That edits are the atom — proposed, then validated, then either accepted or
    rejected. The newer framing treats the *task itself* as the live object; its proposal
    evolves through negotiation with other in-flight tasks and is only an edit once
    it has converged. There is no single moment when ''a finished edit is under review.''


    2. That coherence is enforced by an observer (the gate). The newer framing treats
    artifact integrity as a constraint each task is accountable to during its negotiation,
    not as a rule enforced by a central manager. There is no bottleneck observer —
    multiple tasks act in parallel, each prompted with integrity-relevant context,
    and convergence emerges from negotiation, not from adjudication.


    The coherence concern this PR raised is real and motivates plan-984dfeb''s work.
    The mechanism this PR proposed (a gate over individual edits) is not the right
    shape.'

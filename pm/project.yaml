    \ Claude output length (default: 3)\n- --body TEXT: custom content between _START\
    \ and _END markers; defaults to a short placeholder\n- --delay SECONDS: sleep\
    \ before writing the verdict to simulate session duration (default: 0)\n- --stream:\

  status: pending
  depends_on: []
  description: 'Beyond line coverage (see sibling PR), add two richer measures so
    PASS / NEEDS_WORK reflects test rigor more honestly:


    (1) Path / branch coverage — for each new function or branch in the diff, count
    how many of its independent paths were exercised by scenarios. A function with
    five if-branches that scenarios only exercised one of has poor path coverage even
    if line coverage looks decent. coverage.py supports branch coverage natively (--branch);
    this PR enables it and feeds the per-branch data into the verdict computation
    alongside line coverage.


    (2) User-story coverage — when a plan or PR description specifies user stories
    (per plan-ff4f1a7''s ''plans must produce user stories'' requirement), QA should
    track which stories each scenario exercises and which are uncovered. The QA planner
    already gets the PR description; extend its output schema so each scenario tags
    itself with the user story IDs it covers. The verdict aggregator computes: of
    the user stories declared for this PR, how many are covered by ≥1 scenario? Uncovered
    stories appear in the verdict report as a list, prompting the planner to generate
    scenarios for them on the next iteration.


    These compose with line coverage from the sibling PR: line coverage is the broadest
    signal, path coverage catches branch gaps in covered code, user-story coverage
    catches whole-feature gaps that may not show up as uncovered lines if the PR''s
    code is small relative to the surface it changes.


    Files: pm_core/qa/coverage.py (extend with branch coverage parsing), pm_core/prompt_gen.py
    (planner prompt — request per-scenario user-story tags), pm_core/qa_loop.py (verdict
    aggregation). Tests: synthetic PR with one branch uncovered produces low path
    coverage and a NEEDS_WORK message naming the branch; synthetic PR with 3 user
    stories of which 2 have scenarios produces 67% story coverage and a NEEDS_WORK
    naming the third; both measures degrade gracefully when the PR''s spec lacks user
    stories (coverage falls back to a default ''untagged'' bucket rather than failing).'

  branch: pm/pr-f17e22b-bug-interacting-with-the-tui-block-in-container-bo
  status: pending
  depends_on: []
  description: '## Symptom

    Five prompt generators ship the ''Interacting with the TUI'' block (`tui_section()`
    at pm_core/prompt_gen.py:106) into sessions that run inside containers. Those
    sessions cannot reach the host''s tmux socket, so commands like `pm tui send`
    / `pm tui view` either fail or sit silently. The block is misleading at best and
    actively wastes session effort at worst (sessions try to drive the TUI as instructed
    and get nowhere).


    ## Affected generators


    Container-bound (block should NOT appear):

    - generate_prompt (impl session, prompt_gen.py:177) — including bug-fix flow which
    appends _BUG_FIX_FLOW_BLOCK on top

    - generate_review_prompt (prompt_gen.py:262)

    - generate_merge_prompt (prompt_gen.py:485)

    - generate_qa_interactive_prompt (prompt_gen.py:1556)

    - generate_standalone_qa_prompt (prompt_gen.py:1795)


    Host-side (block IS appropriate, keep as-is):

    - generate_watcher_prompt

    - generate_discovery_supervisor_prompt

    - generate_bug_fix_impl_prompt (the watcher orchestrator, not the per-PR impl
    session)

    - generate_improvement_fix_impl_prompt

    - generate_watcher_review_prompt


    ## Fix

    Add a `containerized: bool = False` parameter to `tui_section(session_name, containerized=False)`
    that returns `""` when True. Have the five container-bound generators pass `containerized=True`
    (or have them resolve container mode via `pm_core.container.is_container_mode_enabled()`
    so the gating tracks the actual launch mode rather than a hardcoded assumption).


    Slightly cleaner alternative: add a `include_tui` parameter to the generators
    themselves, defaulted False for the container-bound ones and True for the host-side
    ones — that keeps the policy at the call site where the launch context is known,
    instead of inside `tui_section`.


    Either way, only the policy-decision lives at the boundary; `tui_section` itself
    stays a leaf helper.


    ## Test

    Spot-check the rendered prompts:

    - pm pr start <bug-pr> in container mode → impl prompt should not contain ''Interacting
    with the TUI''.

    - pm pr review <pr> in container mode → review prompt likewise clean.

    - generate_bug_fix_impl_prompt (watcher) → should still contain the block.


    ## Out of scope

    - Building a container-side TUI proxy so contained sessions could legitimately
    reach the host TUI. Separate idea; this PR just stops claiming the capability
    where it doesn''t exist.'

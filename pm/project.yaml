- id: pr-2680fbf
  plan: plan-regression
  title: QA scenario planner creates new regression test when none fits
  branch: pm/pr-2680fbf-qa-scenario-planner-creates-new-regression-test-wh
  status: pending
  depends_on:
  - pr-06a96fa
  description: '## Goal


    When the QA scenario planner is producing scenarios for a PR and finds no existing
    regression test in pm/qa/regression/ that drives the user flow a scenario needs,
    it authors a new regression test as part of the QA run rather than falling back
    to ad-hoc INSTRUCTION + ARTIFACT scaffolding. The new regression test lands in
    pm/qa/regression/ in the same PR''s branch, becomes a durable asset the discovery
    supervisor (pr-271cb3a) can rerun, and is bound to the scenario via the REGRESSION:
    field introduced by pr-06a96fa.


    ## Why


    After pr-06a96fa lands, QA scenarios prefer binding to existing regression tests.
    INSTRUCTION + ARTIFACT remain only as a fallback. But fallback-as-permanent-strategy
    is exactly the dynamic that prevents the regression library from growing — the
    planner takes the easy path and the library never accumulates new drivers. The
    compounding-value of the regression flow only kicks in when ''no regression fits
    → write one'' is the planner''s default, not an afterthought.


    ## Shape


    1. **Planner decision:** during scenario planning, for each candidate scenario
    the planner classifies its driving flow. If an existing regression test matches
    the flow, emit REGRESSION: <id>. If none matches, emit NEW_REGRESSION: <slug>
    with a one-line description and the planner proceeds to draft the regression test.


    2. **New-regression authoring sub-step:** for each NEW_REGRESSION, a sub-session
    (or a planner-extension turn) drafts pm/qa/regression/<slug>.md following the
    existing regression-test conventions (frontmatter, setup, drive, capture, assertions).
    The drafted file lands in the PR''s branch as part of the scenario''s QA workdir
    commits, the same way scenario captures already do.


    3. **Scenario rebinding:** the scenario emitted by the planner references the
    newly-drafted regression test by its slug. Concretizer and worker treat it the
    same as an existing regression test — load and run it.


    4. **Discovery-supervisor pickup:** because the new regression lives in pm/qa/regression/,
    it''s automatically in scope for the discovery supervisor (pr-271cb3a) on subsequent
    ticks. The library grows by accumulation as designed.


    ## Awareness handoff to mocks


    This is the point where the mocks library becomes relevant — NOT during scenario
    authoring (the pr-942aa21 / pr-6be8ee6 failure mode), but when a regression test
    is being drafted. A regression test specifies a flow against a surface; that surface
    may have mocks the test should use (e.g. FakeGitHubBackend if the test exercises
    github-backend behavior). The new-regression authoring prompt is where the diff-scoped
    mocks block belongs. Sequencing: this PR first, pr-51586d2 (mocks reconnection)
    reads its hand-off contract from here.


    ## Failure paths


    - Planner thinks a regression fits but it doesn''t quite — the scenario fails
    to bind and falls back to NEW_REGRESSION. Handled by treating REGRESSION: as a
    hint that can be downgraded mid-concretization.

    - Drafted regression test fails to run on first attempt — same retry/INPUT_REQUIRED
    pattern that exists for scenarios today; the half-drafted file stays on the branch
    for next iteration.

    - INSTRUCTION + ARTIFACT fallback still exists for scenarios where authoring a
    regression doesn''t make sense (one-shot probes, oracle questions, etc.); planner
    is taught the bar: prefer existing regression, then draft new regression, then
    fall back.


    ## Scope


    - Extend QA planner output schema with NEW_REGRESSION block (sibling of REGRESSION).

    - Add new-regression authoring sub-step to the planner pipeline (prompt-builder
    + invocation).

    - Concretizer + worker accept newly-drafted regression by slug.

    - pr-06a96fa''s REGRESSION-binding code path consumes the new entries seamlessly.

    - Tests: planner emits NEW_REGRESSION when no fit; authoring sub-step produces
    a well-formed markdown file; scenario binds to the drafted regression; falls back
    to INSTRUCTION when neither REGRESSION nor NEW_REGRESSION is appropriate.


    ## Depends on


    - pr-06a96fa (scenarios bind to regression tests as their flow driver — this PR
    extends that binding to newly-authored regressions)


    ## Related


    - pr-51586d2 (mocks reconnection) — depends on this PR; the mocks-awareness block
    lives in the new-regression authoring prompt, not in scenario generation.

    - pr-f4dc8a2 (QA library auditor) — scans for missing fills; this PR is the runtime
    equivalent (write the fill on the spot when a scenario needs one).

    - pr-271cb3a (discovery supervisor) — picks up newly-authored regressions on next
    tick.'

- id: pr-ca6981c
  plan: bugs
  title: 'Bug: pm merge''s git stash/pop corrupts project.yaml with conflict markers
    and leaks un-popped stashes'
  branch: pm/pr-ca6981c-bug-pm-merge-s-git-stash-pop-corrupts-project-yaml
  status: pending
  depends_on: []
  description: "Observed while merging PR #209 (gh #209 / pr-1160366). The merge left\
    \ pm/project.yaml containing raw git conflict markers:\n\n    <<<<<<< Updated\
    \ upstream\n      updated_at: '...02:44:25...'\n    =======\n      updated_at:\
    \ '...02:52:11...'\n    >>>>>>> Stashed changes\n\nwhich is invalid YAML, so store.load()\
    \ raised ProjectYamlParseError and EVERY pm command (list, tui, sync, merge) broke\
    \ until hand-fixed. Two distinct failure modes from the same root cause:\n\n1.\
    \ CORRUPTION: pm merge auto-stashes local project.yaml edits (commit msg 'pm:\
    \ auto-stash for merge'), performs the git merge, then 'git stash pop'. When another\
    \ session has updated project.yaml in the meantime, the pop conflicts on a line\
    \ (here a single updated_at timestamp) and git writes textual conflict markers\
    \ straight into project.yaml. Because project.yaml is the lock-protected source\
    \ of truth for all of pm, corrupting it halts the whole tool. The git merge of\
    \ #209 itself SUCCEEDED (commit 46660f49) — only the bookkeeping pop failed —\
    \ yet the failure left the PR stuck in_review with merged_at=null even though\
    \ it was merged on GitHub.\n\n2. STASH LEAK: a conflicted 'git stash pop' does\
    \ NOT drop the stash, and the merge flow doesn't detect/resolve this, so stashes\
    \ accumulate silently. This incident left 8 stale stashes ('pm: auto-stash for\
    \ merge' x several, plus old WIP snapshots), one of which (a 2-month-old model_config\
    \ refactor) had been sitting unrecovered.\n\nRoot problem: using git's TEXT stash/merge\
    \ to reconcile concurrent project.yaml edits. project.yaml is structured data\
    \ already guarded by store.locked_update — text-level 3-way merge is the wrong\
    \ tool and is inherently fragile to interleaved writes.\n\nFix direction (pick\
    \ one, discuss in review):\n- Don't stash project.yaml across the merge at all.\
    \ Capture the pre-merge bookkeeping change as structured data and re-apply it\
    \ AFTER the git merge via store.locked_update (which already serializes writes\
    \ and re-reads current state), so there's never a text conflict.\n- OR if a stash\
    \ is unavoidable, detect a conflicted pop: abort with a clear pm-level error,\
    \ never leave conflict markers in project.yaml, and either auto-resolve structurally\
    \ (parse both sides as YAML, merge the dict, drop the stash) or roll back cleanly.\n\
    - Add a guard in store.load (or a 'pm doctor' check) that detects git conflict\
    \ markers in project.yaml and reports them with the offending line + remediation,\
    \ instead of a raw YAML scanner traceback.\n- Reap leaked 'auto-stash for merge'\
    \ stashes after a successful merge.\n\ntests: simulate concurrent project.yaml\
    \ edits across a merge and assert (a) project.yaml stays valid YAML, (b) no conflict\
    \ markers are ever written, (c) no stash is left behind, (d) the merged PR ends\
    \ up status=merged with merged_at set.\n\nfiles: the pm merge implementation (pm_core/git_ops.py\
    \ / pm_core/pr_sync.py / wherever 'auto-stash for merge' is created — grep that\
    \ string), pm_core/store.py (load guard / locked_update), and merge-flow tests."
  agent_machine: null
  gh_pr: null
  gh_pr_number: null
  created_at: '2026-05-21T04:06:05.061620+00:00'
  updated_at: '2026-05-24T21:48:25.739643+00:00'
  started_at: null
  reviewed_at: null
  merged_at: null
  notes:
  - id: note-4b81277
    text: 'Confirmed a second instance of this lock-contention failure class while
      merging/starting PRs on 2026-05-21.


      Case: pr-d887f4c (gh #210). ''pr start'' ran ''gh pr create'' which SUCCEEDED
      and created draft PR #210 (createdAt 04:06:07Z), but the immediately-following
      write of gh_pr_number back to project.yaml lost the race for project.yaml.lock
      (''Could not acquire lock on project.yaml.lock within 2.0s — another pm process
      may be writing project.yaml'') and the process exited 1. Result: PR #210 created
      on GitHub but ORPHANED — pm record left gh_pr_number=None, status in_progress.
      Three near-simultaneous ''pr start d887f4c'' invocations were observed (21:06:05,
      21:07:42, 21:09:26), so concurrent pm operations were contending on the lock.


      Two compounding defects:

      1. Ordering: ''gh pr create'' (irreversible external side effect) runs BEFORE
      the project.yaml persist. If the persist fails (here: lock timeout), the external
      PR is orphaned with no record. Fix direction: make creation atomic with the
      record, or reserve/record first, or recover on next run.

      2. Non-idempotent retry (now fixed in gh_ops.create_draft_pr): on re-run the
      gh_pr_number guard was still None so it re-ran ''gh pr create'', which failed
      rc=1 (''a pull request ... already exists''); create_draft_pr swallowed every
      non-zero rc as a flat failure and returned None, so pm never reconciled the
      existing #210. Also note pm pr sync-github does NOT reconcile orphans — it matches
      by existing gh_pr_number, not by branch, so it can''t backfill.


      Fix applied this session: create_draft_pr now detects the ''already exists''
      failure and recovers the existing PR via ''gh pr view HEAD'', returning its
      url/number so the caller records it and continues (with tests). The #210 record
      was manually reconciled (gh_pr_number=210).


      Still open for THIS bug: the underlying project.yaml.lock contention / 2.0s
      timeout under concurrent pm operations, and the create-before-persist ordering
      that can orphan external side effects. Consider: longer/backoff lock acquisition,
      serializing pr-start, and create-after-reserve ordering.'
    created_at: '2026-05-21T04:28:22Z'
    last_edited: '2026-05-21T04:28:22Z'
  - id: note-ec8b4da
    text: 'Third symptom, same root (_unstash_after_merge, pm_core/cli/pr.py:2304-2314):
      on a conflicted `git stash pop` it only echoes "Warning: stash pop had conflicts.
      Resolve manually." and returns False — it does NOT launch a merge/conflict-resolution
      session the way the git-merge-conflict paths do (_launch_merge_window). So a
      picker-driven merge action that hits a stash-pop conflict leaves the user with
      conflicts and no automated resolution session. Fix should launch a resolution
      window on stash-pop conflict (in addition to the corruption + stash-leak fixes),
      so picker merges self-heal like real merge conflicts do.'
    created_at: '2026-05-24T21:48:25Z'
    last_edited: '2026-05-24T21:48:25Z'

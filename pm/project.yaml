- id: pr-0c530e1
  plan: bugs
  title: Cleanup leaves QA/review loop state stale and stops containers sequentially
  branch: pm/pr-0c530e1-cleanup-leaves-qa-review-loop-state-stale-and-stop
  status: in_progress
  depends_on: []
  description: 'After `yt` (cleanup-then-QA), the QA loop''s persistent state (`~/.pm/runtime/pr-<id>.json`)
    is not cleared. The follow-up QA action re-attaches to stale state, surfacing
    "QA already running" / spurious INPUT_REQUIRED.


    `pr_cleanup.cleanup_pr_resources` calls `cleanup_pr_containers` which stops containers
    serially — each `docker stop` waits its 10s SIGTERM grace, so cleanup blocks the
    TUI for ~1 minute when several containers exist.


    ## Fix

    - Extend `cleanup_pr_resources` (`pm_core/pr_cleanup.py`) to delete the QA loop
    state file (`~/.pm/runtime/pr-<id>.json`) and the review loop state file for the
    PR. Audit other persistent loop state for the same issue.

    - Parallelize `cleanup_pr_containers` (`pm_core/container.py`) — submit `remove_container`
    calls to a `ThreadPoolExecutor` and join.


    ## Acceptance

    - After `yt`, the follow-up QA starts a fresh run (no "QA already running" / spurious
    INPUT_REQUIRED).

    - Cleanup of N containers takes ~max(per-container teardown time), not the sum.


    ## Repro

    1. With a PR that has an active QA loop and one or more running containers, select
    it in the TUI.

    2. Press `y` then `t`.

    3. Observe: "Busy: Cleaning …" persists ~1 min (sequential `docker stop`); when
    QA auto-starts it reports "QA already running" then "QA INPUT_REQUIRED" because
    the on-disk loop state survived cleanup.'

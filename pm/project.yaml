    protocol: registers with kind=tts in the registry, GET /api/surface returns identity
    + display (recent spoken-text history bounded by retention window) + attention
    (currently-playing, user-interrupted, last-spoken-at). Backend pluggable via env
    var: ''say'' (macOS) and ''piper'' (Linux, local) by default. No cloud requirement.
    Per-session toggle preserved. Latency target: speech begins within ~1s of a sentence
    becoming available. Tests: active-push API speaks given text; passive-capture
    daemon detects new prose lines; chrome/tool-call/code suppression in passive mode;
    surface registration; GET /api/surface returns recent spoken-text history; per-session

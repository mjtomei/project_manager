- id: pr-f5b7eef
  plan: improvements
  title: 'Improvement: dedicated ''pr list'' tmux window that becomes the auto-target
    when other windows close'
  branch: pm/pr-f5b7eef-improvement-dedicated-pr-list-tmux-window-that-bec
  status: merged
  depends_on: []
  description: "## Goal\nProvide a long-lived tmux window that displays `pm pr list\
    \ -t --open` (most-recently-updated open PRs), and use it as the *destination*\
    \ tmux switches to whenever the currently-focused window is killed — for example\
    \ after `pm pr merge` finishes and tears down the merge / impl / review / qa windows.\n\
    \nToday, when the current window goes away, tmux falls back to the previous window\
    \ in this client's history. In a multi-attached setup that history can land us\
    \ on a window already focused in another attached session, scrambling that other\
    \ view's layout. A dedicated 'home' window that pm always parks the user on after\
    \ a destructive action removes that surprise and gives a useful overview to land\
    \ on.\n\n## Design constraint: pluggable home-window provider\n\nThis is the first\
    \ concrete instance of a more general 'home window' concept. The in-progress 'work\
    \ pane' (from plan-ambient / plan-improvements) is the natural longer-term replacement\
    \ — same role (a stable place to land after window kills), richer content (live\
    \ PR status, attention surfaces, recent activity). Build the seam now so swapping\
    \ providers later is a setting change, not a rewrite of every kill-window call\
    \ site.\n\nConcretely:\n- Define a tiny **HomeWindowProvider** interface (or just\
    \ a dotted-path setting + a couple of well-known functions): `ensure_window(session)\
    \ -> window_name`, `refresh(session) -> None`. Default implementation is the pr-list\
    \ provider this PR introduces.\n- Resolve the active provider via a project setting\
    \ (e.g. `home-window-provider = pr-list` in pm config), with the work-pane provider\
    \ added as another value when it lands.\n- All kill-window call sites that invoke\
    \ the auto-park behavior call `home_window.ensure_and_park(session, client)` —\
    \ they don't know or care which provider is active.\n- The CLI command (`pm session\
    \ home` or similar — see below) dispatches to the active provider's ensure/refresh,\
    \ so binding a hotkey to 'go home' works regardless of which provider is in use.\n\
    \nThis means the work-pane PR, when it lands, just registers a new provider and\
    \ flips the setting. None of the kill-window plumbing has to change.\n\n## Proposed\
    \ behavior\n\n1. **New command** — name it after the role, not the implementation:\
    \ `pm session home` (or `pm home` — bikeshed during impl). The command resolves\
    \ the active provider and calls its ensure/refresh.\n   - First invocation: provider\
    \ creates a tmux window in the current pm session (default name `pm-home`, provider\
    \ can override) running its content. The pr-list provider runs a small Python\
    \ loop that calls pr_list_cmd directly (avoid depending on `watch` being installed\
    \ in containers).\n   - Subsequent invocations: provider refreshes immediately.\
    \ User can rebind a hotkey to this command for instant refresh.\n   - Switches\
    \ the invoking client to the window after creation/refresh.\n\n2. **Auto-park\
    \ on window kill.**\n   When pm code deliberately kills a window the user is currently\
    \ focused on (merge cleanup, picker-driven kills, supersede-on-fresh-loop, etc.),\
    \ ensure the home window exists and set it as the client's `last-window` *before*\
    \ the kill, so tmux's normal previous-window fallback lands there. Use `select-window\
    \ -t <home>` followed by `select-window -l` to seed last-window without changing\
    \ focus before the kill, or call `select-window -t <home>` after the kill — whichever\
    \ sequence avoids flicker.\n\n   Call sites to wire through:\n   - merge cleanup\
    \ path that kills impl/review/qa windows after a merge\n   - picker / TUI 'kill\
    \ window' actions\n   - review-loop supersede (kills old review window before\
    \ fresh start)\n   - any other place pm calls `tmux kill-window` on a window the\
    \ user might be on\n\n3. **Per-session, not per-client.**\n   The home window\
    \ lives in the pm tmux session. Multiple attached clients of that session share\
    \ it (read-only). The 'auto-park' behavior targets the client that triggered the\
    \ kill, not all clients, so other attached views aren't yanked around.\n\n4. **Refresh\
    \ granularity** (provider-specific).\n   The pr-list provider polls every ~5s\
    \ and re-renders. The work-pane provider, when added, can use whatever cadence/event-source\
    \ it wants — that's its concern, not the home-window seam's.\n\n## Out of scope\n\
    - The work-pane provider itself — that lands as a separate PR that adds a new\
    \ provider implementation and bumps the setting default. This PR just establishes\
    \ the seam.\n- Full TUI replacement — this is an at-a-glance window, not interactive.\n\
    \n## Code paths\n- pm_core/home_window.py (new): provider interface, registry,\
    \ ensure_and_park helper.\n- pm_core/cli/session.py: new `home` command that dispatches\
    \ to the active provider.\n- pm_core/home_window/pr_list.py (new): default provider\
    \ running `pm pr list -t --open` on a poll.\n- pm_core/tmux.py: small helper to\
    \ set a client's last-window pre-kill.\n- Audit `tmux.kill_window` callers in\
    \ pm_core/ to invoke `home_window.ensure_and_park` where the user might be on\
    \ the killed window.\n- Settings: add `home-window-provider` (default `pr-list`)."

- id: pr-438028c
  plan: improvements
  title: Remove popup-cmd carve-outs by giving 'pr qa' and 'review-loop start' real
    CLI window management
  branch: pm/pr-438028c-remove-popup-cmd-carve-outs-by-giving-pr-qa-and-re
  status: in_review
  depends_on:
  - pr-fcaa434
  description: "## Goal\nEliminate the two special-case routing branches in `popup_cmd_cmd`\
    \ (pm_core/cli/session.py:1903-1907):\n\n    _cmd_norm = cmd.replace('review loop',\
    \ 'review-loop')\n    if (_cmd_norm.startswith('pr qa') or _cmd_norm.startswith('review-loop')):\n\
    \        _run_picker_command(f'tui:{_cmd_norm}', session)\n        return\n\n\
    Today these two commands need TUI routing (via SIGUSR2 + the queue file) because\
    \ they don't have a CLI implementation that does proper tmux window management\
    \ — only the TUI knows how to find or create the QA / review-loop windows and\
    \ wire them into the TUI's in-memory state. The popup compensates by tossing the\
    \ command over the fence to the TUI.\n\nAfter pr-fcaa434 (plan-subcommand window\
    \ management at the CLI level) the routing list shouldn't need to grow as new\
    \ commands arrive, but the *existing* two carve-outs are still there. Get rid\
    \ of them by giving the underlying CLI commands their own tmux-aware launchers,\
    \ the same way `pr start`, `pr review`, `pr merge`, and `meta` already do (pm_core/cli/pr.py:822-846\
    \ is the reference pattern).\n\nThese commands manage tmux windows by definition.\
    \ When the caller is *inside* a pm session, default to that session. When the\
    \ caller is outside (a watcher, an automation, a different shell), accept an explicit\
    \ `--session <name>` flag (or `PM_SESSION` env var) so they can still target the\
    \ right tmux session. With no session resolvable from either source, error out\
    \ cleanly.\n\n## Concrete changes\n\n### 1. `pm pr qa <pr_id>` (and `pr qa fresh`,\
    \ `pr qa loop`)\nToday's CLI command exists but presumes the TUI is driving —\
    \ it doesn't manage QA windows itself. Refactor so the CLI handler:\n- Resolves\
    \ target session: `--session <name>` flag if passed, else `PM_SESSION` env, else\
    \ `_get_pm_session()` (in-tmux detection). Errors with a clear message if none\
    \ resolve.\n- Looks up existing `qa-<display_id>` window(s) (QA can have scenario\
    \ suffixes like `qa-#158-s1`) in that session.\n- For `pr qa <id>`: switch to\
    \ the existing window if there, else create.\n- For `pr qa fresh <id>`: kill existing\
    \ scenario windows, create fresh ones.\n- For `pr qa loop <id>`: ensure loop state\
    \ is registered (today this lives in `app._qa_loops` — externalize to runtime_state\
    \ so the CLI handler can write it without going through the TUI).\n\nThe QA-pane\
    \ infrastructure on the TUI side (`pane_ops.launch_qa_item`, `qa_loop_ui`) already\
    \ encapsulates most of the window/state logic — extract the tmux-bound parts into\
    \ a shared helper that both the TUI and CLI handlers consume.\n\n### 2. `pm pr\
    \ review-loop start <pr_id>` (new CLI command)\nToday there's no CLI surface for\
    \ review-loop start; the chord `zz d` translates to `tui:review-loop start {pr_id}`.\
    \ Add a real CLI command:\n- `pm pr review-loop start <pr_id> [--session <name>]`\
    \ — start a fresh loop. Same session resolution as `pr qa` above.\n- (Optional\
    \ later) `pm pr review-loop stop <pr_id>`.\n\nThe handler does the same window\
    \ management `_launch_review_window` already does (pm_core/cli/pr.py:_launch_review_window),\
    \ with `review_loop=True`. Loop state (currently `app._review_loops`) needs to\
    \ externalize to runtime_state — pr-55c265f and pr-f27b882 are already pushing\
    \ that direction (writers must persist failed-state, spinner needs initial-state\
    \ snapshot), so this is mostly the same refactor surfaced here too.\n\n### 3.\
    \ Shared session resolution\nAdd a small helper `pm_core/cli/_session_target.py`\
    \ (or extend `helpers`) with `resolve_target_session(explicit: str | None) ->\
    \ str` that runs flag → env → in-tmux detection → error. Use it in both new handlers\
    \ and any future CLI command that needs to target a session.\n\n`pr start`, `pr\
    \ review`, `pr merge`, `meta` already accept the in-tmux-only mode; consider extending\
    \ them with the same flag in a follow-up if there's demand. Out of scope for this\
    \ PR — those work today and don't have the popup carve-out problem.\n\n### 4.\
    \ Remove the carve-out\nOnce both commands have working CLI-level window+state\
    \ management, delete lines 1903-1907 of `popup_cmd_cmd`. Popup-cmd becomes a uniform\
    \ direct-subprocess dispatcher with no command-specific routing.\n\n### 5. Update\
    \ the picker / chord tables\n`_ALL_ACTIONS` and `_MODIFIED_ACTION_CMDS` (session.py:898+)\
    \ have `tui:pr qa ...` and `tui:review-loop start ...` entries. Change them to\
    \ plain `pr qa ...` / `pr review-loop start ...` so the picker uses the new CLI\
    \ surface directly. `_run_picker_command`'s `tui:` branch stays — there might\
    \ be other uses, and removing it is a separate cleanup.\n\n## Out of scope\n-\
    \ Removing the `tui:` prefix dispatch entirely from `_run_picker_command`. Keep\
    \ it as a generic escape hatch.\n- Loop-stop CLI command — write only `start`\
    \ first.\n- Inline (non-tmux) fallback for `pr qa` / `review-loop` — these manage\
    \ tmux windows by definition. The `--session` flag is the supported way to target\
    \ a session you're not currently inside.\n- Adding `--session` to other existing\
    \ commands (`pr start`, etc.). They work today; widen later if needed.\n\n## Depends\
    \ on / related\n- pr-fcaa434 (plan-subcommand window management) — same pattern,\
    \ lays groundwork.\n- pr-f27b882 (popup spinner stale-state) — the runtime_state\
    \ externalization for review-loop is shared.\n- pr-fc6db6a / #156 (concurrent\
    \ _launch_review_window) — the per-container-name lock from the updated note keeps\
    \ the new CLI-level launcher safe under concurrent invocation.\n- pr-3526677 (scrollable\
    \ popup with history) — independent surface change, not blocked by this."

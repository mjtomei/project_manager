    code points therefore renders as width+1 cells (more if the title also contains
    wide chars), overflowing the last column and soft-wrapping on a narrow pane.


    Repro: shrink the pm-home pane to mobile-mode width with at least one long PR
    title so lines truncate; the truncated line wraps, producing a stray trailing
    character / extra row at the bottom — exactly the "no soft-wrap artifacts" case
    the pr-28bda5d acceptance test calls out.


    Fix needs display-width measurement (wcwidth dependency, or a unicodedata-based
    helper with an emoji heuristic). Deferred from pr-28bda5d, whose spec explicitly
    scoped wide-char awareness out (its premise that format_pr_line is plain ASCII
    is incorrect — it carries emoji).'

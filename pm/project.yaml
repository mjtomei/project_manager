  description: '## Symptom

    Opening the PR actions picker (prefix+P) for an OPEN PR can report "No actions
    available (PR is merged or closed)." even though the PR is neither merged nor
    closed. Observed for GitHub #214 / pr-ac58803 (state OPEN on GitHub) whose tmux
    windows are named `#214` / `review-#214`.


    ## Root cause

    The picker resolves the invoking window''s display id against `_pr_display_id(p)`
    (`pm_core/cli/session.py:1080-1085`). `_pr_display_id` returns `#<gh_pr_number>`
    when set, else the local pr-id (`pm_core/cli/helpers.py`). When a PR''s `gh_pr_number`
    is later cleared/changed in project.yaml (e.g. lost during a state reconcile,
    or never persisted), its display id flips from `#214` back to `pr-ac58803`, but
    the already-open windows keep the name `#214`. The picker then finds no PR for
    display id `#214`, `_build_picker_lines` returns `[]` at `session.py:1087-1088`,
    and that empty result falls through to the message at `session.py:1730-1732`,
    which wrongly assumes the only reason for no actions is a terminal status.


    ## Primary fix — self-heal when the PR isn''t found

    When the picker cannot resolve the invoking display id to a PR, do not assume
    merged/closed. Instead attempt to programmatically restore/re-link the PR''s state
    before giving up:

    - Parse the window''s display id (`#N`) and/or its window name''s branch slug,
    and match it against the project''s PRs by branch and against open GitHub PRs
    by number/headRefName.

    - On a match where the local entry is missing `gh_pr_number`, backfill `gh_pr_number`
    (+ `gh_pr` URL, and status from the GitHub state) into project.yaml via `store.locked_update`,
    then re-resolve and show the correct actions.

    - This makes a desynced window self-heal on next use instead of presenting a dead,
    misleading picker.


    ## Secondary fixes

    1. Accurate messaging: distinguish "no PR matches display id `<X>` (window may
    be stale/desynced)" from "PR is merged or closed" at `session.py:1730-1732`. Only
    say merged/closed when `_build_picker_lines` returned empty *because* the resolved
    PR''s status is terminal.

    2. Backfill gap: neither relink command can currently re-link a tracked PR that
    lost its number. `pm pr sync-github` only updates PRs that already have a `gh_pr_number`
    (`pm_core/cli/pr.py:2114`, `sync_from_github`), and `pm pr import-github` skips
    entries already tracked by branch (`pm_core/cli/pr.py:2195-2197`). Add/extend
    a path (reuse the self-heal matcher) that backfills a missing `gh_pr_number` on
    an existing tracked PR by matching its branch to an open GitHub PR.


    ## Acceptance criteria

    - Opening the actions picker from a `#N` window whose PR currently lacks `gh_pr_number`
    re-links the PR (backfills number/URL/status) and shows its real actions, rather
    than "merged or closed".

    - The "merged or closed" message appears only when the resolved PR''s status is
    actually merged/closed; the not-found case gets a distinct, accurate message.

    - `pm pr sync-github` (or an equivalent command) can backfill a missing `gh_pr_number`
    on a tracked PR by branch match.

    - Tests cover: not-found-with-backfill, not-found-no-match (accurate message),
    and genuinely-terminal status (still reports merged/closed).'

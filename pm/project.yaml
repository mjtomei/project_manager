  description: "The bug-fix flow prompt (pm_core/prompt_gen.py:_BUG_FIX_FLOW_BLOCK)\
    \ tells sessions to write a failing test or fall back to a \"manual repro note\"\
    \ for visual TUI regressions. In practice, TUI bugs are reproducible deterministically\
    \ by following pm/qa/instructions/tui-manual-test.md (venv-install pm, create\
    \ a throwaway project, drive the TUI via `pm tui send`/`pm tui view`), but that\
    \ file is never referenced from the bug-fix prompt.\n\nRecent symptom: pr-177dec0\
    \ went through two consecutive sessions that each wrote a fix based on plausible-but-unverified\
    \ theories about Textual's reactive/focus internals because neither session set\
    \ up a real TUI repro. After the second session, the user pointed at the QA instruction\
    \ file and the bug failed to reproduce on the pre-fix code in two minutes — meaning\
    \ both fixes were speculative and one was outright reverted.\n\n## Proposed changes\
    \ to _BUG_FIX_FLOW_BLOCK\n\n1. Reorder priority: for TUI bugs, the venv-install\
    \ + tmux-drive repro is the *primary* reproduction path, not a fallback. Reference\
    \ `pm/qa/instructions/tui-manual-test.md` by name.\n\n2. Add a \"did you reproduce\
    \ on pre-fix code?\" gate before applying a fix:\n   > Before applying a fix,\
    \ reproduce the bug against the pre-fix code (e.g. `git stash` your changes, or\
    \ `git checkout <parent> -- <files>`). If you cannot reproduce, say so explicitly\
    \ and ask the user before proceeding. Do not write a fix on top of an unreproduced\
    \ bug.\n\n3. When the touched files include `pm_core/tui/`, conditionally inline\
    \ a pointer to `tui-manual-test.md` so it shows up in the bug-fix prompt without\
    \ the session needing to discover it.\n\n## Out of scope\n- New QA instruction\
    \ files for non-TUI bug categories (CLI, Claude session, container) — those mostly\

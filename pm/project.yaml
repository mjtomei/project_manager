- id: pr-a6724ae
  plan: bugs
  title: 'Bug: rapid resizing floods _window-resized hooks; redraw spam locks the
    display'
  branch: pm/pr-a6724ae-bug-rapid-resizing-floods-window-resized-hooks-red
  status: pending
  depends_on: []
  description: 'Dragging a terminal corner to resize a tmux client triggers tmux''s
    window-resized hook many times per second across the session group. pm''s _window-resized
    handler has a 150ms debounce intended to coalesce the storm into one rebalance,
    but in practice the user sees a long stretch of choppy/locked redraws while the
    resize is in progress and for a noticeable delay after.


    Likely contributors (worth investigating in order):


    1. Per-(session, base) debounce — pm_core/cli/session.py:_window-resized writes
    a PID to {registry_dir}/{base}.resize and sleeps 150ms before checking if it is
    still the latest. With grouped sessions, the SAME base means the debounce key
    is shared, but the hook fires N times per resize event (once per session in the
    group). Each fire spawns a Python subprocess via run-shell, each subprocess sleeps
    150ms holding its own PID. Concurrent subprocess fork/exec on hot-path resize
    is itself expensive on top of the actual rebalance work.


    2. Rebalance feedback loop — pane_layout.rebalance calls tmux select-layout /
    resize-pane to apply the new layout. select-layout can itself change effective
    window dimensions enough to fire window-resized again, kicking off another hook
    chain. If true, the system gets into a self-perpetuating storm during a drag.


    3. Rebalance work is not constant-time — for windows with many panes, each rebalance
    reads the registry, queries tmux for pane sizes, computes a layout, and applies
    it. During a fast drag, even one rebalance per ~150ms can be visible if the work
    itself is slower than 150ms. With multiple windows in the group all rebalancing,
    total work compounds.


    4. No global debounce across hooks — window-resized, after-select-window, client-attached,
    client-detached all fire the same handler. During a drag, only window-resized
    matters, but if other events fire concurrently (e.g. mouse-driven focus changes),
    they too trigger rebalances on top of the resize storm.


    Fix directions (any one might be enough; combination is safer):


    A. Make the debounce strictly server-global, not per-base. One debounce key for
    the whole tmux server. The first fire wins for the whole storm. Each subsequent
    fire within the debounce window exits immediately without forking subprocess work.


    B. Dedupe at the hook level by setting an env var or runtime flag during rebalance
    and refusing to enter rebalance recursively. Eliminates the feedback loop in (2)
    regardless of whether select-layout actually causes it.


    C. Increase the debounce window to ~500ms during active resize. Detect ''active
    resize'' via a marker file that the hook itself sets; clear it after a quiet period.
    Trades a slightly slower final rebalance for far less spam in the middle of a
    drag.


    D. Drop the run-shell forking entirely. Move the rebalance into the Python TUI
    process (which is already polling) via an in-process queue or signal. Forking
    pm subprocess per hook fire is expensive on a hot path; an in-process consumer
    would be cheap.


    Reproduce: in a pm session with one or more grouped sessions and 4+ panes per
    window, grab a corner of the terminal and drag-resize for ~5 seconds. Observe
    the display visibly hitching during the drag and continuing to redraw for a beat
    after release. Tail /home/matt/.pm/debug/<base>.log during the drag — ''_window-resized:
    ENTERED'' lines should be visible at high frequency, with most resolving as ''debounce
    lost'' but still incurring the fork/exec cost.


    Tests: bench the hook firing rate during a synthetic resize burst; assert the
    worst-case time between resize-end and rebalance-end is bounded; assert no recursive
    rebalance entries via a sentinel; assert subprocess fork count stays roughly constant
    regardless of fire rate.'

    \ when QA makes changes, review is re-triggered; when review makes changes, QA\
    \ is re-triggered. The loop continues until QA passes with no changes for a configurable\
    \ number of iterations (default: 1).\n\n## QA Step Behavior\n- Optional: the standard\
    \ implementation → review → merge flow still works without it\n- Triggered by\
    \ the user when they want manual/integration testing of a PR\n- The user points\
    \ to a test instruction prompt that describes how to set up and run manual tests\n\
    - The QA agent can fix bugs it finds, but any changes re-trigger review\n- If\
    \ review makes changes, that re-triggers QA\n- Loop terminates when QA completes\
    \ with no changes for N iterations (default N=1)\n\n## Test Instruction Library\n\
    - A managed collection of prompts that guide the QA agent on how to exercise a\
    \ given tool or feature\n- Stored as files in a known location (e.g. pm/qa/ or\
    \ pm/instructions/)\n- Each instruction has a title and short description\n- Only\
    \ titles and descriptions are copied into QA prompts — the agent reads the full\
    \ instruction file on demand\n- Accessible via a list-style CLI command (e.g.\
    \ pm qa list)\n- The existing notes.txt review section pattern is an example of\
    \ this — instructions that guide testing but currently only trigger during manual\
    \ review\n\n## TUI Integration\n- Add a TUI pane for browsing, accessing, and\
    \ editing test instructions\n- Instructions should be listable with titles and\
    \ short descriptions\n- Editing launches the user's editor on the instruction\
    \ file\n\n## Prompt Design\n- QA agent prompt includes the list of available instruction\
    \ titles and descriptions, plus the path to the specific instruction for this\
    \ PR\n- QA agent reads the full instruction content itself rather than having\
    \ it inlined\n- QA agent is aware of all available instructions so it can reference\
    \ related ones if needed\n\n## QA Session Recording and Work Directories\n- QA\
    \ activity should be recorded as notes on the PR (what was tested, what was found,\
    \ what was fixed) so there is a persistent record of QA outcomes\n- QA work directories\
    \ (throwaway test projects, test environments) should be tracked — record their\
    \ paths on the PR so they can be inspected or cleaned up later\n- Work directories\
    \ should be created automatically by pm (e.g. under ~/.pm/qa/ or similar) instead\
    \ of relying on the QA session to create ad-hoc directories in /tmp\n- Automatic\
    \ creation ensures consistent naming, discoverability, and cleanup\n\n## QA for\
    \ Existing Features (not just new PRs)\n- Need a flow for sending existing, already-merged\
    \ features through QA — not just new PRs\n- This could use dummy/QA-only PRs on\
    \ GitHub that target the current master and exist solely to run QA instructions\
    \ against existing functionality\n- Alternatively, a standalone QA mode that runs\
    \ against master without requiring a PR at all\n- This enables regression testing,\
    \ periodic health checks, and validating features that were merged before QA was\
    \ introduced\n- The QA instruction library naturally supports this since instructions\
    \ are feature-oriented, not PR-oriented\n\n## Impact on INPUT_REQUIRED Flow\n\
    - The review loop's INPUT_REQUIRED verdict currently serves as the mechanism for\
    \ human-guided testing — the reviewer asks the user to manually verify UI behavior,\
    \ environment-specific setup, etc. QA replaces this for the most part. The INPUT_REQUIRED\
    \ flow in the review loop should be updated:\n  - Review should focus on code\
    \ correctness and no longer request manual testing via INPUT_REQUIRED\n  - INPUT_REQUIRED\
    \ in review should be reserved for genuine ambiguities in the PR spec or architectural\
    \ decisions that need human judgment\n  - The watcher prompt and auto-start logic\
    \ around INPUT_REQUIRED may also need adjustment since QA handles the testing\
    \ concern separately\n  - Review loop iteration callbacks and UI notifications\
    \ for INPUT_REQUIRED should be revisited\n\n## Manual Testing Required\nDuring\
    \ review, INPUT_REQUIRED should be used to verify:\n- QA pane display and keyboard\
    \ navigation (q=toggle, j/k=navigate, Enter=run, e=edit, a=add)\n- Review → QA\
    \ → merge auto-transition flow with auto-start enabled\n- QA planner session spawning\
    \ and child scenario panes in tmux\n- pm qa CLI commands: list, show, add, edit,\
    \ run, standalone\n- Tech tree renders \U0001F9EA icon and magenta style for qa\
    \ status\n- Help screen shows updated keybindings (t=start QA, q=toggle QA pane)\n\
    - QA notes recorded on PR after completion\n- QA work directory creation under\
    \ ~/.pm/workdirs/qa/\n\nReminder: all associated documentation and prompts should\
    \ be updated, including help screens, keybinding references, and any workflow\
    \ documentation."

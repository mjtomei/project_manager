- id: pr-a7927b6
  plan: plan-qa
  title: Implement review phase spec (spec_review) with mock planning
  branch: pm/pr-a7927b6-implement-review-phase-spec-spec-review-with-mock-
  status: pending
  depends_on:
  - pr-942aa21
  description: 'Implement the spec_review phase introduced by pr-942aa21. The spec_review
    is generated after implementation and before the review agent runs, grounding
    the review in the actual code produced rather than the original PR description.


    spec_review content:

    - What to verify: specific functions, code paths, and invariants to check, referenced
    by file and line where possible

    - Implicit requirements: things that must be true for the stated requirements
    to hold, surfaced from the implementation

    - Edge cases and interaction risks not covered by the description

    - Mocks section: for each external dependency touched by the implementation (Claude
    sessions, git ops, tmux, subprocess, file I/O), state whether tests should mock
    it, at what level, and what the mock contract should be (inputs, expected outputs,
    scripted responses). This prevents agents from independently deciding mock strategy
    and producing inconsistent test coverage.


    prompt_gen integration:

    - spec_review is injected into the review prompt between the PR description and
    the review checklist, so the review agent works from explicit grounded requirements
    rather than interpreting the raw description

    - The mocks section is also surfaced in the QA prompt (spec_qa reads spec_review''s
    mocks section as a baseline)


    QA scenario workers for this PR should test progressively:

    - Fast unit tests first: test spec_review parsing, prompt injection, and field
    validation with no external dependencies

    - Mid-tier tests using FakeClaudeSession (pr-abcf70f): verify that the review
    agent receives the spec_review content and that the prompt is well-formed end-to-end,
    without real API calls

    - Full integration last and only if needed: a real review pass against a known
    PR to confirm spec_review improves review quality


    This pattern — unit → fake-claude integration → real integration — should be the
    standard for any scenario worker that would otherwise spin up real Claude sessions.
    The review loop tests are the primary case where slow iteration has been observed.'

  - id: note-67038eb
    text: "Heads-up from a 2026-05-04 09:29 incident in project-manager-c5a1006b:\
      \ hit the more general concurrent-_launch_review_window race that this PR's\
      \ fix only addresses at one entry point.\n\nLogs (~/.pm/debug/project-manager-c5a1006b.log)\
      \ show two _launch_review_window invocations for pr-f5b7eef firing the same\
      \ second:\n\n  09:29:22 [push_proxy] Push proxy started ... (twice — same socket)\n\
      \  09:29:22 [container] podman run -d --name pm-review-pr-f5b7eef ... (twice)\n\
      \  09:29:22 ERROR podman: name 'pm-review-pr-f5b7eef' already in use by 0683a5f204bd\n\
      \                                                   (the container the first\
      \ run just created)\n\nSame shape as 'plain d while loop is running': two paths\
      \ into _launch_review_window for the same PR, no mutual exclusion at the launcher\
      \ itself. Likely trigger this time was the popup-spinner stale-terminal-state\
      \ bug (pr-f27b882): the spinner exits instantly when the previous loop finished,\
      \ the user re-clicks thinking nothing happened, and now two launches race.\n\
      \nSuggestion: serialize at the container-name granularity, not per-PR. The contended\
      \ resource is the container name (pm-review-pr-<id>); review and review-loop\
      \ share that name (correct — they share window + container), but review and\
      \ qa for the same PR use different names (pm-review-pr-<id> vs pm-qa-pr-<id>)\
      \ and shouldn't be artificially serialized. A file lock at ~/.pm/locks/<container_name>.lock\
      \ around the remove_container + wrap_claude_cmd block in pm_core/cli/pr.py:1221-1229\
      \ (and the equivalent QA path) falls naturally out of the existing _make_container_name(label)\
      \ keying. Lets any number of entry points call _launch_review_window concurrently\
      \ while only one container creation per name goes through.\n\nCheaper than auditing\
      \ every entry point that could hit this (plain d, zz d, picker review, picker\
      \ review-loop, auto-sequence, watcher restarts, popup retry-after-spurious-exit).\n\
      \nRelated: pr-bc010f4 (force-rm orphan), pr-f27b882 (stale-state spinner), pr-748e708\
      \ (push-proxy keyed only by container name)."
    created_at: '2026-05-04T16:33:36Z'
    last_edited: '2026-05-04T16:35:39Z'
  - id: note-80159c9
    text: 'Second incident, 2026-05-05 ~05:18 in project-manager-c5a1006b. Same family
      of race, plus a new dimension that confirms the per-container-name lock needs
      to be cross-process (OS flock), not in-process.


      Sequence (master log + per-workdir log):

      - 05:18:33 master log: review-loop iteration 2 for pr-18ac983. transcript symlink
      + podman rm -f pm-review-pr-18ac983.

      - 05:18:33-05:18:43: 10s wait loop in remove_container — confirms removed.

      - 05:18:44 master log: podman run -d --name pm-review-pr-18ac983 → succeeds,
      id=263f3e6c542c.

      - 05:18:44 workdir log (pm-pr-18ac983-...-90100632.log): podman run -d --name
      pm-review-pr-18ac983 → fails with ''name already in use by 263f3e6c542c'' (the
      ID master just created).


      The two invocations came from different pm_core installations:

      - master pm_core: user''s zz d via the picker (post-fix wrapper now skip_local
      for IPC, so picker uses host code).

      - workdir pm_core: the loop''s own iteration-relauncher at review_loop.py:117-130
      runs ''pm pr review --fresh --review-loop'' as a subprocess with cwd=pm_root
      pointing into the workdir; wrapper cwd-walks for non-IPC commands, finds workdir''s
      local pm_core, uses that.


      Implication: in-process locks (Python-level) won''t help because the racers
      are *separate processes from different pm_core installs*. The lock has to be
      OS-level (fcntl.flock on a host file like /tmp/pm-locks/<container_name>.lock
      or ~/.pm/locks/<container_name>.lock) so both processes see the same lock regardless
      of which pm_core they imported.


      Additional observed symptom: the popup spinner stays stuck open on top of the
      affected window after the failed-launch race. The host''s _launch_review_window
      apparently succeeded (container 263f3e6c exists, window created), but the workdir''s
      failed launch may have left state that confuses the spinner''s exit logic. Worth
      verifying whether the lock fix incidentally clears this, or whether spinner
      state cleanup needs separate attention.


      Suggested fix path:

      1. host file at ~/.pm/locks/<container_name>.lock acquired via fcntl.flock LOCK_EX
      with a short timeout (say 60s, generous because remove_container''s wait is
      10s).

      2. lock acquired BEFORE remove_container, released AFTER wrap_claude_cmd returns.
      Both racers serialize on that lock; the second one re-checks ''is this container
      still there or already created by the first racer'' after acquiring and either
      no-ops or proceeds.

      3. Inside the lock, an idempotent path: if the container with this name is already
      running and matches our intended config, attach to it instead of recreating.
      (Optional, but turns the race into a no-op rather than a wait.)'

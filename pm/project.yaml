- id: pr-6836fad
  plan: plan-qa
  title: Embed session tag in container names and consolidate push proxies
  branch: pm/pr-6836fad-embed-session-tag-in-container-names-and-consolida
  status: merged
  depends_on: []
  description: 'Two related improvements to container and push proxy management:


    1. **Session tag in container names**: Embed the TUI session tag (e.g. c5a1006b)
    into container names so containers are tied to their session. Changes naming from
    pm-{label}-{suffix} to pm-{session_tag}-{label}-{suffix}. Enables listing all
    containers for a session with ''docker ps --filter name=pm-c5a1006b-'' and proper
    cleanup when a session ends.


    2. **One push proxy per (session, branch) pair**: Instead of spawning one push
    proxy per container (leading to dozens of identical proxies for QA scenarios on
    the same branch), run one proxy per unique (session_tag, pr_id) combination. Multiple
    containers on the same branch share the same proxy. Socket path becomes deterministic:
    /tmp/pm-push-proxy-{session_tag}-{pr_id}/push.sock. This dramatically reduces
    the number of proxy processes (from O(containers) to O(branches)) and makes cleanup
    trivial — given a session tag you can find and clean up all its proxies.'

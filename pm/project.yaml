  description: 'When a review loop is running for a PR (started via zz d), pressing
    plain d opens a second review window instead of telling the user a loop is already
    active.


    The done_pr() function in pr_view.py has a fast-path that checks for an existing
    review-{display_id} tmux window and switches to it. But this can fail when:

    1. get_pm_session() returns None due to the pane registry race condition (pr-e3cf481)

    2. The review loop is between iterations and the window was momentarily killed


    The function does NOT check app._review_loops to see if a loop is already managing
    this PR. The zz d and zzz d handlers (start_or_stop_loop) do check this, but plain
    d bypasses it.


    Fix: In done_pr() (pr_view.py ~line 136), check app._review_loops.get(pr_id) before
    proceeding. If a loop is running for the selected PR, show a message like ''Review
    loop running — use z d to stop'' and return without spawning a second window.'

- id: pr-a94befb
  plan: watchers
  title: Replace guide flow with project-level watcher using prompt addendums
  branch: pm/pr-a94befb-replace-guide-flow-with-project-level-watcher-usin
  status: pending
  depends_on:
  - pr-3032fb6
  - pr-945546e
  description: "Replace the current guide/init flow with the project-level watcher\
    \ from the watcher framework, so new users are introduced to watchers from the\
    \ very start.\n\n## Current guide behavior\n- On first run with no project.yaml,\
    \ a guide prompt walks the user through setup\n- The guide is a one-shot session\
    \ that creates project.yaml and disappears\n- Beginner mode adds prompt addendums\
    \ to subsequent sessions\n\n## New approach: watcher-driven onboarding\n- The\
    \ project state watcher (from pr-3032fb6) detects when things are missing or incomplete\n\
    - Instead of a separate guide flow, the watcher adds prompt addendums to active\
    \ sessions when it detects gaps:\n  - No project.yaml → addendum instructs the\
    \ session to help create one\n  - No plans defined → addendum suggests creating\
    \ a plan\n  - Plans with no PRs → addendum suggests breaking down into PRs\n \
    \ - PRs with no dependencies set → addendum suggests reviewing dependency structure\n\
    \  - No container config → addendum suggests setting up containers if applicable\n\
    \  - Beginner mode enabled → addendum with extra guidance and next-step recommendations\n\
    - Addendums are dynamic: they appear when relevant and disappear once the gap\
    \ is filled\n- The watcher polls project state and updates addendums automatically\n\
    \n## General-purpose addendum generation\n- The same addendum mechanism extends\
    \ beyond onboarding to any low-cost status check that may need attention:\n  -\
    \ GitHub API rate limit approaching → addendum warns sessions to be conservative\
    \ with API calls\n  - Disk space low → addendum advises against creating new workdirs\n\
    \  - Claude API errors trending up → addendum notes instability, suggests saving\
    \ work\n  - Branches diverged far from master → addendum suggests rebasing\n \
    \ - PRs stuck in a state for too long → addendum nudges toward action\n  - Container\
    \ image out of date → addendum suggests rebuilding\n  - tmux session count high\
    \ → addendum suggests cleaning up finished sessions\n  - Upstream dependency updates\
    \ available → addendum flags potential breakage\n- These checks should be cheap\
    \ (file stats, cached API responses, project.yaml inspection) so they can run\
    \ frequently without overhead\n- Each check produces a short addendum only when\
    \ actionable — no noise when things are healthy\n\n## Benefits\n- Users learn\
    \ the watcher pattern immediately — it becomes a natural part of the tool\n- No\
    \ separate guide code to maintain — just watcher observations and addendums\n\
    - More adaptive than a linear guide: responds to actual project state, not a fixed\
    \ script\n- Works for experienced users too: if someone deletes their plans or\
    \ creates an incomplete config, the watcher notices and helps\n- Beginner mode\
    \ becomes just a flag that makes the watcher more verbose in its addendums\n-\
    \ Service and infrastructure issues surface naturally in session prompts without\
    \ requiring the user to check dashboards\n\n## Migration\n- Remove or deprecate\
    \ the existing guide prompt and guide_deps_reviewed flag\n- Move guide logic into\
    \ the project state watcher's observation rules\n- Keep backward compat: projects\
    \ with guide_deps_reviewed=true skip the onboarding addendums"

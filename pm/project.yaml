- id: pr-51b9f26
  plan: plan-state
  title: Change-log audit table for state writes
  branch: pm/pr-51b9f26-change-log-audit-table-for-state-writes
  status: pending
  depends_on: []
  description: 'Phase 1 sibling of plan-state. Add a state-change audit log so every
    write to a domain table also produces a timestamped change record. Gives us ''what
    happened today / over the last week / who changed this value'' as a single SELECT
    and a full replayable history of interactions across pm.


    Schema: state_changes(id INTEGER PRIMARY KEY, timestamp_ns INTEGER NOT NULL, actor
    TEXT, context TEXT, table_name TEXT NOT NULL, row_pk TEXT, op TEXT NOT NULL, before_json
    TEXT, after_json TEXT). Indexes on (timestamp_ns), (table_name, timestamp_ns),
    and (actor, timestamp_ns).


    Implementation: per opted-in table, install AFTER INSERT / UPDATE / DELETE triggers
    that write a row into state_changes capturing the table name, primary key, op,
    and the OLD / NEW row JSON. The trigger reads actor and context from SQLite session-level
    pragmas / temp variables that the Python wrapper at pm_core/store/db.py sets before
    each transaction (using sqlite3 connection.execute(''PRAGMA pm_actor = ?'', ...)
    or a per-connection temp table). Actor is the user / agent session id; context
    is the CLI command name or TUI action that triggered the write (e.g. ''pm pr start'',
    ''tui:action_review_pr'').


    Per-table opt-in: domain tables that are already event-shaped (notably hook_events
    from Phase 5, or attention archive from plan-ambient pr-3fee106) skip the audit
    triggers since they would just duplicate themselves. Most tables (project, prs,
    plans, panes, qa_runtime, settings, specs, markers) opt in.


    Retention: configurable per-host. Defaults to ''keep everything'' since the persistence-everywhere
    principle from plan-ambient applies (50TB backing store assumption). A per-deployment
    retention setting can prune old rows if needed.


    Read API: pm_core/store/changes.py exposes query helpers — recent_changes(since=None,
    table=None, actor=None, limit=N), changes_for_row(table, pk), most-recent-change-per-row,
    etc. The TUI / CLI can surface ''recent activity'' views on top of this, and ambient
    context queries (plan-ambient''s pm context) can include ''last N changes to project
    state'' as part of the agent''s grounding.


    Files: pm_core/store/db.py (transaction wrapper sets PRAGMA pm_actor / pm_context),
    pm_core/store/changes.py (audit-log API), pm_core/store/schema.py (state_changes
    table + helper to install triggers per opted-in table). Migration trigger installation
    runs once when each domain table is created or upgraded.


    Tests: trigger fires on INSERT / UPDATE / DELETE for an opted-in table; opted-out
    table writes don''t produce audit rows; actor and context are captured from the
    connection-level pragma; before_json / after_json correctly serialize the row;
    reading the audit log as a time series gives the expected ordered history; truncation
    of state_changes via retention policy doesn''t break referential integrity (state_changes
    is independent of domain tables).'

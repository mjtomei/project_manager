    pr review` on its own PR — completing/reviewing itself is the orchestrator''s
    job, not the implementer''s.


    Anything running outside a container (e.g. a meta/advisor session, or an ad-hoc
    session in the main project) can safely run pm commands directly against the main
    project — as this very session demonstrated by running `pm pr start` successfully.
    The blanket prohibition makes those sessions needlessly press TUI keys instead
    of just running the command.


    Scope:


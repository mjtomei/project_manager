  branch: pm/pr-a1f267a-regression-coverage-auto-sequence-chain-pause-cond
  status: pending
  depends_on: []
  description: '## Goal


    Add a Claude-driven regression-test markdown covering the auto-sequence chain
    (pr-e58459b) — the start -> review -> QA pipeline used by both TUI keypress and
    the programmatic pm pr auto-sequence CLI consumed by the impl watchers. Today
    its halt-at-pause-condition behavior is covered only by ad-hoc manual testing.


    ## Scenarios


    New file pm/qa/regression/auto-sequence-halt-conditions.md exercising every documented
    pause condition on both entry points:


    ### Entry points

    - TUI keypress (O key on a selected PR)

    - pm pr auto-sequence <id> CLI (programmatic; what watchers use)


    ### Pause conditions to verify

    1. **impl idle-no-spec**: PR enters impl, the spec_impl is missing or pending
    review (spec_pending=True), session goes idle. Chain pauses; impl window left
    in place for human inspection.


    2. **review INPUT_REQUIRED**: review session emits INPUT_REQUIRED. Chain pauses
    at review; does not advance to QA.


    3. **QA INPUT_REQUIRED**: QA scenario emits INPUT_REQUIRED (or refiner rejection
    per pr-b59f0c7 reason machinery). Chain pauses at QA; does not advance to merge.


    4. **stop-before-merge**: chain reaches QA PASS but the configured behavior is
    stop-before-merge (auto-merge=false per pr-b77702b, or improvement-fix gated).
    Chain stops; PR sits in qa-pass / ready-for-merge state.


    5. **review NEEDS_WORK loop**: review emits NEEDS_WORK -> impl rerun -> review
    again. Verify the chain loops correctly (does not double-advance to QA) and respects
    max-iterations.


    6. **QA NEEDS_WORK loop**: same shape on the QA side — NEEDS_WORK loops back to
    a fix iteration before re-running QA scenarios.


    7. **terminal pause (max-iterations hit)**: chain hits max-iterations on a sub-loop.
    Pauses with structured reason (per pr-b59f0c7) the watcher can route.


    For each pause, the regression captures: (a) which entry point triggered the chain,
    (b) which pause condition fired, (c) the chain''s emitted state, (d) whether the
    next manual / watcher action correctly resumes from the paused state.


    ## Sequencing


    Independent of Phase 10 code-wise. Lands more usefully after pr-06a96fa.


    ## Manual testing



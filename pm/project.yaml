- id: pr-fcaa434
  plan: improvements
  title: 'Bug: plan subcommands launch Claude inline instead of switching to / creating
    a tmux window when run inside a pm session'
  branch: pm/pr-fcaa434-bug-plan-subcommands-launch-claude-inline-instead-
  status: in_review
  depends_on: []
  description: '## Symptom

    Running plan subcommands from the command popup (prefix+M) — or from any shell
    pane inside a pm tmux session — launches the Claude session *in the calling pane*
    instead of switching to (or creating) the dedicated per-plan tmux window. Concretely:
    in a session where the plan-regression window already exists, typing `plan review
    plan-regression` in the popup runs Claude inside the popup, ignoring the existing
    window. Same problem for every plan subcommand that calls `launch_claude` directly.


    `pr start` does this correctly today (pm_core/cli/pr.py:822-846): it checks `tmux_mod.find_window_by_name`,
    switches to an existing window or creates a new one, and only falls back to inline
    Claude when not in tmux. The plan commands skip that pattern entirely and call
    `launch_claude` straight away.


    ## Affected plan subcommands

    All six plan commands that call `launch_claude`:

    - `plan_add` (pm_core/cli/plan.py:139) — should use a per-instance plan-add window
    (the TUI side already uses _DEPS_PSEUDO_PLAN_ID-style synthetic ids).

    - `plan_breakdown` (line 241) — per-plan window keyed on plan_id.

    - `plan_review` (line 415) — per-plan window keyed on plan_id.

    - `plan_deps` (line 493) — synthetic plan-deps window (matches TUI''s `_DEPS_PSEUDO_PLAN_ID`
    at pane_ops.py:627).

    - `plan_fixes` (line 661) — likely matches plan-deps'' synthetic-window pattern;
    pick one and apply.

    - `plan_fix` (line 818) — same shape.


    The TUI-side equivalent already exists at `pane_ops._launch_in_plans_window` (pane_ops.py:570),
    called from `handle_plan_action` for the `e/v/breakdown/deps/review` plan-picker
    actions. Window naming via `_plans_window_name(plan_id)`.


    ## Other similar breakages found

    Same pattern check across CLI: any `launch_claude` caller that should run in its
    own dedicated tmux window when invoked inside a pm session.


    - `cli/cluster.py:224` — cluster planning launches inline. Should get its own
    dedicated window (e.g., `cluster` synthetic).

    - `cli/container.py:186` (container build) — runs a long-lived Claude session
    for image builds. Inline is wrong inside a pm session.

    - `cli/guide.py:88, 128` — interactive guide. Probably *should* take over the
    calling pane in some cases, but if invoked from the popup needs to land in a dedicated
    guide window.


    Already correct (reference patterns):

    - `cli/pr.py:pr_start` (line 822-846) — find-or-create window with proper fallback.

    - `cli/pr.py:_launch_review_window` — same pattern.

    - `cli/meta.py:166-196` — same pattern.


    ## Fix

    Lift the find-or-create-window logic into a small CLI helper (e.g. `pm_core/cli/_window_launch.py`
    or extend `claude_launcher`) that takes (window_name, prompt, cwd, session_key,
    fresh) and:

    1. If in tmux session, find_window_by_name → select_window if exists (kill if
    --fresh); else new_window with the wrapped `pm <subcmd>` invocation.

    2. If not in tmux, fall back to existing `launch_claude` inline behavior.


    Have all six plan subcommands plus the cluster/container-build/guide cases route
    through it. Window names use `_plans_window_name(plan_id)` for plan-keyed actions
    and synthetic strings (`plan-deps`, `plan-fixes`, `cluster`, `container-build`,
    `guide`) otherwise.


    ## Out of scope

    - Fixing the popup-cmd routing list (session.py:1903-1907) — that exists because
    some commands lack CLI-level window management; with this fix the routing list
    no longer needs to grow as new commands are added.


    ## Test

    - From a pm tmux session shell or popup, run `plan review <plan-id>` for a plan
    that already has its window open → expect window switch, not inline Claude.

    - Run `plan breakdown <plan-id>` for a plan without a window → expect a new window
    created and Claude launched there.

    - Same for deps, fixes, fix, add, cluster, container build, guide.'

- id: pr-d8cfa16
  plan: plan-qa
  title: Batched QA scenario execution
  branch: pm/pr-d8cfa16-batched-qa-scenario-execution
  status: closed
  depends_on: []
  description: 'Instead of spawning one session per QA scenario, batch scenarios into
    a configurable number of worker sessions. The scenario generator/concretizer groups
    scenarios across the configured worker count, choosing groupings that maximize
    shared context (e.g. by functional area, related files, or test theme). Each worker
    session reviews the diff and loads relevant files once, then runs its assigned
    scenarios sequentially. After each scenario completes, the worker writes a per-scenario
    report and waits for approval before proceeding to the next — preserving the existing
    approval flow so the user can review each scenario''s results individually. Workers
    must also stop and wait when hitting INPUT_REQUIRED state, just as individual
    scenario sessions do today. Benefits: drastically reduces session count (avoids
    hitting subscription usage limits and API credit fallback), eliminates redundant
    diff review and file loading across scenarios, and reduces total token usage.
    The QA status watcher should poll per-scenario report files so the TUI can still
    show individual scenario progress.'

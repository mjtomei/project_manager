- id: pr-1735d44
  plan: bugs
  title: 'Consolidate window refocus: switch all co-viewing sessions consistently'
  branch: pm/pr-1735d44-consolidate-window-refocus-switch-all-co-viewing-s
  status: in_progress
  depends_on: []
  description: 'Window refocusing is split between tmux.select_window (switches one
    session) and tmux.switch_sessions_to_window (switches all grouped sessions). The
    correct behavior for all refocusing is: if multiple sessions are attached and
    viewing the same window, they should all switch together. Currently select_window
    is used in pr.py (4 call sites), meta.py, container.py, pr_view.py (2), pane_layout.py,
    qa_status.py, and qa_loop.py — these only switch the invoking session, leaving
    co-viewers behind. Consolidate into a single refocus function (e.g. tmux.focus_window)
    that detects sessions currently viewing the same window as the caller and switches
    them all. Replace all select_window and switch_sessions_to_window call sites with
    the unified function. Human-guided testing needed: verify co-viewing sessions
    follow the switch, verify sessions viewing different windows are not affected,
    test from TUI-launched commands and from CLI.'
  agent_machine: spark-424d
  gh_pr: https://github.com/mjtomei/project_manager/pull/159
  gh_pr_number: 159
  created_at: '2026-04-07T12:51:22.561975+00:00'
  updated_at: '2026-05-03T12:08:21.050718+00:00'
  started_at: '2026-04-07T13:06:32.173284+00:00'

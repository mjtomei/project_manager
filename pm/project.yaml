  status: pending
  depends_on: []
  description: 'Bug: when an agent sends tmux commands (especially ''q'') using the
    -t flag to target a specific session, it sometimes disconnects or affects a different
    session instead. The user reports being repeatedly disconnected from their active
    session when another agent targets a different session with -t.


    Possible causes to investigate:

    - tmux -t target resolution ambiguity: if the session name is a prefix of another
    session name, tmux may match the wrong one

    - The ''q'' key being sent to the wrong pane/window if the target resolves incorrectly

    - Session group behavior: if sessions are grouped, commands targeting one member
    may affect others

    - Race condition: if the target session doesn''t exist yet or was just created,
    the command may fall through to the current session


    Steps to reproduce:

    1. Have two active pm sessions (e.g. pm-project_manager-xxx and pm-food-yyy)

    2. From one session, have an agent send a tmux command with -t targeting the other
    session

    3. Observe that the first session gets disconnected or receives the command instead


    Fix should ensure tmux commands are precisely targeted and cannot leak to other
    sessions. Consider using exact match flags or full session:window.pane targeting
    to prevent ambiguous resolution.'

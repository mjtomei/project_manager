- id: pr-b77702b
  plan: plan-regression
  title: Per-plan auto-merge=false mode with dep-merge in start prompt
  branch: pm/pr-b77702b-per-plan-auto-merge-false-mode-with-dep-merge-in-s
  status: pending
  depends_on: []
  description: 'Add a per-plan setting that lets auto-start work through PRs without
    merging them to master, and have the start prompt instruct Claude to merge in
    any unmerged dependency branches before working. Together these enable iterating
    on a coherent set of PRs in a plan without the changes touching master until the
    user manually merges each one.


    Motivation: today''s auto-start watchers (bug-fix-impl, improvement-fix-impl,
    regression supervisor, and others) auto-merge PRs on QA PASS. That''s the right
    default for narrow bug fixes, but for plans where the user expects to iterate
    on the result before shipping (e.g. ambient surfaces, ux improvements, anything
    new), there''s no way to let auto-start do the implementation work and stop short
    of merging. Today the only way to get auto-start to chew through a plan is to
    accept that everything will land in master.


    Approach (chosen over a per-plan staging branch alternative because plans iterate
    after first release — a graduate model assumes a clean ship-and-done lifecycle
    that real plans do not have, whereas keeping each PR independently merge-able
    composes with continuous amendment):


    (1) Per-plan field ''auto_merge: bool'' in project.yaml plans entries, default
    true (current behavior). When false, auto-start watchers run impl/review/QA as
    normal but skip the merge step on QA PASS — the PR sits in qa-pass / in_review
    state awaiting explicit human merge.


    (2) The ''pm pr start'' prompt builder (pm_core/prompt_gen.py and the start-related
    impl/spec prompts) gets a new preamble ONLY WHEN the PR has at least one depends_on
    entry that is not yet merged. If the PR has no dependencies, or all its dependencies
    are already merged, the preamble is omitted entirely (the merged deps are already
    in the current branch via the master base — nothing to do). When the preamble
    is added, it lists only the still-unmerged deps with their branch names and instructs
    Claude: ''This PR depends on N PRs that have not yet merged: [pr-A: branch, pr-B:
    branch, ...]. Before doing anything else, merge each of these into the current
    branch. Resolve any conflicts as you would any other merge conflict.'' Topological
    order is not needed because if B depends on A then B has already merged A in during
    B''s own start, so when C starts depending on both, merging B alone transitively
    brings in A. Re-runs are not an issue because if a dep merged to master in the
    meantime its branch may be gone but its commits are already in the current branch
    via master — the merge is a no-op. Dep-merge only happens in start; done/qa do
    not need it because the impl session already integrated the deps and any subsequent
    dep advances are handled when the user explicitly restarts.


    (3) Watcher behavior: existing auto-start watchers (bug_fix_impl_watcher, improvement_fix_impl_watcher,
    regression supervisor, plus any future ones) check the PR''s plan''s auto_merge
    setting before invoking the merge step. When false, they stop at QA PASS, log
    that the PR is awaiting manual merge, and move on to the next candidate.


    Files: pm/project.yaml schema (the plans entry shape — document the field), pm_core/store.py
    (read auto_merge with default True), pm_core/prompt_gen.py (start prompt preamble
    for unmerged deps, omitted entirely when all deps merged or none exist), pm_core/watchers/bug_fix_impl_watcher.py
    and improvement_fix_impl_watcher.py and any other watchers that auto-merge (skip
    merge when plan''s auto_merge is false), tests for: schema default, watcher respects
    flag, start prompt INCLUDES the preamble when at least one dep is unmerged and
    lists only those unmerged deps, start prompt OMITS the preamble entirely when
    all deps are merged, start prompt OMITS the preamble entirely when there are no
    deps, end-to-end flow where a plan with auto_merge=false has its PRs picked up
    by a watcher and reaches qa-pass without merging.'

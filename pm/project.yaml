      verifier pane is REUSED not relaunched (:142-144). The one-shot fake emits exactly
      one verdict per process and ignores stdin/tmux input, so it never fires a fresh
      idle_prompt -> the scenario STALLS in pending instead of recovering to VERIFIED.

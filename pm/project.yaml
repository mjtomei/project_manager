- id: pr-e2b7fdf
  plan: plan-regression
  title: Realistic single-prompt task — internet + directive + post-run integrity
    audit
  branch: pm/pr-e2b7fdf-programbench-submission-scaffolding
  status: pending
  depends_on:
  - pr-ca6859f
  - pr-6f9301e
  - pr-ed10ac4
  - pr-b3b8df0
  - pr-fbda1a8
  description: "## Goal\n\nThe capstone of the autonomous loop: a single-prompt task\
    \ evaluation that mirrors how a real engineer works — internet access, a written\
    \ directive specifying the task and its constraints, and a post-run integrity\
    \ audit confirming the agent didn't cheat by referencing the answer directly.\
    \ This is the realistic shape of the \"single prompt flow\" Phases 1-10 have been\
    \ building toward.\n\nInspired by ProgramBench (https://programbench.com) but\
    \ deliberately not its exact submission format. ProgramBench tests an agent's\
    \ ability to rebuild a working codebase from a compiled binary + docs alone, with\
    \ no internet. That's an interesting constraint but unrealistic — real engineers\
    \ have the internet. The thing the autonomous loop should actually be good at\
    \ is \"given a directive and the materials you'd realistically have, produce a\
    \ working result without referencing the answer.\"\n\nThe exact-ProgramBench offline\
    \ task lives in `pr-0cf3626` (filed alongside, see Related) as a separate runnable;\
    \ this PR is the primary deliverable.\n\n## Shape\n\nLayer pm on top of a per-task\
    \ cleanroom image. A leader Claude session uses pm itself as its orchestration\
    \ tool: files plan + PRs, drives them through start/review/QA/merge under the\
    \ Phase 10 flow, produces a working result. Three constraints make this realistic\
    \ where ProgramBench is artificial:\n\n1. **Internet access** — the agent has\
    \ the same web access a real engineer would. Stack Overflow, library docs, vendor\
    \ sites, search. No artificial sandboxing of common knowledge.\n\n2. **Directive\
    \ + provided materials** — the task envelope is a written directive describing\
    \ what to build, plus the same docs / specs / reference behavior a real engineer\
    \ would be given (the reference binary's observable behavior, API documentation,\
    \ examples). The agent is told explicitly which materials it may consult.\n\n\
    3. **Post-run integrity audit** — after the run, audit the agent's tool-use transcript\
    \ (web fetches, file reads, command executions) against an allowlist derived from\
    \ (2). The audit verifies the agent did NOT reference:\n   - The reference implementation's\
    \ source code\n   - Test cases for the task\n   - Walkthroughs or solutions specific\
    \ to the task\n   - Anything else explicitly out-of-bounds in the directive\n\
    \   \n   This is the load-bearing realism check: agents with internet can trivially\
    \ Google the answer if it's findable. The integrity audit is what makes the score\
    \ meaningful.\n\n## Pieces\n\n- **Leader prompt template** — new prompt builder\
    \ (sibling of `generate_prompt`, `generate_review_prompt`) framing pm as the leader's\
    \ tool. Lists relevant CLI commands, references the provided-materials manifest,\
    \ instructs the leader to file the plan + PRs and drive them via the Phase 10\
    \ QA flow (regression-bound scenarios, new-regression authoring where needed,\
    \ etc.). Different prompt from `pr-b3b8df0`'s auto-synthesis primitive (which\
    \ is setup-time / pre-leader); this is the leader prompt itself.\n\n- **Task envelope\
    \ format** — `pm/tasks/<task_id>/` directory convention. Contains: `directive.md`\
    \ (the prompt), `materials/` (the provided docs / reference binary / examples),\
    \ `allowlist.yaml` (what the integrity audit permits), and post-run `audit.md`\
    \ (the audit report). The cleanroom image mounts `/workspace/task/` to this directory.\n\
    \n- **Adapter CLI** — `pm bench realistic --task <path>` (or similar) drops the\
    \ task envelope into a workdir, generates the leader prompt, spawns the leader\
    \ session in `benchmark_mode` (`pr-6f9301e`), extracts `/workspace/result/` as\
    \ the produced artifact when the leader finishes.\n\n- **Integrity audit module**\
    \ — `pm_core/bench/audit.py`. Inputs: tool-use transcript (from Claude's session\
    \ logs), allowlist. Outputs: structured `audit.md` enumerating every out-of-bounds\
    \ reference (or stating clean), with verdict PASS / FAIL. FAIL includes the offending\
    \ tool call(s) with a one-line reason. Integrates with existing verdict surfaces.\n\
    \n- **Reproducibility Dockerfile** — `FROM` whatever base the task envelope declares,\
    \ layered with pm + Claude Code + pinned deps. Egress allowlist permits the model\
    \ API + the explicitly-allowed materials sources; everything else is blocked at\
    \ the network namespace (iptables-style harness).\n\n- **End-to-end test** — a\
    \ fixture task envelope + expected artifact + expected integrity-audit verdict;\
    \ verifies the adapter, leader prompt, post-run audit, and Phase 10 QA flow all\
    \ interact correctly.\n\n## Why depends on pr-fbda1a8 (bridge PR)\n\n`pr-fbda1a8`\
    \ re-validates Phases 1-5 features under Phase 10's flow. The leader session this\
    \ PR spawns drives the entire autonomous loop end-to-end — if any Phase 1-5 feature\
    \ has silently regressed under the new flow, the leader fails for reasons unrelated\
    \ to the task. Bridge must land first so this PR's failures are signal, not noise.\n\
    \n## Manual testing\n\nRun the adapter against the fixture task envelope and a\
    \ held-back real task. Confirm: the leader produces a result, the QA flow drives\
    \ scenarios under the Phase 10 model (regression-bound), the integrity audit catches\
    \ a deliberately-seeded out-of-bounds reference, and the audit PASSes on a clean\
    \ run.\n\n## Depends on\n\n- pr-ca6859f (self-recovery audit — required for unattended\
    \ operation)\n- pr-6f9301e (headless / benchmark_mode — runtime substrate)\n-\
    \ pr-ed10ac4 (no-progress safety stop — prevents the leader from spinning)\n-\
    \ pr-b3b8df0 (auto-synthesis primitive — produces QA instructions from the task\
    \ envelope)\n- pr-fbda1a8 (bridge PR — confirms Phase 1-5 features work under\
    \ Phase 10 flow)\n\n## Out of scope\n\n- The exact ProgramBench offline task —\
    \ separate PR, see Related.\n- Multi-task benchmark harness — this PR runs one\
    \ task at a time; batching is follow-up.\n- Reference-implementation comparison\
    \ via behavior diff — that's the synthesis primitive's job.\n\n## Related\n\n\
    - pr-0cf3626 (filed alongside): the exact ProgramBench offline task as a separate\
    \ runnable. Inherits the leader prompt + adapter CLI from this PR but flips internet=off\
    \ and switches the post-run check to ProgramBench's submission tarball format."

- id: pr-3251c21
  plan: null
  title: 'Bug: TUI review-loop reads stale workdir from in-memory PR snapshot, bails
    when workdir actually exists on disk'
  branch: pm/pr-3251c21-bug-tui-review-loop-reads-stale-workdir-from-in-me
  status: pending
  depends_on: []
  description: "## Symptom\nUser triggers review-loop on a PR whose implementation\
    \ session is currently running (so the workdir definitely exists on disk and is\
    \ recorded in pm/project.yaml). The TUI logs 'No workdir for <pr>. Start the PR\
    \ first.' and bails. A second attempt moments later succeeds.\n\n## Root cause\n\
    `_start_loop` at pm_core/tui/review_loop_ui.py:184 reads:\n\n    workdir = pr.get('workdir')\n\
    \nwhere `pr` is a dict the caller resolved from the TUI's in-memory app state\
    \ (typically via _get_selected_pr → app's cached project data). The TUI does not\
    \ auto-reload project.yaml on file changes. If `pm pr start` was run after the\
    \ TUI's last reload — e.g. via the picker, an auto-start watcher, or a subprocess\
    \ from an impl session — the on-disk yaml has `workdir: ...` set, but the TUI's\
    \ snapshot still shows None.\n\nThe CLI review path at pm_core/cli/pr.py:1141-1147\
    \ is more defensive: if workdir is missing or the path doesn't exist, it falls\
    \ back to `_ensure_workdir(data, pr_entry, root)` which can recreate the workdir.\
    \ The TUI review-loop path skips that fallback entirely.\n\n## Fix\nTwo pieces:\n\
    \n1. In _start_loop, re-read project.yaml from disk before the workdir check:\n\
    \   - Resolve fresh data via `store.load(app._root)`, look up the PR by id, use\
    \ the on-disk workdir.\n   - This both fixes the stale-snapshot case and matches\
    \ what the CLI does.\n2. If the freshly-read workdir is still None or the path\
    \ doesn't exist, call `_ensure_workdir` (same fallback the CLI uses) before declaring\
    \ failure. Only fall through to the failure path (with proper failed-state transition\
    \ — see companion bug pr-55c265f) if _ensure_workdir also fails.\n\n## Audit other\
    \ TUI launchers\nThe same in-memory-snapshot pattern likely affects start, review,\
    \ qa, merge launchers. Audit each for: (a) freshness of the pr dict at the workdir\
    \ check; (b) presence of the _ensure_workdir fallback. Standardise on a single\
    \ helper that resolves PR + workdir from disk for all TUI-triggered actions.\n\
    \n## Test\nRepro: with a PR that has no workdir, run `pm pr start <pr>` from outside\
    \ the TUI (or via a watcher), then immediately invoke review-loop from the TUI\
    \ picker. Expected: review window opens. Actual: 'No workdir for <pr>'."

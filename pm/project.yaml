    by the discovery supervisor (pr-271cb3a) after the test sessions file. Reconcile
    is a backstop that verifies the supervisor''s links and catches anything the supervisor
    missed.


    This changes the impl prompt generation (prompt_gen.py) to detect bug PRs and
    inject the reproduce→fix→verify→reconcile sequence. The review and QA prompts
    should also be aware — reviewers should check that a reproduction test exists

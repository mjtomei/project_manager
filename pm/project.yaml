- id: pr-942aa21
  plan: plan-qa
  title: Add spec generation step between PR phases
  branch: pm/pr-942aa21-add-spec-generation-step-between-pr-phases
  status: merged
  depends_on: []
  description: "Add an optional \"spec\" step to the PR lifecycle that bridges the\
    \ gap between the user's natural-language description and each subsequent phase\
    \ (implementation, review, QA). The spec is produced by an agent that reads the\
    \ PR description, the relevant codebase, and any prior phase outputs, then restates\
    \ the requirements in terms grounded in the actual code.\n\nThe spec surfaces\
    \ implicit requirements that the description assumes but doesn't state. For example,\
    \ \"scenario windows should stay open after verdict\" implies the container, worktree,\
    \ and process backing the window must also be preserved — but the description\
    \ only mentions windows. The spec step would identify these dependencies and make\
    \ them explicit.\n\nPer-phase specs:\n\nEach phase gets its own spec field on\
    \ the PR yaml:\n\n- spec_impl — What to implement, stated in terms of specific\
    \ code changes, functions to modify, invariants to maintain\n- spec_review — What\
    \ to verify during review, grounded in the implementation that was produced and\
    \ the original intent\n- spec_qa — What to test and how, grounded in the actual\
    \ implementation and the system's runtime behavior\n\nEach phase's spec builds\
    \ on the previous — the review spec references the implementation, the QA spec\
    \ references both.\n\nSpec generation modes:\n\nA global setting controls how\
    \ spec review works, with a per-PR override. Three modes:\n\n1. auto — Claude\
    \ generates the spec and uses best judgment to resolve ambiguities. No user review.\
    \ The phase proceeds immediately. This is effectively the current behavior — no\
    \ change to workflow.\n2. review — Claude generates the spec and pauses for explicit\
    \ user review and approval before the phase begins. The user can refine, correct,\
    \ or expand.\n3. prompt (default) — The spec is generated and the phase proceeds\
    \ without pausing, UNLESS:\n  - The user set review_spec: true on the PR at creation\
    \ time, OR\n  - Claude determined during spec generation that it cannot confidently\
    \ resolve an ambiguity and needs user input.\n\n  In either case, behavior matches\
    \ review mode.\n\nWhat the spec should contain:\n\n- Restatement of requirements\
    \ grounded in the codebase (referencing actual code paths, not abstract descriptions)\n\
    - Implicit requirements inferred from stated ones — what must also be true for\
    \ each requirement to hold\n- Ambiguities identified, with Claude's proposed resolution\
    \ (in auto/prompt mode) or flagged for user input (in review mode)\n- Edge cases\
    \ or interactions with existing behavior that the description doesn't address\n\
    \nWhat the spec enables:\n\n- Downstream agents work from explicit specs rather\
    \ than interpreting raw descriptions, reducing judgment calls and making weaker\
    \ models viable for later phases\n- The user catches misunderstandings before\
    \ code is written (or reviewed, or tested)\n- Ambiguities are resolved once per\
    \ phase rather than rediscovered by each agent"

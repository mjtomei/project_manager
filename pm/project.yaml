  description: 'Add a ''pm tutorial'' CLI command that launches a guided interactive
    tutorial in three modules, each runnable independently via --module flag:


    ## Module 1: tmux basics

    - Starts a fresh tmux session on a temp server socket

    - Enables mouse mode programmatically if not already set

    - Uses tmux hooks (after-select-pane, after-select-window, etc.) to detect when
    the user completes actions like switching panes, resizing, scrolling, creating
    windows

    - Progress tracked in a state file (~/.pm/tutorial/progress.json)

    - A Claude pane monitors the state file and provides guidance, answers questions,
    and congratulates on completed steps


    ## Module 2: TUI navigation

    - Sets up an example project with PRs in various states (pending, in_progress,
    in_review, qa, merged, closed) with dependencies between them

    - Walks through navigating the tech tree, using keybindings, viewing PR details,
    using the command bar, filtering/sorting

    - Claude session watches the state file and describes what everything means as
    the user explores

    - State file updated as user completes each exploration task


    ## Module 3: git fundamentals

    - Two-pane layout: Claude guidance pane + command line pane

    - Covers version control concepts, commits, branches, remotes vs local, push/pull/fetch,
    merge conflicts

    - Hands-on exercises in a disposable practice repo

    - Claude walks through each concept and verifies understanding via the state file


    ## Shared infrastructure

    - Progress state file tracks completion across all modules, persists between sessions

    - pm tutorial --module tmux|tui|git to run individual modules

    - pm tutorial (no flag) runs all three in sequence

    - Claude session prompt instructs watching for state file changes and guiding
    the user through steps'

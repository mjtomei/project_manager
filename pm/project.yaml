- id: pr-cfa6b00
  plan: improvements
  title: 'Improvement: pm which reports the pm_core path for the three IPC contexts
    where drift has mattered (host CLI, TUI in-process, popup IPC)'
  branch: pm/pr-cfa6b00-improvement-pm-which-reports-the-pm-core-path-for-
  status: pending
  depends_on: []
  description: "## Goal\nToday `pm which` (`cli/__init__.py:252-256`) reports a single\
    \ `pm_core` path — the one resolved in the host-CLI invocation context. After\
    \ the recent IPC-resolution work (pr-26ca427, the wrapper code-path-selection\
    \ fix, the IPC session-tag fallback in fce4593), there are multiple paths `pm_core`\
    \ can take depending on invocation context, and the actual chosen path can differ\
    \ between them. The user-visible failure mode was \"the popup IPC ran old code\
    \ while the host pm ran new code, and nothing said so.\"\n\nMake `pm which` report\
    \ the paths for the three invocation contexts where drift has actually mattered,\
    \ so this kind of mismatch is diagnosable in one command. Each row reflects **actual\
    \ execution in that context**, not a snapshot or simulation.\n\n## Contexts\n\n\
    ### 1. Host CLI\nThe path the wrapper picks when invoked from the current shell.\
    \ Same as today's `pm which`. Reports cwd, `chosen_via`, `selected_root`, `is_ipc`,\
    \ derived session tag.\n\n### 2. TUI in-process — actual IPC roundtrip\nThe pm_core\
    \ that the running TUI would resolve **right now**, not what it loaded at mount.\n\
    \nMechanism: file-based request/response, extending the existing SIGUSR2 + queue\
    \ + sentinel pattern with a return channel.\n\n- `pm which` writes a request marker\
    \ file at `~/.pm/sessions/<tag>/which-request-<reqid>` and signals the TUI (SIGUSR2\
    \ with a `which` kind, or a dedicated SIGUSR3).\n- The TUI's handler runs `pm_core_path()`\
    \ inside its own process, writes the result to `~/.pm/sessions/<tag>/which-response-<reqid>`,\
    \ deletes the request marker.\n- `pm which` polls the response file with a short\
    \ timeout (~500ms). On timeout, reports `(no TUI session detected)`.\n\nWhy not\
    \ a sidecar-on-mount: a snapshot file written at TUI start lies if anything changes\
    \ the TUI's loaded code afterward (hot-reload, lazy imports, `importlib.reload`).\
    \ Today the TUI doesn't reload, but the correctness shouldn't depend on that staying\
    \ true. More importantly, the diagnostic should reflect what `pm_core_path()`\
    \ returns when called in the TUI's process **now**, not what was true at startup.\n\
    \nWhat this catches: TUI running stale code after a pm upgrade or override change\
    \ while the user hasn't restarted; cwd-or-env-driven drift between the shell running\
    \ `pm which` and the TUI's own context.\n\n### 3. Popup IPC — actual popup subprocess\
    \ roundtrip\nThe pm_core that a real popup-IPC subprocess would load.\n\nMechanism:\
    \ `pm which` forks an actual popup subprocess via the same `tmux display-popup`\
    \ invocation the picker uses, with a hidden `which-probe` kind. That subprocess\
    \ goes through the wrapper's full resolution path, writes the result to `~/.pm/sessions/<tag>/which-popup-response-<reqid>`,\
    \ and exits. `pm which` reads the file.\n\nWhy not simulation: the wrapper's behavior\
    \ depends on argv, env subset, cwd at exec time — all of which can differ between\
    \ the simulating process and a real popup-IPC subprocess. `_ipc_session_tag`'s\
    \ argv parsing has been the source of bugs already; simulating it from pm-which's\
    \ process is not the same as exec'ing the real thing. By construction, the probe\
    \ matches the real popup invocation.\n\nWhat this catches: the exact class of\
    \ bug the user previously hit — popup-IPC silently loading the workdir's `pm_core`\
    \ while the rest of pm was on master. Load-bearing for that incident; the other\
    \ rows would have agreed and hidden the divergence.\n\n## Output\n\n```\n$ pm\
    \ which\nhost cli:        /home/matt/claude-work/project-manager/pm_core\n   \
    \              chosen_via=pm_root  session_tag=project_manager-c5a1006b  is_ipc=False\n\
    tui in-process:  /home/matt/claude-work/project-manager/pm_core\n            \
    \     session=pm-project_manager-c5a1006b  via=IPC roundtrip (380ms)\npopup ipc:\
    \       /home/matt/claude-work/project-manager/pm_core\n                 chosen_via=pm_root\
    \  argv-session=pm-project_manager-c5a1006b  via=real popup subprocess\n\nall\
    \ paths match ✓\n```\n\nWhen paths disagree:\n\n```\nhost cli:        /home/matt/claude-work/project-manager/pm_core\n\
    popup ipc:       /home/matt/.pm/workdirs/.../pm-pr-XXX/pm_core    ⚠ different\n\
    \                 chosen_via=cwd_walk  (find_local_pm_core hit the workdir clone)\n\
    ```\n\n`--json` flag for scripting / regression tests.\n\n## Acceptance criteria\n\
    \n- `pm which` from any shell inside a pm session reports the three rows above\
    \ with attribution.\n- All three rows reflect actual execution in their context,\
    \ not snapshots or simulations.\n- Context 2 fires a real IPC to the TUI and waits\
    \ up to 500ms; falls back to `(no TUI session detected)` on timeout or no TUI\
    \ present.\n- Context 3 forks an actual popup-IPC subprocess via `display-popup`\
    \ with a `which-probe` kind; reads the response file the probe writes.\n- When\
    \ all paths match, output ends with `all paths match ✓`. When any diverges, the\
    \ divergent row is visually highlighted.\n- `pm which --json` emits a structured\
    \ form.\n- Exit code is 0 in all cases — this is a diagnostic, not a check.\n\n\
    ## Invariants\n\n- `pm which` MUST NOT mutate state. Read-only diagnostic.\n-\
    \ `pm which` MUST NOT fail when the TUI isn't running. That row reads `(no TUI\
    \ session detected)`.\n- The popup `which-probe` kind MUST exit cleanly without\
    \ rendering a visible overlay (display-popup with `-E` + a no-output command;\
    \ the probe writes its file and exits before tmux paints).\n- The TUI's IPC handler\
    \ for `which` MUST run `pm_core_path()` synchronously from the same process the\
    \ TUI was already using; not via a subprocess.\n\n## Edge cases\n\n- Concurrent\
    \ `pm which` invocations: each request marker uses a unique `<reqid>` (uuid) so\
    \ responses don't collide.\n- TUI process is alive but unresponsive (blocked on\
    \ something): 500ms timeout fires; row reports `(TUI timeout)` rather than blocking\
    \ the command.\n- Popup subprocess fails to launch (e.g. not inside a tmux session):\
    \ row reports `(not in tmux — popup context unavailable)`.\n- User runs `pm which`\
    \ from a shell pane that is itself inside the pm session: host-cli row reflects\
    \ that shell's cwd; tui row reflects the TUI's pm_core. Useful when these differ.\n\
    - `--json` output still includes the same context rows, with `null` for any row\
    \ that couldn't be resolved.\n\n## Verification\n\n- Run from host shell inside\
    \ a pm session → three rows, all matching the master `pm_core`, `all paths match\
    \ ✓`.\n- Run from a shell whose cwd is inside a workdir clone → host-cli row shows\
    \ the workdir's `pm_core` (via `find_local_pm_core`); tui row still shows master;\
    \ visible divergence flagged.\n- Kill the TUI, run `pm which` → tui row reads\
    \ `(no TUI session detected)`; other rows unchanged.\n- Outside tmux entirely\
    \ → popup row reads `(not in tmux — popup context unavailable)`; tui row also\
    \ unavailable; host-cli row reflects pure cwd resolution.\n- Stress: 10 concurrent\
    \ `pm which` invocations → each gets its own reqid, no response-file mixing.\n\
    \n## Out of scope\n\n- Container-subprocess context. Containers run pm via the\
    \ bind-mounted source at `/opt/pm-src`; checking bind-mount drift is a different\
    \ concern and can ship as a separate `pm doctor`-style command if it ever bites.\n\
    - Watcher-subprocess context. Watchers spawn `pm` from their own cwd; their resolution\
    \ is \"host CLI from that cwd,\" already covered by context 1 in principle.\n\
    - A `pm doctor` style multi-check command. `pm which` is one diagnostic; `pm doctor`\
    \ could compose it with others (registry health, runtime_state sanity, queue inspection\
    \ from pr-5612e43) — separate idea.\n- Live-watching for path changes. Snapshot\
    \ at invocation time only.\n\n## Related\n\n- pr-26ca427 — popup project root\
    \ resolution via session metadata.\n- fce4593 — IPC session-tag fallback for argless\
    \ IPC commands.\n- pr-813cc19 — wrapper logging (`chosen_via`, `selected_root`,\
    \ `is_ipc`) which this command surfaces as a user-facing command.\n- pm_core/wrapper.py\
    \ — the resolution logic. `pm which` is the user-visible projection of what's\
    \ in the log.\n- pm_core/cli/helpers.py — `trigger_tui_command` and the SIGUSR2\
    \ + queue + sentinel pattern, which the context-2 IPC extends with a response\
    \ channel.\n- pm_core/cli/session.py — `_popup-show` / `display-popup` invocation;\
    \ the context-3 probe reuses this."

- id: pr-a792886
  plan: plan-qa
  title: Add pause-after-QA-plan mode with global setting, prefix key, and per-PR
    field
  branch: pm/pr-a792886-add-pause-after-qa-plan-mode-with-global-setting-p
  status: pending
  depends_on:
  - pr-ee1ff04
  description: 'Add a mode that pauses QA execution after test generation so the user
    can review and approve the proposed test plan before tests are run. Three ways
    to activate:


    1. **Global setting**: A project-level setting in project.yaml (e.g. qa_pause_after_plan:
    true) that always pauses after QA generates a proposed set of tests. Default:
    false.


    2. **Prefix key**: A modifier/prefix key before the QA keybinding in the TUI that
    activates pause-after-plan for a single QA run without changing the global setting.
    E.g., if ''q'' starts QA, then some prefix + ''q'' starts QA with pause enabled
    for just that run.


    3. **Per-PR field**: A field on the PR in project.yaml (e.g. qa_pause: true) that
    can be set at PR creation time (pm pr add --qa-pause) or via the edit screen (pm
    pr edit --qa-pause). This marks specific PRs for pause-after-plan regardless of
    the global setting.


    When paused, the QA agent should present the proposed test plan and wait for user
    approval (INPUT_REQUIRED or similar). The user can approve, modify, or reject
    the plan. After approval, QA proceeds with execution.


    Priority order: per-PR field overrides global setting; prefix key overrides both
    for that single run.


    Reminder: all associated documentation and prompts should be updated.'

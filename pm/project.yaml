- id: pr-e5b4dd8
  plan: improvements
  title: 'Improvement: window-attached persistent Claude popup for ad-hoc diagnostics
    outside the container'
  branch: pm/pr-e5b4dd8-improvement-window-attached-persistent-claude-popu
  status: in_review
  depends_on: []
  description: '## Goal

    Generalize today''s `c` keybinding (TUI: launches a Claude session in a new pane
    via `pane_ops.launch_claude`) as a **window-attached popup**: a Claude session
    bound to a specific tmux window that survives window switches, can be dismissed
    and re-summoned, and runs *outside* any container so it has host-level access.


    ## Why

    A common workflow today: hit `c` from the TUI, ask the Claude session a question
    that needs host-level access (run host commands, read files outside the workdir
    bind-mount, inspect tmux state, etc.), then switch windows to do other work. When
    you come back you want to keep talking to the same session — not start a new one
    and lose context.


    Today `c` opens a pane in the current TUI window, so dismissing means killing
    the pane and the session. There''s no way to keep the session alive while temporarily
    hiding it, or to summon a new ad-hoc session attached to *another* window (e.g.
    one of the impl/review/QA workdirs) with the same persistence semantics.


    ## Proposed surface


    A new keybinding (e.g. prefix+? or prefix+/ — bikeshed during impl) that:


    1. **First press in a window**: spawns a long-lived Claude session attached to
    that window. Session lives in a tmux popup overlaid on the current window. The
    session itself runs outside any container — full host filesystem and tmux access,
    distinct from impl/review/QA which run boxed.


    2. **Subsequent presses**: re-shows the same session''s popup over the current
    window. Same conversation, same scrollback. Esc / dismissal hides the popup; the
    session continues in the background.


    3. **Window-attached identity**: each tmux window gets its own session (key: window-id).
    Press the binding from a different window → different session, summoned/dismissed
    independently. Closing the window terminates its session.


    4. **Persistent across window switches**: switch away with the popup hidden →
    come back, hit the binding → same session resurfaces. Switch away with the popup
    *visible* → tmux''s usual popup-per-window behavior; coming back re-shows it (or
    it stays open depending on how display-popup interacts with select-window).


    ## Implementation sketch

    - One detached background tmux pane per window-id, holding the Claude session.
    Run the session there from the start so it survives popup dismiss/re-show.

    - The popup binding finds the pane for the current window''s id, attaches a popup
    that mirrors / sends input to it (e.g. `tmux display-popup -E ''tmux attach-session
    -t <session> \\; select-pane -t <pane>''` or a thinner wrapper that splits a pane
    into the popup).

    - State map at `~/.pm/sessions/<tag>/diag-panes.json` mapping window-id → pane-id
    so re-presses across pm restarts can rebind.

    - Run outside the container by default — it''s the explicit point of the feature.
    Provide a flag to opt into containerized mode if there''s a future use case for
    that, but keep the default unboxed.


    ## Relationship to existing `c`

    - `c` becomes a deprecated alias / shortcut for opening the popup attached to
    the current window.

    - Existing `c` behavior of spawning a fresh pane stays accessible if there''s
    a use case (probably not — the popup should subsume it).


    ## Out of scope

    - Cross-window session reuse (one session shared across all windows). The feature
    is window-attached on purpose so each context gets its own thread.

    - Containerized variant — separate idea.

    - Session state inspection / management UI (list all attached sessions, kill them,
    etc.). Handled by closing the host window.


    ## Test

    - Open a TUI window, press the binding → Claude session appears as popup, type
    something.

    - Dismiss with Esc → popup closes.

    - Switch to a different window, press binding → different session appears.

    - Switch back, press binding → original session reappears with prior conversation.

    - Close the original window → its session terminates; map entry cleaned up.'

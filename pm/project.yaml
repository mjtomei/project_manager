- id: pr-4bd08d7
  plan: plan-qa
  title: Add built-in Anthropic-to-OpenAI translation proxy for local LLM providers
  branch: pm/pr-4bd08d7-add-built-in-anthropic-to-openai-translation-proxy
  status: pending
  depends_on:
  - pr-9a5b86e
  description: 'Claude Code only speaks the Anthropic Messages API (/v1/messages),
    but many local LLM servers (vLLM, sglang, older Ollama) only support OpenAI-compatible
    chat completions (/v1/chat/completions). Ollama 0.14+ added native Anthropic API
    support, but other backends haven''t.


    Add a lightweight, zero-dependency translation proxy in pm_core/anthropic_proxy.py
    that:

    - Translates Anthropic Messages API requests → OpenAI chat completions requests

    - Translates OpenAI responses → Anthropic Messages API responses

    - Handles streaming SSE translation (Anthropic event types ↔ OpenAI delta chunks)

    - Supports tool use round-trips (tool_use blocks ↔ tool_calls, tool_result ↔ tool
    role)

    - Supports vision/images (Anthropic image blocks → OpenAI image_url)

    - Strips extended thinking blocks (not supported by OpenAI API)

    - System prompt translation: Anthropic top-level system field ↔ OpenAI system
    message in messages array

    - Stop reason mapping: end_turn→stop, tool_use→tool_calls, max_tokens→length

    - Usage/token counting translation between the two API formats

    - Error response translation: map OpenAI errors back to Anthropic-style error
    responses

    - Model name passthrough/mapping for arbitrary local model names

    - max_tokens handling: Anthropic requires it explicitly, OpenAI defaults differ

    - Cache-control header stripping: handle Anthropic prompt caching headers gracefully

    - Health check endpoint (/health) so the lifecycle watcher (pr-1f35c6d) can monitor
    the proxy

    - stdlib only — no FastAPI/Flask/uvicorn dependencies


    Integration with pm provider:

    - Auto-start the proxy when a type=local provider backend doesn''t support /v1/messages

    - pm provider add detects whether the proxy is needed during connectivity check

    - pm provider test reports proxy status


    This enables targeting sglang, vLLM, and any OpenAI-compatible server without
    requiring users to install external tools like LiteLLM.


    ## Thinking Model Support (Critical for Progress UI)


    Problem: Models like qwen3 produce thinking tokens before content tokens. Claude
    Code shows a "↓ N tokens" progress counter based on counting characters from text_delta
    SSE events. During the thinking phase, no text deltas arrive, so the counter shows
    nothing for 10-30+ seconds.


    How Claude Code''s token counter works (from source analysis of cli.js v2.1.73):

    - Characters from content_block_delta with type text_delta are accumulated

    - Displayed token count = Math.round(accumulated_chars / 4)

    - Counter only shows after 30 seconds of streaming (it9 = 30000) OR if thinking/extended
    thinking is detected

    - usage.output_tokens from message_delta is used for cost tracking only, NOT for
    the progress spinner


    Solution: Translate Ollama''s thinking field into Anthropic thinking content blocks:

    1. When Ollama streams {"message": {"thinking": "token..."}}: - Emit content_block_start
    with {"type": "thinking", "thinking": ""} - Emit content_block_delta with {"type":
    "thinking_delta", "thinking": "token..."}

    2. When Ollama streams {"message": {"content": "token..."}}: - Close the thinking
    block (content_block_stop) - Start text block: content_block_start with {"type":
    "text", "text": ""} - Emit content_block_delta with {"type": "text_delta", "text":
    "token..."}

    3. On done: true chunk from Ollama: - Extract prompt_eval_count -> input_tokens
    - Extract eval_count -> output_tokens - Send both in message_delta.usage (Claude
    Code requires BOTH fields)


    Note: May require Claude Code beta header anthropic-beta: thinking-2025-04-15
    or similar. The proxy should check what betas the client sends and only emit thinking
    blocks if supported.


    ## Token Counting


    Ollama provides token counts but shims typically hardcode 0. The proxy must:

    - Streaming: Read prompt_eval_count and eval_count from the final done: true chunk

    - Non-streaming: Read same fields from response body

    - Forward as message_delta.usage.input_tokens AND .output_tokens (both required)


    ## Quirks Discovered During QA


    1. Claude Code sends ?beta=true query param on /v1/messages — strip query strings

    2. Claude Code probes /v1/models — forward to upstream

    3. Ollama base URL has no /v1 — handle both /v1/chat/completions and /api/chat

    4. Models need 32K+ context for Claude Code''s system prompt (~15-20K tokens)

    5. type=openai with openai: model prefix does not work in Claude Code v2.1.73
    — only ANTHROPIC_BASE_URL works, so translation proxy is required'

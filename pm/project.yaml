- id: pr-5be51894
  plan: plan-qa
  title: Check NEEDS_WORK verdicts for unpushed changes and redirect to INPUT_REQUIRED
  branch: pm/pr-5be51894-check-needs-work-verdicts-for-unpushed-changes-and
  status: pending
  depends_on:
  - pr-8fdda09
  description: 'When a QA scenario returns NEEDS_WORK, verify that the session actually
    pushed commits to the PR branch. NEEDS_WORK implies the session found issues AND
    committed fixes for the review loop to pick up on the next iteration. If the clone''s
    HEAD commit is unchanged from when the scenario started (no push occurred), the
    session found problems it couldn''t fix — it should have reported INPUT_REQUIRED
    instead.


    Implementation:

    1. Add an ``initial_head_commit`` field to ``QAScenario`` and record the clone''s
    HEAD at scenario launch (both tmux and container paths).

    2. When NEEDS_WORK is detected in the polling loop, run ``git rev-parse HEAD``
    on the scenario''s worktree clone and compare against the recorded initial commit.

    3. If the HEAD is unchanged, send the scenario a follow-up message explaining
    that NEEDS_WORK requires pushed fixes and asking it to switch to INPUT_REQUIRED,
    then put the scenario back in pending to wait for the revised verdict.

    4. If the HEAD has advanced (commits were pushed), accept the NEEDS_WORK verdict
    as-is — the review loop will pick up the fixes.


    Follow the same retry/limit pattern as the PASS verification follow-ups to avoid
    infinite loops.'

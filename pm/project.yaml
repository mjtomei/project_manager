- id: pr-3032fb6
  plan: watchers
  title: 'Watcher core framework: BaseWatcher, WatcherManager, and auto-start refactor'
  branch: pm/pr-3032fb6-always-on-watcher-framework-with-pluggable-intelli
  status: merged
  depends_on: []
  description: "Refactor the watcher loop from an auto-start companion into a pluggable\
    \ always-on framework. This is the core infrastructure that all watchers build\
    \ on.\n\n## BaseWatcher abstract class\n- ALL watchers inherit from this, providing:\n\
    \  - Shared polling loop with configurable interval\n  - Configurable user interaction\
    \ mechanisms: INPUT_REQUIRED escalation, non-blocking recommendations in TUI log,\
    \ sticky notifications\n  - Base prompt template that all watcher Claude sessions\
    \ share (project context, state file awareness, pm tui and framebuffer commands,\
    \ tmux setup)\n  - Common tmux pane management (creating/reusing watcher panes,\
    \ capturing output)\n  - State persistence (what the watcher has seen, acted on,\
    \ recommended)\n  - Shared verdict/action vocabulary so all watchers communicate\
    \ the same way\n- Each watcher implements: poll() -> observations, assess(observations)\
    \ -> actions, act(actions)\n\n## WatcherManager\n- Single orchestrator that manages\
    \ all registered watchers\n- Handles scheduling, deduplicates user notifications,\
    \ provides the unified interaction layer\n- Dispatches polling to each watcher,\
    \ collects recommendations\n- One place in the code implements the mechanisms\
    \ for user interaction, prompt generation, and loop management — individual watchers\
    \ only implement domain-specific logic\n\n## TUI integration\n- Watchers mapped\
    \ to different keys with w as prefix, startable from TUI even when auto-start\
    \ is off\n- New TUI pane accessible with ww that lists all running watchers, lets\
    \ you select and jump to their windows, see which have requested input\n- Certain\
    \ actions like moving PRs between steps gated by TUI interaction in this pane;\
    \ recommended actions collected and presented here\n- TUI indicators similar to\
    \ current auto-start watcher showing when any watcher is running or has requested\
    \ input\n\n## Auto-start watcher refactor\n- Refactor the existing auto-start/watcher\
    \ loop to use the new BaseWatcher pattern as proof of concept\n- pm watcher start/stop\
    \ CLI commands to control watchers\n- Each watcher can be enabled/disabled independently\n\
    \n## Deprecated PRs\nThese would be subsumed by built-in watchers using this framework:\n\
    - pr-b53bfe2, pr-76fa48d, pr-72f1278, pr-757a140\n\nThe existing #113 (TUI watchdog\
    \ for dead threads) and #115 (watcher INPUT_REQUIRED refinement) remain relevant\
    \ as they improve the underlying mechanisms this framework builds on."

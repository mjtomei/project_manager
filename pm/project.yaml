- id: pr-3f7815c
  plan: watchers
  title: Spec tree branching with multiple candidate specs per PR
  branch: pm/pr-3f7815c-spec-tree-branching-with-multiple-candidate-specs-
  status: pending
  depends_on:
  - pr-942aa21
  - pr-848ba9b
  description: 'Extend spec generation to support multiple candidate specs branching
    from a base, enabling speculative exploration at the spec level.


    ## Spec branching


    - A base spec starts as just a title and short description (the "what", not the
    "how")

    - `pm decision add --spec <pr-id>` creates a spec-level decision point

    - Spec generation produces multiple candidate specs as branches of the decision
    point

    - Each spec branch is a complete spec with its own approach, tradeoffs, and implementation
    plan

    - Each spec branch can have its own implementation workdir


    ## Integration with spec generation (pr-942aa21)


    - Spec generation prompt updated to produce multiple candidates when it detects
    design uncertainty

    - Candidates are automatically registered as branches of a decision point

    - Each candidate spec is self-contained — includes its own test plan, acceptance
    criteria, and implementation notes

    - Comparison metadata: each branch notes its tradeoffs relative to the others


    ## Workflow


    1. PR exists with title and short description

    2. User or prompt triggers spec generation

    3. Generator identifies significant design choices and creates a decision point

    4. Multiple spec variants are generated as branches

    5. Each branch can be independently implemented

    6. Human or machine resolves the decision, winner''s spec becomes the canonical
    one


    ## Visibility


    - Spec variants visible in TUI within the PR detail view

    - `pm decision show` lists spec branches with summaries

    - Resolved specs show which branch won and why'

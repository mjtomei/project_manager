    Migration: import existing ~/.pm/debug/*.log on first open of the new schema,
    parsing the standard pm log format. Old log files are renamed to .migrated-<timestamp>.


    Files: pm_core/paths.py (configure_logger uses a SQLiteLogHandler), new pm_core/store/logs.py
    (handler implementation, batching, retention pruning), pm_core/store/schema.py
    (logs table + indexes).


    Tests: log writes from concurrent processes don''t corrupt rows or block each
    other; batching coalesces correctly under bursty loads; queries return the expected

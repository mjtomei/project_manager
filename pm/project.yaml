- id: pr-ed10ac4
  plan: plan-regression
  title: No-progress safety stop on review/QA loops
  branch: pm/pr-ed10ac4-no-progress-safety-stop-on-review-qa-loops
  status: pending
  depends_on: []
  description: 'Detect "same diff, same verdict, no real change" between iterations
    of the review or QA loop and short-circuit before max-iterations.


    Today max-iterations is the only ceiling and is loose (60 minutes per pr-860969d);
    a no-progress detector catches the cheap-to-detect case where the loop is spinning.
    Approach: hash the diff + verdict + relevant prompt snippets across iterations;
    on N consecutive identical hashes (default 2), short-circuit with a NEEDS_WORK
    verdict and a structured reason that the watcher can route to retry-once or mark-failed
    (per pr-ca6859f''s playbooks).


    Useful in normal mode too — a stuck review loop today wastes the full iteration
    budget.


    Manual testing: synthesize a review loop where the implementation does not change
    between iterations (e.g. a NEEDS_WORK that the impl session cannot address), confirm
    the safety stop fires within N iterations rather than hitting max-iterations.'

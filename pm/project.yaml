- id: pr-a84a939
  plan: improvements
  title: Extract data-service layer between storage and UIs
  branch: pm/pr-a84a939-extract-data-service-layer-between-storage-and-uis
  status: pending
  depends_on: []
  description: "Establish a clean separation between storage and every consumer of\
    \ pm state by inserting a typed data-service layer between them. **This is a pure\
    \ code refactor — it does NOT change pm's storage architecture (text files in\
    \ git stay text files in git).**\n\nWhy this is valuable independent of storage:\n\
    \n(1) Today's TUI reaches directly into project.yaml structures. The CLI commands,\
    \ watchers, prompt builders, hook readers, qa_loop, container.py, and many other\
    \ modules also read pm state directly. With a service layer in place, all of them\
    \ — and any future UI like plan-ambient's rc viewer, project browser, doc reader,\
    \ or a future web frontend — consume the same view-shaped types from pm_core/services/\
    \ without coupling to specific file paths or YAML schemas.\n\n(2) Reading pm state\
    \ today involves direct yaml.safe_load and dict-walking. A typed service layer\
    \ (frozen dataclasses or Pydantic models) catches typos and shape errors at the\
    \ service boundary, not at deep dict accesses inside the TUI.\n\n(3) New UIs in\
    \ plan-ambient (rc viewer, project browser, doc reader) become incremental — find\
    \ or add the service methods you need; no per-UI duplication of file-reading code.\n\
    \n(4) Tests at the service layer can fixture state in-memory without touching\
    \ disk, regardless of whether the underlying storage is a YAML file (today) or\
    \ anything else (future).\n\nConcrete shape:\n\n(1) Create pm_core/services/ with\
    \ one module per domain (project, prs, plans, panes, qa_runtime, hooks, etc.).\
    \ Each module exposes typed read methods (PrSummary, PrDetails, PlanSummary, PaneListing,\
    \ etc.) returning frozen dataclasses or Pydantic models — no dict-walking, no\
    \ internal IDs leaked.\n\n(2) Write methods accept typed command objects (StartPr,\
    \ MovePane, etc.) and return the new state or an error type. Internally they continue\
    \ to use pm_core/store.py and other file-based readers/writers; the file-based\
    \ architecture is preserved.\n\n(3) Refactor every reader/writer of pm state to\
    \ go through services:\n  - pm_core/tui/* — every place app.py / pr_view.py /\
    \ pane_ops.py reads or writes state\n  - pm_core/cli/* — pr.py / plan.py / qa.py\
    \ / session.py / helpers.py / container.py / meta.py\n  - pm_core/watchers/* —\
    \ every watcher\n  - pm_core/qa_loop.py and pm_core/qa/*\n  - pm_core/prompt_gen.py\n\
    \  - pm_core/hook_events.py\n  - pm_core/pr_sync.py, pm_core/auto_start.py, pm_core/loop_shared.py\n\
    \  - pm_core/container.py, pm_core/pr_cleanup.py\n  - Anywhere else that imports\
    \ from pm_core/store* or reads project.yaml / pane-registry / runtime files\n\n\
    (4) Lint / import-graph test enforces the separation: no module under pm_core/\
    \ outside pm_core/store* or pm_core/services/ may import from pm_core/store* directly.\
    \ A test asserts this on every PR going forward.\n\n(5) Tests at the service layer\
    \ — unit-test each service method against fixture data without spinning up a TUI\
    \ or CLI. Existing UI tests stay where they are; service tests are added beneath\
    \ them.\n\nOut of scope:\n- Storage migration of any kind. project.yaml stays\
    \ YAML in git. Everything currently in ~/.pm/ stays as files.\n- Building any\
    \ new UI on top of services — done by individual UI PRs (rc viewer, project browser,\
    \ etc., already in plan-ambient). The service layer is what makes those PRs cheap.\n\
    - A web/HTTP transport for services — could be added later as a thin FastAPI adapter;\
    \ not required to ship.\n\nFiles: new pm_core/services/ package, refactor every\
    \ module enumerated in (3), import-graph guard test.\n\nTests: every service method\
    \ has unit tests against fixture state; TUI / CLI / watcher integration tests\
    \ still pass after the refactor; the import-graph guard catches any direct pm_core/store*\
    \ import from outside the allowed packages."

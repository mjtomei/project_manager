- id: pr-d3ae95e
  plan: tui-ux
  title: Add session permission visibility and risk dashboard
  branch: pm/pr-d3ae95e-add-session-permission-visibility-and-risk-dashboa
  status: pending
  depends_on: []
  description: 'Add a permission/risk visibility layer for Claude sessions. Currently
    all sessions (implementation, review, QA, watcher, merge) run with the same broad
    permissions (--dangerously-skip-permissions), and there''s no visibility into
    what access each session actually has or needs.


    ## Goals

    - Provide visibility into the current risk level across all active sessions

    - Allow fine-grained control over what each session type can access (GitHub API,
    git push, file writes, shell commands, etc.)

    - Reduce the number of sessions with wide-ranging access to limit the blast radius
    of things going wrong

    - Acknowledge that the user can''t approve every command — instead, provide a
    risk dashboard so they can make informed decisions about which sessions to trust


    ## Possible approach

    - Define permission profiles per session type (e.g. review sessions don''t need
    git push, QA scenarios don''t need GitHub API access, watcher only needs read
    access)

    - TUI dashboard showing active sessions with their permission level and a color-coded
    risk indicator

    - Ability to promote/demote session permissions on the fly (e.g. temporarily grant
    a review session push access)

    - Log and surface when sessions attempt actions outside their permission scope

    - Integration with container isolation — containers provide a natural enforcement
    boundary for restricting tool access


    ## Non-goals

    - This is not about replacing --dangerously-skip-permissions entirely — it''s
    about adding visibility and optional restrictions on top of it

    - Not about per-command approval — that defeats the purpose of autonomous operation'

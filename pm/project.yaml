- id: pr-3a8111d
  plan: improvements
  title: 'Improvement: pass --name to spawned Claude sessions so the Claude phone/iPad
    apps'' code section shows legible session names tied to pm session-tag + tmux
    window + pane role'
  branch: pm/pr-3a8111d-improvement-pass-name-to-spawned-claude-sessions-s
  status: pending
  depends_on: []
  description: 'Today pm spawns Claude sessions without passing the `--name` flag,
    so the Claude desktop / phone / iPad apps (and `claude agents`) show auto-generated
    summaries or UUIDs. When a user has many Claude sessions in flight across multiple
    pm PRs and uses `/rc` (remote-control alias, https://code.claude.com/docs/en/commands.md)
    to access them from the Claude mobile app''s code section, the listing is unreadable
    — they can''t tell which session is the impl for #193 vs the review for #190 vs
    the QA scenario 2 for #170.


    Fix: pass `--name` at every Claude-launch site with a deterministic format that
    encodes the pm context.


    ## Naming format


    `<session-tag>/<tmux-window-name>/<pane-role>`


    Examples:


    - `project_manager-c5a1006b/#193/impl` — impl Claude session for PR #193.

    - `project_manager-c5a1006b/review-#190/claude` — review Claude session for PR
    #190. The role is `claude` to distinguish from the diff pane (which doesn''t run
    Claude but still has a role in pm''s pane registry).

    - `project_manager-c5a1006b/qa-#170-s2/claude` — QA Claude for scenario 2 of PR
    #170.

    - `project_manager-c5a1006b/merge-#202/claude` — merge-resolve Claude.

    - `project_manager-c5a1006b/plan-regression/claude` — plan-review Claude.

    - `project_manager-c5a1006b/meta/claude` — pm meta Claude.


    The pane-role component MUST be included even when only one pane in the window
    currently runs Claude. Reasons: (a) windows can grow extra Claude panes (companion
    patterns, side discussions); (b) consistent naming format is easier than two formats;
    (c) the role tag is what tells the user ''this is the impl, that''s the review''
    on mobile where the window name alone may be cropped.


    The pane role is the same string already registered with pm''s pane-registry (e.g.,
    `impl`, `review-claude`, `review-diff`, `qa-claude`, `plan-edit`, `plan-review`,
    `meta`). For pm''s --name purposes we drop the `-claude` suffix where it''s redundant
    — a name ending in `/review-claude` is uglier than ending in `/review`.


    ## Implementation


    A single helper `pm_core/claude_launcher.py::format_session_name(session_tag,
    window_name, pane_role) -> str` that returns the formatted name. Called from every
    Claude-spawn site:


    - `launch_claude` (pm_core/claude_launcher.py:127) — main interactive launch path.
    Add `--name <formatted>` to the assembled `cmd` list.

    - `launch_claude_print` (line 217) — one-shot non-interactive print mode. Less
    important here (the apps don''t track these as agents) but still worth tagging
    for consistency in transcripts.

    - `launch_claude_print_background` — same as launch_claude_print.

    - `build_claude_shell_cmd` (line 304) — the helper that produces the docker-exec-wrapped
    command for containerized sessions. Inject `--name` here so the container''s claude
    binary picks it up.

    - Inline subprocess launches in cli/pr.py / cli/plan.py / cli/meta.py / review_loop.py
    / qa_loop.py — audit for any `subprocess.Popen([..., ''claude'', ...])` patterns
    that bypass the launcher helpers and add `--name` to those too.


    The caller knows session_tag (from `pm_core.paths.get_session_tag()`), window_name
    (it''s about to create the window — already in scope), and pane_role (already
    passed to pane_registry.register_pane). All three pieces are already available
    at each launch site — this PR just plumbs them through to `--name`.


    ## Acceptance criteria


    - Every Claude session pm spawns has a `--name` set in the launch command.

    - The name follows the format `<session-tag>/<window-name>/<pane-role>` (with
    the `-claude` suffix stripped from role when redundant).

    - Running `claude agents` lists pm-spawned sessions with these names visible.

    - Opening the Claude mobile / iPad app''s code section shows the same names, making
    it easy to distinguish parallel sessions.


    ## Invariants


    - Names MUST NOT contain characters Claude Code rejects in --name. Verify the
    allowed character set; sanitize the formatted string if needed (likely just /
    and #-prefixed numbers; if Claude restricts /, use a different separator like
    `-` or `:`).

    - Name length MUST stay under whatever cap Claude Code enforces (mobile apps often
    crop at ~30-40 chars). Truncate the session-tag if too long, never the role.

    - If `format_session_name` can''t build a valid name (missing session_tag, missing
    window_name), fall back to no `--name` flag rather than spawning with a broken
    arg.


    ## Edge cases


    - pm running outside tmux (CLI invocations from a bare shell) — no window name.
    Format becomes `<session-tag>/<pane-role>` (two parts). Document this in the helper.

    - Containerized sessions — the wrapped `claude` inside the container sees the
    --name and registers under that name in its own state. Should be transparent.

    - Renames after spawn (the user manually renaming via /rename or claude agents
    Ctrl+R) — pm doesn''t override these. Subsequent `pm pr review` etc. re-spawn
    fresh sessions with the original format.


    ## Verification


    - pm pr start <pr-id> → claude agents shows the new session with name `<tag>/<window>/<role>`.

    - pm pr review <pr-id> → analogous for review session.

    - Same for qa, merge, meta, plan-review.

    - `/rc` from inside a session → the Claude mobile app''s code section lists by
    the new names.


    ## Out of scope


    - Backfilling names for already-running sessions. Restart applies the new names.

    - Configurable naming format. Single deterministic format is enough; if users
    want custom, they can /rename post-hoc.

    - Names that encode runtime state (iteration count, etc.). Names are spawn-time
    identifiers, not status displays — pm''s own TUI / agents-window handle that.


    ## Related


    - pr-612d556 (agents window) — once names are pm-meaningful at spawn time, the
    agents window''s pm-PR correlation logic gets much simpler. The ''Option 2'' in
    pr-612d556 (parse claude agents output and correlate to pm PR-id) collapses to
    ''just parse the name field'' once this PR lands.

    - pane_registry — source of truth for pane-role strings. Reuse the same strings.

    - Claude Code CLI reference: https://code.claude.com/docs/en/cli-reference.md
    (--name flag).

    - /rc / /remote-control alias: https://code.claude.com/docs/en/commands.md.'

- id: pr-6f9301e
  plan: plan-regression
  title: Headless / benchmark mode for autonomous loops
  branch: pm/pr-6f9301e-headless-benchmark-mode-for-autonomous-loops
  status: pending
  depends_on:
  - pr-ca6859f
  - pr-438028c

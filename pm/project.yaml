- id: pr-2173cf1
  plan: bugs
  title: 'Bug: hook_install writes wrong hook_receiver path when run inside a container'
  branch: pm/pr-2173cf1-bug-hook-install-writes-wrong-hook-receiver-path-w
  status: merged
  depends_on: []
  description: 'ensure_hooks_installed() (pm_core/hook_install.py) is called from
    pm session and pm tui startup. It writes hook commands using Path.home() to compute
    RECEIVER_PATH (line 36: RECEIVER_PATH = Path.home() / .pm / hook_receiver.py).
    Containers bind-mount the host''s ~/.claude read-write at /home/pm/.claude (container.py:587-589),
    so any settings.json change inside a container propagates back to the host. When
    pm session or pm tui runs inside a containerized Claude (impl, review, QA), Path.home()
    resolves to /home/pm and ensure_hooks_installed writes /home/pm/.pm/hook_receiver.py
    into the bind-mounted settings.json. The host then fires hooks pointing at /home/pm/.pm/hook_receiver.py,
    which does not exist on the host, and Claude reports ''Stop hook feedback: ...
    can''t open file ...: No such file or directory'' on every Stop event. The receiver
    design (per pr-014f93f spec) intentionally uses the host absolute path as the
    bind-mount target inside the container, so the same command works in both contexts
    — but only if the path written into settings.json is always the host''s path.
    Today nothing enforces that.


    Fix: have pm export PM_HOST_HOME (the host user''s home) into every container
    it creates, then have hook_install.py prefer PM_HOST_HOME over Path.home() when
    computing RECEIVER_PATH. On the host, PM_HOST_HOME is unset and Path.home() is
    correct. Inside a container, PM_HOST_HOME is set by container.py at create time
    and overrides the container''s /home/pm. Alternative shape: hook_install detects
    container context (e.g. /.dockerenv exists, or a pm-set marker) and skips the
    install entirely, on the assumption that the host has already done it correctly.
    Either works; the env var approach is more robust because it also fixes _HOOKS_BASE
    on line 32 (which has the same Path.home() issue and would write hook event files
    to the wrong location inside containers if it ever needed to).


    Reproduce: from any containerized pm session (e.g. an impl pane Claude), run pm
    session or pm tui. Inspect ~/.claude/settings.json on the host — hook commands
    now reference /home/pm/.pm/hook_receiver.py. Trigger a Stop event in any Claude
    session and the hook fails with file-not-found.


    Tests: ensure_hooks_installed with PM_HOST_HOME set writes the host path regardless
    of Path.home(); without PM_HOST_HOME falls back to Path.home() (host behavior
    unchanged); container.py sets PM_HOST_HOME to the host user home when creating
    containers; integration test that simulates running ensure_hooks_installed in
    a fake container env (HOME=/home/pm, PM_HOST_HOME=/home/matt) and asserts the
    written path is /home/matt/....'

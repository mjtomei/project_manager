      in a bug-fix PR session).

      - Extended: `pm qa list / show / edit` now cover the new artifacts category
      alongside instructions and regression.

      - Behavior change: `pm tui test --file-bugs` now files BOTH bugs (`--plan bugs`)
      and improvements (`--plan ux`), not just bugs. The flag name is unchanged for
      now but the addendum is unified.


      ## TUI changes


      - The QA pane (`q` key) renders a third section "Artifact Recipes" sourced from
      pm/qa/artifacts/. Status-bar counter includes artifacts.

      - The `a` key in the QA pane no longer hardcodes `pm qa add-instruction new-instruction`.
      It now opens a small modal picker (QACreatePickerScreen) asking for name + kind
      (instruction/regression/artifact) + mode (guided author-* vs scaffold add-*).

      - TUI Enter on a regression item still launches via `launch_qa_item` but now
      goes through `build_regression_test_prompt`; behavior should match prior runs
      except that the filing addendum is the unified one.


      ## New on-disk surfaces


      - `pm/qa/artifacts/` — new directory category. Two recipes ship: `tmux-screen-recording.md`,
      `cli-recording.md`.

      - `pm/qa/captures/<pr-id>/impl/{pre-fix,post-fix}/` and `pm/qa/captures/<pr-id>/scenarios/<n>/`
      — capture layout consumed by the bug-fix flow and QA scenario prompts.

      - `pm/qa/captures/regression/<test-id>/<timestamp>/` — capture layout for regression
      tests (no PR scope).

      - `pm_core/docs/qa_library.md` — packaged reference doc shipped via setuptools.package-data;
      readable by `pm qa docs` regardless of the project pm is run against.


      ## Bug-fix flow prompt: behavior changes


      - Restructured from 3 steps to 5: manual repro on pre-fix → failing test → fix
      → verify with test → verify manually. Steps now reuse prior-session artifacts
      when valid, skip re-implementing fixes that are already committed, and only
      produce a fresh post-fix capture when this session changed the fix.

      - Step 1 now handles already-committed fixes: stash uncommitted, or checkout
      parent / revert files temporarily for committed fixes.

      - Bug-fix review checklist now flags missing captures as INPUT_REQUIRED (not
      NEEDS_WORK) to avoid infinite review loops.


      ## Forward-looking docs


      - Regression tests section in `pm_core/docs/qa_library.md` carries a `> [!CAUTION]`
      callout flagging that the section describes post-pr-7d5d036 behavior. Until
      that PR lands, the runner still hardcodes "testing against pm tmux session".
      A note on pr-7d5d036 reminds the implementer to drop the callout when their
      fix lands.

      - Containment model for the runner rewrite is pinned in pr-7d5d036 (note-a870561):

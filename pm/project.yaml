  description: 'Build a benchmark suite for testing changes to review and QA prompts,
    flows, and watcher configurations against known bugs.


    Sources of test cases:

    1. **Our own post-merge bugs** — the 20+ QA system fixes, 3 _ensure_workdir fixes,
    container push proxy saga (16+ corrective actions), race conditions, shell quoting
    bugs, dead code/unused imports that slipped through review. Each becomes a regression
    test: given the pre-fix code, does the review/QA system catch the bug?


    2. **Open source AI project bugs** — PRs from repos like LangChain, vLLM, llama.cpp,
    Transformers where bugs were merged and later fixed. These test whether our review
    catches issues in AI-specific code (model loading, tokenization, inference pipelines,
    prompt handling).


    3. **Open source non-AI project bugs** — PRs from repos like PostgreSQL, Redis,
    CPython, Node.js where subtle bugs were merged. These test general code review
    quality (race conditions, memory issues, edge cases, security vulnerabilities).


    The benchmark runner:

    - Takes a before/after commit pair (buggy code + fix)

    - Presents only the buggy code to the review/QA system

    - Scores whether the system identified the actual bug vs false positives

    - Tracks precision (are identified issues real?) and recall (are real bugs found?)

    - Supports A/B testing different prompts, models, effort levels, and watcher configs


    Enables data-driven iteration on review prompts and QA scenarios rather than guessing.'

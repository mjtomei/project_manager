- id: pr-945ba50
  plan: plan-state
  title: Replace project.yaml with SQLite database
  branch: pm/pr-945ba50-replace-project-yaml-with-sqlite-database
  status: pending
  depends_on:
  - pr-f38005f
  description: 'Replace the YAML file-based state store with SQLite to get proper
    ACID transactions, concurrent read safety, and atomic writes without hacks.


    ## Motivation


    project.yaml is a flat YAML file that requires file locking (pr-f38005f), atomic
    staging writes, and parse-error guards to safely handle concurrent access from
    the TUI, CLI, and background sync. These are workarounds for the absence of a
    real database. SQLite provides all of this for free with better performance.


    ## Approach


    - Introduce a project.db SQLite database alongside (then replacing) project.yaml

    - Schema mirrors current YAML structure: project table, prs table, plans table,
    notes table

    - store.py load/save API stays the same externally — implementation switches to
    SQLite

    - Migration: on first open, if project.yaml exists and project.db does not, import
    from YAML

    - All reads/writes go through sqlite3 with WAL mode enabled (concurrent readers,
    single writer, no corruption on crash)

    - Remove file locking, atomic staging, and parse-error guard workarounds once
    migration is complete


    ## Scope


    - pm_core/store.py: replace yaml.load/dump with sqlite3 queries

    - Migration path from existing project.yaml installs

    - TUI reload becomes a lightweight SELECT instead of full file parse

    - CLI commands unchanged from the user perspective'

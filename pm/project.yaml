- id: pr-a5a800a
  plan: bugs
  title: 'Defensive: normalize window-size on pm session init so external ''manual''
    override is cleared'
  branch: pm/pr-a5a800a-defensive-normalize-window-size-on-pm-session-init
  status: pending
  depends_on: []
  description: "pm session init currently only writes window-size when it wants to\
    \ set 'smallest' for shared (--global / --group) sessions. For non-shared sessions,\
    \ pm doesn't touch the option at all and trusts the global default ('latest').\
    \ This is fragile: if a per-session 'window-size' override exists from outside\
    \ pm — set by a manual tmux command, an IDE integration, a session manager, or\
    \ any other external tool — pm silently inherits it.\n\nThe trap: window-size\
    \ = manual disables auto-resize entirely (only explicit resize-window commands\
    \ change sizes). When this leaks onto a pm session, all auto-resize behaviors\
    \ break in confusing ways. Switching to a window doesn't grow it, attaching/detaching\
    \ clients doesn't recompute, and the symptoms look like broken hooks or broken\
    \ aggressive-resize even though those are fine.\n\nHit during a debugging session\
    \ today on pm-project_manager-c5a1006b plus its grouped sessions: every grouped\
    \ session had window-size = manual (origin unknown — no pm code path writes it).\
    \ Auto-resize appeared completely broken; clearing the per-session option (set-option\
    \ -u) restored normal behavior.\n\nFix: in pm session init (pm_core/cli/session.py:_session_start\
    \ or _register_tmux_bindings — wherever the existing window-size = smallest write\
    \ happens for shared sessions), add a corresponding *unset* for non-shared sessions.\
    \ That is:\n  - shared session: tmux set-option -t <session> window-size smallest\
    \   (existing behavior)\n  - non-shared session: tmux set-option -ut <session>\
    \ window-size       (NEW: explicitly clear any per-session override so it falls\
    \ through to global 'latest')\n\nThe unset is idempotent and cheap. It only matters\
    \ when something external set the override; in the normal case it's a no-op.\n\
    \nSame treatment for the per-window override: set_shared_window_size in pm_core/tmux.py\
    \ writes window-size = smallest per-window when PM_SHARE_MODE is set. For non-shared\
    \ windows, optionally unset to be safe (lower priority — per-window manual is\
    \ rare and mostly harmless if shared sessions normalize their own).\n\nFiles:\
    \ pm_core/cli/session.py (the session init path that already touches window-size),\
    \ pm_core/tmux.py (set_shared_window_size, optional). Tests: a non-shared pm session\
    \ has no per-session window-size override after init; if one is set externally\
    \ before init, pm clears it; shared sessions still get 'smallest'."

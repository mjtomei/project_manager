- id: pr-6553192
  plan: bugs
  title: 'Bug: suppress-switch flag leaks across action invocations when consume only
    happens inside picker'
  branch: pm/pr-6553192-bug-suppress-switch-flag-leaks-across-action-invoc
  status: merged
  depends_on: []
  description: 'request_suppress_switch / consume_suppress_switch in pm_core/runtime_state.py
    manage a per-(pr_id, action) flag that tells callers to skip the post-launch focus
    switch when the user has explicitly dismissed the popup (q/Esc). Today the flag
    is *set* in the picker spinner when the user dismisses (session.py:1363) and *consumed*
    in the same picker spinner when the target window appears (session.py:1328). That
    works only when the action''s lifecycle stays inside one picker invocation.


    The leak: if the user dismissed a popup spinner for action X (flag set), then
    triggered action X *a different way* — e.g. TUI keybinding, or a fresh popup invocation
    that exited before reaching the spinner — the flag was never consumed. The next
    time anything checks consume_suppress_switch for that (pr_id, action), it sees
    the stale True and skips the focus switch even though the user''s intent for *this*
    invocation was to focus.


    Concrete repro: user pressed prefix+P, triggered an action, pressed q on the spinner
    (flag set). Later in a different window, pressed zzd (TUI keybinding) for the
    same PR. The expected focus switch to the review window did not happen. Pressing
    zzd again worked because by then the flag had been cleared by some other path.
    Inconsistent and hard to reason about.


    Fix: clear suppress-switch when the action''s window actually opens, not just
    from inside the picker spinner. The natural hook is set_action_state — when transitioning
    to ''launching'' or ''running'' (a fresh launch of this action), clear any pending
    suppress_switch for the same (pr_id, action). That covers every entry point: picker
    spinner, TUI keybinding, auto-start, watcher-triggered, ad-hoc CLI. The flag''s
    purpose is ''the user dismissed the *current* invocation''s popup''; once a new
    invocation begins, the flag is necessarily stale.


    Concretely: in runtime_state.set_action_state, if the new state is ''launching''
    or ''running'' and the prior state was anything else (including absent), call
    _clear_suppress_switch as part of the same write. Single-place fix; no changes
    needed at call sites.


    Files: pm_core/runtime_state.py (set_action_state hook to clear suppress_switch
    on transition to launching/running). Tests: dismissing a popup sets the flag;
    opening a fresh action window for the same PR clears it; subsequent action invocations
    switch focus normally; the flag still works inside a single picker invocation
    (set when user dismisses, consumed when window opens, no surprise pre-clear).'

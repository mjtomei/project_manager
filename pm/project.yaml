- id: pr-0b827df
  plan: tui-ux
  title: Add running tasks pane to TUI with window switching and grouping
  branch: pm/pr-0b827df-add-running-tasks-pane-to-tui-with-window-switchin
  status: in_review
  depends_on: []
  description: 'Add a new pane to the TUI that shows all active tasks running in the
    current tmux session and lets you switch to their windows.


    ## Display

    - Lists all running tasks detected from tmux windows (implementation sessions,
    review loops, QA runs, watcher, plan worker, etc.)

    - Tasks grouped by type: Implementation, Review, QA, Watcher, Other

    - Each entry shows the PR ID/title, window name, and status indicators (spinner
    for active, verdict for completed)

    - Multi-window tasks (like QA with scenario windows) collapsed to a single entry
    by default showing the main window

    - Expandable: toggle to reveal individual scenario/sub-windows under the collapsed
    entry


    ## Navigation

    - Up/Down (j/k) to move between tasks within a group

    - J/K to jump between task type groups

    - Enter on a collapsed multi-window task switches to its main window

    - Enter on an expanded sub-window switches to that specific window

    - Toggle expand/collapse on multi-window tasks (e.g. with space or right/left
    arrow)


    ## PR actions from the tasks pane

    - All the same commands available in the main TUI tech tree should work on PRs
    selected in the tasks pane

    - Start review loops, QA, merge, stop loops, view details, etc. — the full keybinding
    set

    - This lets you manage PRs through their entire flow without switching back to
    the tech tree

    - The tasks pane becomes an alternative workflow-oriented view focused on what
    is actively running


    ## Mobile mode integration

    - Transitioning to mobile mode (small terminal) should automatically switch the
    TUI to the tasks pane as the default view, since it is compact and action-oriented

    - Coming out of mobile mode should restore the TUI to whatever pane was open before
    entering mobile mode

    - The tasks pane is the natural mobile-first view: it shows what matters (running
    work) and lets you act on it without needing the full tech tree layout


    ## Window switching

    - Selecting a task switches the tmux client to that window

    - Works with grouped sessions (resolves attached session before switching)


    ## Implementation

    - New widget in the TUI sidebar or as a toggleable pane

    - Polls tmux window list periodically to detect new/removed tasks

    - Matches windows to PRs via naming convention (e.g. review-#128, qa-#124-s71)

    - Reuses existing tmux session resolution logic (current_or_base_session)'

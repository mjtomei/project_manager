- id: pr-2181ccd
  plan: plan-regression
  title: Move QA captures out of git into ~/.pm/captures/ alongside workdirs
  branch: pm/pr-2181ccd-move-qa-captures-out-of-git-into-pm-captures-along
  status: closed
  depends_on:
  - pr-6be8ee6
  description: "## Goal\n\nStop committing QA capture content to git. Move \\`pm/qa/captures/<pr>/\\\
    `\nout of the repo and into a local-only directory under \\`~/.pm/\\`\n(peer to\
    \ \\`~/.pm/workdirs/\\`), so the same ephemeral-artifact\nconvention pm already\
    \ uses for workdirs applies to captures.\nManifests stay in git as the durable\
    \ index; the actual cast / log /\nsnapshot files live outside.\n\n## Why\n\nThis\
    \ PR (pr-6be8ee6) added ~3.9 MB of captures across ~356 files in\nthe repo — about\
    \ 89% of the PR's line count and 36× the byte\nweight of the actual code changes.\
    \ The growth is unbounded: every\nQA run, every bug-fix session, and every replacement\
    \ scenario will\nkeep adding capture files indefinitely. Keeping them in git makes\n\
    diffs hard to review, clones slow, and git history dominated by\nnon-code blobs.\n\
    \nWorkdirs (\\`~/.pm/workdirs/<pr>/\\`) already live outside the repo\nfor the\
    \ same reason. Captures are the same shape of artifact: they're\ngenerated by\
    \ pm's process, useful while a PR is active, and their\ndurable value is the *manifest*\
    \ indexing what was captured, not\nevery byte of every cast.\n\n## Shape\n\n###\
    \ Storage layout\n\n    ~/.pm/captures/\n      <pr-id>/\n        impl/\n     \
    \     pre-fix/                 # from bug-fix flow\n            recording.cast\n\
    \            transcript.log\n            manifest.md\n          post-fix/\n  \
    \          ...\n        scenarios/\n          <n>/\n            prompt.md\n  \
    \          verdict.md\n            recording.cast\n            transcript.log\n\
    \            manifest.md\n\nMirrors today's in-repo layout, just rooted at\n\\\
    `~/.pm/captures/<pr>/\\` instead of \\`<repo>/pm/qa/captures/<pr>/\\`.\n\n###\
    \ What stays in git\n\nManifests stay in git, in a smaller form:\n\n- A per-PR\
    \ \\`pm/qa/captures/<pr>/index.md\\` listing scenarios + their\n  verdicts + relative\
    \ path under \\`~/.pm/captures/<pr>/\\`.\n- The scenario \\`manifest.md\\` files\
    \ (the human-readable description\n  of what each capture demonstrates) can either\
    \ stay in git or move\n  out — most reviewers want the description but not the\
    \ bytes;\n  keeping the description in git preserves browsability without the\n\
    \  weight.\n\n### Optional remote backup\n\nA configurable backend (S3, rsync\
    \ target, etc.) so a finalize step\ncan sync \\`~/.pm/captures/<pr>/\\` to durable\
    \ storage. Optional\nbecause the primary use case (active QA review during the\
    \ PR's life)\ndoesn't need durability beyond the producing machine.\n\n### Resolution\n\
    \nA small helper (\\`pm qa captures path <pr-id> [<scenario>]\\`)\nresolves the\
    \ local path; tools / prompts that today reference\n\\`pm/qa/captures/...\\` get\
    \ redirected via that helper.\n\n## Scope\n\n- New \\`captures_dir(pr_id)\\` in\
    \ \\`pm_core/paths.py\\`.\n- \\`_persist_scenario_verdicts\\` writes verdict.md\
    \ to the new path\n  and skips the in-worktree commit.\n- Scenario worker prompt's\
    \ \"save captures under\" target points at\n  the new path (or a worker-resolvable\
    \ mount of it inside the\n  scenario container).\n- Bug-fix flow capture paths\
    \ likewise.\n- \\`pm qa captures\\` CLI surface: \\`path\\`, \\`list\\`, optional\n\
    \  \\`push\\` / \\`pull\\` for the remote-backup story.\n- Migrate existing \\\
    `pm/qa/captures/\\` content out of the repo\n  history once the new layout is\
    \ in (one large delete commit; the\n  history is preserved on the branch that\
    \ produced each capture).\n- Update recipes / docs to reference \\`~/.pm/captures/<pr>/\\\
    `.\n\n## Out of scope\n\n- The remote-backup backend itself — declare the interface,\
    \ ship\n  the local-only default, plug in S3/rsync/etc later.\n- Retroactive migration\
    \ of captures from already-merged PRs.\n\n## Conflict to resolve with pr-7d5d036\n\
    \npr-7d5d036's containment model (note-a870561) currently says\n\"captures and\
    \ bug PRs leak to master.\" This PR walks back the\n\"captures leak to master\"\
    \ half — captures don't leak; only their\nmanifests and verdicts do. Worth aligning\
    \ the two before either\nlands.\n\n## Depends on\n\npr-6be8ee6 — uses the verdict-persistence\
    \ infrastructure that lands\nthere; redirects its target path rather than replacing\
    \ the\nmechanism."

- id: pr-98b2a95
  plan: bugs
  title: 'Bug: dedicated plans window is shared across all plans, defeating multi-plan
    parallelism'
  branch: pm/pr-98b2a95-bug-dedicated-plans-window-is-shared-across-all-pl
  status: merged
  depends_on: []
  description: 'PR pr-a353c3d (''Launch plan pane actions in a dedicated plans window
    instead of the main window'', merged today as #179) routes all plan actions through
    a single hardcoded window name ''plans'' (pm_core/tui/pane_ops.py line 535: PLANS_WINDOW_NAME
    = "plans"). _ensure_plans_window() finds-or-creates that one window regardless
    of which plan the action was invoked on. Result: every plan action — edit, breakdown,
    claude/c, deps, review — for every plan goes to the same shared window. The PR''s
    stated promise (''this also enables running multiple plan actions in parallel
    (e.g. plan add on two plans at the same time)'') is not delivered.


    Observed: tmux window 7 named ''plans'' (no plan id), pressing c on plan A and
    then c on plan B both target window 7. Whatever was running in there for plan
    A is interrupted by plan B''s session.


    Fix: window name must be plan-scoped. Concrete shape:

    - Change PLANS_WINDOW_NAME to a function: window_name(plan_id) returning ''plans-<plan-id>''
    (or ''plans/<plan-id>'' if the slash plays nicely with tmux — needs a quick check).

    - _ensure_plans_window(app) becomes _ensure_plans_window(app, plan_id) — takes
    the plan id, builds the per-plan window name, finds or creates that specific window.

    - _focus_plans_window(app) becomes _focus_plans_window(app, plan_id).

    - _launch_in_plans_window(app, cmd, role, fresh=False) becomes _launch_in_plans_window(app,
    plan_id, cmd, role, fresh=False).

    - handle_plan_action(app, action, plan_id) passes plan_id through every _launch_in_plans_window
    call site (lines 596, 599, 601, etc.) — note that the ''deps'' action currently
    has no plan_id; that one is genuinely cross-plan and can keep using a single ''plans-deps''
    window, or be revisited.


    Edge case: when plan_id is None (e.g. cross-plan ''deps'' command, or future actions
    that aren''t tied to a single plan), use a fallback window name like ''plans''
    (current behavior) so cross-plan work still has a home.


    Tests: pressing c on plan A creates window ''plans-<A>''; pressing c on plan B
    creates window ''plans-<B>'' (separate window); pressing c on plan A again reuses
    ''plans-<A>'' rather than creating a duplicate; cross-plan ''deps'' action uses
    the ''plans'' fallback window; window cleanup on plan removal still works.'

- id: pr-7b3b639
  plan: bugs
  title: 'Bug: popup hangs after ''pr start <new-pr>'' even though impl window opens'
  branch: pm/pr-7b3b639-bug-popup-hangs-after-pr-start-new-pr-even-though-
  status: pending
  depends_on: []
  description: 'When prefix+M opens the popup and the user types ''pr start <pr_id>''
    for a PR that has not yet been started, the implementation window opens correctly
    and the user''s client switches to it, but the popup pane does not close — the
    user is left stuck inside it. The same flow against an already-started PR (fast-path
    that just switch-windows to the existing window) closes the popup cleanly.


    User hypothesis (likely correct): the two pr_start paths return identically as
    far as click is concerned, but something about the new-PR path keeps the popup
    body''s subprocess.run from cleanly returning. Both paths return click exit 0
    in the success case, so it is not a verdict-level difference visible in _popup-cmd''s
    result.returncode check.


    Possible mechanisms ranked by likelihood:


    (1) wrap_claude_cmd → create_container in pr.py:1048 spawns ''podman run -d <image>
    bash -c <setup>'' and waits up to 30s for the container''s READY sentinel file.
    If any of that workflow inherits or re-creates a pty connected to the popup body
    (e.g. via ''podman run'' attaching stdin to the calling tty), the popup''s pty
    gets stolen and stays in a state where keyboard input goes nowhere even after
    pr_start returns. Verify by adding ''stdin=subprocess.DEVNULL'' on the podman
    invocations and seeing if the symptom changes.


    (2) The new-window path''s ''tmux select-window'' (in tmux_mod.new_window line
    156) does not pass check=True, so a silent failure leaves the user''s client on
    the wrong window without raising. Pair with (1), this could leave the popup overlay
    in an inconsistent state.


    (3) tmux''s display-popup -E semantics: when the calling client switches windows
    during the popup''s lifetime, the popup overlay can persist on the new window
    without being interactive. Mitigation: pass --background to popup-launched commands
    so focus stays put until the popup closes naturally. The user explicitly said
    switching IS desired, so this is the *less* preferred fix; only consider if (1)
    and (2) don''t pan out.


    Repro: in a pm session that uses container mode, prefix+M, type ''pr start <id>''
    for any PR with status=pending. Observe the impl window opens, but the popup pane
    is stuck — neither Ctrl+C nor Esc nor q dismisses it. Compare with running the
    same command for a PR with status=in_progress, which closes cleanly.


    First diagnostic step: add INFO-level logging at the top and bottom of popup_cmd_cmd
    (in pm_core/cli/session.py) capturing the timestamp and result.returncode before
    _wait_dismiss is even considered. Run the broken case, check whether _popup-cmd
    actually returns. If yes, the hang is in tmux''s overlay; if no, the hang is in
    subprocess.run and (1) is the likely cause.


    Tests: end-to-end test that runs ''pm _popup-cmd <session>'' with stdin piped
    to ''pr start <new-pr-id>\n'' and asserts the process exits within a bounded time;
    integration test that runs prefix+M against a fresh pm test session and asserts
    the popup closes after a successful pr start.'

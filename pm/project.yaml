- id: pr-2c060b2
  plan: plan-regression
  title: 'Claude-based regression test: CLI output rendering at varied terminal widths'
  branch: pm/pr-2c060b2-claude-based-regression-test-cli-output-rendering-
  status: pending
  depends_on: []
  description: "Add a Claude-driven regression scenario that exercises pm's CLI listing\
    \ commands ('pm pr list', 'pm pr list -t', 'pm pr list -t --workdirs', 'pm pr\
    \ ready', 'pm plan list', and any other record-style commands as they're added)\
    \ at a range of randomly-chosen terminal widths and inspects the rendered output\
    \ for layout bugs.\n\nMotivation: this kind of bug is hard to catch with unit\
    \ tests because the buggy behavior depends on (a) the specific terminal width\
    \ relative to the line length, (b) wide-char emoji status icons miscounted by\
    \ len(), (c) interactions between our wrapping and the terminal's own edge-wrap\
    \ behavior, and (d) less or other pagers being in the path. Two real bugs from\
    \ a single session of manual testing motivated this:\n1. echo_record gated wrapping\
    \ on isatty(stdout) — silently no-op'd when piped to less.\n2. _wrap_record_to_width\
    \ used len() rather than cell_len(), so lines that were one cell over the width\
    \ (because of a wide emoji icon) slipped past the wrap check unwrapped and got\
    \ mid-word-broken by the renderer. Then the textwrap.fill fallback had the same\
    \ bug for long lines without good break tokens.\n\nBoth bugs would have been caught\
    \ immediately by a 'render this command at width 94 and verify no line exceeds\
    \ 94 visual cells' check.\n\nScenario shape (similar to pr-fbda1a8 'Claude-based\
    \ tests for watcher classes and prompt generation gaps' which is the established\
    \ pattern for Claude-driven regression tests in this plan):\n\n1. Set up: ensure\
    \ pm has a non-trivial set of PRs in project.yaml (the test project's own state\
    \ is a good sample — many PRs with varying title lengths, status icons, deps lists,\
    \ optional machine/timestamp suffixes).\n\n2. For each of N randomly-chosen terminal\
    \ widths in a sensible range (say, 60-180 columns, with N ~= 8 plus a couple of\
    \ edge values like exactly the threshold the test detects):\n   a. Open a tmux\
    \ pane resized to that width (tmux has 'tmux resize-pane -t <pane> -x <width>').\n\
    \   b. Run each listing command in that pane: 'pm pr list', 'pm pr list -t', 'pm\
    \ pr list -t --workdirs', 'pm pr ready', 'pm plan list'. Pipe through cat or just\
    \ tee to capture output as the user would see it.\n   c. Capture the rendered\
    \ output via 'tmux capture-pane -p'.\n   d. Hand the captured output + the known\
    \ terminal width to Claude with a prompt asking: are any lines visually wider\
    \ than the terminal? Are any words split mid-word? Are continuation lines indented\
    \ consistently? Does the wrapping land at the natural boundary tokens we configured\
    \ (' <- ', ' (', ' [') when those tokens are present? Are there any other layout\
    \ oddities?\n\n3. Aggregate Claude's per-width findings into a single PASS/NEEDS_WORK\
    \ verdict. Each finding includes the width, the offending output, and a short\
    \ description.\n\n4. The scenario also probes for *improvements*: Claude is asked\
    \ to flag layouts that are technically correct but ugly or hard to read (e.g.\
    \ a one-character spillover that we didn't catch, an awkward continuation that\

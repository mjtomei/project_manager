  title: Enable git push from inside containers scoped to PR branch
  branch: pm/pr-5e96046-enable-git-push-from-inside-containers-scoped-to-p
  status: merged
  depends_on:
  - pr-d568b98
  description: 'Containers currently have the repo mounted at /workspace but no credentials
    to push to the remote. Review and implementation sessions inside containers need
    to be able to push commits to their own PR branch on the origin.


    ## Requirements

    - Container sessions can `git push` to the origin, but only to the specific branch
    that was programmatically created for their PR (e.g. `pm/pr-XXXX-...`)

    - Must work across all three backends: GitHub, bare git, and local

    - Should not grant broad push access — scope credentials/permissions to the single
    PR branch where possible

    - Git credential/SSH configuration should be injected at container creation time
    based on what the host uses (HTTPS token, SSH key, etc.)

    - If branch-scoped restrictions aren''t feasible for a backend, document the limitation


    ## Testing

    - QA should verify push access works for all three backends

    - Verify that the container can push to its own branch

    - Verify that push to other branches is restricted (or document if not possible)

    - Test with both HTTPS and SSH remote URLs'

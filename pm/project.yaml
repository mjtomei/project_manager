  - id: note-30c1a2e
    text: 'FORWARD-LOOKING REFACTOR REQUEST (2026-05-14, plan-regression review):
      before finalizing this PR, audit verdict handling to ensure FakeClaudeSession
      covers every verdict that real Claude sessions can emit in the autonomous loop.
      Specifically: walk through the verdict-extraction sites (pm_core/verdict_transcript.py,
      pm_core/loop_shared.py, pm_core/qa_loop.py, watcher prompts in pm_core/prompt_gen.py)
      and enumerate the verdict tokens consumed today (PASS, NEEDS_WORK, INPUT_REQUIRED,
      READY, plus the QA scenario refiner''s reasons and the bug-fix flow''s pre-fix
      repro markers). Any verdict that the real verdict-detection path handles must
      also be scriptable in FakeClaudeSession, otherwise tests will silently mis-model
      production behavior.


      PROPOSAL: introduce a shared verdict-handling class (e.g. VerdictRegistry /
      VerdictHandler) that both the verdict-detection path AND FakeClaudeSession import
      from. The registry declares the canonical set of verdicts, their parsing rules,
      and any per-verdict metadata (reason capture per pr-b59f0c7, pre-fix evidence
      per pr-eb450a0, coverage gates per pr-b42059d). New verdicts are added in one
      place and the test infrastructure picks them up automatically.


      This also means: when subsequent PRs add new verdicts or verdict-adjacent state
      (the obvious candidates from this plan are pr-eb450a0 evidence markers, pr-b42059d
      coverage data, pr-8ed578d fix-line gate, pr-b59f0c7 reason strings, pr-2680fbf
      NEW_REGRESSION authoring sub-status, pr-98f670e shallow-PASS supervisor amendments),
      they extend the registry rather than duplicating parsing logic across detection
      and tests.


      Why now: pr-fbda1a8 (the bridge PR after this one) depends on FakeClaudeSession
      to re-validate Phases 1-5 features under Phase 10''s flow. If FakeClaudeSession''s
      verdict surface drifts from the real one, that bridge''s tests will pass while
      production silently regresses. Shared-registry refactor at the FakeClaudeSession
      stage prevents the drift before any test depends on the wrong shape.


      If the refactor is too large to land inside this PR, file a follow-up improvement
      PR before merging and link it as a prerequisite of pr-fbda1a8.'
    created_at: '2026-05-14T14:46:11Z'
    last_edited: '2026-05-14T14:46:11Z'
  - id: note-567f97b
    text: 'SCOPE EXTENSION (2026-05-18, review discussion): this PR grew beyond the
      original FakeClaudeSession plan in four ways, all to keep the fake''s verdict
      surface from drifting from production:


      1. No-verdict mock mode + `_all` "fake everything" config key. impl/watcher/merge-style
      sessions emit no verdict; the fake now writes output and stays open (blocks
      on stdin until the pane closes, or `--hold N`). The `_all` top-level key in
      the per-session fake-claude JSON fakes every session type, with untyped calls
      falling back to a no-verdict mock.


      2. Verdict-surface audit (addresses note-30c1a2e). Audited every verdict-extraction
      site and closed three drift gaps: watcher (emits READY/INPUT_REQUIRED, was registered
      no-verdict), qa concretize/refiner (emits REFINED_STEPS/REFINER_REJECT, was
      mis-typed as qa_scenario), qa finalize (emits FINALIZE_DONE/FINALIZE_BLOCKED,
      had no session type). New verdicts added to the fake catalogue. NOTE: this PR
      did NOT do the proposed shared VerdictRegistry refactor — verdict definitions
      still live in two places (detection path + fake_claude.py). If that registry
      is still wanted before pr-fbda1a8, it should be a follow-up PR.


      3. qa_concretize and qa_finalize promoted to first-class model_config.SESSION_TYPES
      (fall back to "qa"). The refiner and finalize panes are now independently model-targetable
      via project.yaml model_config and `pm model set`. cli/model.py now derives its
      session-type list from model_config instead of hard-coding a duplicate.


      4. validate_model_config() added — flags unknown session-type keys / invalid
      effort levels in project.yaml model_config (resolution silently ignored them
      before). Surfaced as warnings in `pm model show`.


      Also: master was merged into the branch (was ~949 commits behind); PASS_WITH_SUGGESTIONS
      dropped per #166; all six QA build_claude_shell_cmd calls now pass session_tag=state.session_tag
      to avoid cwd-based tag drift. Full suite green (2408 passed). Spec updated with
      a "Scope extensions beyond the original plan" section.'
    created_at: '2026-05-18T20:40:53Z'
    last_edited: '2026-05-18T20:40:53Z'
  - id: note-af93128
    text: Filed the deferred shared-VerdictRegistry refactor as follow-up pr-1d8b2b7
      (plan-regression) and linked it as a prerequisite of pr-fbda1a8, per the forward-looking
      refactor request in note-30c1a2e.
    created_at: '2026-05-18T21:03:43Z'
    last_edited: '2026-05-18T21:03:43Z'
  - id: note-530ac2e
    text: "FOLLOW-UP REQUEST (QA planning, 2026-05-19): the current fake-claude config\
      \ only supports weighted random verdict selection (claude_launcher._pick_fake_verdict\
      \ → random.choices on a {\"verdicts\": {\"PASS\": 70, ...}} map). That makes\
      \ multi-iteration loop scenarios (e.g. \"NEEDS_WORK on iter 1, PASS on iter\
      \ 2\") unexpressible — you can only bias weights and hope, which is flaky in\
      \ CI and silently mis-models the very state-machine transitions FakeClaudeSession\
      \ was built to exercise.\n\nPROPOSAL: add a scripted-sequence form to the per-type\
      \ \"verdicts\" field, alongside the existing weighted map:\n\n  {\n    \"review\"\
      : { \"verdicts\": [\"NEEDS_WORK\", \"PASS\"] },\n    \"qa_verification\": {\n\
      \      \"verdicts\": [\n        {\"verdict\": \"FLAGGED\", \"body\": \"Step\
      \ 3: FAILED\"},\n        {\"verdict\": \"VERIFIED\"}\n      ]\n    }\n  }\n\n\
      Design points:\n- Polymorphic field: dict = weighted (existing); list = scripted.\
      \ List entries may be bare strings or objects carrying per-iteration overrides\
      \ (body / delay / preamble / etc.) layered over the type's _defaults.\n- Cursor\
      \ lives in a sidecar (~/.pm/sessions/<tag>/fake-claude.state with {\"review\"\
      : 1, ...}), not the config — config stays declarative. Advance under flock (or\
      \ O_CREAT|O_EXCL + rename) so two panes of the same session-type launching concurrently\
      \ do not both grab slot 0.\n- End-of-sequence: clamp-to-last by default (extra\
      \ iterations keep emitting the terminal verdict, so the loop still completes).\
      \ Opt-in wrap via {\"sequence\": [...], \"wrap\": true} for the rare cycling\
      \ case. Clamp is safer — wrap can silently mask iteration-count bugs.\n- Validation:\
      \ extend validate_session_verdicts to walk the list form and check each entry's\
      \ verdict against SESSION_TYPE_VERDICTS — same error surface in set_fake_claude_config.\n\
      - Optional debug aid: pm fake-claude peek <tag> printing the next verdict each\
      \ session type would emit.\n\nWhy now: pr-fbda1a8 (the bridge PR) will start\
      \ asserting on loop iteration counts and verdict ordering. Without scripted\
      \ sequences those tests can only express \"eventually PASS\", which defeats\
      \ the point of replacing real Claude with a fake. The QA plan for this PR has\
      \ a multi-iteration scenario (NEEDS_WORK → PASS, FLAGGED → VERIFIED) that is\
      \ currently unexpressible against the existing schema.\n\nScope: ~50 LOC in\
      \ claude_launcher.py + paths.py + tests. Small enough to land in this PR, or\
      \ split as a follow-up improvement PR linked as a prerequisite of pr-fbda1a8\
      \ (same pattern used for the deferred VerdictRegistry refactor in pr-1d8b2b7)."

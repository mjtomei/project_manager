- id: pr-4c41017
  plan: tui-ux
  title: 'Refactor TechTree: split PR nodes into individual Textual widgets'
  branch: pm/pr-4c41017-refactor-techtree-split-pr-nodes-into-individual-t
  status: qa
  depends_on: []
  description: 'Refactor the TechTree from a monolithic single-widget renderer into
    a compositional Textual architecture:


    1. **PR nodes as individual widgets**: Each PR becomes its own Widget with absolute
    positioning. Spinner updates only refresh the 2-3 active node widgets instead
    of repainting all ~120 nodes, eliminating the 20% idle CPU from the 1-second full-tree
    refresh timer.


    2. **Plan groups as container widgets**: Each plan group becomes a PlanGroup container
    widget holding its PR nodes + plan label. Collapse/expand becomes show/hide on
    a container instead of recomputing the whole layout. Enables per-plan scrolling
    regions.


    3. **Edge rendering as a separate cached layer**: A dedicated EdgeCanvas widget
    draws dependency arrows. Edges only change when dependencies change, so it can
    cache aggressively and skip redraws on spinner ticks.


    4. **Layout computation caching**: Cache compute_tree_layout() results and only
    recompute when PR list, dependencies, or filters actually change.


    5. **Keyboard navigation simplification**: Each node widget knows its grid neighbors,
    replacing the current on_key candidate-finding loops.'

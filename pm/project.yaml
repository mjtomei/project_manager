  title: 'fix: rename tmux session after git init in guide to restore pm session access'
  branch: pm/pr-df1aa3f-fix-rename-tmux-session-after-git-init-in-guide-to
  status: pending
  depends_on: []
  description: 'When the guide initializes a new git repo for a user who has none,
    the session tag changes (derived from the new git repo name/path hash). The tmux
    session retains the old tag-based name, making `pm session` unable to find it
    — it looks up the new tag and finds nothing.


    The fix is to add a section to the guide prompt instructing the guide to rename
    the tmux session with the correct new tag after git repo creation. The guide can:

    1. Get the new tag by running `pm session --tag` (or compute it) after git init
    / pm init

    2. Rename the tmux session: `tmux rename-session $(tmux display-message -p ''#{session_name}'')
    pm-<new-tag>`


    This ensures the session remains accessible via `pm session` after the tag changes.'

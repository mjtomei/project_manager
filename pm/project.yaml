  title: Gaze tracking — protocol extension and browser provider
  branch: pm/pr-8c21624-gaze-tracking-protocol-extension-and-browser-provi
  status: pending
  depends_on:
  - pr-39a4e66
  description: 'Extend AttentionState with optional gaze: {x, y, region_id, last_at}.
    x/y are normalized 0..1 in the surface viewport coordinate space. region_id is
    the data-region attribute of the visible element under the gaze point if known.
    Add a JS provider at pm_core/surfaces/static/gaze.js that wraps WebGazer (Brown
    University, brownhci/WebGazer) — vendored as a static asset under pm_core/surfaces/static/vendor/webgazer/.
    WebGazer was chosen because: (a) runs entirely client-side so no video data leaves
    the device (privacy framing solved), (b) self-calibrates from observed user interactions
    (clicks/touches correlate with gaze targets — no explicit calibration ceremony
    needed), (c) uses MediaPipe Facemesh by default with ridge/weightedRidge regression
    modules, (d) MIT-licensed, actively maintained. The provider: requests camera
    permission with a clear on-page consent prompt, runs WebGazer''s interaction-driven
    calibration silently in the background, computes gaze coordinates, posts to a
    new POST /api/attention {gaze: {...}} endpoint with debounce ~200ms. Gaze events
    accumulate in the protocol''s SignalHistories alongside other signals (bounded
    by the same retention rules). Surfaces opt in by including the provider script
    tag — it is not enabled by default for any surface. The context query exposes
    gaze when present, omits it when not. Surfaces without gaze keep working — purely
    additive. Tests: protocol payload round-trip with and without gaze, surfaces that
    opt out have no gaze field, calibration confidence improves with simulated clicks,
    the per-device WebGazer profile persists across reloads via its localStorage hook.'

  branch: pm/pr-9043b67-external-pm-project-loader-and-status-aggregation
  status: pending
  depends_on:
  - pr-e3595fe
  - pr-939d8cf
  description: 'Add a small module (e.g. `pm_core/external.py`) that knows how to
    read another pm project. `load_external_project(path)` resolves the path, opens
    `<path>/pm/project.yaml`, and returns the parsed data dict — or a structured error
    sentinel for missing-path / missing-yaml / parse-error cases (do not raise; callers
    must render gracefully). Cache results per-call via a simple dict so a single
    TUI render or review run doesn''t re-read the same external repo multiple times.
    Add aggregation helpers: `external_pr_counts(plan)` returns a dict of status→count
    summed across the external project''s PRs; `external_status(plan)` derives an
    aggregate status (active/blocked/done) using the same rules used today for local
    plans. Treat external plans as leaves of this project''s tree — do not recurse
    into the external project''s own hierarchy on the first pass.


    Tests: Test the loader against a fixture external project. Test missing path,
    missing pm/project.yaml, and malformed yaml return error sentinels (not exceptions).
    Test PR count aggregation across statuses. Test that the call-scoped cache prevents
    duplicate reads. Test status derivation for projects with mixed PR statuses.


    Files: pm_core/external.py, pm_core/store.py, tests/test_external.py'

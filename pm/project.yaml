- id: pr-f4dc8a2
  plan: plan-regression
  title: 'QA library auditor: scan a project and propose regression-test fills (with
    attached mocks)'
  branch: pm/pr-f4dc8a2-qa-library-auditor-scan-a-project-and-suggest-fill
  status: pending
  depends_on:
  - pr-6be8ee6
  - pr-7d5d036
  description: '## Goal


    A meta-tool that scans a project and proposes fills for the QA library, with the
    regression-test surface as the primary accumulation point (per the Phase 10 redesign
    in plan-regression.md).


    ## Why now


    After pr-06a96fa (scenarios bind to regression tests) and pr-2680fbf (planner
    authors a new regression when none fits) land, the QA flow''s compounding step
    lives in regression tests, with mocks attached at that surface. pr-2680fbf is
    the *runtime* fill-the-gap step: when the planner needs a regression and none
    exists, it writes one as part of the scenario. This PR is the *static* counterpart:
    a scan-the-project audit that proposes the fills the runtime path hasn''t reached,
    and surfaces hierarchy problems (e.g. legacy INSTRUCTION+ARTIFACT scenarios that
    should be migrated to regression tests).


    ## Hierarchy the auditor enforces


    1. Regression tests (primary) — the auditor''s main output. For each user-visible
    surface in the project that lacks a regression test exercising it, propose a regression-test
    draft. Same shape as pr-2680fbf''s runtime authoring step but driven by a project-wide
    scan rather than a per-PR scenario need.


    2. Mocks (attached to regression-test surfaces) — for each proposed or existing
    regression test, identify mockable external dependencies (per pm qa mocks and
    the registry shipped by pr-942aa21). Propose mock entries for surfaces that need
    them but lack registry entries. Mocks are not proposed standalone; they always
    attach to a regression-test surface — consistent with pr-51586d2''s choice that
    mocks awareness lives at the regression-authoring surface.


    3. Instructions / artifact recipes (fallback-only) — flag legacy INSTRUCTION+ARTIFACT
    scaffolding that exists for flows now better expressed as regression tests. Suggest
    migration; do not propose new INSTRUCTION+ARTIFACT entries except for genuine
    one-shot probes/oracles (per the Phase 10 fallback rule).


    ## Inputs


    - pm/qa/regression/ existing entries (loaded via qa_instructions.list_all)

    - pm/qa/mocks/ registry (loaded via qa_instructions.list_mocks)

    - pm/qa/instructions/ and pm/qa/artifacts/ for the fallback-only audit

    - Project source code — the auditor probes for user-visible surfaces (CLI subcommands,
    TUI key bindings, watcher entrypoints, backends) and intersects with what the
    regression library exercises


    ## Outputs


    A markdown report at pm/qa/audit-TIMESTAMP.md (or similar) with sections per hierarchy
    tier:

    - Missing regression tests (with proposed drafts ready to be filed or merged directly
    into pm/qa/regression/)

    - Missing mocks attached to existing or proposed regression tests

    - Legacy INSTRUCTION+ARTIFACT scenarios that should migrate to regression tests

    - Stale or duplicated entries that should be merged or removed


    ## Failure modes


    - Auditor over-proposes (every surface gets a regression test, library bloats)
    — controlled by a confidence threshold and by surfacing proposals as a report
    for human review rather than auto-filing.

    - Auditor misses surfaces — exposed by the auditor running periodically (e.g.
    via the discovery supervisor pr-271cb3a) and converging over time.


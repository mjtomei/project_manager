- id: pr-612d556
  plan: improvements
  title: 'Improvement: pm session agents command opens a tmux window running ''claude
    agents'' for live multi-session view'
  branch: pm/pr-612d556-improvement-pm-session-agents-command-opens-a-tmux
  status: pending
  depends_on: []
  description: "Add a new pm CLI: `pm session agents` (or `pm agents` — bikeshed during\
    \ impl) that opens a dedicated tmux window in the current pm session showing the\
    \ live output of Claude Code's `claude agents` command. The window is long-lived,\
    \ refreshes the view periodically, and is the natural place to glance for 'which\
    \ Claude sessions are working / needs input / done' across all in-flight PRs.\n\
    \n## Why\nClaude Code 2.1.139+ shipped an 'agent view' feature (https://code.claude.com/docs/en/agent-view)\
    \ that shows a table of all background Claude sessions with state icons (working\
    \ / needs input / idle / completed / failed / stopped). That info is genuinely\
    \ useful for pm — it answers 'which of my many running PRs is currently blocked\
    \ on me' at a glance, the question pm watchers approximate today via tmux pane\
    \ scraping.\n\nThere's no programmatic API for the data yet (verified separately).\
    \ The CLI `claude agents` is what's available. Wrapping it in a pm tmux window\
    \ is the simplest integration that gets us most of the value today and picks up\
    \ improvements as Claude Code's CLI evolves.\n\nThis is parallel to pr-f5b7eef's\
    \ home-window pattern — a long-lived pm-managed window that runs a poll-and-refresh\
    \ display. Same infrastructure (window naming, layout management, content-change-only\
    \ redraw idea from pr-28bda5d), different content.\n\n## Behavior\n\n- `pm session\
    \ agents` from inside a pm tmux session:\n  - First invocation: creates a tmux\
    \ window named `agents` (or similar) running a small Python loop that calls `claude\
    \ agents` every ~3-5s, clears the pane, prints the table. Same loop pattern as\
    \ the pr-list home window.\n  - Subsequent invocations: refreshes immediately\
    \ and switches the calling client to the window.\n- Outside a pm tmux session:\
    \ prints `claude agents` output to stdout once (since there's no window to manage).\n\
    - Refresh cadence: configurable via `pm set agents-refresh-interval <seconds>`.\
    \ Default 3s. Same content-change-only redraw idea from pr-28bda5d so a quiet\
    \ pm produces a quiet agents window.\n\n## Integration with pr-id mapping (optional\
    \ Phase 2 in the same PR scope)\n\nClaude Code's `claude agents` shows sessions\
    \ by Claude's own session-id. pm knows which PR each session is working on (via\
    \ the PR-id → workdir → spawned-claude-session mapping). A pm-flavored variant\
    \ that augments the table with the pm PR-id, plan, and status would be much more\
    \ useful than the raw `claude agents` output.\n\nTwo ways to do this:\n1. **Wrap\
    \ and re-render**: parse `claude agents` output, look up each Claude session-id\
    \ in pm's pane registry / PR-id mapping, render an augmented table with PR-id,\
    \ title, plan, agent state side-by-side.\n2. **Embed in pr list**: surface the\
    \ agent-state column in `pm pr list -t` itself. The agents window then becomes\
    \ pure `pm pr list -t --with-agent-state` and we get this functionality everywhere\
    \ PRs are listed without a separate window.\n\nOption 2 is the better long-term\
    \ integration. Option 1 is the cheapest near-term ship. Recommend option 2 as\
    \ the goal, option 1 as the v1 if option 2's parse-and-correlate logic is more\
    \ work than the rest combined.\n\n## Acceptance criteria\n\n- `pm session agents`\
    \ from a pm tmux session opens a window with live `claude agents` output.\n- Window\
    \ refreshes on a configurable interval; quiet pm produces no flicker (content-change-only\
    \ redraw).\n- Window survives pm restarts (window persists in tmux even if the\
    \ TUI restarts; the refresh loop re-attaches).\n- Outside a pm tmux session, the\
    \ command prints once to stdout — no error, no window-creation attempt.\n- If\
    \ `claude agents` is unavailable (older Claude Code version), the window shows\
    \ a clear 'requires Claude Code 2.1.139+' message instead of crashing.\n\n## Invariants\n\
    \n- Window content MUST NOT depend on the TUI being focused or running. Same standalone\
    \ pattern as the home window.\n- Refresh loop MUST NOT log to the project debug\
    \ log on every tick (would be log spam). Log only on errors and on user-facing\
    \ events (window created, window refresh interval changed).\n- The CLI command\
    \ MUST be idempotent — running it when the window already exists refreshes content\
    \ and focuses, does not error or create a duplicate.\n\n## Edge cases\n\n- `claude`\
    \ binary not on PATH → display a fallback message and exit cleanly (don't poll-loop\
    \ hitting a missing command).\n- Many concurrent agents (~50+) → `claude agents`\
    \ output may overflow the pane height; the window should let the user scroll.\
    \ tmux's pane scrollback covers this for free.\n- pm running on a host without\
    \ an interactive Claude install (e.g., a CI runner or a container) — show empty\
    \ / 'no Claude Code agents detected' state.\n\n## Verification\n\n- From a pm\
    \ tmux session, run `pm session agents`. Confirm a window named `agents` appears\
    \ with the `claude agents` table.\n- Run again. Confirm the existing window is\
    \ reused and focused, not duplicated.\n- Resize the window. Confirm the table\
    \ re-renders for the new width (Claude Code's `claude agents` handles this; pm\
    \ just needs to not interfere).\n- Wait 30s with no agent state changes; confirm\
    \ no flicker / no redraws happen.\n- Trigger a Claude session into 'needs input'\
    \ state (background a Claude session and let it stall on a permission prompt).\
    \ Confirm the agents window shows the state transition within the refresh interval.\n\
    \n## Related\n\n- pr-f5b7eef (#193, merged) — home window. Same long-lived-tmux-window-with-periodic-refresh\
    \ pattern; reuse the abstractions.\n- pr-28bda5d — content-change-only redraw\
    \ for the home window. The agents window should adopt the same pattern.\n- Claude\
    \ Code agent view docs: https://code.claude.com/docs/en/agent-view\n- A parallel\
    \ improvement (separate PR worth filing): subscribe pm's watcher to Claude Code's\
    \ `Notification` hook for cleaner 'needs input' detection than pane scraping."

- id: pr-1139060
  plan: null
  title: 'Bug: QA orphan-container cleanup is slow and containers leak across runs'
  branch: pm/pr-1139060-bug-qa-orphan-container-cleanup-is-slow-and-contai
  status: pending
  depends_on: []
  description: 'Every QA run starts with a ~100-second stall before planning can begin,
    because cleanup_orphaned_qa_containers (pm_core/container.py:969) serially removes
    stale containers from the previous run. With 11 orphans and podman inspect taking
    ~10s per non-existent object on this host (remove_container loops inspect with
    a 5s timeout inside a 10s deadline), that''s ~110s of pre-planning overhead —
    during which the user sees no progress and scenarios don''t launch.


    Two related issues:


    1. Sequential cleanup — the loop in cleanup_orphaned_qa_containers calls remove_container
    one at a time. These removals are independent; a ThreadPoolExecutor (~8 workers)
    would collapse 11 × 10s → ~15s.


    2. Container leak at source — QA completion does not remove its own containers
    when the loop exits (INPUT_REQUIRED, user-cancel, or pass). Every run therefore
    starts by paying the previous run''s debt. Ideally the prior run cleans up on
    finish so the next run has nothing to orphan-reap.


    Acceptance:

    - cleanup_orphaned_qa_containers parallelises remove_container across orphans.

    - QA completion (success, INPUT_REQUIRED, stopped) removes its scenario containers
    before returning, so the next run''s orphan sweep has nothing to do in the common
    case.

    - A new QA run after a normal completion starts the planner in well under 30s
    on a host with similar podman timings.

    - Test: run QA twice in succession; assert second run''s cleanup_orphaned_qa_containers
    removes 0 orphans (or near it).


    Observed during pr-014f93f testing. The 100-second delay is user-visible as "QA
    stuck" before the planner pane even appears.'

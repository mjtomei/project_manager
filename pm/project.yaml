- id: pr-66bf1b6
  plan: improvements
  title: 'Improvement: spec template adds Acceptance Criteria, Invariants, Edge Cases,
    and Verification sections'
  branch: pm/pr-66bf1b6-improvement-spec-template-adds-acceptance-criteria
  status: pending
  depends_on: []
  description: '## Goal

    Update the spec-generation prompt at `pm_core/spec_gen.py` (and the equivalent
    block at line ~504) to ask for four sections beyond what''s there today, grounded
    in standard software-spec patterns adapted for our agent-driven flow.


    The current template asks for:

    1. Requirements

    2. Implicit Requirements

    3. Ambiguities

    4. Edge Cases


    Change to:

    1. Requirements (unchanged)

    2. Acceptance Criteria *(new)*

    3. Implicit Requirements (rename to Invariants — see below)

    4. Edge Cases (refined — see below)

    5. Verification *(new)*

    6. Ambiguities (unchanged, kept last so resolutions sit near the top of the impl
    context)


    ## New / changed sections


    ### Acceptance Criteria *(new, after Requirements)*

    Concise prose summary of the full set of functionality that should be working
    at the end. Not a test-case list — a paragraph or short bullet list answering
    ''what does the user observe / can the user do that they couldn''t before?'' Used
    as:

    - QA''s source of truth for what to verify.

    - A human-readable spec summary for fast review.

    - The implementer''s end-of-iteration self-check.


    Should be readable in 10-30 seconds and complete (anything not in here is not
    promised).


    ### Invariants (rename of Implicit Requirements)

    Contracts that must hold. The ''all logs must tolerate missing fields'' / ''logs
    must not raise'' / ''state writes go through the existing flock'' class of statement.
    Reads as a checklist of things the implementation cannot violate. Renamed from
    ''Implicit Requirements'' because that name reads as ''implied requirements''
    which gets confused with implicit acceptance criteria.


    ### Edge Cases (refined)

    Scenarios and concerns to think about during implementation, distinct from invariants.
    Reads as a list of test situations: ''what if the loop ends with KILLED?'', ''what
    if get_action_state returns None initially then a populated entry?''. The output
    of this section often becomes pytest cases or QA scenarios.


    The split (Invariants = contracts that hold, Edge Cases = scenarios to test) makes
    both more useful than the current blended Implicit Requirements / Edge Cases pair.


    ### Verification *(new, after Edge Cases)*

    Exact commands and expected outputs to confirm the spec is met. The end-of-iteration
    check the implementer and reviewer share. Format:

    - Command(s) to run.

    - Expected stdout shape, log lines to grep for, or assertions to confirm.

    - Negative checks (what should NOT appear).


    Lines up with SWE-bench''s FAIL_TO_PASS / PASS_TO_PASS pattern: the spec defines
    the verification harness, not just the goal.


    ## Sections explicitly NOT changed

    - Code-path grounding (file:line refs) stays — it works.

    - Cross-references to related PRs at the bottom stay.

    - Imperative tone stays (no RFC 2119 keywords — pm uses Claude as the implementer;
    the precision tax for MUST/SHOULD/MAY doesn''t earn its keep).

    - No ''Non-goals'' section. With Claude as implementer, agents already err toward
    narrower scope, not wider; encouraging narrower hurts when verification is the
    bottleneck and the implementer could have solved more with the same verification
    work.

    - No ''Lessons'' section. PR notes (`pm pr note add`) cover this well enough.


    ## Code paths

    - pm_core/spec_gen.py:228-238 — main template.

    - pm_core/spec_gen.py:504-507 — secondary template (purpose unclear at read time;
    verify whether it''s a duplicate or a different phase).

    - Existing specs do not need backfill — new specs from now on inherit the structure.


    ## Acceptance Criteria

    After this PR, every newly-generated impl spec contains the six sections in the
    order listed, with the new sections (Acceptance Criteria, Verification) populated.
    The Invariants section reads as a checklist of contracts; Edge Cases reads as
    a list of scenarios. The QA loop and the reviewer can both find the verification
    command in a known place.


    ## Invariants

    - Existing specs render unchanged (no migration script).

    - The spec generator continues to run via `launch_claude_print` — no change to
    invocation.

    - Format stays markdown; downstream consumers (`format_spec_for_prompt`) need
    no changes.


    ## Edge Cases

    - Spec for a trivial PR (one-line fix): Acceptance Criteria and Verification might
    collapse to one line each. That''s fine — short specs are good. The template should
    not force volume.

    - QA-phase spec vs. impl-phase spec (the second template at line 504+ is QA-specific):
    the section list may differ — QA specs already focus on scenarios. Either apply
    the same six-section template uniformly or keep two phase-specific templates.
    Decide during impl.

    - Cross-references to related PRs: keep at the bottom as today.


    ## Verification

    - Generate a spec for any in-flight PR after the change. Confirm the markdown
    contains all six section headings in the new order, with non-empty Acceptance
    Criteria and Verification sections.

    - Cross-check a manually-written spec (e.g. one of pr-813cc19 / pr-26ca427 / pr-f27b882)
    against the new template — what fields would change? The result should be: more
    structure, no information loss.'

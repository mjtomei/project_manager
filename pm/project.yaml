- id: pr-a84a939
  plan: plan-state
  title: Extract data-service layer between storage and UIs
  branch: pm/pr-a84a939-extract-data-service-layer-between-storage-and-uis
  status: pending
  depends_on: []
  description: "Phase 10 of plan-state. Establish a clean separation between storage\
    \ (SQLite via pm_core/store/) and every UI / consumer by inserting a typed data-service\
    \ layer in between. Storage becomes an internal-only package; everything outside\
    \ pm_core/store/ and pm_core/services/ goes through services.\n\nWhy now: the\
    \ DB migration is necessary but not sufficient. Today's TUI reaches directly into\
    \ project.yaml structures, but the CLI commands, watchers, prompt builders, hook\
    \ readers, qa_loop, container.py, and many other modules also read pm state directly.\
    \ With a service layer in place, all of them — and any future UI like plan-ambient's\
    \ rc viewer, project browser, doc reader, or a future web frontend — consume the\
    \ same view-shaped types from pm_core/services/ without knowing whether storage\
    \ is SQLite, Postgres, or anything else.\n\nThis PR is the *complete* separation,\
    \ not a TUI-only refactor. Done means every entry point that reads or writes pm\
    \ state goes through services; no direct pm_core/store/ imports remain outside\
    \ pm_core/services/ itself.\n\nConcretely:\n\n(1) Create pm_core/services/ with\
    \ one module per domain (project, prs, plans, panes, qa_runtime, hooks, logs,\
    \ etc.). Each module exposes typed read methods (PrSummary, PrDetails, PlanSummary,\
    \ PaneListing, etc.) returning frozen dataclasses or Pydantic models — no SQL,\
    \ no rows, no internal IDs leaked.\n\n(2) Write methods accept typed command objects\
    \ (StartPr, MovePane, etc.) and return the new state or an error type. Internally\
    \ they use pm_core/store/ to perform the SQL; externally they hide it.\n\n(3)\
    \ Refactor every reader/writer of pm state to go through services. The migration\
    \ list is comprehensive, not just the TUI:\n  - pm_core/tui/* — every place app.py\
    \ / pr_view.py / pane_ops.py / etc. reads or writes state today\n  - pm_core/cli/*\
    \ — pr.py / plan.py / qa.py / session.py / helpers.py / container.py / meta.py\n\
    \  - pm_core/watchers/* — every watcher that observes or modifies state\n  - pm_core/qa_loop.py\
    \ and pm_core/qa/* — verdict tracking, scenario state\n  - pm_core/prompt_gen.py\
    \ — pulls deps, plans, notes when building prompts; goes through services\n  -\
    \ pm_core/hook_events.py and pm_core/hook_install.py — hook reader/writer\n  -\
    \ pm_core/container.py and pm_core/pr_cleanup.py — workdir / container state lookups\n\
    \  - pm_core/pr_sync.py — github-sync writes\n  - pm_core/auto_start.py, pm_core/loop_shared.py\
    \ — auto-start / loop scheduling state\n  - Anywhere else that imports from pm_core/store/*\
    \ or reads project.yaml / pane-registry / runtime files\n\n(4) The audit log (pr-51b9f26)\

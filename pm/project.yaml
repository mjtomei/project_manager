  description: 'Define the shape every ambient surface exposes, in pm_core/surfaces/protocol.py.
    Types: SurfaceKind enum (rc, browse, doc, tts, ...), SurfaceIdentity (id, kind,
    host, lan_url, started_at, pid), DisplayState (path, version, document text or
    other rendered content), AttentionState (viewport_top, viewport_bottom, selection,
    focus_target, last_user_input_at, signals: SignalHistories). SignalHistories is
    a per-signal time-series — every signal type retains history. Histories persist
    indefinitely via the archive (see persistent-archive PR); the protocol-level SignalHistories
    object is an in-memory cache of the recent past (default ~10 minutes, configurable
    per signal) populated from the archive on surface start, NOT the source of truth.
    Long-tail queries hit the archive directly through pm_core/surfaces/archive.py.
    Initial signal types: viewport_changes, selection_changes, focus_changes, scroll_events,
    touch_events. Gaze and implicit-signal histories slot into the same shape when
    their PRs land — no protocol redesign needed. Surfaces serve GET /api/surface
    returning {identity, display, attention} as a single payload. The rc viewer''s
    GET /api/doc is refactored to construct its response from this shape (with the
    existing field names preserved as a transitional alias so the rc webapp keeps
    working unchanged). No new behavior — pure extraction so subsequent surfaces have
    a target to implement against. Tests: type round-trip, rc /api/doc still serves
    the same shape it did before, /api/surface on rc returns the new structured payload,
    in-memory cache rehydrates from archive on surface restart, cache eviction does
    not lose data (still queryable from archive).'

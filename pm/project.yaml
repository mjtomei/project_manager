  description: 'Many generated prompts include a blanket warning not to run pm commands
    that spawn Claude sessions (`pm pr start`, `pm pr done`, `pm plan add`, `pm plan
    breakdown`, `pm plan review`), instructing the session to drive the TUI instead.
    This is overly broad.


    The constraint is only genuinely needed in two situations:

    1. Sessions running inside a container, which cannot/should not reach back out
    to manage the host pm session.


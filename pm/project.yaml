- id: pr-b4b68f3
  plan: bugs
  title: 'Bug: decouple TUI in-memory state from project.yaml via a coalescing write
    queue'
  branch: pm/pr-b4b68f3-bug-decouple-tui-in-memory-state-from-project-yaml
  status: merged
  depends_on: []
  description: "## Symptom\n\nTUI key handling exhibits a \"first press lags, next\
    \ few queue, results appear all at once\" pattern when navigating PR selection\
    \ rapidly. With ~330 PRs in project.yaml, every h/l keypress that moves the selection\
    \ blocks the asyncio event loop for hundreds of milliseconds.\n\n## Root cause\n\
    \n`pm_core/tui/pr_view.py:42` `handle_pr_selected` calls `store.locked_update(...)`\
    \ synchronously on the main thread for every selection change, just to persist\
    \ `active_pr`. `store.locked_update` (`pm_core/store.py:262-265`):\n\n    with\
    \ _lock(root, timeout):\n        data = load(root, validate=validate)   # parse\
    \ full ~18k-line yaml\n        fn(data)\n        save(data, root)            \
    \           # rewrite the whole file\n\nPer keypress: file lock + full yaml parse\
    \ + full yaml write. Subsequent keypresses queue in Textual's event queue until\
    \ the I/O finishes, then process in a batch.\n\n## Architecture (proposal)\n\n\
    Decouple in-memory project state from on-disk state, with a coalescing write queue\
    \ between them.\n\n**In-memory layer.** `app._data` (already exists) becomes the\
    \ source of truth for the running TUI. All TUI mutations write to `app._data`\
    \ immediately and return — synchronous, no I/O, no lock. UI reads from `app._data`\
    \ directly.\n\n**Write queue.** A bounded async queue of pending file-state operations.\
    \ Operations are tagged with an op-kind key (e.g. `(\"set\", \"project.active_pr\"\
    )`, `(\"update_pr_status\", pr_id)`). A background worker drains the queue and\
    \ applies operations to disk via `locked_update`.\n\n**Coalescing.** Before enqueuing,\
    \ the queue checks for an existing pending op with the same key and replaces it.\
    \ So 12 rapid `set active_pr=*` enqueues collapse to one disk write of the final\
    \ value. Debounce emerges naturally: pressing h/l repeatedly queues one pending\
    \ op that keeps getting replaced; the worker only sees the last value when it\
    \ gets around to draining.\n\n**Conflict resolution.** External writes (other\
    \ pm processes editing project.yaml) need to be respected. On each drain cycle\
    \ the worker re-reads the file under the lock, applies the queued ops on top of\
    \ the fresh disk state, and writes. This is what `locked_update`'s closure-based\
    \ API already enables — we just route through the queue instead of inline.\n\n\
    **Shutdown.** App exit flushes the queue (await drain) before returning.\n\n##\
    \ Touch points\n\n- `pm_core/store.py` — add `WriteQueue` class with `enqueue(key,\
    \ fn)` and a `drain()` coroutine. Existing `locked_update` stays for one-shot\
    \ CLI use.\n- `pm_core/tui/app.py` — own a `WriteQueue` instance on mount; start\
    \ its worker task; flush on unmount.\n- `pm_core/tui/pr_view.py:handle_pr_selected`\
    \ and similar — replace direct `store.locked_update(...)` calls with `app._write_queue.enqueue((\"\
    set\", \"active_pr\"), lambda d: d[\"project\"].__setitem__(\"active_pr\", pr_id))`.\n\
    - Audit other TUI mutation sites (status flips from sync, watcher updates, note\
    \ appends) and route them through the queue too. CLI paths keep using `locked_update`\
    \ directly.\n\n## Out of scope (separate PRs)\n\n- The TUI redraw refactor (pr-4c41017\
    \ / #131: split TechTree into per-node widgets, cache edges and layout) — that\
    \ PR targets render cost; this one targets state-write cost on the asyncio thread.\
    \ The two are complementary.\n- Replacing the yaml-file backing store with SQLite\
    \ or similar — possible future work, but the queue abstraction makes that swap\
    \ localized.\n\n## Acceptance criteria\n\n- Holding h or l in the tech tree no\
    \ longer queues keys; selection follows input in real time.\n- After rapid selection\
    \ navigation across N PRs, exactly one `active_pr` write to disk reflects the\
    \ final selection.\n- Quitting the TUI flushes pending writes before exit (no\
    \ lost mutations).\n- Concurrent external edits to project.yaml from another pm\
    \ process are not clobbered (re-read under lock before applying queued ops).\n\
    \n## Verification\n\n- Repro: open TUI with ~330 PRs; hold j/k for 2 seconds;\
    \ observe selection movement and event-loop responsiveness.\n- Pre-fix baseline:\
    \ selection batches; visible lag.\n- Post-fix: smooth nav; check `git diff project.yaml`\
    \ shows a single `active_pr:` change to the final selected PR, not an in-flight\
    \ intermediate."

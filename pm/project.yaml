- id: pr-eb4b7e3
  plan: bugs
  title: 'Bug: editor subprocess inherits TUI''s process group — orphaned editors
    silently steal input bytes'
  branch: pm/pr-eb4b7e3-bug-editor-subprocess-inherits-tui-s-process-group
  status: pending
  depends_on: []
  description: "## Symptom\n\nA vim editor spawned by `pm pr edit` (10 days old) was\
    \ found still alive, orphaned to PID 1 but **keeping the TUI's PGID** (3389450).\
    \ Because that pgid was the foreground process group of the TUI's pty (/dev/pts/51),\
    \ both vim and the TUI received terminal input from the line discipline. They\
    \ raced for each byte you typed — about 1 in 4 keypresses made it past vim to\
    \ the TUI.\n\nManifested as random key drops in the TUI: pressing h or l four\
    \ times in slow succession (~500ms apart) registered only one keypress in the\
    \ TUI's event loop. Traced via `textual.events.Key.__init__` — only one Key event\
    \ constructed per four keypresses. Killing the orphan vim eliminated the drops\
    \ immediately.\n\n## Root cause\n\n`pm_core/editor.py:81` spawns the user's $EDITOR\
    \ with:\n\n    subprocess.call([editor, tmp_path])\n\nNo `start_new_session=True`,\
    \ no `preexec_fn=os.setsid`. The child inherits the TUI's PGID. If the TUI's terminal\
    \ client disconnects or the editor otherwise outlives a clean teardown, it gets\
    \ reparented to PID 1 but retains the original pgid. When that pgid happens to\
    \ be the foreground pgrp of a live pty (the TUI keeps running on the same pgid),\
    \ the orphan editor becomes a silent input thief.\n\n## Three things to do\n\n\
    ### 1. Fix the immediate site\n\nIn `pm_core/editor.py`, pass `start_new_session=True`\
    \ so the editor gets its own session/process group:\n\n    ret = subprocess.call([editor,\
    \ tmp_path], start_new_session=True)\n\n### 2. Audit other interactive-child spawn\
    \ sites\n\nAny pm code that hands control to an interactive program inheriting\
    \ stdin from the TUI process is at risk. Candidates worth checking (grep `subprocess.(call|run|Popen)`\
    \ across pm_core):\n\n- `pm_core/editor.py` — confirmed culprit; commit-message\
    \ editors, note editors, spec editors all flow through here\n- `pm_core/cli/meta.py`,\
    \ `pm_core/cli/tui.py` — interactive flows that may shell out\n- `pm_core/providers.py`,\
    \ `pm_core/claude_launcher.py` — claude session launches (usually in tmux panes\
    \ so already isolated, but worth verifying)\n- `pm_core/push_proxy.py` — already\
    \ isolated (its own PGID per ps output), but confirm\n- Anything that runs `git\
    \ commit` without `-m` (opens $EDITOR), or `git merge` with conflict resolution\
    \ prompts, or `gh pr create` without `--body`\n\nFor each: pass `start_new_session=True`\
    \ OR redirect `stdin=subprocess.DEVNULL` when the child shouldn't need terminal\
    \ input. Background daemons (push_proxy, watchers) should always get `stdin=DEVNULL`.\
    \ Foreground interactive children (editors, pagers) should get `start_new_session=True`.\n\
    \n### 3. Automated detection of stdin-sharing processes\n\nAt TUI startup (and\
    \ optionally periodically), scan `/proc/*/fd/0` for any process other than the\
    \ TUI itself that has the TUI's controlling pty as fd 0. If found, log a warning\
    \ (with PID, command, PPID) and surface it in the status bar so the user can act\
    \ before keys start vanishing.\n\nImplementation sketch (pm_core/tui/app.py mount\
    \ hook):\n\n    import os, glob\n    my_tty = os.readlink(f\"/proc/{os.getpid()}/fd/0\"\
    )\n    intruders = []\n    for fd_link in glob.glob(\"/proc/*/fd/0\"):\n     \
    \   pid = fd_link.split(\"/\")[2]\n        if pid == str(os.getpid()): continue\n\
    \        try:\n            if os.readlink(fd_link) == my_tty:\n              \
    \  cmd = open(f\"/proc/{pid}/cmdline\").read().replace(\"\\\\0\", \" \")\n   \
    \             intruders.append((pid, cmd))\n        except OSError:\n        \
    \    pass\n    if intruders:\n        _log.warning(\"stdin intruders on %s: %s\"\
    , my_tty, intruders)\n        # surface in status bar / log_message\n\nThis catches\
    \ the bug class generically — even subprocess paths we forgot to fix, or future\
    \ ones we add without thinking.\n\n## Tradeoffs: detection-and-warn vs. fix-at-spawn-site\n\
    \n**Fix-at-spawn-site** (option 2): correct by construction — once every spawn\
    \ passes `start_new_session=True` or `stdin=DEVNULL`, the bug class is gone. Downsides:\
    \ easy to forget when adding new spawn sites; orphaned children in their own session\
    \ can be harder to clean up on TUI shutdown (we no longer get them via process-group\
    \ signaling, so we need explicit tracking); some children may legitimately want\
    \ to share our tty (rare for pm).\n\n**Detection-and-warn** (option 3): catches\
    \ everything regardless of spawn-site discipline, including future regressions\
    \ and external processes that somehow inherit our fd. Downsides: only reactive\
    \ — the user has already lost keypresses by the time the warning shows; needs\
    \ a recovery action (kill the intruder, or surface \"kill PID X\" suggestion);\
    \ periodic scanning adds (small) overhead.\n\n**Recommendation:** do both. Option\
    \ 2 is the real fix; option 3 is a safety net for the cases we miss. Option 3\
    \ alone is insufficient (lossy keys before detection); option 2 alone is fragile\
    \ (one missed spawn site silently regresses).\n\nThere is a third option — **separate\
    \ process groups per spawn, with explicit cleanup tracking**. Reject: more code\
    \ (a registry of child pgids to clean up on TUI exit), and `start_new_session=True`\
    \ already achieves the isolation goal with no tracking needed since the orphan\
    \ can no longer share our pgid. Process-group tracking only matters if we want\
    \ to signal *groups* of children together, which we don't for editors.\n\n## Verification\n\
    \n- `pm pr edit <id>`, then kill the parent shell forcibly so vim becomes an orphan\
    \ with PID 1 as PPID. Check `ps -o pid,pgid,cmd -p <vim-pid>` — after the fix,\
    \ pgid == vim's own pid, not the TUI's.\n- Reproduce the h/l drop test from the\
    \ original session: should see every `Key.__init__` fire.\n- Restart the TUI with\
    \ a known intruder process (e.g. a `sleep infinity </dev/pts/$TUI_PTY &` in another\
    \ shell) and confirm the detection logs a warning."

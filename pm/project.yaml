  title: 'Bug: popup picker says ''No project.yaml found'' because display-popup doesn''t
    inherit launching pane''s cwd'
  branch: pm/pr-26ca427-bug-popup-picker-says-no-project-yaml-found-becaus
  status: merged
  depends_on: []
  description: "## Symptom\nPressing the picker key (prefix+P or whatever the current\
    \ binding is) opens the picker popup but it immediately fails with:\n\n    No\
    \ project.yaml found.\n\neven though the active window's pane is in a valid pm\
    \ repo (verified via `tmux display-message -p '#{pane_current_path}'` returning\
    \ e.g. /home/matt/claude-work/project-manager).\n\n## Diagnosis\nThe `_log.info('popup-picker\
    \ invoked: ...')` entry for failing invocations lands in `~/.pm/debug/default.log`\
    \ — not the session's per-tag log file. `get_session_tag()` (pm_core/paths.py:81)\
    \ returns None when `get_git_root(start_path or cwd)` returns None, which happens\
    \ because the popup's cwd is *not inside any git repo*.\n\nThe cause: `session.py:750`\
    \ invokes `tmux display-popup -E -w <width> -h <height> <body>` with no `-d <start-dir>`\
    \ argument. Without `-d`, the popup's cwd is tmux's server-side default — typically\
    \ the directory the tmux *server* was started in, not the active pane's `pane_current_path`.\
    \ So even though the user's pane is in /home/matt/claude-work/project-manager,\
    \ the popup's bash starts somewhere else (often /, /home/matt, or the server's\
    \ launch dir) and `find_project_root()` walks up from there finding nothing.\n\
    \n`state_root() → find_project_root()` then raises FileNotFoundError, which session.py:1518-1523\
    \ catches and prints 'No project.yaml found.'\n\n## Fix\nTwo parts.\n\n1. **Pass\
    \ `-d` to display-popup.** In `_popup-show` (session.py:711-753) include `-d`\
    \ resolved to the launching pane's cwd:\n\n       subprocess.run(tmux_mod._tmux_cmd(\n\
    \           'display-popup', '-E',\n           '-d', subprocess.run(tmux_mod._tmux_cmd('display-message',\
    \ '-p', '#{pane_current_path}'),\n                                capture_output=True,\
    \ text=True).stdout.strip() or '~',\n           '-w', width, '-h', height, body))\n\
    \n   This makes the popup's cwd match the launching pane. Apply to both `_POPUP_PICKER_BODY`\
    \ and `_POPUP_CMD_BODY` paths and any other display-popup callers.\n\n2. **Resolve\
    \ project root from session metadata, not cwd.** Even with the cwd fix, the popup\
    \ still breaks if the launching pane's cwd is a deleted workdir (post-merge cleanup\
    \ race) or the user has manually cd'd outside the repo. Add a per-session 'pm_root'\
    \ record:\n\n   - When `pm session` starts, persist the project root to either\
    \ the pane-registry JSON (`~/.pm/pane-registry/<base>.json`) or a sidecar (`~/.pm/sessions/<tag>/pm_root`).\n\
    \   - `_popup-picker` and `_popup-cmd` (and ideally state_root() for any session-aware\
    \ caller) resolve via that record first, fall back to cwd-walking only if it isn't\
    \ set.\n\n   This also fixes a deleted-cwd race: after `pm pr merge` cleans up\
    \ a workdir, panes with that path as cwd can no longer resolve project root via\
    \ getcwd() — the popup picker hits FileNotFoundError on os.getcwd() itself, which\
    \ the existing handler bucket-catches as 'No project.yaml found' (also misleading).\n\
    \n## Test\n- Repro: from any tmux client, switch to a session-window whose pane\
    \ is at a valid cwd inside the pm repo, press picker key. Expected: picker opens.\
    \ Actual: 'No project.yaml found'.\n- Verify the cwd issue: bind a debug key that\
    \ runs `display-popup -E 'pwd; read'` (no -d) — confirms the popup's cwd is not\
    \ the pane's cwd.\n\n## Code paths\n- pm_core/cli/session.py:711-753 `_popup-show`:\
    \ add `-d <pane_current_path>` to the display-popup invocation.\n- pm_core/cli/session.py:1490+\
    \ `_popup-picker` / `_popup-cmd`: resolve project root via session metadata first.\n\
    - pm_core/pane_registry.py or pm_core/paths.py: helper for storing/retrieving\
    \ per-session pm_root."

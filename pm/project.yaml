  title: Add list view mode for the main TUI tech tree pane
  branch: pm/pr-5e116f0-add-list-view-mode-for-the-main-tui-tech-tree-pane
  status: pending
  depends_on: []
  description: 'Add an alternative list view mode for the main TUI pane that shows
    PRs as a compact top-down list instead of the graph layout.


    ## Display

    - Each PR is a single row: status icon, PR ID, title, current state indicators
    (loop markers, spinners, verdicts), dependency list at the end

    - Compact enough to show 40+ PRs on screen at once vs ~8 in graph mode

    - Plan group headers as separator rows, same as graph mode

    - Toggle between graph and list mode with a keybinding (e.g. v for view toggle)


    ## All existing commands work identically

    - Same keybindings for starting review, QA, merge, stop, edit, etc.

    - Same navigation: j/k for up/down, J/K to jump between plan groups

    - Same filtering (F to cycle status filter), sorting, hide merged/closed toggles

    - Selected PR highlights the row, detail panel updates the same way


    ## Sorting and dependency clustering

    - Same sort fields work (updated_at, created_at, status, etc.)

    - Dependent PRs are clustered together: a PR and its dependency chain appear as
    a contiguous block

    - Within a cluster, dependencies appear before dependents (topological order)

    - Indentation or a subtle connector character can show depth in the dependency
    chain


    ## Layout

    - Dependencies shown inline at end of row, e.g. ''depends: #108, #109''

    - Columns: status icon | PR ID | title (truncated to fit) | loop/verdict marker
    | depends

    - Column widths adapt to terminal width

    - No horizontal scrolling needed — the list is always single-screen width


    ## Motivation

    - Graph mode is great for understanding structure but expensive to render and
    hard to scan quickly

    - List mode is better for daily workflow: quickly see what needs attention, act
    on it

    - Works much better on narrow terminals and mobile'

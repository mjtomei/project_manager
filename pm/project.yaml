- id: pr-a3a081a
  plan: plan-qa
  title: Auto-extract QA-relevant notes from implementation and review session transcripts
  branch: pm/pr-a3a081a-auto-extract-qa-relevant-notes-from-implementation
  status: pending
  depends_on: []
  description: 'Add an automated background Claude session that runs after implementation
    and review sessions to mine their transcripts for QA-relevant information. The
    session should:


    1. Scan all impl and review session transcripts for the PR that haven''t already
    been processed (tracked via a processed-transcripts manifest per PR)

    2. Identify changes, decisions, workarounds, edge cases, and known limitations
    mentioned in the sessions that QA should verify

    3. Add these as structured PR notes tagged for QA consumption (e.g. prefixed with
    ''QA-verify:'')

    4. Work for both normally-exited and killed sessions — it processes transcripts
    on disk, not live session state


    Trigger points:

    - After an implementation session exits (normal or crash)

    - After a review session exits

    - On demand via CLI (pm pr extract-qa-notes <pr-id>) for manual runs or catch-up


    The session runs in the background (no tmux window needed) using claude --print
    mode. It reads the transcript JSONL files, extracts the relevant information,
    and calls pm pr note add to attach findings to the PR.


    This bridges the information gap where impl sessions discover edge cases or make
    design decisions that QA needs to know about but that aren''t captured in the
    spec or PR description.'

- id: pr-b42059d
  plan: plan-regression
  title: 'QA: code coverage of exercised lines factors into PASS verdict'
  branch: pm/pr-b42059d-qa-code-coverage-of-exercised-lines-factors-into-p
  status: pending
  depends_on: []
  description: "Capture code coverage on the code under test during QA scenario execution,\
    \ surface it to the verdict, and loop the QA flow until a configurable coverage\
    \ target is met (or escalate if it cannot be).\n\nSame kind of coverage measure\
    \ you would compute for unit or integration tests — what was executed in the code\
    \ under test — just gathered through the QA scenario harness rather than via direct\
    \ test invocation. The 'tests' in this case are the scenarios; the 'code under\
    \ test' is whatever the scenarios exercise (the pm Python codebase when QAing\
    \ pm itself, or the project's source code when QAing a downstream project).\n\n\
    Acknowledged hard parts (this PR may end up scoped to just the Python case for\
    \ v1):\n\n(a) Scenarios run arbitrary commands chosen by Claude — shell, CLI invocations,\
    \ tmux operations. Coverage instrumentation needs to wrap whatever the target\
    \ command's runtime is. For Python projects (like pm itself), running 'coverage\
    \ run -p --concurrency=multiprocessing <cmd> ...' on each scenario invocation\
    \ records to per-process .coverage files; combining across scenarios is straightforward\
    \ via 'coverage combine'.\n\n(b) For non-Python target code, coverage is project-specific\
    \ (gcov/llvm-cov for C/C++, c8/nyc for JS, etc.). Out of scope for v1 — the implementation\
    \ should be structured so adding new languages later is a matter of adding a coverage\
    \ backend, not redesigning the flow.\n\n(c) Subprocess crossings — when the command-under-test\
    \ forks children (pm spawns claude, etc.), coverage must follow. coverage.py's\
    \ parallel + multiprocessing modes handle this for Python; non-Python languages\
    \ each have their own story.\n\n(d) Mapping coverage to the PR's diff — given\
    \ a per-scenario or aggregated coverage report, intersect with the lines added\
    \ or modified by this PR's diff vs base. Report 'diff coverage X%' alongside per-scenario\
    \ verdicts. Lines outside the diff are out of scope for the verdict (they may\
    \ be exercised but were not changed).\n\nFlow:\n\n1. Scenario harness wraps the\
    \ command-under-test in 'coverage run' (or equivalent for the target language).\
    \ Each scenario's coverage data lands in the scenario's workdir.\n\n2. After all\
    \ scenarios complete, the QA worker aggregates: 'coverage combine' across scenarios,\
    \ then 'coverage report --include=<diff files>' to compute diff-only coverage.\n\
    \n3. If diff coverage is below the configured target (default 70%, per-project\
    \ configurable), the QA flow loops: the aggregated coverage report (uncovered\
    \ lines, summary numbers, per-function breakdown) is appended to the planner's\
    \ prompt for the next iteration. The planner is told: 'Of the lines you intended\
    \ these scenarios to exercise, the following remain uncovered: [...]. Update or\
    \ add scenarios to exercise them.' New / updated scenarios run, coverage is recomputed,\
    \ and the loop continues until the target is met.\n\n4. Loop termination — the\
    \ coverage loop must terminate. Three exit conditions:\n   - PASS: diff coverage\
    \ ≥ target. Verdict proceeds normally.\n   - GIVE-UP: coverage plateaus across\
    \ N consecutive iterations (default 2 — coverage did not increase between iterations)\
    \ AND is still below target. Verdict downgrades to NEEDS_WORK with a message:\
    \ 'Coverage stuck at X% < target Y%. Uncovered lines: [...]. The planner could\
    \ not find scenarios to cover them — the lines may be unreachable through the\
    \ scenario harness (e.g. error paths that require fault injection), or genuinely\
    \ dead. Consider adding unit tests or marking them as not-coverable.'\n   - HARD\
    \ CAP: max iterations (default 5) — escalates to INPUT_REQUIRED so a human can\
    \ decide whether to lower the target, accept the gap, or rewrite the code to be\
    \ more testable.\n\n5. The PASS / NEEDS_WORK verdict is influenced by diff coverage\
    \ as above. Above target, the existing assertion-based verdict path proceeds.\
    \ Below target with planner unable to make progress, escalation as in (4).\n\n\
    Files: pm_core/qa_loop.py (verdict computation, loop-control, planner-prompt addendum),\
    \ pm_core/cli/qa.py (scenario harness — wrap commands in coverage), new pm_core/qa/coverage.py\
    \ (parse coverage output, intersect with diff, generate the planner-prompt block,\
    \ plateau detection), pm_core/prompt_gen.py (extend the QA planner prompt to accept\
    \ and act on the coverage feedback block).\n\nTests: a synthetic Python project\
    \ where a deliberately-uncovered function in the diff produces a low diff-coverage\
    \ number and the planner's next-iteration prompt names that function as needing\
    \ coverage; iteration converges to high coverage as the planner adds scenarios;\
    \ verdict thresholding works; plateau detection escalates correctly when no new\
    \ scenarios increase coverage; hard cap escalates to INPUT_REQUIRED; subprocess\
    \ coverage follows pm spawning a child; a non-Python target gracefully falls back\
    \ to 'no coverage backend, skipping diff coverage' rather than failing the verdict."

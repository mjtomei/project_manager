- id: pr-6aa74c6
  plan: tui-ux
  title: Fuzzy select for pr and plan commands
  branch: pm/pr-6aa74c6-fuzzy-select-for-pr-and-plan-commands
  status: in_review
  depends_on: []
  description: 'Add a ''plan select'' TUI command and intelligent fuzzy/partial matching
    for both ''pr select'' and ''plan select''. Typing ''plan select watch'' navigates
    to the first PR under the watchers plan. Typing ''pr select spec'' finds pr-942aa21
    by title match.


    Matching and ranking: fuzzy match against ID, title, description, and plan name.
    Rank results with weighted scoring — exact ID match highest, then ID prefix, then
    title substring, then description substring, then plan name. When multiple fields
    match the same query, scores combine. Best match wins. If multiple results tie,
    prefer the one closest to current cursor position.


    Result cycling: after a fuzzy match, the full ranked result list is retained.
    Dedicated TUI keys (e.g. n/N or similar) cycle forward/backward through the match
    list, moving the cursor to each result in rank order. The result list and cycling
    keys stay active until a new fuzzy match command is run, replacing the previous
    list. Both ''pr select'' and ''plan select'' share the same cycling keys and result
    list — running either command replaces whatever list was active.


    For plan select, auto-expands collapsed plan groups and moves cursor to the first
    PR in that plan. Works with display IDs (#125) and raw IDs (pr-942aa21) as before,
    plus now also partial matches.'

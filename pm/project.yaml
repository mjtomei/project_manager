- id: pr-28bda5d
  plan: improvements
  title: 'Improvement: home window redraws only on actual content change, not on a
    5s timer'
  branch: pm/pr-28bda5d-improvement-home-window-redraws-only-on-actual-con
  status: merged
  depends_on: []
  description: '## Goal

    Today the pm-home window''s loop (`pm_core/home_window/pr_list.py:_loop_main`)
    redraws every 5 seconds and on sentinel touch. The 5s timer was needed for the
    clock in the header line; the actual project state usually doesn''t change between
    ticks, so most redraws are no-ops that just blink the screen.


    Switch to redraw-only-on-change. The window stays current because every state-mutating
    pm command can touch the sentinel (which wakes the loop early), but a quiet pm
    produces a quiet pm-home — no flicker, no wasted clears, easier to read.


    ## Behavior


    Replace the timer-based redraw with hash-based change detection:


    - Loop wakes on a short tick (e.g. 0.5–1s), on sentinel touch, or on SIGWINCH.

    - On wake, call `_render_once()` to produce the output text and compute a hash.

    - Compare to the last rendered hash. **Write to stdout only if the hash differs.**
    Sentinel touch is a hint to recheck, not a force-redraw.


    Sentinel + tick + SIGWINCH are all ''check'' triggers; the hash is the only ''should
    we paint'' decision. Callers signaling refresh don''t have to know whether their
    change affected the rendered output — they say ''I touched something'' and the
    loop figures it out.


    Alternatives considered:

    - **Mtime-watching of source files.** Cheaper per tick but brittle — easy to miss
    a source.

    - **inotify (Linux only).** Could layer on top of hashing later.


    ## Width- and height-aware rendering


    The current renderer writes `format_pr_line` output without truncation, and prints
    the full PR list which often overflows the pane. The terminal scrolls, leaving
    the *oldest* (bottom of the list) visible — wrong way around. The user wants the
    *most recent* (top of the list) visible.


    `_render_once` should be both width- and height-aware:


    - **Pane size** read from `os.get_terminal_size()` (the home process is attached
    to the pane''s TTY, so this returns the right dimensions).

    - **Width**: truncate or wrap each line to fit the current width. Pass the width
    into `format_pr_line` or post-process the output.

    - **Height**: the renderer already sorts by `updated_at` descending, so `prs[0]`
    is the most recent. Print only the first N rows that fit the visible height (height
    − header lines − optional footer line). If there are more PRs than fit, append
    a footer like `(… and M more)`.

    - After writing, the cursor lands at the bottom of the rendered output, but since
    the rendered output is bounded by pane height, no scrolling occurs — the most
    recent rows stay visible at the top.


    Width-aware rendering means resize naturally produces different text → hash differs
    → redraw fires. SIGWINCH wakes the loop immediately so the user doesn''t see stale-look
    during the inter-tick wait.


    Add a SIGWINCH handler that simply sets a wake flag — the existing select/sleep
    loop wakes, the next iteration recomputes width/height and renders.


    ## Header / clock decision


    The current header includes `(updated HH:MM:SS)` which is clock-time, so it changes
    every second even when content doesn''t. Drop the absolute clock from the header;
    render staleness with relative phrasing only at redraw time (e.g. `(updated 8s
    ago)` derived from the last-changed timestamp of the rendered content). Relative
    phrasing makes freshness self-evident on a quiet window without driving redraws.


    ## Sentinel kick still required


    Anything that mutates state and wants pm-home to reflect it immediately should
    touch the sentinel (`provider.refresh(session)`, already implemented at home_window/pr_list.py:63-68).
    Audit existing call sites — currently only the explicit `pm session home` invocation
    calls it. Add refresh calls in:

    - `pr add` / `pr edit` / `pr close` / `pr merge` / `pr review` / `pr start` /
    `pr qa` (anywhere project.yaml or runtime_state changes).

    - `set_action_state` writes.


    A small helper in home_window — `refresh_home(session=None)` that resolves the
    active session and touches the sentinel — keeps callers terse.


    Note: with hash-based ''don''t write if unchanged'', a redundant refresh call
    is free — it triggers a recheck that confirms nothing changed and writes nothing.


    ## Out of scope

    - inotify-based event watching (linux-only optimization).

    - Live-streaming change deltas to the home window (instead of full re-render).

    - Vertical scrolling within the home window. The ''most recent first, truncate
    to fit, footer says +M more'' approach is enough; if a user wants to see the whole
    list they run `pm pr list -t --open` in a shell.


    ## Test

    - Open pm-home. Idle for 30s with no pm activity → no redraws (no flicker, no
    screen clear).

    - Run `pm pr edit <id> --status in_review` from a shell → home redraws within
    ~1s showing the new status.

    - `touch ~/.pm/runtime/home-refresh-<base>` with no underlying change → loop wakes,
    computes hash, sees no diff, does NOT redraw.

    - Resize the pane (via tmux split-pane / kill-pane changing the width) → home
    redraws immediately with truncated/fitted lines, no leftover wrapped output from
    the previous width.

    - Make the pane very narrow (mobile-mode width) → titles truncate cleanly with
    ellipsis, no soft-wrap artifacts.

    - Project with more open PRs than the pane is tall → only the most recent N fit,
    footer reads `(… and M more)`, oldest are hidden, top of list is visible (not
    the bottom).


    ## Code paths

    - pm_core/home_window/pr_list.py: `_loop_main` and `_render_once` — hashing, width-
    and height-aware rendering, SIGWINCH handler, drop absolute clock from header,
    `(… and M more)` footer.

    - pm_core/home_window/__init__.py: add `refresh_home(session=None)` helper.

    - Mutating CLI commands that should kick: pr add/edit/close/merge/review/start/qa,
    set_action_state.


    Related: pr-813cc19 (observability — once landed, the per-redraw log will only
    fire on actual changes, which is itself useful telemetry).'

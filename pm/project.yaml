- id: pr-06a96fa
  plan: plan-regression
  title: QA scenarios reuse regression tests as their flow driver
  branch: pm/pr-06a96fa-qa-scenarios-reuse-regression-tests-as-their-flow-
  status: pending
  depends_on:
  - pr-7d5d036
  description: "## Goal\n\nSwitch QA scenarios from \"instruction (setup) + artifact\
    \ recipe (drive / capture)\" pairs to binding directly to a regression test as\
    \ the canonical flow driver, with per-scenario assertions layered on top.\n\n\
    ## Why\n\nToday every QA run reinvents how to drive a flow. The planner picks\
    \ an instruction for setup and a recipe for capture, and the worker stitches them\
    \ together. The flows get exercised once (during that QA run), captured, and then\
    \ never re-run — every PR's scenarios start from scratch.\n\nRegression tests\
    \ are designed to be durable, reusable, recorded flows. If a QA scenario IS a\
    \ regression-test run + per-scenario Thens, then:\n\n- The library of \"exercised\
    \ user flows\" grows by accumulation rather than per-PR effort.\n- The same flow\
    \ is driven the same way across PRs, so behavior drift gets caught.\n- Captures\
    \ from regression runs feed both the regression history and the QA scenario's\
    \ evidence.\n- The instruction/artifact-recipe split goes away — a regression\
    \ test already specifies the surface, the driver, and the capture.\n\n## After\
    \ this PR\n\nQA scenario shape becomes (sketch):\n\n    SCENARIO N: <title>\n\
    \    FOCUS: <area>\n    REGRESSION: <regression-test-id>\n    STEPS:\n      GIVEN:\
    \ <starting state — usually established by the regression test's setup>\n    \
    \  WHEN: <usually the regression test's user action>\n      THEN: <PR-specific\
    \ observable outcomes the regression run should produce>\n\n## Planner preference\
    \ order (Phase 10 hierarchy)\n\nAfter pr-2680fbf lands, the planner's preference\
    \ order becomes:\n\n1. REGRESSION: <id> — an existing regression test in pm/qa/regression/\
    \ fits the scenario's flow. The regression has already been written and is the\
    \ canonical driver. Use this when a fit exists; this is the load-bearing path\
    \ that makes the library compound.\n\n2. NEW_REGRESSION: <slug> (introduced by\
    \ pr-2680fbf) — no existing regression fits, so the planner authors one as part\
    \ of the QA run. The drafted regression lands on the PR branch, the scenario binds\
    \ to it by slug, and the new regression becomes part of the durable library that\
    \ subsequent PRs can reuse. This is the PREFERRED path when there's no existing\
    \ fit — falling through to (3) skips the chance to grow the library.\n\n3. INSTRUCTION\
    \ + ARTIFACT (legacy / fallback) — kept for genuine one-shot probes/oracles that\
    \ don't fit the regression-test shape (e.g. \"is this config value parsed correctly?\"\
    , \"what does pm pr list return for an empty project?\"). Should be rare after\
    \ pr-2680fbf lands; the auditor (pr-f4dc8a2) flags overuse.\n\nThis PR establishes\
    \ (1). pr-2680fbf adds (2). (3) remains as the fallback the planner should prefer\
    \ to avoid.\n\n## Why this depends on the prior PR\n\npr-7d5d036 cleans up the\
    \ regression runner — drops surface-specific framing assumptions and fixes the\
    \ containment model so regression runs don't leak state into the caller's repo.\
    \ That cleanup makes the runner safely reusable as a QA-scenario primitive. Until\
    \ it lands, binding QA to regression would inherit those bugs at scale.\n\n##\
    \ Scope\n\n- Extend QA scenario parsing to recognize REGRESSION: <id>.\n- Concretizer\
    \ verifies the regression test exists and its user-visible surface matches the\
    \ scenario's Then.\n- Worker invokes the regression test's flow and overlays the\
    \ scenario's Then assertions on the resulting captures.\n- Planner prompt updated\
    \ to prefer REGRESSION when a fitting test exists; defer NEW_REGRESSION wiring\
    \ to pr-2680fbf; fall back to INSTRUCTION + ARTIFACT only when neither fits.\n\
    - Recipe library + instruction library remain for scaffolding; the regression\
    \ library becomes the primary durable surface catalog.\n\n## Out of scope\n\n\
    - Authoring new regressions inline (that's pr-2680fbf).\n- Removing INSTRUCTION/ARTIFACT\
    \ support (they remain as a fallback for one-shot probes/oracles).\n- Mocks awareness\
    \ in regression authoring (that's pr-51586d2, which depends on pr-2680fbf)."

- id: pr-7fe2588
  plan: bugs
  title: 'Bug: popup should close on Ctrl+C / Esc regardless of body state'
  branch: pm/pr-7fe2588-bug-popup-should-close-on-ctrl-c-esc-regardless-of
  status: pending
  depends_on: []
  description: "Today the prefix+M / prefix+P popup closes only when the body command\
    \ exits. If the body is in an unexpected state — subprocess hung, _wait_dismiss\
    \ not entered, container creation blocked — the user has no way to dismiss the\
    \ popup with Ctrl+C or Esc. Tmux's display-popup -E has no built-in keyboard escape;\
    \ the popup is effectively hostage to whatever the body is doing.\n\nFix: wrap\
    \ the popup body shell so Ctrl+C and Esc both unconditionally exit the body, which\
    \ then triggers display-popup -E to close.\n\nConcretely:\n\n(1) Ctrl+C — easy.\
    \ Add 'trap exit 130 INT' at the top of the popup body shell wrapper. Today the\
    \ SIGINT propagates to whatever subprocess is running but the wrapper shell does\
    \ not exit on its own. The trap makes the shell exit 130 on SIGINT, which closes\
    \ the popup.\n\n(2) Esc — harder. The popup is a regular pty; Esc as a single\
    \ key doesn't terminate processes. Two approaches:\n  (a) Wrap the body in a small\
    \ Python that reads stdin in raw mode in a background thread and exits on Esc.\
    \ While the foreground subprocess runs, the background watcher kills it on Esc.\
    \ This works but adds complexity to every popup.\n  (b) Bind a key inside the\
    \ popup pane: tmux 3.4+ display-popup -B doesn't exist as such, but you can bind\
    \ keys in the calling client's table that target the popup pane. Less reliable\
    \ across tmux versions.\n  \n  Recommended: (a) — implement once in pm_core/cli/_popup.py\
    \ as a wrapper that the picker_inner / cmd_inner shell bodies call instead of\
    \ directly exec'ing pm _popup-cmd. The wrapper spawns the underlying pm command\
    \ and watches for Esc concurrently.\n\n(3) Update both prefix+M and prefix+P bodies\
    \ to use the new wrapper. The trap-INT change is a one-liner; the Esc-watcher\
    \ addition is the bigger piece.\n\nTests: a popup body that is intentionally hung\
    \ via a sleep can be dismissed by Ctrl+C; same body dismissed by Esc; existing\
    \ successful pr_start / popup-cmd flows still close cleanly when the body exits\
    \ naturally; the wrapper does not interfere with subcommand stdin (e.g. the 'pm>'\
    \ prompt in popup-cmd still works)."

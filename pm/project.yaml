- id: pr-b0d1b3b
  plan: tui-ux
  title: Return to last-focused window when current window closes
  branch: pm/pr-b0d1b3b-return-to-last-focused-window-when-current-window-
  status: pending
  depends_on: []
  description: 'When a tmux window closes (e.g. finishing a review session, closing
    an implementation pane), tmux picks the next window by index rather than returning
    to the window you came from. This means closing a pane opened from the TUI dumps
    you on a random window instead of back to the TUI.


    Fix: Use tmux hooks (after-select-window to track focus history, window-unlinked
    or pane-exited to trigger navigation) or tmux''s set-option to maintain a focus
    stack per session. When a window closes, automatically switch to the previously
    focused window.


    The focus stack should:

    - Record each window focus in order (deduplicated, most recent first)

    - Pop the closed window from the stack and switch to the next entry

    - Handle chains (close window A → go to B, close B → go to C)

    - Be scoped to the pm session group (not affect other tmux sessions)

    - Survive TUI restarts (store in a file or tmux environment variable)


    This also improves the experience when navigating deep: TUI → impl window → review
    window → close review → back to impl → close impl → back to TUI.'

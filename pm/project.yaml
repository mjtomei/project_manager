  description: 'Single benchmark_mode flag covering the runtime and prompt layers
    so pm can run autonomous loops end-to-end without a TUI or human-reachable surface.


    Runtime: pm operates without a visible TUI (no picker, no popup, hooks bypassed
    where they assume a TUI surface). All session activity captured in a single structured
    log file. Builds on pr-438028c (CLI window management for review-loop / QA) and
    what is left after it lands.


    Prompt layer: extends pr-f17e22b''s TUI-section gate to a project-wide flag that
    strips "ask the user" / interactive language from every prompt builder — generate_prompt,
    generate_review_prompt, generate_merge_prompt, the QA planner / refinement / scenario
    prompts, and the watcher prompts.


    Coupling rationale: removing INPUT_REQUIRED from prompts is only safe once self-recovery
    playbooks exist. Sequenced after pr-ca6859f (watcher self-recovery audit) for
    that reason.


    Driven by the ProgramBench submission as a forcing function — the cleanroom image
    has no human and no human-reachable surface — but the headless runtime is generally
    useful for unattended operation.


    Manual testing: a representative bug-fix run completes end-to-end with benchmark_mode
    on, no TUI launched, structured log captures the full session, and no INPUT_REQUIRED

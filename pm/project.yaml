- id: pr-8d8b360
  plan: bugs
  title: 'Bug: merge-conflict resolution pushes a local master merge on GitHub backend
    instead of re-running the GitHub merge'
  branch: pm/pr-8d8b360-bug-merge-conflict-resolution-pushes-a-local-maste
  status: in_progress
  depends_on: []
  description: '## Symptom

    On a merge conflict with the **GitHub backend**, pm''s merge-resolution session
    pushes a *local* merge of the PR branch into `master` straight to origin, bypassing
    GitHub. GitHub never records the merge (PR stays OPEN), and master gets a merge
    commit authored/committed by the local user instead of GitHub. Observed with #212
    (pr-b4b68f3): merge commit 6003301e, committer "Matthew Tomei", subject "Merge
    pull request: ..." — vs a correct gh merge like #213''s 52551e37 (committer "GitHub").


    ## Root cause

    `prompt_gen.generate_merge_prompt` (pm_core/prompt_gen.py:558-623), standard merge-conflict
    variant. The GitHub/vanilla path (`backend != "local"`) instructs, while cwd is
    the **PR branch workdir**:

    - Goal: "Resolve the merge conflict so that `master` contains the merged result
    of both branches."

    - Step 2: "ensure `master` includes changes from `branch`"

    - Step 4: "Push the merged `master` to origin"


    Run in the branch workdir, that drives the agent to check out master, merge the
    branch into it, and `git push origin master` — a local master merge that skips
    `gh pr merge` entirely. The `local` backend path is correct (commit the merge
    on master in the workdir, NO push, since origin is a local non-bare repo); the
    bug is the GitHub/vanilla path reusing that "master includes branch" framing and
    adding "push master to origin".


    ## Expected (GitHub backend)

    The resolution should keep GitHub as the merger:

    1. Merge `base_branch` (master) **into the PR branch** in the workdir, resolving
    conflicts there.

    2. Push the **PR branch** to origin.

    3. Re-run the GitHub merge (`gh pr merge <#> --merge`) so GitHub performs the
    master merge and records the PR as merged.

    4. Pull `base_branch` into the local repo.

    Never `git push origin master` directly on the GitHub backend.


    ## Scope

    - Fix the GitHub/vanilla branch of `generate_merge_prompt` (direction + steps
    + MERGED verdict text + the "merge of branch into master failed" framing).

    - Leave the `local` backend path as-is (it is correct).

    - Consider having the post-resolution finalize re-invoke `gh pr merge` rather
    than relying on the agent to push.


    ## Acceptance

    - GitHub-backend merge-resolution prompt instructs merge master→branch, push branch,
    re-run `gh pr merge`, pull master; it does NOT instruct pushing master to origin.

    - After an auto-resolved conflict on the GitHub backend, GitHub shows the PR as
    Merged (merge commit committer = GitHub), with no local-committer master merge.

    - Local backend behavior unchanged.

    - Tests assert the github-backend prompt mentions pushing the branch + gh pr merge
    (not pushing master); local-backend prompt unchanged.'

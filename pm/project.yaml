- id: pr-c05ba7b
  plan: plan-state
  title: Migrate container governor lock to SQLite row lock
  branch: pm/pr-c05ba7b-migrate-container-governor-lock-to-sqlite-row-lock
  status: pending
  depends_on: []
  description: 'Phase 4 of plan-state. Replace the ~/.pm/governor.lock file with a
    row-locked sentinel in a process_locks table.


    Schema: process_locks(name PRIMARY KEY, holder_pid, acquired_at, host). Acquire
    is INSERT ... ON CONFLICT DO NOTHING with a check that the existing holder is
    still alive (PID liveness via os.kill(pid, 0)); release is DELETE WHERE holder_pid
    = self.


    Avoids the classic stale-lockfile-on-crash problem that flock-style locks have,
    since SQLite''s write transaction itself is a lock and PID liveness is checked
    on contention.


    Migration: existing governor.lock is removed on first open of the new schema (any
    existing holder fails over cleanly the next time it tries to acquire).


    Tests: concurrent acquire returns one winner; release works; acquired-but-dead
    holder is reaped on contention; same name can be reused for additional process
    locks (e.g. push-proxy locks) later without schema changes.'

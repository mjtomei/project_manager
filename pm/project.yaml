- id: pr-3d1fa55
  plan: bugs
  title: 'Bug: terminal-status PRs keep their tmux windows when finalized outside
    pm merge flow'
  branch: pm/pr-3d1fa55-bug-terminal-status-prs-keep-their-tmux-windows-wh
  status: qa
  depends_on: []
  description: '## Symptom

    A PR marked terminal (merged/closed) *outside* pm''s own merge flow keeps all
    of its tmux windows open — impl, merge-, review-, and every qa-<id>-sN scenario
    window. Observed with pr-b4b68f3 (GitHub #212): its code shipped to master via
    a content-merge with diverged SHAs (so neither GitHub nor pm auto-detected the
    merge), it was then marked merged via `pm pr edit --status merged`, and a TUI
    reload did not reclaim any of its ~10 windows.


    ## Root cause

    Window teardown for a finished PR only runs as part of pm''s interactive merge
    flow (`pm pr merge` / picker merge action). A status transition to a terminal
    state by any other path — `pm pr edit --status merged|closed`, a PR merged by
    content with diverged SHAs (see pr-ca6981c / GitHub SHA-based merge detection),
    or an externally-merged PR picked up by sync — does not trigger window cleanup.
    So the windows orphan.


    ## Expected

    Reaching a terminal status (`merged`/`closed`) should reclaim the PR''s windows
    regardless of how it got there. The cleanest fix is to make window teardown a
    function of the PR reaching terminal status (detected on TUI reload / sync), not
    a side effect of the merge command. Reuse the existing teardown (cf. `_cleanup_stale_scenario_windows`,
    qa_loop.py) and extend it to impl/merge/review/qa windows for any PR whose status
    is in `_TERMINAL_STATUSES` (session.py:953) but whose windows still exist.


    ## Acceptance

    - Marking a PR merged/closed by any path (edit, sync-detected, content-merge)
    causes its impl/merge/review/qa windows to be closed on the next TUI reload/sync.

    - No orphaned windows remain for terminal-status PRs.

    - Active/non-terminal PRs are unaffected.

    - Test: simulate a PR with open windows transitioning to merged via `pm pr edit`;
    assert windows are reclaimed.'

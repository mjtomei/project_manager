    text: 'Add filesystem watching: the webapp should also push SSE updates when the
      underlying source file changes on disk (e.g., the user saves the file in vim
      from another terminal), not only when Claude calls /api/accept. This makes pm
      rc a drop-in replacement for livedown-style live-preview tools and also keeps
      the viewer honest when external tools or other Claude sessions modify the file.
      Implementation: watch the served path with watchdog (or asyncio inotify wrapper);
      on modify events, reload the file and emit a state event over the existing SSE
      stream (and bump version). Debounce ~150ms to coalesce rapid editor saves. If
      the file is deleted or replaced, surface that as a state event too rather than
      silently 404''ing on subsequent /api/doc.'

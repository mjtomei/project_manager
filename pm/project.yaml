- id: pr-3b4a1b1
  plan: watchers
  title: Add user-defined watcher registration mechanism
  branch: pm/pr-3b4a1b1-add-user-defined-watcher-registration-mechanism
  status: pending
  depends_on:
  - pr-3032fb6
  description: 'Allow users to define and register custom watchers that plug into
    the BaseWatcher framework.


    ## Registration

    - Users create a watcher by subclassing BaseWatcher in a Python file

    - pm watcher register <path_to_file> registers it with the WatcherManager

    - Registered watchers stored in project config or ~/.pm/watchers/

    - pm watcher list shows all registered watchers (built-in and custom) with enabled/disabled
    status


    ## Watcher definition

    - Minimal interface: implement poll(), assess(), and optionally act()

    - Access to all BaseWatcher facilities: prompt templates, TUI notifications, INPUT_REQUIRED,
    tmux pane management

    - Can define custom polling intervals, enable/disable conditions, and priority


    ## Distribution

    - Watchers can be shared as standalone .py files or pip-installable packages

    - pm watcher install <url_or_package> to install from git or PyPI

    - Entry point discovery: packages can register watchers via setuptools entry_points


    ## Examples

    - Ship a few example custom watchers (e.g. dependency update checker, CI status

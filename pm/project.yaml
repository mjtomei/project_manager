- id: pr-3fee106
  plan: plan-ambient
  title: Persistent attention archive — SQLite time-series store
  branch: pm/pr-3fee106-persistent-attention-archive-sqlite-time-series-st
  status: pending
  depends_on:
  - pr-39a4e66
  description: 'Per-host persistent archive for all surface signals (display state,
    attention state, signal histories). Stored as SQLite (one DB per host at ~/.pm/surfaces/archive.db)
    with a schema designed to scale to long-horizon retention (years, terabytes) and
    to swap to a remote time-series store later without protocol changes. Schema:
    events(id, surface_id, signal_name, timestamp_ns, payload_json, confidence) —
    single wide table indexed by (surface_id, signal_name, timestamp_ns) and (timestamp_ns)
    for cross-surface global queries. Each surface implementation writes events through
    a shared writer in pm_core/surfaces/archive.py that batches writes (~100ms windows)
    to keep per-event write cost low. Read API: archive.query(surface_id=None, signal=None,
    since=None, until=None, limit=None) → iterator of typed events. The protocol''s
    in-memory SignalHistories continues to exist as a cache for recent-past queries
    (last few minutes) but is no longer the source of truth — it is rebuilt from the
    archive on surface restart. Long-tail queries (e.g. ''where has the user dwelt
    most over the last month?'') hit the archive directly. No automatic expiry: retention
    is configurable per-host and per-signal-class but defaults to ''keep everything.''
    Tests: write/read round-trip, batched writer correctness under concurrent surfaces,
    query performance over 1M synthetic events, in-memory cache reconstruction on
    surface restart, schema-evolution path (adding a new signal type doesn''t break
    existing queries).'

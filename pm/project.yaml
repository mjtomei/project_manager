  description: 'PR #154 added locked_read_modify_write to pane_registry.py and converted
    register_pane, unregister_pane, and _reconcile_registry. But 10 call sites in
    other files still do unlocked load_registry → modify → save_registry, racing with
    the locked paths and each other. Under concurrency (QA spawning 20+ panes), a
    stale load overwrites another operation''s save, silently dropping pane registrations.


    Unlocked call sites to convert:

    1. pane_layout.py:340-343 — register_and_rebalance

    2. pane_layout.py:469-489 — check_user_modified

    3. pane_layout.py:607-620 — handle_pane_exited

    4. pane_layout.py:690-697 — handle_pane_opened

    5. cli/session.py:319 — session creation (overwrites entire registry)

    6. cli/session.py:572-575 — _pane-closed

    7. cli/session.py:715-722 — _window-resized handler

    8. cli/pr.py:1237-1240 — PR merge cleanup

    9. tui/pane_ops.py:44-90 — heal_registry

    10. tui/pane_ops.py:160-163 — rebalance wrapper


    After conversion, remove the public load_registry and save_registry functions
    (or mark them read-only / private) so callers can''t bypass locking. All mutations
    must go through locked_read_modify_write. load_registry can remain public for
    read-only access but save_registry should be removed from the public API — the
    only way to write should be through the locked helper.'

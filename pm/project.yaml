- id: pr-813cc19
  plan: improvements
  title: 'Improvement: add structured observability for window/pane lifecycle, popup
    spinner, runtime_state transitions, and wrapper code-path selection'
  branch: pm/pr-813cc19-improvement-add-structured-observability-for-windo
  status: merged
  depends_on: []
  description: '## Goal

    Several recent bugs were hard to diagnose because the relevant primitives don''t
    log. Auditing the incidents from 2026-05-04 and 2026-05-05 surfaces a consistent
    set of silent paths. This PR adds structured INFO-level logging at those spots
    so the next incident is debuggable from `~/.pm/debug/<session-tag>.log` without
    code reading.


    The cost is a handful of `_log.info` lines plus one or two helpers; the benefit
    is that every recurring class of bug we''ve hit recently leaves a trail.


    ## Logging-level policy


    Today: default INFO, DEBUG when `~/.pm/sessions/<tag>/debug` exists, rotated at
    10MB with 1 backup. Most additions below are INFO and fire at human-event cadence
    (a few per minute at most), so volume is fine.


    The one volume-sensitive case is the popup spinner''s per-tick state at 0.15s
    tick × ~5min iteration ≈ 2,000 ticks. Per-tick logs are only useful when reproducing
    a stuck spinner; almost every tick is uneventful (cur_state=running for many seconds
    in a row).


    **Spinner approach: transition-only at INFO + opt-in per-tick under env var.**

    - Log at INFO when something actually changes: cur_state flip, window_open flip,
    saw_disappear flip, keypress received, exit. Expect ~10-50 lines per spinner instance,
    not 2,000.

    - Per-tick verbose state behind `PM_SPINNER_TRACE=1` env var (not a Python log
    level). Off by default. Avoids polluting the level taxonomy for one diagnostic
    and keeps the on/off knob obvious for users investigating.


    ## Audit of silent primitives → why they matter


    ### 1. Window / pane lifecycle (pm_core/tmux.py + pm_core/cli/helpers.py)

    - `tmux.kill_window` — no log. Couldn''t tell whether the merge cleanup actually
    killed #201''s windows or whether they died from pane-exit. Add INFO: ''kill_window:
    session=<s> window=<id-or-name>''.

    - `tmux.select_window` and `tmux.select_window_in_session` — no log. `switch_sessions_to_window`
    logs but the underlying primitive doesn''t. Add INFO: ''select_window: target=<s>:<w>
    rc=<rc>'' for both.

    - `tmux.new_window` and `new_window_get_pane` — partial logging. Add post-creation
    window id/name confirmation.

    - `cli.helpers.kill_pr_windows` — silent. Add INFO entry/exit: ''kill_pr_windows:
    pr=<id> windows_found=<list>'' / ''kill_pr_windows: pr=<id> killed=<list>''.

    - `home_window.park_if_on` — silent on success. Already logs failures via except.
    Add INFO when watching is non-empty: ''park_if_on: target_window=<id> watching=<sessions>
    parked_to=<home>''.

    - `home_window.ensure_home_window` — INFO: ''ensure_home_window: provider=<name>
    created=<bool> name=<win>''.


    All of these fire on user/automation events, low cadence.


    ### 2. Popup spinner (pm_core/cli/session.py:_wait_for_tui_command)

    The spinner has been the suspect in three recent incidents (pr-f27b882 stale-state,
    pr-23d97f8 unresponsive-dismiss, pr-f27b882 second repro ''didn''t switch when
    window appeared''). It runs in a popup process that doesn''t share the TUI''s
    logger but does log to its own session-tag log.


    INFO additions (transition-only — see policy above):

    - Entry: `spinner: pr=<id> action=<a> fresh=<b> target_window=<w> initial_window_ids=<set>
    initial_state=<s>`.

    - State transitions only (not every tick): `spinner transition: <field> <old>
    -> <new>`.

    - Each select_window attempt and rc.

    - Each consume_suppress_switch result.

    - Each keypress received (small volume — only fires on user input).

    - Exit: `spinner exit: reason=<window_open|terminal_state|keypress|kbinterrupt>`.


    DEBUG (only under debug-mode marker file):

    - cbreak-setup outcome: `spinner stdin: cbreak=<bool> reason=<...>`.


    Opt-in (PM_SPINNER_TRACE=1):

    - Per-tick: `tick i=<n> cur_state=<s> verdict=<v> cur_window_ids=<list> saw_disappear=<b>
    window_open=<b>`.


    ### 3. Runtime-state transitions (pm_core/runtime_state.py)

    `set_action_state` and `consume_suppress_switch` are silent. Stale-state and missed-transition
    bugs (pr-f27b882 family) are entirely about runtime_state contents and writers.

    - INFO on transitions only (skip no-op writes): `set_action_state: pr=<id> action=<a>
    from=<old> to=<new> verdict=<v>`.

    - INFO: `consume_suppress_switch: pr=<id> action=<a> consumed=<bool>`. Skip when
    consumed=False to avoid noise from picker callers — only log the True case.


    ### 4. Wrapper code-path selection (pm_core/wrapper.py)

    We hit two bugs caused by the wrapper loading the wrong pm_core (master vs. workdir,
    IPC vs. non-IPC). Once per pm invocation, very low volume.

    - INFO: `wrapper: argv0=<...> selected_root=<path> chosen_via=<override|pm_root|cwd_walk|installed>
    is_ipc=<bool>`.


    ### 5. TUI mount / unmount and trigger

    TUI restarts at 05:55:08 (the #201 merge incident) and we don''t know what triggered
    it.

    - INFO mount: `TUI mount: pid=<n> session=<s> trigger=<initial|restart|signal>`.

    - INFO unmount: `TUI unmount: reason=<...>`.

    - The restart-self path records the reason it''s restarting.


    Once per restart — negligible volume.


    ### 6. Container launcher (pm_core/container.py)

    Most container ops do log. Gaps:

    - `wrap_claude_cmd`: log entry with label, workdir, container name. Already logs
    creation; add the lock acquisition (when pr-fc6db6a''s flock lands) and the container-name
    decision.

    - `remove_container`: log entry param.


    ### 7. Iteration relauncher (pm_core/review_loop.py:_launch_review_window)

    The subprocess that fires `pm pr review --fresh --review-loop` is quiet. Per iteration,
    low cadence.

    - INFO: `relauncher: pr=<id> iteration=<n> loop_id=<id> cmd=<cmd>` on entry.

    - INFO: `relauncher: pr=<id> rc=<rc> elapsed=<s>` on exit.


    ### 8. SIGUSR2 command queue (pm_core/tui/app.py)

    Currently logs queue drain at DEBUG. Lift the actual command-dispatch log to INFO:
    `queue dispatch: cmd=<c> result=<ok|exc>`. One per command, low cadence.


    ### 9. Picker action dispatch (pm_core/cli/session.py:popup_picker_cmd)

    `_run_picker_command` doesn''t log which command was selected. Add INFO: `picker
    dispatch: action=<lbl> cmd=<c> route=<tui|direct>`.


    ## Out of scope

    - Structured-log format change (move to JSON). Today''s log is human-readable
    and grep-friendly; keep it.

    - Span-style tracing (no opentelemetry).

    - Adding a custom TRACE level — env-var-gated PM_SPINNER_TRACE is the only opt-in
    we need.


    ## Test

    - After this PR, repro one of the recent incidents (e.g. concurrent _launch_review_window)
    and confirm the log shows the full causal chain: wrapper code-path → kill_window
    → park_if_on → kill_window → relauncher → container create → spinner entry → state
    transitions → exit reason.


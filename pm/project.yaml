- id: pr-23d97f8
  plan: null
  title: 'Bug: popup spinner becomes unresponsive to q/Esc/Ctrl+C dismissal in some
    failure states, leaving the popup stuck open'
  branch: pm/pr-23d97f8-bug-popup-spinner-becomes-unresponsive-to-q-esc-ct
  status: in_review
  depends_on: []
  description: '## Symptom

    The picker popup spinner (`_wait_for_tui_command` in pm_core/cli/session.py:1171-1457)
    usually responds to q / Q / Esc keypresses to dismiss the popup without cancelling
    the queued command (line 1434), and to Ctrl+C via the `KeyboardInterrupt` handler
    (line 1449). In some states it becomes unresponsive to all of those — the popup
    stays open on top of the affected window indefinitely until the user either kills
    the pane externally or the underlying tmux session goes away.


    Concretely observed on 2026-05-05: after the concurrent _launch_review_window
    race for pr-18ac983 (#184) (documented in pr-fc6db6a''s note-80159c9), the popup
    ended up stuck on top of #184 and could not be dismissed via q / Esc / Ctrl+C.


    ## Hypotheses worth investigating


    1. **cbreak mode setup silently failed.** session.py:1280-1289 wraps termios setup
    in try/except. If `tcgetattr` or `tty.setcbreak` raises, `old_attrs` is set to
    None. The select+read loop continues running, but stdin is now in canonical mode
    — `sys.stdin.read(1)` won''t return a single character until Enter is pressed,
    so q / Esc on their own do nothing. Reproduces if anything in the popup''s parent
    shell environment changed termios state before the spinner''s setup ran.


    2. **Spinner loop blocked on a slow tmux call.** Inside the loop, `tmux_mod.list_windows(session)`
    and `_rs.get_action_state(pr_id, action)` each round-trip the tmux server / read
    a JSON file. Under contention (e.g., another pm command holding a lock, tmux server
    temporarily unresponsive), one of these can block past the 0.15s tick. While blocked,
    the select+read for keypresses isn''t running, so keypresses queue in the kernel
    buffer until the call returns. If the call hangs longer, the popup feels unresponsive.


    3. **Race-induced state confusion.** Under the concurrent-launch race (pr-fc6db6a),
    the window can flicker: master creates → workdir removes → workdir create fails.
    Spinner ticks during this might see cur_window_ids empty (saw_disappear=True)
    one tick, cur_state=running another tick, and never reach the terminal-state-and-no-window
    condition that would short-circuit. The spinner keeps spinning. q/Esc should still
    work in this case; it''s only stuck because nothing satisfies the exit conditions.


    If (3) is the only issue, the popup is responsive but just doesn''t have an exit
    condition to take. If q/Esc genuinely don''t work, (1) or (2) is in play.


    ## Diagnostic ask


    Add a temporary debug log in the spinner loop showing each tick''s: `cur_state`,
    `window_open`, `saw_disappear`, `old_attrs is None`, and any keypress chars read.
    Reproduce the stuck-popup case (easiest path: trigger the concurrent-launch race
    in pr-fc6db6a). Confirm whether the loop is ticking and whether keypresses are
    being received.


    ## Fix candidates by hypothesis


    - (1): if `old_attrs` is None after setup, log a warning and force the popup to
    exit immediately rather than spinning unresponsively. The user''s keypress in
    canonical mode would arrive only after Enter — at which point we should still
    honor it, but defaulting to ''exit'' keeps the popup from getting stuck.

    - (2): wrap the per-tick tmux + state calls with a short timeout (e.g. 1s); on
    timeout, count the loop iteration but skip the call. After N consecutive timeouts,
    exit the spinner with an error message.

    - (3): add a ''spinner stuck'' detection — if N ticks (e.g. 100, ~15s) pass with
    no state change *and* no window event, surface a message and offer Esc to dismiss
    with explicit text. (User''s q/Esc would already work in this case — this is just
    a UX hint.)


    Most likely combined fix: log enough state per tick to root-cause the specific
    case, then implement whichever cause the logs point to.


    ## Out of scope

    - The underlying race that triggered the stuck popup in the observed incident
    (pr-fc6db6a). This PR is about the popup''s responsiveness when something goes
    wrong, not preventing things from going wrong.


    ## Test

    Repro: trigger the concurrent-launch race in pr-fc6db6a (or simulate by manually
    creating runtime_state in a stuck shape: state=running, no review window present,
    fresh=True, initial_window_ids non-empty). Press q / Esc / Ctrl+C → expect the
    popup to close. Currently does not.


    Related:

    - pr-fc6db6a (#156) — the race that triggered this in the wild.

    - pr-f27b882 — adjacent spinner short-circuit issue (stale terminal state).'

- id: pr-900fb7d
  plan: plan-qa
  title: 'Pattern-extraction pipeline: similarity and difficulty scoring for model
    routing'
  branch: pm/pr-900fb7d-pattern-extraction-pipeline-similarity-and-difficu
  status: pending
  depends_on:
  - pr-2e81e51
  description: 'Extend the pattern-extraction review pipeline with similarity and
    difficulty scoring to avoid using the strongest models on every session uniformly.


    The identification session (stage 2) already reads similar code to find it. Extend
    its output to also produce a per-location score with two dimensions:

    - Similarity: how closely related is this code to the task in the new diff (same
    function, same module, analogous pattern in different area, etc.)

    - Complexity: how non-trivial is the pattern at this location (multi-step invariant
    with non-obvious ordering, single obvious step, etc.)


    These scores are used to select the model for the corresponding stage-3 extraction
    session:

    - High similarity + non-trivial: strongest model

    - High similarity + simple: lighter model

    - Low similarity: lighter model, and aggregation session weights findings from
    this location lower


    Scoring should be conservative: default toward stronger models when uncertain,
    since the whole point of the pipeline is to catch things that look simple but
    are not. The identification session should err toward flagging complexity rather
    than assuming simplicity.


    The aggregation session also receives the scores and uses them to weight hazard
    confidence — a hazard sourced only from low-similarity locations is reported with
    lower confidence than one corroborated by high-similarity code.


    Also apply the existing QA concurrency cap pattern to stage-3 sessions to bound
    parallelism when many similar locations are found.'

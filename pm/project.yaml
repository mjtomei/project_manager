- id: pr-ad7bd98
  plan: bugs
  title: Fix arrow crossing in TUI tech tree when dependencies are vertically stacked
  branch: pm/pr-ad7bd98-fix-arrow-crossing-in-tui-tech-tree-when-dependenc
  status: pending
  depends_on: []
  description: 'When a PR node has two incoming dependency arrows and one source is
    horizontally aligned while the other is below it, the layout draws both arrows
    to the same (top) slot on the target node. This causes the arrows to cross unnecessarily.


    Fix: when there are two incoming arrows and one source is below the horizontal:

    - If only one incoming arrow, route it to the bottom connection slot instead of
    the top

    - If multiple incoming arrows, push the horizontal arrow up to the top slot and
    route the lower arrow to the bottom slot, so they don''t cross


    More generally, incoming arrows should be assigned to connection slots (top/middle/bottom)
    based on the vertical position of their source node relative to the target, to
    minimize crossings.'

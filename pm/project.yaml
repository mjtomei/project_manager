    \ verdict keyword alone on its own line\n2. Block-style verdicts (FLAGGED_START/FLAGGED_END,\
    \ REFINED_STEPS_START/REFINED_STEPS_END, QA_PLAN_START/QA_PLAN_END, VERIFIED):\
    \ writes optional preamble, then the _START marker, a configurable body (defaulting\

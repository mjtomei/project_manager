- id: pr-291e891
  plan: improvements
  title: 'Track action source metadata for TUI operations: session, window, and task
    context'
  branch: pm/pr-291e891-track-action-source-metadata-for-tui-operations-se
  status: pending
  depends_on: []
  description: 'Before TUI actions (status transitions, PR starts, merges, etc.) are
    locked or serialised, we need a way to understand where they came from. Add source
    metadata to TUI actions so that each operation records which Claude session initiated
    it, which tmux window that session lives in, and which PR or task it was working
    on.


    This is a precursor to the file-locking PR (pr-109). Locking requires knowing
    who holds the lock and what they are doing — without action attribution that information
    is unavailable and lock contention is opaque.


    Concretely:

    - Define an action context structure: session tag, tmux window ID/name, PR ID
    being worked on (if any), and a human-readable description of the task (e.g. ''\''''review-loop
    iteration 3''\'''' or ''\''''qa-scenario-s2''\'''').

    - Propagate this context through the code paths that mutate shared state: project.yaml
    writes, status transitions, PR start/done/merge flows. The context can be passed
    explicitly or inferred from environment variables set when a Claude session is
    launched.

    - Persist the most recent action context per session in a lightweight sidecar
    (e.g. ~/.pm/sessions/{tag}/action-context.json) so it can be read by the TUI,
    watchers, and the locking layer without requiring the original caller to still
    be running.

    - Surface this in pm pr list or a new pm session list command so a human or watcher
    can see at a glance which session last touched each PR and what it was doing.


    The locking PR can then use this as the basis for lock attribution, deadlock detection
    (who is waiting on whom), and surfacing contention to the user in a meaningful
    way rather than just a timeout.'

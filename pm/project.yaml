  notes:
  - id: note-7f64d92
    text: When this PR lands, remove the `> [!CAUTION]` forward-looking note at the
      top of the "Regression tests" section in pm_core/docs/qa_library.md (added by
      pr-6be8ee6). The body text in that section is already written for the post-fix
      behavior; the callout is the only thing acknowledging the gap.
    created_at: '2026-05-08T19:51:43Z'
    last_edited: '2026-05-08T19:51:43Z'
  - id: note-a870561
    text: 'Containment model — intentional vs leakage:


      INTENDED OUTPUTS (these still propagate out of the run, even with isolation):

      1. Bug PRs from --file-bugs write directly to the user''s pm/project.yaml on
      master via `pm pr add`. This is the cheapest path for the user (PR shows up
      in their list immediately) and the regression runner is trusted to file accurately.

      2. Captures under pm/qa/captures/regression/<test-id>/<timestamp>/ are committed
      to git on master alongside the run that produced them. This is what makes behavior
      diffs across runs work; without it, the captures never get reviewed.

      3. The run report (stdout). Same as today.


      CONTAINED (must NOT leak from the ephemeral env):

      4. Anything Claude does to the project working tree outside pm/qa/captures/regression/...
      or pm/project.yaml — file edits, commits, branches, stashes, pushes.

      5. Spawned processes (servers, daemons, watchers). Reap on run end.

      6. Filesystem writes outside the ephemeral env''s scratch space.

      7. Tmux state — any pane/window the test creates is in the ephemeral env, vanishes
      at end. The user''s live pm session is never touched.


      Network: out of scope to block by default. Tests that hit real services do real
      calls. Optional --no-network for tests that want to assert offline behavior
      is a nice-to-have, not a blocker.


      These boundaries should be implemented at the runner level (sandbox the working
      tree to captures + project.yaml; ephemeral container or scratch dir for everything
      else) rather than asked of the test prompt.'
    created_at: '2026-05-08T20:14:09Z'
    last_edited: '2026-05-08T20:14:09Z'
  - id: note-a618612
    text: 'Depends on pr-abcf70f (FakeClaudeSession): the runner cleanup needs predictable
      outcomes for its own regression coverage, which requires controlling the Claude
      session verdict via a fake. Without that, runner behavior changes can''t be
      exercised deterministically end-to-end.'
    created_at: '2026-05-14T01:10:54Z'
    last_edited: '2026-05-14T01:10:54Z'
  - id: note-cd01975
    text: 'While doing the runner cleanup, sweep pm/qa/instructions/ to make sure
      every instruction still matches the current flows — instructions written before
      later refactors (BDD-shaped scenarios, captures-out-of-git, new session/container
      layout, etc.) may have stale steps or references. Also audit coverage: every
      user-facing surface added since the instruction library was last refreshed (notably
      the QA flow itself — pm qa run, pm qa author-*, pm qa add-*, pm qa docs, pm
      qa captures-path, the create-picker modal, etc.) should have at least one instruction
      that drives it end-to-end so future scenarios have a Given to build on.'

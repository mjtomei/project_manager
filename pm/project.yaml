- id: pr-df6cd9f
  plan: watchers
  title: Add decision point awareness to planning and spec prompts
  branch: pm/pr-df6cd9f-add-decision-point-awareness-to-planning-and-spec-
  status: pending
  depends_on:
  - pr-848ba9b
  description: 'Make planning, spec generation, and implementation prompts aware of
    decision points so they can suggest creating them when they detect uncertainty.
    This is additive guidance only — no prompt requires decision points to function.


    ## Prompt updates


    - **Planning prompts** (plan breakdown, plan review): when the planner identifies
    genuine uncertainty about approach, it suggests creating a decision point rather
    than committing to one path. Examples: "should this be a watcher or a cron job?",
    "monolith vs. microservice for this component?"

    - **Spec generation prompts**: when the spec generator encounters significant
    design forks, it suggests (or automatically creates, if spec tree branching is
    available) a decision point with candidate specs

    - **Implementation prompts**: sessions know which decision branch they''re working
    on and what alternatives exist. If an implementation discovers that its branch''s
    approach is fundamentally flawed, it can flag this

    - **Review prompts**: reviewers can flag when a branch looks clearly better or
    worse than siblings, recommending resolution


    ## Design principles


    - Awareness is purely additive — all prompts work exactly as before if no decision
    points exist

    - No prompt is forced to create decision points — they suggest when appropriate

    - Decision point suggestions include rationale (what is uncertain and why it matters)

    - LLM-facing output (from `pm decision list/show`) is included in prompt context
    when relevant decision points exist'

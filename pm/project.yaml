- id: pr-30588a7
  plan: plan-regression
  title: 'Bug fix flow: reproduce with test, fix, verify'
  branch: pm/pr-30588a7-bug-fix-flow-reproduce-with-test-fix-verify
  status: merged
  depends_on: []
  description: 'Differentiate the bug fix workflow from feature implementation. When
    a PR has plan=bugs (or a new type=bug field), the implementation prompt should
    enforce a reproduce-first flow:


    1. Reproduce: Write or identify a failing test (preferably a Claude-guided test
    using FakeClaudeSession or similar) that demonstrates the bug

    2. Fix: Implement the fix

    3. Verify: Run the test to confirm it passes

    4. Reconcile (verification only): At session end, scan the supervisor''s cross-references
    on this PR. Confirm any linked overlapping bugs still exist after the fix; for
    each that''s now also resolved, append a note marking the link as confirmed-overlap.
    For any newly-noticed overlap not already in the supervisor''s notes, append a
    pointer.


    The reconcile step is *not* the primary dedup mechanism — that''s handled post-hoc
    by the discovery supervisor (pr-271cb3a) after the test sessions file. Reconcile
    is a backstop that verifies the supervisor''s links and catches anything the supervisor
    missed.


    This changes the impl prompt generation (prompt_gen.py) to detect bug PRs and
    inject the reproduce→fix→verify→reconcile sequence. The review and QA prompts
    should also be aware — reviewers should check that a reproduction test exists
    before passing.'

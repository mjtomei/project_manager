- id: pr-4585fd3
  plan: tui-ux
  title: Use resolved display IDs instead of raw PR IDs in all output
  branch: pm/pr-4585fd3-use-resolved-display-ids-instead-of-raw-pr-ids-in-
  status: pending
  depends_on: []
  description: 'Replace direct usage of raw PR IDs (pr-XXXX) in all output strings
    with a resolver that provides appropriate formatting depending on context.


    ## Two resolution modes


    1. **User-facing** (`click.echo`, `app.log_message`, TUI display) — resolve to
    the GitHub PR number if available (e.g. `#123`), otherwise fall back to the raw
    ID. This is what `_pr_display_id` already does.


    2. **Logging** (`_log.info`, `_log.warning`, etc.) — resolve to a string that
    includes both IDs for debuggability (e.g. `#123 (pr-cf41efc)` or just `pr-cf41efc`
    if no GitHub PR exists).


    ## Implementation


    - Add a resolver function that takes a `pr_id` string and project data (or a PR
    dict) and returns the appropriate display string for each mode

    - Provide a convenience variant that can look up the PR from just the ID + data
    dict, so callers that only have `pr_id: str` don''t need to fetch the PR dict
    themselves

    - Replace all user-facing `pr_id` references in `click.echo` and `app.log_message`
    calls across `cli/pr.py`, `tui/pr_view.py`, `tui/auto_start.py`, `tui/sync.py`,
    `cli/qa.py`, `cli/plan.py`, etc.

    - Replace all `_log.*` references that include PR IDs to use the dual-ID log format

    - Keep the raw `pr_id` for internal logic (dict lookups, branch names, container
    names, etc.) — only change how it''s displayed to users and logs'

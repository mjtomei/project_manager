- id: pr-bc010f4
  plan: bugs
  title: 'Bug: create_container fails on name collision instead of reusing or recreating'
  branch: pm/pr-bc010f4-bug-create-container-fails-on-name-collision-inste
  status: pending
  depends_on: []
  description: 'create_container in pm_core/container.py fails with ''name is in use:
    container already exists'' when a container of the requested name exists, regardless
    of whether the existing container is actually serving anyone. This trips on a
    common failure mode: a previous attempt to start a session was interrupted (TUI
    killed mid-launch, podman run completed but the wrapper crashed before exec, etc.),
    leaving an orphan container in ''Created'' or ''Exited'' state with no live process
    attached. The next attempt to start the same session sees the orphan and refuses,
    with a misleading error blaming podman.


    Concrete repro from today: running review-loop for pr-177dec0 failed with rc=125
    ''name pm-review-pr-177dec0 is in use''. podman ps -a showed the container in
    ''Created'' state — never actually ran. Manual ''podman rm -f pm-review-pr-177dec0''
    followed by retry succeeded.


    The orphan was almost certainly the correct container for this session — same
    name, same image, same workdir mount — just half-built. So two reasonable behaviors:


    (1) **Reuse if safely-correct.** Inspect the existing container; if its image,
    workdir mount, and relevant env vars match what we''d create, just docker start
    (or podman start) it. Most precise; preserves any work-in-progress state. Downside:
    requires careful inspect comparison and exposes us to subtle drift if the session
    config changed between attempts.


    (2) **Force-recreate when not in use.** If the existing container is in ''Created''
    or ''Exited'' state (no live process), ''podman rm -f <name>'' first, then run.
    If it''s ''Up'' (something is actually using it), error clearly with a useful
    message naming the running container and suggesting cleanup. Simpler, catches
    the common case (interrupted previous attempt), and matches the user''s preference.


    Recommendation: ship (2) as the fast fix. (1) is a nicer follow-up if reuse turns
    out to matter.


    Concretely: in container.py:create_container, before the ''podman run'' attempt,
    run ''podman inspect --format "{{.State.Status}}" <name>''. If it returns a status
    indicating not-running (''created'', ''exited'', ''dead'', ''configured''), ''podman
    rm -f <name>'' and proceed. If it returns ''running'' or ''up'', raise a clear
    ContainerError naming the conflict and suggesting ''pm container cleanup'' to
    investigate. If the inspect returns no-such-container, proceed normally.


    Files: pm_core/container.py (create_container preflight check; helper to query
    container status). Tests: orphan in Created state is removed and recreate succeeds;
    orphan in Exited state same; existing Running container produces a clear error
    rather than the cryptic ''name in use'' subprocess failure; race between two concurrent
    create_container calls for the same name produces one winner and one clear error
    rather than corruption.


    Cross-reference: pr-748e708 (push-proxy keyed by session_tag+pr_id collisions)
    is a similar identity-collision class for a different resource. The shape of the
    fix is similar — detect, decide reuse vs replace, give a clear error if neither
    works.'

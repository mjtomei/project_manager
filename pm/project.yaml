- id: pr-6f542a2
  plan: improvements
  title: 'Bug: action pane shows nothing while picker-dispatched commands are running;
    audit all actions for silent-pane and missing window paths'
  branch: pm/pr-6f542a2-bug-action-pane-shows-nothing-while-waiting-on-a-m
  status: in_review
  depends_on: []
  description: '## Symptom

    Selecting an action from the picker leaves the action pane blank during the run
    for any command that the picker dispatches *directly* (the non-`tui:` branch of
    `_run_picker_command` at session.py:1470+). Most prominent for merge-with-no-conflict
    (no merge window appears, no progress message), but the same shape hits other
    actions:


    - **Implementation re-start** (`pr start`): when there''s no existing window and
    the user fires the start action a second time, the popup pane is blank for a while
    during the run. Fresh first-time starts feel fine because the user expects setup
    time; the second-invocation case is more confusing because the workdir already
    exists and the run is short.

    - **Plain review** (`pr review` without loop): same shape — popup is silent until
    the review window appears.

    - **Merge with no conflict**: silent throughout because no window is ever created.


    The user-visible problem is the same in every case: no spinner label changes,
    no streamed output, no indication anything is happening.


    ## Root cause

    Two separable issues, the second more pervasive than the first:


    ### A. `_run_picker_command`''s direct-subprocess branch captures output

    At session.py:1470-1487, when the dispatched command doesn''t start with `tui:`,
    the picker runs `pm <cmd>` as a subprocess with `capture_output=True` and only
    prints stdout/stderr after the subprocess exits. The reason for capture (per the
    comment at line 1472-1474) is that display-popup''s raw-mode TTY mangles bytes
    streamed by the child. Whether that''s still true on current tmux is worth re-verifying
    — newer tmux versions handle popup TTY streaming better, and even if there''s
    mangling it''s preferable to a fully blank pane.


    ### B. Most action commands don''t write runtime_state, so the spinner has nothing
    to label

    `_wait_for_tui_command`''s spinner displays `cur_state or "queued"` (session.py:1420).
    When the underlying CLI command doesn''t transition runtime_state, the spinner
    shows "queued…" or nothing meaningful. Currently:

    - `pr_start`: doesn''t write runtime_state at all.

    - `pr_review`: same — no runtime_state writes from the CLI handler. (review-loop
    iterations DO write, but plain `pr review` doesn''t.)

    - `pr_merge`: same.

    - `pr_qa`: writes via `runtime_state.set_action_state` for some paths but not
    consistently.


    So even for picker-dispatched actions that *do* go through `tui:` routing (the
    spinner fires), the lack of state transitions means the user sees "queued…" forever.


    ## Audit checklist

    For each picker-dispatched action, verify the user-experience during a typical
    run:


    | Action | Picker dispatch route | Window-name pattern | runtime_state writes
    | Behavior today |

    |---|---|---|---|---|

    | `pr start` | direct subprocess | `{display_id}` | none | silent until window
    appears |

    | `pr start --fresh` | direct subprocess | `{display_id}` | none | silent until
    window appears |

    | `pr review` | direct subprocess | `review-{display_id}` | none | silent until
    window appears |

    | `pr review --fresh` | direct subprocess | `review-{display_id}` | none | silent
    during kill+recreate |

    | `review-loop start` | tui: route | `review-{display_id}` | yes (running/done/failed)
    | spinner shows running |

    | `pr qa` | tui: route | `qa-{display_id}` | partial | inconsistent labels |

    | `pr qa fresh/loop` | tui: route | `qa-{display_id}` | partial | inconsistent
    labels |

    | `pr merge` | direct subprocess | (no window unless conflict) | none | silent
    throughout no-conflict path |


    ## Proposed fix

    Two-part. Either alone would be a partial fix; both together close the issue.


    ### 1. Wire every picker-dispatched action into runtime_state

    Each action''s CLI entry point writes `set_action_state(pr_id, action, "running")`
    on entry and `"done"`/`"failed"` on exit. Make the action label visible via the
    existing spinner label path. Concretely:


    - `pr_start` (cli/pr.py:745+): on entry, `set_action_state(pr_id, "start", "running")`.
    On window-created success, "done". On error path, "failed" with verdict in the
    entry.

    - `pr_review` (cli/pr.py:1126+): same pattern, action="review".

    - `pr_merge` (cli/pr.py:1781+): same, action="merge". Especially valuable here
    because the no-conflict path opens no window.

    - `pr_qa`: audit existing writes for completeness.


    The spinner already labels by `cur_state` so this Just Works once the writes are
    in place. Picker-dispatched commands also need to route via `tui:` (or have the
    picker spawn the spinner against the action''s runtime_state regardless of route)
    so the spinner is actually polling.


    ### 2. Stream output for direct-subprocess actions

    For commands that benefit from streaming (informational lines like ''Merging GitHub
    PR #N...''), have `_run_picker_command`''s else-branch use line-buffered stdout
    instead of capture. Verify the display-popup raw-mode TTY mangling concern is
    still relevant; if it is, fall back to the runtime_state path from (1) and accept
    that streaming is unavailable in popups.


    ## Audit for missing-window paths

    Same pass should verify each action correctly opens a window (or correctly reports
    none-needed) on the relevant code paths. Specifically for merge (the original
    symptom):


    - Conflict path uses `_launch_merge_window` (cli/pr.py:1441) at multiple call
    sites (1596, 1645, 1664, 1691, 1847, 1926, 1945, 1995) — every conflict branch
    should fire it; none should silently echo manual instructions and return.

    - No-conflict path is correctly window-less but should still surface progress
    through the runtime_state mechanism in (1).


    ## No claude -p in any of these paths

    Audit for incidental `claude -p` invocations (`launch_claude_print` / `launch_claude_print_background`
    in `pm_core/claude_launcher.py`) anywhere in the merge, start, review, or merge-window
    flow. Direct callers today: `review.py` (review checks), `spec_gen.py` (spec generation),
    `qa_loop.py` (QA scoring) — none should be on these picker action paths. Confirm
    by tracing.


    ## Code paths

    - pm_core/cli/pr.py: `pr_start` (745), `pr_review` (1126), `pr_merge` (1781),
    `pr_qa`, `_launch_review_window` (1126), `_launch_merge_window` (1441) — add runtime_state
    transitions.

    - pm_core/cli/session.py:1450 `_run_picker_command` — possibly stream stdout for
    direct-subprocess branch.

    - pm_core/runtime_state.py — no changes expected; `set_action_state` already supports
    the needed transitions.


    ## Test

    - Picker → `pr start` on a PR with an existing workdir but no live window → action
    pane shows ''start: running…'' progress, then ''done'' and dismisses (or switches
    to the new window if focus follows).

    - Picker → `pr review` on an in_progress PR → progress visible during kill+recreate.

    - Picker → `pr merge` on a clean-merge PR → progress visible, no window opened,
    action pane shows ''merge: done'' on exit.

    - Picker → `pr merge` on a conflict PR → progress visible, then merge window opens,
    action pane switches to it.

    - grep the merge / start / review call graphs for `launch_claude_print` → zero
    hits.


    ## Related

    - pr-c1f8086 (just filed) — `_wait_for_tui_command` reads stale workdir yaml;
    also a ''spinner doesn''t reflect reality'' bug, distinct from this one.

    - pr-fc6db6a (#156) — the per-container-name lock recommended there; relevant
    to merge if merge ever wraps Claude in a container (it doesn''t today, but worth
    noting).

    - pr-813cc19 (observability — merged) — the spinner / runtime_state / window logs
    made this diagnosable. Once the runtime_state writes from this PR land, the per-action
    lifecycle becomes visible in logs too.'

- id: pr-8ed578d
  plan: plan-regression
  title: 'QA: fix-line coverage gate ties coverage to the diff so PASS requires the
    fix code to be exercised'
  branch: pm/pr-8ed578d-qa-fix-line-coverage-gate-ties-coverage-to-the-dif
  status: pending
  depends_on:
  - pr-b42059d
  description: 'Build on pr-b42059d (line coverage feeds verdict) so PASS additionally
    requires that the lines *added or modified by this PR* were executed by the QA
    scenario — not just that overall coverage is high.


    ## Motivation


    A QA run can hit a high overall coverage number while never executing the lines
    the fix actually changed: the scenario exercises an unrelated path and the verdict
    still passes. For an unsupervised bug-fix loop this is the difference between
    ''we know the fix code ran and the bug is gone'' and ''something ran and nothing
    crashed.''


    ## Proposed behavior


    1. Compute the changed-line set from the PR''s diff against its base.

    2. Intersect with the per-line coverage data produced by pr-b42059d.

    3. Verdict PASS requires: (a) every changed *executable* line in the fix is covered
    by at least one QA scenario, OR (b) explicit justification recorded in the PR
    notes for any uncovered line (e.g. ''defensive branch only triggered on impossible
    input'').

    4. Verdict surfaces a ''fix-line coverage'' percentage distinct from total coverage.


    ## Code paths

    - Wherever pr-b42059d emits coverage data: add a diff-aware filter.

    - Verdict computation path: add fix-line gate.

    - pm pr show / list: show fix-line coverage when present.


    ## Out of scope

    - Path / branch coverage on the diff (covered by pr-8422dea).

    - Mutation testing of the fix lines (separate idea).


    ## Depends on

    - pr-b42059d (line coverage data must exist first)'

- id: pr-748e708
  plan: bugs
  title: 'Bug: push-proxy keyed only by (session_tag, pr_id) — impl and QA containers
    fight over the same socket'
  branch: pm/pr-748e708-bug-push-proxy-keyed-only-by-session-tag-pr-id-imp
  status: pending
  depends_on: []
  description: 'Shared push-proxy implementation in pm_core/push_proxy.py:start_push_proxy
    keys live proxies by (session_tag, pr_id). When the implementation container and
    QA scenario containers all want a proxy for the same PR, they share the same key
    but have different workdirs — and only one workdir can be the proxy''s source.
    Whichever container starts second wins, and the loser''s container ends up pushing
    git through a proxy that points at the wrong workdir.


    Concrete observation from a debugging session today (PR 2d0588a):


    - 04:54 — implementation proxy started with workdir = the impl PR workdir.

    - 10:13 — QA spawned, called start_push_proxy with the same (session_tag, pr_id)
    key. The ''reuse if alive'' guard at push_proxy.py:688 didn''t fire (likely the
    socket was momentarily unlinked or transiently dead between an impl session restart
    and QA launch). The function os.unlink''d the existing socket and spawned new
    subprocesses with QA scenario workdirs (/home/matt/.pm/workdirs/qa/pr-2d0588a-…/s-13/repo
    and …/s-18/repo).

    - After that point: the impl container''s git push went through the live proxy
    at /tmp/pm-push-proxy-2fd7c69049fe33cb/push.sock — but the proxy was running ''git
    push'' from a QA scenario clone that didn''t have the impl branch''s commits.
    Push failed silently or pushed wrong commits.


    The design assumption ''one proxy per (session_tag, pr_id) is enough'' breaks
    when impl and QA both want a proxy and have different workdirs. The QA containers
    won the race because their workdir was the most recent one start_push_proxy saw.


    Three candidate fixes (any one would close the bug; need to pick one based on
    the proxy''s broader semantics):


    (1) Include the workdir (or a hash of it) in the proxy key. Each unique workdir
    gets its own proxy. Simplest. Downside: more proxies running, but they''re cheap
    (one process per active workdir on the PR).


    (2) Refuse to replace a live proxy with a different workdir. If start_push_proxy
    finds a live proxy with the same (session_tag, pr_id) but a different workdir
    than requested, it returns an error rather than os.unlink''ing the existing one.
    Forces callers to handle the conflict explicitly. Downside: callers don''t currently
    expect this error and would need updating.


    (3) Make the proxy stateless about workdir: serve git push from whatever workdir
    the *request* names, not whatever workdir the proxy was started with. The proxy
    becomes a pure git-push relay; the workdir is part of each request. Most invasive
    but architecturally cleanest — also fixes the analog for any future protocol that
    needs to serve multiple clients across the same PR.


    Recommendation: ship (1) as the fast fix; consider (3) as a follow-up cleanup.
    (2) is a useful sanity guard regardless.


    Files: pm_core/push_proxy.py (proxy key derivation, start_push_proxy guard logic),
    tests for the multi-workdir case (impl + QA scenario both starting against the
    same PR; assert each gets its own proxy or the proxy serves both correctly).


    Cross-reference: pr-0c530e1 (cleanup-completeness on yt and merge detection) is
    a related but separate concern. The proxy-workdir collision is about identity,
    not lifecycle. Both PRs surfaced from the same debugging session investigating
    containers and proxies that survived a merge.'

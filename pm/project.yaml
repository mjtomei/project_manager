- id: pr-1735d44
  plan: bugs
  title: 'Consolidate window refocus: switch all co-viewing sessions consistently'
  branch: pm/pr-1735d44-consolidate-window-refocus-switch-all-co-viewing-s
  status: in_review
  depends_on: []
  description: 'Window refocusing is split between tmux.select_window (switches one
    session) and tmux.switch_sessions_to_window (switches all grouped sessions). The
    correct behavior for all refocusing is: if multiple sessions are attached and
    viewing the same window, they should all switch together. Currently select_window
    is used in pr.py (4 call sites), meta.py, container.py, pr_view.py (2), pane_layout.py,
    qa_status.py, and qa_loop.py — these only switch the invoking session, leaving
    co-viewers behind. Consolidate into a single refocus function (e.g. tmux.focus_window)
    that detects sessions currently viewing the same window as the caller and switches
    them all. Replace all select_window and switch_sessions_to_window call sites with
    the unified function. Human-guided testing needed: verify co-viewing sessions
    follow the switch, verify sessions viewing different windows are not affected,
    test from TUI-launched commands and from CLI.'
  agent_machine: spark-424d
  gh_pr: https://github.com/mjtomei/project_manager/pull/159
  gh_pr_number: 159
  created_at: '2026-04-07T12:51:22.561975+00:00'
  updated_at: '2026-05-04T14:00:14.026192+00:00'
  started_at: '2026-04-07T13:06:32.173284+00:00'
  reviewed_at: '2026-05-04T14:00:14.026192+00:00'
  merged_at: null
  notes:
  - id: note-3b6b377
    text: 'Bug: window refocus targets the currently-selected session at refocus time
      instead of the session that originally created the command. Fix: log the attached
      session (the one from which the command was created) at command creation time,
      and use that recorded session for the refocus rather than querying the active
      session at refocus time.'
    created_at: '2026-04-07T13:47:24Z'
    last_edited: '2026-04-07T13:47:24Z'
  - id: note-980be03
    text: 'Bug: when running with --fresh, if a window is already in view in another
      attached session, refocus should switch that session''s window — not the TUI
      session where fresh was triggered. Review already works this way, but implementation
      (and possibly QA) does not — they switch the TUI window instead of the co-viewing
      session that has the target window visible.'
    created_at: '2026-04-07T14:11:26Z'
    last_edited: '2026-04-07T14:11:26Z'
  - id: note-35bb96a
    text: 'Add to scope: capture originating session at command-launch time, not at
      window-creation time. Separate but related bug worth folding into this consolidation:
      when a TUI command fires off something asynchronous, the session that actually
      gets focused when the resulting window is finally created is whichever session
      the user happens to be in at that moment, not the session they were in when
      they fired the command. This is because select_window / switch-client resolve
      current session lazily via $TMUX / tmux display-message at execution time, which
      reflects the user''s current focus rather than the command''s originating context.
      Fix: capture (session, window) at the moment the TUI command is issued and thread
      it through to the eventual focus_window call. The unified tmux.focus_window
      introduced by this PR should accept an explicit originating session/window pair
      rather than querying the environment when it runs. This is the same data already
      proposed by pr-291e891 (action source metadata) for file-locking purposes. Coordinate
      so both PRs use a shared action-context structure rather than duplicating the
      capture mechanism.'
    created_at: '2026-05-03T11:56:47Z'
    last_edited: '2026-05-03T11:56:47Z'

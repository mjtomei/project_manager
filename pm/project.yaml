- id: pr-3d38f05
  plan: bugs
  title: Fix review loop splitting Claude and diff panes across windows when existing
    window has dead Claude pane
  branch: pm/pr-3d38f05-fix-review-loop-splitting-claude-and-diff-panes-ac
  status: pending
  depends_on: []
  description: 'When a review window exists with only the diff pane alive (Claude
    pane dead), starting a fresh review loop incorrectly splits the new session across
    two windows: it places the diff pane in the old window (matched by name) and creates
    the new Claude session in a new window instead of keeping both panes together.


    Root cause is likely in window existence checks and pane targeting: the loop finds
    the old window by name, reuses it for the diff pane, but then fails to target
    it correctly for the Claude session (possibly because the window was renamed or
    pane IDs shifted), so it falls back to creating a new window.


    Fix should:

    1. When an existing review window is found but its Claude pane is dead, treat
    it as fully stale and either reuse it entirely (creating both panes there) or
    close it and start fresh — never split the two panes across different windows.

    2. Audit window name matching and post-rename pane targeting to ensure both panes
    always end up in the same window.'

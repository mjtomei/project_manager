- id: pr-4a89e52
  plan: plan-qa
  title: QA verdict collection survives TUI restart
  branch: pm/pr-4a89e52-qa-verdict-collection-survives-tui-restart
  status: in_review
  depends_on: []
  description: 'Bug: QA scenario verdict polling runs in a daemon thread inside the
    TUI process (via start_qa_background → run_qa_sync → _poll_tmux_verdicts). When
    the TUI restarts, these threads die and app._qa_loops is lost. The tmux panes
    with QA scenarios keep running to completion, but nobody collects their verdicts
    or updates qa_status.json.


    Fix: Move verdict polling into the qa_status.py process that already runs in the
    QA status pane. It already loops reading qa_status.json — extend it to also poll
    scenario tmux panes for verdicts and write updates back to qa_status.json. This
    way verdict collection is tied to the QA status pane''s lifetime, not the TUI''s.
    The TUI reads qa_status.json to detect completion and trigger lifecycle transitions
    (merge, back-to-review, etc.). The initial scenario list and window names are
    seeded into qa_status.json by the TUI at launch time, and qa_status.py takes over
    monitoring from there.'

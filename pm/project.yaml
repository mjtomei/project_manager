- id: pr-eb2dbfc
  plan: plan-qa
  title: 'Container memory governor: dynamic memory limits with per-type stop policy
    and QA queuing'
  branch: pm/pr-eb2dbfc-container-memory-governor-dynamic-memory-limits-wi
  status: qa
  depends_on: []
  description: 'Add a memory governor that prevents OOM crashes by projecting memory
    consumption before launching containers, with configurable stop-on-idle for different
    container types.


    ## Global memory target

    - User-configurable target max memory consumption (e.g. pm container set memory-target
    48g)

    - Before launching any container, the governor checks: current_used + projected_new
    <= target

    - Projection uses a rolling average of peak memory per container type (impl, review,
    qa_scenario, qa_planner), observed from docker stats and persisted across sessions


    ## Per-type stop-on-idle policy

    - Configurable per container type: pm container set stop-idle impl|review|qa on|off

    - When enabled, containers of that type are docker stopped (not removed) after
    their session completes (verdict emitted, review done, impl session idle)

    - Stopped containers preserve filesystem overlay — docker start brings them back
    with packages/venv intact

    - Default: qa on, impl off, review off (QA scenarios are the main memory hog)


    ## Memory projection

    - Track historical peak memory per container type using docker stats samples

    - Store rolling averages in ~/.pm/container-stats.json

    - Projection for a new container = average peak for that type

    - For QA scenarios: project total = current + (remaining_scenarios * avg_qa_peak)


    ## Launch gating

    - Implementation and review: if projected memory exceeds target, show error in
    TUI status bar and refuse to launch. User can free memory by stopping containers
    manually or lowering the target.

    - QA scenarios: if a scenario fails the memory check, it enters a wait loop. The
    TUI status pane shows which scenarios are waiting for memory. The QA loop retries
    the check periodically and launches the scenario once memory is available (other
    scenarios finishing and being stopped frees memory).

    - QA planner projects memory for all scenarios at once. If the full batch would
    exceed the target, it launches as many as fit and queues the rest.


    ## Status bar integration

    - TUI status bar shows current memory usage vs target (e.g. 34G/48G)

    - When a launch is blocked, status bar shows the blocked action

    - QA scenarios waiting for memory show a waiting indicator in the QA status pane'

- id: pr-70d02ed
  plan: plan-regression
  title: 'Regression coverage: watcher behavior and review session'
  branch: pm/pr-70d02ed-regression-coverage-watcher-behavior-and-review-se
  status: pending
  depends_on: []
  description: '## Goal


    Add Claude-driven regression-test markdowns covering the four watcher / observation
    surfaces from Phases 2-4: the discovery supervisor, the bug-fix implementation
    watcher, the improvement-fix implementation watcher, and the watcher review session.
    Today these are covered only by BaseWatcher framework tests (pr-3032fb6) and live
    operator markdown. They merged under the old QA flow and need durable, discovery-supervisor-runnable
    coverage going forward.


    ## Scenarios


    Four new files in pm/qa/regression/:


    ### 1. discovery-supervisor-tick.md

    Start the discovery supervisor against a fixture project state (some pending PRs,
    some in flight, some recently merged). Let it tick. Verify it:

    - Reads the work log (pm/watchers/discovery.log) for context

    - Launches the expected regression test in the watcher''s window (per pr-97ddabf)

    - Reconciles a synthetically-filed bug PR via dedup against existing entries (pm
    pr list --plan bugs)

    - Appends a one-line summary

    - Emits READY (or INPUT_REQUIRED if a deliberate ambiguity is seeded)


    Variants:

    - Empty work log (cold start)

    - Full work log (rolling context — verify trimming/summarization works)

    - In-flight test from previous tick (continuation, not re-launch)


    ### 2. bug-fix-watcher-pick-and-advance.md

    Bug-fix watcher (pr-e3a711c) against plan=bugs with multiple pending PRs. Verify
    it:

    - Picks the right candidate per the prompt''s prioritization signals (severity
    + recurrence + age + Watcher notes)

    - Invokes pm pr auto-sequence on the picked PR

    - Advances impl -> review -> QA -> auto-merge on PASS

    - Honors concurrency cap (does nothing when at cap)


    Variants:

    - At concurrency cap (no-op)

    - Stuck PR with repeated NEEDS_WORK (escalates via INPUT_REQUIRED)

    - Reproduce-step failure from pr-30588a7 (escalates)


    ### 3. improvement-fix-watcher-gated-merge.md

    Improvement-fix watcher (pr-d39a7fb) against plan=ux. Same shape as bug-fix-watcher
    but with gated-merge: PRs that PASS QA are marked ready-for-merge and NOT merged.
    Verify:

    - Stops at qa-pass; no merge happens

    - Next tick continues without re-attempting the merged-pending PR


    Variants:

    - Human merges some PRs between ticks; next tick picks up the next candidate

    - Backlog with multiple ready-for-merge PRs


    ### 4. watcher-review-session-summary.md

    Launch the watcher review session (pr-e84b43c) from the TUI. Verify:

    - Opening summary covers all three watchers'' recent activity (discovery, bug-fix,
    improvement-fix)

    - A follow-up question (e.g. "why was bug X deduped against bug Y?") gets a reasoned
    answer using the work logs

    - A remediation flow (add a Watcher-section note to notes.txt) confirms before
    applying

    - The added note shows up in the next watcher tick


    ## Family 3: opportunistic audit (folded in here)


    As these scenarios run, Claude is asked to flag *other* uncovered surfaces it

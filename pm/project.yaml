  description: "## Goal\nMake `pm pr list` optionally surface the same action keybindings\
    \ used by the picker (`s/e/d/t/g` plus `z` / `zz` modifiers), shown alongside\
    \ each PR row. The hint shows the keys for the action corresponding to the PR's\
    \ *current phase* (in_progress → start, in_review → review, qa → qa, etc.), so\
    \ the list doubles as a cheat sheet for what to press next on each PR.\n\nThe\
    \ pr-list home window (pr-f5b7eef) enables this flag in its render so the user\
    \ sees an at-a-glance home view that is also a per-PR action menu reference.\n\
    \n## Proposed CLI\n\n- New flag: `pm pr list --actions` (or `-a`). Off by default\
    \ to avoid changing existing output.\n- When enabled, each non-terminal row gets\
    \ a trailing hint showing the keys that apply to its current phase, e.g.:\n  -\
    \ `in_progress` → `[s | z s: fresh]`\n  - `in_review` → `[d | z d: fresh | zz\
    \ d: loop]`\n  - `qa` → `[t | z t: fresh | zz t: loop]`\n  - statuses with no\
    \ current-phase action (e.g. ready-to-start in unusual states) fall back to the\
    \ full key list.\n- Terminal statuses (`merged`, `closed`) — no hint, matching\
    \ the picker's `_TERMINAL_STATUSES` behavior.\n- Combinable with existing flags\
    \ (`-t`, `--open`, etc.).\n\n## Single source of truth\nThe keybindings live in\
    \ `pm_core/cli/session.py` (`_SHORTCUT_KEYS` at ~line 1601, `_MODIFIED_ACTION_CMDS`\
    \ at ~line 884, `_STATUS_PHASE` at ~line 924). Don't duplicate. Extract a small\
    \ helper — e.g. `pm_core/action_keys.py` with `hint_for_status(status: str) ->\
    \ str` — that both the picker and pr_list_cmd consume. This keeps the picker and\
    \ the list in sync as the binding map evolves.\n\n## Home-window default\nThe\
    \ `pr-list` HomeWindowProvider from pr-f5b7eef invokes `pm pr list -t --open --actions`\
    \ so the home view always carries the hints. Other callers / scripts get the unchanged\
    \ default output.\n\n## Out of scope\n- Making the hints clickable / interactive\
    \ — this is a printed cheat sheet, not a TUI.\n- Adding a separate column for\
    \ live action runtime-state (queued/running/done badges) — that's a different\
    \ surface; orthogonal.\n\n## Code paths\n- pm_core/action_keys.py (new): hint\
    \ helper.\n- pm_core/cli/session.py: refactor to consume the helper instead of\
    \ inlining the maps in the picker render.\n- pm_core/cli/pr.py (pr_list_cmd):\
    \ add `--actions` flag + render the hint.\n- pm_core/home_window/pr_list.py (added\
    \ by pr-f5b7eef): pass `--actions` in the rendered command."

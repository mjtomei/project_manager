- id: pr-726757e
  plan: improvements
  title: 'Improvement: per-session container safety config — egress allowlist, filesystem
    isolation, env-var redaction, default profiles'
  branch: pm/pr-726757e-improvement-per-session-container-safety-config-eg
  status: pending
  depends_on:
  - pr-ca19555
  description: "## Goal\nFollow-up to pr-ca19555 (whole-session containerization +\
    \ popup gate). Once the pm session can run inside a container, define explicit\
    \ safety-configuration knobs so the container's blast radius is bounded by policy,\
    \ not just by being-in-a-container.\n\nThree orthogonal axes; per-profile defaults;\
    \ one profile selected per session-tag.\n\n## Axes\n\n### 1. Network egress\n\
    - `open` — current behavior, no firewall (full internet from inside the container).\n\
    - `allowlist` — outbound traffic permitted only to a configured list of endpoints.\
    \ Sensible default list: model API (`api.anthropic.com`), git remote (configured\
    \ `origin` hostname), package mirrors if any.\n- `model-only` — outbound permitted\
    \ only to the model API endpoint. No git push/fetch, no package downloads. Used\
    \ for benchmark conformance (matches ProgramBench's no-internet rule when paired\
    \ with a local-mirror for git).\n- `offline` — no outbound network. Local-backend\
    \ mode only; any code that tries to reach out fails fast.\n\nImplementation: iptables\
    \ / netns rules applied to the session container at start. The egress-allowlist\
    \ firewall harness from Phase 9 of plan-regression is the shared primitive; this\
    \ PR makes it user-selectable per session.\n\n### 2. Filesystem exposure\n- Which\
    \ host paths are bind-mounted into the container, and at what mode (RO / RW).\n\
    - Defaults:\n  - The pm repo / target repo: RW (work needs to happen).\n  - `~/.claude`\
    \ config: RO (let the agent use it, don't let it modify).\n  - `~/.gitconfig`,\
    \ SSH keys, anything credential-shaped: NOT bind-mounted by default.\n  - Per-session\
    \ writable scratch under `~/.pm/sessions/<tag>/scratch/`.\n- Profile knobs:\n\
    \  - `default` — the above.\n  - `strict` — everything RO except the workdir and\
    \ scratch. `.claude` not even mounted; user logs in via a per-container token\
    \ if needed.\n  - `open` — current bind-mount set (matches today's behavior).\n\
    \n### 3. Env-var redaction\n- Default-deny: ANTHROPIC_API_KEY and a handful of\
    \ model API keys are passed in (needed for the agent to function); everything\
    \ else is dropped.\n- Today many env vars (PATH, PM_PROJECT, PM_HOST_HOME, etc.)\
    \ are passed in or computed; that stays.\n- Knobs:\n  - `pass` — list of additional\
    \ env vars to pass through.\n  - `redact` — list of env vars to explicitly drop\
    \ even if they'd otherwise pass.\n- A warning in the popup when env-var redaction\
    \ would *not* fire (e.g. AWS_ACCESS_KEY_ID or GH_TOKEN is in env and the profile\
    \ says to pass it).\n\n## Profiles\n\nThree named profiles a user selects per\
    \ session-tag, configurable via setting `session-safety-profile`:\n\n- `open`\
    \ — egress=open, fs=open, env=permissive. Current behavior of `pm session`. Default\
    \ for now.\n- `bounded` — egress=allowlist (model + configured git remote), fs=default,\
    \ env=default-deny. The recommended safe profile for trusted work. Default after\
    \ pr-ca19555 lands.\n- `hardened` — egress=model-only, fs=strict, env=minimal.\
    \ For untrusted code, benchmark runs, or first-time use of dangerously-skip-permissions\
    \ on a new tag.\n\nProfile + dangerously-skip-permissions interact: the popup\
    \ from pr-ca19555 names the active profile and notes that `hardened` constrains\
    \ what skip-permissions can actually reach. If the user is enrolling skip-permissions\
    \ on a tag with profile=open, the popup MUST surface that combination as a high-risk\
    \ configuration and recommend switching to bounded.\n\n## Storage\n\nPer-session\
    \ profile config at `~/.pm/sessions/<tag>/safety-profile.yaml`:\n\n```yaml\nprofile:\
    \ bounded  # or 'open' / 'hardened' / 'custom'\noverrides:\n  egress: allowlist\n\
    \  egress_allowlist:\n    - api.anthropic.com\n    - github.com\n  fs_extra_mounts:\
    \ []\n  env_pass: []\n  env_redact: []\n```\n\nGlobal default at `~/.pm/safety-profile-default.yaml`.\
    \ A new profile-edit CLI: `pm session safety [show|set <profile>|edit]`.\n\n##\
    \ Acceptance criteria\n- New `pm session` on a tag with no explicit profile uses\
    \ the global default. If the global default is `bounded`, network egress is firewall-restricted\
    \ to the model API + configured git remote within ~1s of session start.\n- `pm\
    \ session safety set hardened` on a tag flips the profile; next `pm session` start\
    \ enforces hardened isolation.\n- Bind-mounted credential paths (SSH keys, gitconfig\
    \ with credential helpers) are absent under `bounded` and `hardened` profiles.\n\
    - Env-vars not in the pass-list are redacted from the container's environment;\
    \ verified via `docker exec <container> env` or equivalent.\n- The pr-ca19555\
    \ popup names the active profile and warns when `open` is combined with skip-permissions.\n\
    \n## Invariants\n- Profile choice MUST be visible — the TUI status bar / a startup\
    \ log line / the pr-ca19555 popup all show the active profile name.\n- Profile\
    \ changes MUST require an explicit user action (CLI command or popup choice).\
    \ Drive-by edits to project.yaml or other state never change the profile.\n- The\
    \ default profile stays `open` until `bounded` is well-tested. We don't silently\
    \ break existing workflows.\n\n## Edge cases\n- `hardened` egress (model-only)\
    \ combined with a non-local git backend → `pm push` fails. Surface clearly. User\
    \ must either switch profile or use local backend.\n- Per-session profile config\
    \ under `~/.pm/sessions/<tag>/` lives alongside the dangerously-skip-permissions\
    \ file; both are state about the same session-tag and should be inspected together\
    \ by debug tooling.\n- Profile YAML schema versioning — start with v1, plan for\
    \ migrations.\n\n## Verification\n- `pm session` with profile=bounded → `curl\
    \ https://google.com` from inside the container should fail; `curl https://api.anthropic.com`\
    \ should succeed.\n- `pm session` with profile=hardened → `ls -la ~` inside container\
    \ shows no SSH keys, no .gitconfig, no .claude.json (only the per-container token\
    \ if one is provisioned).\n- Switch profile via `pm session safety set hardened`\
    \ mid-session → does it apply on next session start (yes, expected) or immediately\
    \ (no, document that re-start is required).\n\n## Out of scope\n- Per-PR profile\
    \ overrides. One profile per session-tag; PRs within a session inherit. Adding\
    \ per-PR overrides is a separate idea if it ever matters.\n- Cross-host attestation\
    \ of profile state. Local-only.\n- Real-time profile enforcement audit (intrusion\
    \ detection inside the container). Out of scope; firewalls + bind-mount config\
    \ are the enforcement surface.\n\n## Related\n- pr-ca19555 — whole-session containerization\
    \ + dangerously-skip-permissions popup. Direct dependency.\n- Phase 9 of plan-regression\
    \ — egress-allowlist firewall harness (item 9 originally). This PR makes the same\
    \ primitive user-facing via profiles.\n- pm_core/container.py — wrap_claude_cmd's\
    \ env injection + bind-mount choices are the touch points for the fs and env-var\
    \ axes.\n- pm_core/paths.py — sessions dir is where the profile file lives."

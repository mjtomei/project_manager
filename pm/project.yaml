- id: pr-5cdec87
  plan: null
  title: 'Bug: pr edit from prefix+M popup opens vim in the popup pane and dismisses
    on exit; should open in a new tmux pane like the TUI does'
  branch: pm/pr-5cdec87-bug-pr-edit-from-prefix-m-popup-opens-vim-in-the-p
  status: pending
  depends_on: []
  description: '## Symptom

    Running `pr edit <pr_id>` (or any field-edit variant) from the prefix+M command
    popup opens vim *inside the popup pane*. When vim exits, the popup closes, taking
    the open editor with it. If the user backgrounds vim or quits early, they lose
    the popup and any half-saved buffer state.


    The TUI''s edit action (Enter on a PR row, or pressing `e`) does the right thing:
    `pane_ops.launch_pane(app, f"pm pr edit {pr_id}", "pr-edit", ...)` at pm_core/tui/pane_ops.py:239
    opens vim in a new tmux pane that persists. The popup-cmd dispatch (session.py:1909-1918)
    skips that and just runs `pm pr edit` as a subprocess inside the popup, which
    inherits the popup''s TTY.


    ## Expected behavior


    - **Prefix+M popup running `pr edit`** → open vim in a *new tmux pane* (split-window
    in the current window), same as the TUI edit action.

    - **Regular shell running `pm pr edit`** (whether inside or outside the pm tmux
    session) → keep current behavior, open vim in that shell. The user is already
    in a persistent pane and chose to invoke from there; they want vim there, not
    in a new split.


    The distinction is between *popup-dispatched* invocation and *user-shell* invocation,
    not between in-tmux vs. out-of-tmux.


    ## Root cause + fix


    `pm_core/cli/session.py:popup_cmd_cmd` runs the dispatched command via `_run_with_abort_keys(full_cmd,
    ...)` — a plain subprocess in the popup. `pm pr edit` then runs vim against the
    popup''s TTY.


    Two ways to fix; recommend (B):


    **(A) Route `pr edit` through the TUI carve-out** like `pr qa` and `review-loop`
    (session.py:1903-1907). The TUI already handles edit via the launch_pane code
    path. Cheap to add; widens the popup-cmd carve-out list, which pr-438028c is trying
    to *eliminate*.


    **(B) Have `pm pr edit` decide for itself when to spawn a new pane vs. run inline.**
    Pass a signal from the popup that says ''I''m a transient popup, open elsewhere.''
    Concretely: `popup_cmd_cmd` sets `PM_IN_POPUP=1` in the subprocess env (it already
    sets `PM_PROJECT`). `pr_edit` checks for `PM_IN_POPUP`; if set + in-tmux + pm
    session detected, mimic the TUI''s launch_pane behavior (split-window with the
    editor). Otherwise (PM_IN_POPUP unset, or no tmux session), run inline as today.


    (B) follows the same direction pr-fcaa434 and pr-438028c go: window-management
    decisions live in the command itself, not in popup-cmd routing rules. Adds one
    env var but no carve-out growth.


    ## Implicit requirements


    - The subprocess that opens vim in the new pane must inherit the user''s editor
    preference (`$EDITOR`/`$VISUAL`/falls back to vim). Already handled by pr_edit;
    no change needed beyond making sure the launched pane invokes the same path.

    - The new pane registers with the pane-registry under role `pr-edit` for cleanup,
    matching what `launch_pane` does today.

    - When PM_IN_POPUP is set but the tmux session can''t be detected (edge case),
    fall through to inline behavior — better to have a mildly awkward UX than a broken
    command.


    ## Edge cases


    - User runs `pm pr edit` from a shell pane that happens to be inside the popup
    process tree (e.g. they typed into the popup''s bash). Same handling as direct
    popup invocation — PM_IN_POPUP is set; the new pane opens. Acceptable.

    - User runs `pm pr edit` from a regular shell-pane inside the pm session. PM_IN_POPUP
    not set; vim opens inline. Matches today.

    - User runs `pm pr edit` from a non-tmux shell. PM_IN_POPUP not set, no tmux session;
    inline.

    - pr-edit invoked with `--title` / `--status` / etc. flags (non-interactive edits)
    shouldn''t spawn a pane at all — only the interactive description-edit path opens
    vim. Verify the env-var check is gated on ''this invocation will spawn an editor''
    rather than fired unconditionally.


    ## Verification


    - From prefix+M popup, run `pr edit <pr-id>`. Expected: a new tmux pane appears
    in the current window with vim open; the popup remains visible (or dismisses cleanly
    while the pane stays open).

    - From a regular shell pane inside the pm session, run `pm pr edit <pr-id>`. Expected:
    vim opens in the same pane (current behavior).

    - From outside any tmux session, run `pm pr edit <pr-id>`. Expected: vim opens
    in the current terminal (current behavior).

    - Run `pm pr edit <pr-id> --status in_review` (non-interactive flag-only edit)
    from any of the three contexts. Expected: no pane spawned, no vim — the field
    is updated and the command exits normally.


    ## Code paths

    - pm_core/cli/session.py:1857+ `popup_cmd_cmd` — set `PM_IN_POPUP=1` in the subprocess
    env (or pass through `_run_with_abort_keys`).

    - pm_core/cli/pr.py:317 `pr_edit` — check for `PM_IN_POPUP`; if set + tmux session
    + interactive editor path, route via the same helper `pane_ops.launch_pane` uses
    (or its CLI-side equivalent — see pr-fcaa434''s shared helper for plan commands).

    - pm_core/tui/pane_ops.py:239 `launch_pane` for `pr-edit` role — reference for
    the pane-registry registration pattern.


    ## Related

    - pr-438028c (#199) — removing popup-cmd carve-outs by giving commands their own
    window management. This bug fits exactly that pattern.

    - pr-fcaa434 (#202) — same fix shape applied to plan subcommands. The shared helper
    that lands there is the natural place for pr_edit''s pane-spawn path.'

- id: pr-b56e079
  plan: bugs
  title: 'Bug: picker-driven ''pr merge'' swallows errors and doesn''t launch merge-resolve
    window'
  branch: pm/pr-b56e079-bug-picker-driven-pr-merge-swallows-errors-and-doe
  status: merged
  depends_on: []
  description: "Two related issues observed when running 'merge' from the prefix+P\
    \ action picker on a PR (concrete repro: pr-177dec0 / #157). Same flow on a different\
    \ PR (#185) worked because that PR had no error and didn't need the resolve window.\
    \ The picker's merge dispatch is silently incomplete in both directions — error\
    \ path hidden, conflict path missing.\n\n(1) Errors from the merge subprocess\
    \ get swallowed because the popup closes immediately when the subprocess exits.\n\
    \nThe picker's direct-CLI dispatch in pm_core/cli/session.py:1442-1445 does call\
    \ _wait_dismiss when result.returncode != 0, so in principle errors are visible.\
    \ But in practice the user reports the popup vanished without showing anything\
    \ readable. Likely culprits:\n\n  (a) 'pm pr merge' returned 0 even though the\
    \ merge itself failed (e.g. printed an error to stdout/stderr and exited 0 because\
    \ merging needs a resolve window — see issue 2).\n  (b) The error was printed\
    \ to a stream that got swallowed by display-popup -E's terminal buffering.\n\n\
    Fix: any non-zero exit from the picker's CLI dispatch should _wait_dismiss as\
    \ today, but ALSO show stderr explicitly (today subprocess.run inherits stderr\
    \ to the popup's tty, but if the popup is in raw mode the bytes may not render\
    \ correctly). And subprocess invocations should be reviewed to ensure they exit\
    \ non-zero on failures that the user needs to see — particularly 'pm pr merge'\
    \ when it can't auto-resolve.\n\n(2) Picker-driven merge doesn't launch the resolve\
    \ window when the merge needs one. TUI-driven merge does.\n\nThe TUI's merge action\
    \ calls 'pm pr merge --resolve-window <pr_id>' (and similar flags) which causes\
    \ pm to launch a Claude session in a new tmux window to resolve conflicts. The\
    \ picker dispatches plain 'pm pr merge {pr_id}' (session.py:877) without --resolve-window,\
    \ so when the merge encounters a conflict (or needs the post-merge propagation\
    \ step), the subprocess prints a message and exits — no Claude session launches\
    \ to handle the resolution.\n\nFix: any pm command invoked from inside the tmux\
    \ session — picker, popup-cmd shell, or shell-pane CLI — should default to behaviors\
    \ that match the TUI's invocation when those behaviors require tmux. Specifically:\
    \ the picker's merge entry should pass --resolve-window. More generally, the in-tmux\
    \ dispatch path should set a 'tmux-aware' flag that pm sub-commands consume to\
    \ enable window-launching auto-resolve flows. This matches the user's intent:\
    \ 'commands run from inside the tmux session in shells or in the picker should\
    \ behave similar to running commands in the command bar in the tui.'\n\nConcretely:\n\
    \n- session.py:877 ACTIONS['merge'] becomes 'pr merge --resolve-window {pr_id}'\
    \ (or even better, --background --resolve-window if the picker's wait-for-window\
    \ logic should drive the focus switch).\n- Add an environment variable PM_IN_TMUX_SESSION=1\
    \ set whenever pm runs under TMUX (already implicit via /tmp/tmux-1000/default,1620978,12);\
    \ pm sub-commands that have --tmux-aware behaviors auto-enable when set, so any\
    \ CLI invocation inside the session gets parity with the TUI command bar.\n- _popup-picker's\
    \ direct-CLI dispatch surfaces stderr clearly on failure: capture it, _wait_dismiss\
    \ with the captured text, prefix with 'pm error:' so the user knows what to look\
    \ at.\n\nFiles: pm_core/cli/session.py (ACTIONS table + _popup-picker direct-CLI\
    \ error rendering), pm_core/cli/pr.py (merge command — ensure non-zero on actual\
    \ failure), pm_core/wrapper.py (set PM_IN_TMUX_SESSION when /tmp/tmux-1000/default,1620978,12\
    \ is set, propagate to subcommands).\n\nTests: simulate a pr merge that needs\
    \ --resolve-window — verify the picker invocation launches the window same as\
    \ the TUI invocation; simulate a pr merge that errors (e.g. branch protection\
    \ rejection) — verify the picker shows the error and waits for keypress before\
    \ closing; running 'pm pr merge' from a shell inside the tmux session has identical\
    \ observable behavior to running the same from the TUI command bar."

  plan: bugs
  title: 'Bug: capture originating tmux session when the PR actions pane opens, not
    at action-execution time'
  branch: pm/pr-c41f029-bug-capture-originating-tmux-session-when-the-pr-a
  status: pending
  depends_on: []
  description: 'When a TUI action (pr start/review/qa/merge, review-loop, qa-loop)
    creates or replaces a window, pm tries to move the session that initiated the
    action onto the new window so the user follows their action. Today that originating
    session is determined LATE — at action-execution time — via tmux.sessions_on_window(base,
    window_id), which queries each grouped session''s current window (''tmux display
    -p #{window_id}'') and matches it against the old window id. switch_sessions_to_window()
    then moves the matches.


    Problem: there is a delay/race between the user triggering the action from the
    PR actions pane (picker/popup) and the code running sessions_on_window. By the
    time detection runs, the active window/session can have changed (the popup closed,
    another session navigated, the old window was already killed/recreated), so the
    wrong session — or no session — gets switched to the new window. The detection
    is also several tmux round-trips of latency on the action''s critical path.


    Fix: determine the originating session ONCE, at the moment the PR actions pane
    / picker is opened (when we still know which client/session invoked it), and pass
    it explicitly through to the action instead of re-detecting at execution time.
    The action then hands that captured session straight to switch_sessions_to_window()
    rather than calling sessions_on_window().


    Concretely:

    - At pane/picker open, resolve the invoking session (e.g. from the client tty
    -> session via tmux list-clients, or PM_TMUX/session env, or the active client)
    and store it on the action context.

    - Thread the captured session through the dispatch path (command bar / SIGUSR2
    command queue / picker result handlers in pm_core/tui/pr_view.py and screens.py)
    into the action implementations (review_loop_ui, qa_loop_ui, pr start/merge flows).

    - switch_sessions_to_window() should accept the captured originating session(s)
    directly; keep sessions_on_window() only as a fallback when no captured session
    is available (legacy/CLI paths).


    This builds directly on pr-291e891 (action source metadata: session/window/task)
    — that PR defines the action-context structure; this one ensures the session field
    is captured at pane-open time and actually used for window-following, eliminating
    the late-detection race.


    Files: pm_core/tmux.py (sessions_on_window / switch_sessions_to_window), pm_core/qa_loop.py
    (~2739 sessions_on_window call site), pm_core/tui/review_loop_ui.py, pm_core/tui/qa_loop_ui.py,
    pm_core/tui/pr_view.py, pm_core/tui/app.py (command dispatch / _drain_command_queue),
    pm_core/tui/screens.py (picker screens).


    tests: simulate an action where the active window changes between pane-open and
    action-execution and assert the originally-capturing session is the one switched
    to the new window; assert switch_sessions_to_window uses the captured session
    without calling sessions_on_window when context is present.'

- id: pr-cfe24ea
  plan: improvements
  title: 'Picker actions: open shell, impl spec, or QA spec pane in the current window
    for the selected PR'
  branch: pm/pr-cfe24ea-picker-action-open-shell-pane-in-current-window-cd
  status: in_review
  depends_on: []
  description: 'Add picker actions and matching CLI commands so the same pane operations
    work from prefix+P, prefix+M, and a shell inside a pm session. Each action opens
    a pane in the *current* window targeting the selected PR.


    ## Pane actions (each with picker shortcut + CLI command)


    (1) **Shell at workdir** — picker key `c` (cd) / CLI `pm pr shell <pr_id>`. Opens
    a split-window pane with a shell pre-run via `pm pr cd <pr_id>` so the shell lands
    in the PR''s workdir. Use case: ad-hoc git / file inspection / running test commands
    without leaving the current window.


    (2) **Implementation spec viewer** — picker key `i` (impl) / CLI `pm pr view-spec
    <pr_id> [--kind impl]`. Opens a split-window pane that displays the impl spec
    at `pm/specs/<pr_id>/impl.md` (path resolved via the same helper `pm pr spec-path`
    already exposes) using `glow -p` if available, falling back to `less` otherwise.


    (3) **QA spec viewer** — picker key (avoid collision with `q` = picker quit, `a`/`t`
    = qa actions; use e.g. `Q` shifted) / CLI `pm pr view-spec <pr_id> --kind qa`.
    Same shape as (2) but for the QA spec.


    (4) **Diff viewer** — picker key `D` (or similar; bikeshed) / CLI `pm pr view-diff
    <pr_id>`. The same diff pane content the review window currently shows in its
    left half (`git --no-pager diff <base>...HEAD` piped through `less -R`, with status
    + change summary headers — see `_launch_review_window` in pm_core/cli/pr.py for
    the existing template). This also lets review windows construct their diff pane
    by *invoking* this CLI command instead of duplicating the shell pipeline inline.
    Reduces the live shell-quoting surface in `_launch_review_window`.


    ## CLI parity contract


    For each picker action the CLI must:

    - Be invokable as a regular `pm pr <subcmd> <pr_id>` from any shell.

    - Accept the **same PR-id forms existing commands accept**: pm internal id (`pr-f5b7eef`),
    GitHub display id (`#193`), or bare GitHub number (`193`). Use the existing `_resolve_pr_id`
    helper at `pm_core/cli/helpers.py:337` (and `_require_pr` for not-found errors)
    — same as `pm pr review`, `pm pr merge`, etc. Don''t roll a new resolver.

    - Detect when running inside a pm tmux session (via `_get_pm_session()`); if so,
    open the pane in the current window the same way the picker does. Otherwise (run
    from a non-pm shell), print the content to stdout (e.g. `view-spec` cats the file,
    `view-diff` runs `git diff` directly).

    - This way, prefix+M (popup-cmd, runs CLI subprocess directly), prefix+P + key
    (picker, dispatches via `_run_picker_command`), and a typed shell command (`pm
    pr view-spec ...`) all converge on the same behavior.


    The picker dispatches the resolved pm-id when known (since the picker has the
    loaded data). The CLI accepts whatever the user typed. Both end up at `_resolve_pr_id`
    → `_require_pr`.


    ## Common dispatch (refactor)


    A single helper in `pm_core/cli/pr.py` (e.g. `_open_pane_for_pr(pr_id, role, command,
    target_window)`) used by all four. Builds the tmux split-window invocation with
    role-based pane-registry registration (`pr-shell`, `pr-impl-spec`, `pr-qa-spec`,
    `pr-diff`) so the layout manager and cleanup track each pane.


    Split direction: horizontal when the current pane is wider than tall, vertical
    otherwise.


    ## Edge cases

    - PR has no workdir (pending status): only the shell action requires it; spec/diff
    viewers don''t.

    - Spec file missing: surface a clear error (`No impl spec for <pr_id> — run "pm
    pr spec <pr_id>" first`) instead of opening an empty pager.

    - `glow` not installed: silent fall-through to `less`.

    - `less` not installed (rare): final fall-through to `cat <path>; read` so the
    pane stays up long enough to read.

    - Diff against a base branch the workdir doesn''t have a remote ref for: same
    backend-aware logic that `_launch_review_window` already uses (`origin/<base>`
    for github/vanilla, plain `<base>` for local).

    - PR id not resolvable: `_require_pr` already raises with a clear error; surface
    it.


    ## Files

    - `pm_core/cli/pr.py` — new commands `pr shell`, `pr view-spec`, `pr view-diff`;
    new helper `_open_pane_for_pr`; refactor `_launch_review_window` to call `view-diff`
    for its diff pane (or share the helper).

    - `pm_core/cli/session.py` — ACTIONS table additions and dispatch handler for
    the four new picker keys.

    - `pm_core/cli/__init__.py` — register the new subcommands so they show in `pm
    pr --help`.


    ## Tests

    - `pm pr shell <pr-with-workdir>` from a pm tmux pane → split pane with cwd =
    workdir.

    - `pm pr shell #193` and `pm pr shell pr-f5b7eef` and `pm pr shell 193` all resolve
    to the same PR.

    - `pm pr view-spec <pr-with-spec>` from a pm tmux pane → split pane shows glow-rendered
    markdown (or less).

    - `pm pr view-spec <pr-without-spec>` → clear error, no empty pane created.

    - `pm pr view-diff <pr>` from a pm tmux pane → split pane shows the same diff
    content review windows use.

    - All four invoked from prefix+M (popup-cmd) → same behavior as prefix+P + the
    corresponding key.

    - All four invoked from a non-tmux shell → content printed to stdout instead of
    opening a pane.

    - `pm pr review` (review window) creates its diff pane via the same code path
    as `pm pr view-diff`.

    - `glow` absent → less used; specs/diff still display.

    - Pane registered for cleanup; closing the parent window kills the spec/shell/diff
    pane.


    ## Out of scope

    - Live-refresh of the diff pane when the workdir changes (today review''s diff
    is one-shot).

    - Spec editor mode (write/edit). View-only here.'

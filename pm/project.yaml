  description: 'Allow users to define and register custom watchers that plug into
    the BaseWatcher framework.


    ## Registration

    - Users create a watcher by subclassing BaseWatcher in a Python file

    - pm watcher register <path_to_file> registers it with the WatcherManager

    - Registered watchers stored in project config or ~/.pm/watchers/

    - pm watcher list shows all registered watchers (built-in and custom) with enabled/disabled

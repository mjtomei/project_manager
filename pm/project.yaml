- id: pr-871dbf5
  plan: watchers
  title: Add high-effort watcher supervisors that monitor and coach lower-effort sessions
  branch: pm/pr-871dbf5-add-high-effort-watcher-supervisors-that-monitor-a
  status: qa
  depends_on:
  - pr-3032fb6
  description: 'Add a new watcher type that runs at high effort (Opus-level) and monitors
    other running sessions (QA scenarios, implementation, review) that run at lower
    effort, providing real-time feedback at their message prompts.


    ## Behavior

    - Supervisor watchers observe other Claude sessions by capturing their tmux pane
    output

    - When they spot issues, suboptimal approaches, or opportunities, they inject
    feedback at the target session''s message prompt

    - Each supervisor targets a configurable subset of tasks (e.g. ''all QA scenarios
    for pr-X'', ''all implementation sessions'', ''sessions in plan-qa'')

    - Multiple supervisors can run concurrently, each covering different task subsets

    - pm watcher supervisor start [--target <filter>] [--count N] to launch N supervisors
    covering the filtered tasks


    ## Feedback logging

    - Every piece of feedback a supervisor gives is logged to a persistent file (~/.pm/logs/supervisor/<session-id>.jsonl)

    - Log entries include: timestamp, target session, what was observed, what feedback
    was given, whether the target session acted on it

    - pm watcher supervisor log [--target <filter>] to review feedback history

    - Enables post-hoc review of whether supervisors are adding value or just adding
    noise


    ## Scaling

    - Coded so that the number of supervisors and their target assignments are configurable
    at runtime

    - Supervisors rebalance when sessions start/stop

    - Should use the shared BaseWatcher pattern from pr-3032fb6


    ## Motivation

    - QA scenarios running at lower effort sometimes miss things or go down wrong
    paths

    - A high-effort supervisor watching multiple sessions can catch issues early and
    course-correct

    - The feedback log lets us evaluate ROI and tune the approach'

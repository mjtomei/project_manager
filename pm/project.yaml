- id: pr-7251b72
  plan: improvements
  title: Refuse pm pr start when PR is not committed on base branch
  branch: pm/pr-7251b72-refuse-pm-pr-start-when-pr-is-not-committed-on-bas
  status: merged
  depends_on: []
  description: 'When pm pr start clones the main repo to create a workdir, it clones
    from the committed state of master (or the configured base_branch). If the PR
    entry has been added to project.yaml but not yet committed to git, the workdir
    clone will not contain that PR entry. This causes confusing failures downstream
    when the implementation session tries to read its own PR from the workdir project.yaml.


    Add a pre-start check that verifies the PR ID exists in the committed (git show
    HEAD:pm/project.yaml) version of project.yaml before proceeding with the clone.
    If the PR is not committed, print a clear error message telling the user to commit
    the pm state first (e.g. via pm push or git commit) and refuse to start.


    Key changes:

    - In pr_start (cli/pr.py), before cloning, read the committed project.yaml from
    git (git show HEAD:pm/project.yaml)

    - Check that the PR ID appears in the committed data

    - If missing, emit an error like "PR {pr_id} is not committed to {base_branch}
    yet. Run pm push to commit project state before starting."

    - Exit with a non-zero return code'

- id: pr-37073ad
  plan: plan-3119574
  title: 'Container: pre-install Playwright + Chromium + ffmpeg for browser QA recordings'
  branch: pm/pr-37073ad-container-pre-install-headless-chrome-ffmpeg-puppe
  status: merged
  depends_on: []
  description: 'Add browser video-recording tooling to the QA container image so the
    walker UI PRs can be recorded under Claude-driven QA. Today the base `pm-dev`
    image (`Dockerfile`) ships curl/asciinema/tmux — protocol- and terminal-level
    capture only, no browser engine — so rendered UI, `walker.js` behavior (hotkeys,
    SSE→DOM reactivity), and the activity-indicator animation cannot be recorded.
    This PR pre-installs Playwright (Node, Chromium only):

    - The `playwright` npm package (Node 22 already present) plus its bundled Chromium,
    installed via `npx playwright install --with-deps chromium`. `--with-deps` pulls
    Chromium''s runtime shared libs (libnss3, libatk-bridge2.0-0, libgtk-3-0, libgbm1,
    libasound2, …) and fonts automatically, replacing the hand-maintained apt list.
    Chromium only — skip Firefox/WebKit to limit image size.

    - `ffmpeg` (apt). Playwright records video natively (it bundles its own ffmpeg),
    so system ffmpeg is only needed to transcode the resulting `.webm` to `.mp4` and
    for the existing asciinema workflow; keep it.


    Why Playwright instead of puppeteer: native context-level video recording (no
    third-party screen-recorder), built-in trace capture (`trace.zip` — DOM snapshots
    + network + console, viewable in the trace viewer), auto-waiting + role/text locators
    that suit LLM-driven live re-execution (no brittle sleeps), and `install --with-deps`
    which owns the system-library problem. A single Chromium build keeps the size
    hit comparable to a bare Google Chrome install.


    Single base image (no per-project / multi-image split). Lands in the base `Dockerfile`
    alongside the existing asciinema/tmux QA-recording tooling, with a build-time
    verification step. Flag the image-size increase (Chromium + Playwright is heavy).
    Runtime note for callers: Playwright launches Chromium with `chromium.launch({
    args: [''--no-sandbox'', ''--disable-dev-shm-usage''] })` in the rootless container;
    call out a mount/flag in `pm_core/container.py` only if one is actually required.
    **No human-guided testing** — verified by the build + smoke-launch.


    Tests: image builds with the new layer; `npx playwright --version` exits 0; a
    headless Chromium smoke script (`chromium.launch({args:[''--no-sandbox'',''--disable-dev-shm-usage'']})`
    → `page.goto(''about:blank'')` → dump DOM) exits 0 inside the container; `ffmpeg
    -version` and `node -e "require(''playwright'')"` succeed; existing asciinema/tmux/curl
    tooling still present.


    Files: `Dockerfile`, `pm_core/container.py` (only if a runtime flag/mount for
    Chromium is required).'

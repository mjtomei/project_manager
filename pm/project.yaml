  description: 'Phase 9 of plan-state. Replace ~/.pm/debug/*.log files with rows in
    a logs table.


    Schema: logs(id INTEGER PRIMARY KEY, timestamp_ns INTEGER NOT NULL, level TEXT
    NOT NULL, logger TEXT, message TEXT, context_json TEXT, session_id TEXT, pr_id
    TEXT). Indexes: (timestamp_ns), (logger, timestamp_ns), (session_id, timestamp_ns),
    (pr_id, timestamp_ns), (level, timestamp_ns).


    This is the highest-write-rate store in the plan — every _log.info / _log.warning
    / _log.exception call across pm lands here. Implementation strategy: a custom
    logging.Handler in pm_core/paths.configure_logger that writes to the database
    in batches (e.g. flush every 100 records or every 100ms, whichever first) to amortize
    transaction overhead. Synchronous flush on critical paths (errors, shutdown).


    Retention: configurable per-host. Defaults to ''keep 30 days'' since logs grow
    fast and ''keep everything'' from plan-ambient''s persistence-everywhere principle
    would be overwhelming for log streams specifically. Make the default tunable so
    users with the 50TB budget can opt into longer retention.


    Reader-side wins (the motivation):

    - ''Last 100 errors across all sessions'': single indexed SELECT

    - ''What did this PR''s QA loop log between T1 and T2'': indexed range scan, no
    file-globbing


- id: pr-49ce773
  plan: null
  title: 'Bug: popup picker exits with misleading ''merged or closed'' on empty lines,
    blocking navigation to other PRs'
  branch: pm/pr-49ce773-bug-popup-picker-exits-with-misleading-merged-or-c
  status: pending
  depends_on: []
  description: "## Symptom\nWith PR #193 (pr-f5b7eef, status: in_review) selected,\
    \ the popup picker shows:\n\n    PR Actions — #193\n    No actions available (PR\
    \ is merged or closed).\n\nthen exits on a keypress. The user cannot navigate\
    \ to other PRs that have open windows. The status claim is wrong (PR is in_review,\
    \ not merged or closed) and the navigation block is wrong even when the status\
    \ claim is right.\n\n## Root cause\n`pm_core/cli/session.py:1601-1606` short-circuits\
    \ whenever `_build_picker_lines` returns an empty list:\n\n    lines, _picked_pr,\
    \ _label_to_cmd = _resolve_for(current_pr)\n    if not lines:\n        click.echo(f\"\
    PR Actions — {current_pr}\")\n        click.echo(\"No actions available (PR is\
    \ merged or closed).\")\n        _pause_and_exit(0)\n\nThere are two compounded\
    \ problems with this:\n\n1. **Misattribution.** Empty lines is treated as 'PR\
    \ is merged or closed' but the only path `_build_picker_lines` (lines 1038-1126)\
    \ returns [] *because of merged/closed status* is via `if not actions: return\
    \ []` after `_actions_for_status(status)`. It also returns [] when the PR lookup\
    \ fails (`if not pr: return []` at line 1068). For #193 the lookup is the suspect\
    \ path — same condition (`_pr_display_id(p) == pr_disp`) is used in nav_pr_ids\
    \ construction but _resolve_for / _build_picker_lines use independent dict lookups\
    \ against the loaded prs list, leaving room for stale-data or dict-shape inconsistencies.\
    \ The user-facing copy hardcodes one cause for what is actually a multi-cause\
    \ condition.\n\n2. **Navigation blocked.** Even when the PR genuinely is merged/closed\
    \ (the user's explicit point: 'even if it was, I should still be able to start\
    \ the pane and move around to other prs, the actions should just be blocked for\
    \ that one'), the picker exits immediately. There's no way to use h/l (or whatever\
    \ the nav keys are) to move to another PR that does have actions.\n\n## Fix\n\
    - Replace the early `_pause_and_exit(0)` on empty lines with a render path that\
    \ still shows the picker shell + navigation hint, with a clear inline message\
    \ scoped to the *current* PR:\n  - For terminal status (merged/closed): 'No actions\
    \ — PR is {status}.' Navigation keys still work.\n  - For lookup failure / unexpected\
    \ empty: 'Could not load actions for {current_pr}.' (don't claim the PR is merged\
    \ when we don't know that). Log enough at `_log.warning` to diagnose.\n- Audit\
    \ `_build_picker_lines` and `_resolve_for` to ensure the lookup-failure case for\
    \ #193 is identified — the symptom suggests a code path where `_pr_has_open_window`\
    \ puts a display_id into nav_pr_ids that the subsequent `_pr_display_id == pr_disp`\
    \ lookup then fails to match. Possible causes to check:\n  - case/whitespace differences\
    \ between nav-list-time and resolve-time\n  - PR data mutated mid-popup (unlikely\
    \ but possible)\n  - gh_pr_number type drift (int vs str) producing different\
    \ display_id strings on different reads\n- Consider passing the resolved `pr`\
    \ dict from nav-list construction directly into `_resolve_for` instead of re-looking-up\
    \ by display_id, removing the lookup-divergence class of bug entirely.\n\n## Test\n\
    - Repro: with #193 in_review and a window open, invoke picker → expect actions\
    \ list, observe the misleading exit message.\n- Repro nav block: edit a PR's status\
    \ to 'merged' in project.yaml manually, ensure the PR still has an open tmux window,\
    \ invoke picker landing on that PR → expect to be able to press nav key and move\
    \ to another PR."

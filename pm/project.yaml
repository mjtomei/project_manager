  notes:
  - id: note-8a406b6
    text: "Two concrete symptoms observed 2026-05-10 in project-manager-c5a1006b:\n\
      \n1. _window-resized firing every 1-2 seconds in a tight feedback loop. Log\
      \ evidence (~/.pm/debug/project-manager-c5a1006b.log):\n\n  09:59:24 _window-resized:\
      \ ENTERED session=pm-project_manager-c5a1006b~4 window=@0\n  09:59:24 _window-resized:\
      \ debounce won, rebalancing\n  09:59:24 rebalance: window @0 size=153x44, 2\
      \ panes\n  09:59:24 rebalance: applying layout: 2abd,153x44,0,0{76x44,0,0,1095,76x44,77,0,710}\n\
      \  09:59:24 _window-resized: rebalance returned True\n  09:59:25 _window-resized:\
      \ ENTERED ... (same window, same size)\n  09:59:25 rebalance: applying layout:\
      \ 2abd,153x44,0,0{76x44,0,0,1095,76x44,77,0,710}\n  ...\n  09:59:30 (still firing\
      \ every 1-2s, identical layout each time)\n\nSame window, same dimensions, same\
      \ panes, same computed layout output every iteration. Debounce reports 'debounce\
      \ won' each time — debouncing isn't the bug. The pattern is self-perpetuating:\
      \ rebalance calls tmux select-layout → tmux fires window-resized because layout\
      \ change counts as a resize → _window-resized triggers rebalance → tmux fires\
      \ window-resized → ...\n\n2. Manual zoom (prefix+z) gets undone within ~1-2\
      \ seconds. The user zooms a pane; rebalance from the loop above (or a fresh\
      \ window-resized hook fired by the zoom event itself) calls tmux select-layout,\
      \ which clobbers the zoom state. The user can't keep a pane zoomed because something\
      \ always unzooms them shortly after. Likely a different surface of the same\
      \ root cause: rebalance doesn't preserve manual zoom across a select-layout\
      \ call, and with the feedback loop running rebalance fires constantly enough\
      \ that any zoom is short-lived.\n\nSuggested fix path:\n\na. **Idempotence check\
      \ in rebalance**: before tmux_mod.set_window_layout (the select-layout call),\
      \ fetch the current tmux layout string and compare. If equal to the computed\
      \ target, skip the apply. This breaks the feedback loop directly — a no-op rebalance\
      \ doesn't fire window-resized.\n\nb. **Preserve zoom across rebalance**: detect\
      \ whether the active pane in the target window is zoomed before applying the\
      \ layout (tmux 'list-panes -F #{window_zoomed_flag}'). If zoomed, either skip\
      \ the apply entirely or re-zoom after applying. Likely the simplest fix is:\
      \ if zoomed, skip — the user has explicitly chosen a non-default state, respect\
      \ it until they exit zoom.\n\n(a) and (b) are independent fixes that compound:\
      \ (a) stops the noise, (b) makes the rare legitimate rebalance not fight user-driven\
      \ zoom. Both are small.\n\nBoth symptoms are user-visible right now and the\
      \ second (zoom-fights-rebalance) is the more annoying day-to-day. Worth prioritizing."

- id: pr-b7ada6a
  plan: tui-ux
  title: Add offline mode with dynamic sync for GitHub-backed projects
  branch: pm/pr-b7ada6a-add-offline-mode-with-dynamic-sync-for-github-back
  status: pending
  depends_on: []
  description: "Allow projects using the GitHub backend to work fully offline and\
    \ sync back when connectivity is restored.\n\n## Offline mode\n- Automatically\
    \ detected when GitHub API calls fail, or manually toggled with pm offline / pm\
    \ online\n- While offline, the project behaves like the local git backend: local\
    \ merges, local branch operations, no GitHub API calls\n- All PR status transitions,\
    \ reviews, QA, and merges work locally\n- TUI shows an offline indicator so the\
    \ user knows GitHub sync is paused\n\n## Dynamic sync on reconnect\n- pm sync\
    \ or automatic detection of connectivity triggers sync\n- Sync does NOT rely on\
    \ any history or log of what happened offline — it dynamically computes the delta\
    \ at sync time by comparing:\n  - Local branch states vs remote branch states\n\
    \  - Local project.yaml PR statuses vs GitHub PR statuses\n  - Local commits not\
    \ pushed vs remote commits not pulled\n  - GitHub PRs that were merged/closed\
    \ externally while offline\n- For each PR, determines the correct action: push\
    \ local changes, pull remote changes, update status, create/update GitHub PR,\
    \ resolve conflicts\n- Presents a sync plan to the user for confirmation before\
    \ executing\n\n## Conflict resolution\n- When local and remote have diverged (e.g.\
    \ PR was merged locally but also updated on GitHub), sync identifies the conflict\
    \ and proposes resolution\n- Same dynamic diff approach works for fixing out-of-sync\
    \ states caused by bugs or user error — not just offline mode\n- pm sync --dry-run\
    \ to preview what would happen without executing\n\n## Reuse for general sync\
    \ repair\n- The sync mechanism should be general enough to fix any inconsistency\
    \ between local state and GitHub\n- pm sync --repair mode that checks everything\
    \ and fixes discrepancies regardless of whether offline mode was used\n- This\
    \ replaces ad-hoc fixes for sync bugs with a single robust reconciliation tool\n\
    \n## Motivation\n- Working on planes, trains, or in areas with spotty connectivity\n\
    - Recovering from bugs that push project.yaml out of sync with GitHub\n- User\
    \ errors (manual yaml edits, force pushes) that create inconsistencies"

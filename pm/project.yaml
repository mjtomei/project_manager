- id: pr-2e81e51
  plan: plan-qa
  title: 'Pattern-extraction review pipeline: parallel similar-code analysis with
    hazard aggregation before verdict'
  branch: pm/pr-2e81e51-pattern-extraction-review-pipeline-parallel-simila
  status: pending
  depends_on:
  - pr-ee1ff04
  description: 'Add a multi-stage parallel analysis pipeline that runs before the
    review verdict to catch hazards the reviewer would miss without deep cross-codebase
    knowledge.


    Pipeline stages:


    1. Decomposition session (1): Reads the diff and breaks it into discrete tasks
    — concrete operations the new code performs (e.g. "splits a tmux pane", "registers
    pane in registry", "triggers layout rebalance"). Produces a structured list of
    tasks.


    2. Similar code identification (1 session per task): For each task, searches the
    codebase for other code performing the same operation. Produces a list of similar
    code locations per task.


    3. Pattern extraction (1 session per similar code location): Reviews the existing
    similar code — not to evaluate it, but to extract: (a) invariants — what this
    code always does and in what order; (b) tricky bits — non-obvious things a developer
    implementing the task from scratch would likely miss or get subtly wrong, and
    why they matter. The session should read surrounding context, comments, hooks,
    and related code to understand the mechanism behind each invariant, not just the
    surface pattern.


    4. Aggregation (1 session): Receives the task list, all extracted invariants and
    tricky bits, and the new code. For each task, diffs the new code against the extracted
    contracts. Produces structured HAZARD signals for deviations — e.g. "task X has
    invariant A+B+C, new code only does A+C, missing B because <reason>".


    Hazard signals feed into the existing review loop as blocking issues before the
    verdict is issued. The pipeline runs in parallel where possible (all identification
    sessions run together, all extraction sessions run together) with a synchronization
    point before aggregation.


    All sessions use the same model. Scope is fully open — no filtering of tasks or
    similar code locations. The aggregation session is responsible for discounting
    low-confidence findings.


    The motivating example: a QA status pane creation was missing a user_modified=False
    reset before calling rebalance(), making rebalance() silently a no-op. The code
    looked correct in isolation. A reviewer would only catch it by finding the 6 other
    pane creation sites, extracting the 3-step invariant, and noticing the new code
    only had 2 steps — exactly what this pipeline does.'

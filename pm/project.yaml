- id: pr-0af4723
  plan: plan-ambient
  title: Audio cues for PR state transitions (start, review verdict, QA verdict, merge,
    INPUT_REQUIRED, failure)
  branch: pm/pr-0af4723-audio-cues-for-pr-state-transitions-start-review-v
  status: pending
  depends_on: []
  description: 'Discrete short sounds (chimes, tones, beeps — NOT speech) tied to
    PR-state changes so the user gets ambient awareness of what''s happening across
    many parallel PRs without watching the TUI. Fits Phase 2 alongside the TTS audio
    surface — same audio output infrastructure, different signal class. The TTS PR
    (pr-?) covers speech for content; this PR covers tones for events.


    ## Design


    The state transitions worth a cue (initial set; tunable per user):


    - **PR started** (start: pending → in_progress) — a short rising 2-note tone.

    - **Review PASS** — a clear positive chime.

    - **Review NEEDS_WORK** — a soft neutral tone (not punishing; this is normal).

    - **Review INPUT_REQUIRED** — distinct attention tone, since the user needs to
    act.

    - **QA PASS** — slightly different chime from review PASS (so the user can tell
    apart by ear).

    - **QA FAIL / verdict ERROR or KILLED** — descending tone, clearly different from
    NEEDS_WORK.

    - **Merge succeeded** — completion chime, distinct from PASS chimes.

    - **Merge conflict** — attention tone, different from INPUT_REQUIRED so the user
    can tell the two apart.

    - **Watcher escalation** — distinct attention tone (these are rarer and worth
    catching).


    Each cue is ~200-500ms. Total alphabet is small enough to learn by ear within
    a day of use.


    ## Sources of state changes pm can hook into


    - `pm_core/runtime_state.py:set_action_state` — central choke point for action
    transitions. Hook on transitions to terminal states with verdict, dispatch the
    appropriate cue.

    - `pm_core/pr_sync.py` for status changes (merged, closed) detected from gh.

    - The review-loop / QA-loop completion callbacks.

    - The watcher framework''s escalation path.


    Probably one new helper, e.g. `pm_core/audio_cues.py`, exposing `emit(event_kind,
    pr_id=..., verdict=...)`. Called from the existing transition sites; no other
    consumer needs to know about it.


    ## Backend


    Reuse the same playback abstraction as the TTS audio surface PR (`pm tts`):

    - macOS: `afplay` (or `say -v <voice>` with a short word like ''done'' if afplay-with-file
    feels heavy).

    - Linux: `paplay` / `aplay` / `piper` already wired for TTS.

    - Container hosts: no audio device by default → silently no-op. The cue infrastructure
    must tolerate ''no audio device'' without crashing.


    Sound files vendored under `pm_core/audio_cues/sounds/`. Short, copyright-clean
    (use `sox` to synthesize tones, or vendor from CC0 sound libraries). 9 cues ×
    ~10KB each = trivial repo overhead.


    ## Per-session toggle


    `pm session audio-cues on/off` and a global setting `audio-cues = on/off/severity-only`.
    `severity-only` plays cues only for INPUT_REQUIRED / merge conflict / watcher
    escalation — the ones that genuinely want attention. Default is `on` after this
    PR lands; can flip to `severity-only` based on user feedback.


    Suppression while the user is actively typing in any pm pane (`pm tui send` evidence,
    or recent stdin activity in any tracked pane) to avoid the cue overlapping their
    keystrokes. Resume after a short idle.


    ## Acceptance criteria


    - Each of the listed PR-state transitions emits the appropriate cue on macOS and
    Linux hosts with audio devices.

    - Container / no-audio hosts log the would-be cue but don''t crash.

    - The cue alphabet is small (~9 sounds), distinguishable by ear, and the mapping
    is documented in a single source of truth file (so contributors can add new cues
    consistently).

    - Per-session toggle works; settings persist across pm session restarts.

    - No cue fires for the same (pr_id, event_kind, verdict) tuple within 2 seconds
    — debounce against rapid duplicate transitions.


    ## Invariants


    - Cues MUST NOT block the calling thread for more than ~5ms. Playback happens
    in a background thread / subprocess.

    - Cues MUST NOT depend on the TUI being focused or even running. The audio-cues
    helper is callable from CLI subprocesses (e.g. the daemonized review-loop from
    pr-438028c).

    - Cue dispatch MUST log the (event, pr, verdict, dispatched/suppressed) at INFO
    level so users can audit which cues fired and why.


    ## Edge cases


    - Many simultaneous PRs landing terminal verdicts within a few seconds — debounce
    per-(pr, event) but don''t cap globally; the point is to surface concurrent activity.

    - Watcher in a tight retry loop hitting INPUT_REQUIRED repeatedly — the dedupe
    window catches this. Watchers that produce many escalations in a row will only
    sound once until the user clears.

    - Audio device hot-plugged out (laptop screen closed, headphones unplugged) —
    let the OS handle, fail silently.

    - User on remote SSH with no local audio — same as container case, log but don''t
    play.


    ## Why in plan-ambient and not improvements


    The plan''s Vision section emphasizes "surfaces should inform without demanding
    focus" and explicitly notes Active Badge''s lesson about "low-bandwidth ambient
    indicators (someone is in the room, the build is green, the user is idle)." Audio
    cues are exactly that — presence-without-attention signals that don''t pull focus
    the way a popup does. Filing here keeps the audio output surface (cues + TTS)
    coherent: same backend, same toggle pattern, same calm-tech philosophy.


    ## Out of scope


    - TTS-style speech for events. The TTS surface PR handles content speech; this
    PR is event tones only. They can coexist (different volume / different channel
    if needed).

    - Cue customization per user (user-uploaded sounds). v1 ships the default alphabet;
    customization can land later if anyone asks.

    - Cross-host audio routing (your PR completes on a remote server, plays cue on
    your laptop). Local-only.

    - Visual companion cues (status bar flash etc.). The TUI already has its own visual
    signaling.


    ## Related


    - TTS audio surface PR in this plan — shares the playback backend.

    - pr-438028c (daemonized loops) — daemon must be able to fire cues without the
    TUI process. The audio-cues helper being callable from any pm subprocess covers
    this.

    - pr-813cc19 (observability) — the cue dispatch log integrates naturally with
    the existing structured-log story.'

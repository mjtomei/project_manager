- id: pr-3526677
  plan: improvements
  title: 'Improvement: prefix+M command popup becomes a scrollable shell with persistent
    history shared with the TUI command bar'
  branch: pm/pr-3526677-improvement-prefix-m-command-popup-becomes-a-scrol
  status: in_review
  depends_on: []
  description: '## Goal

    Replace the current single-shot prefix+M popup (one `input(''pm> '')` per invocation,
    popup closes when the command finishes) with a long-lived scrollable terminal-like
    surface that:


    1. Shows previous commands and their outputs in a scrollable buffer (up to a sensible
    cap, e.g. last 200 commands or N MB).

    2. Supports up-arrow / down-arrow / Ctrl-R history recall.

    3. Shares command history with the TUI command bar (`/` in the TUI), so a command
    typed in either surface is recallable from the other.

    4. Tab-completes PR IDs, plan IDs, and pm subcommands.


    ## Why

    The popup is the only one-handed way to drive pm from a shell pane that isn''t
    the TUI itself. Today every popup invocation is a fresh dialog — no scrollback,
    no recall of the command you just ran, no awareness of what you typed in the TUI
    command bar five seconds ago. With the popup-cmd''s bug surface around it (the
    routing-list problem fixed in pr-fcaa434, the abort/error-stay-open behavior,
    the popup-spinner stale-state bug pr-f27b882), users build up muscle memory for
    re-typing rather than re-running, which costs accuracy and time. Tab completion
    compounds the win: PR IDs are short hashes that are tedious to type from memory.


    A scrollable, history-aware, completing popup makes it the natural ''inspect +
    dispatch'' surface and reduces the pull toward keeping the TUI focused for everything.


    ## Design


    ### Persistence layer

    Single shared file (e.g. `~/.pm/sessions/<tag>/command_history`) with newline-separated
    submitted commands. Append-on-submit from both surfaces. Read on surface mount
    to populate the up-arrow stack. Lock-free reads, lock-on-append (file lock keyed
    by path) to handle concurrent writes from multiple surfaces.


    Cap the file at e.g. 1000 lines — when it grows past, trim to the most recent
    1000 atomically. Per-session, not global, so each project''s history stays separate.


    ### Popup surface

    Replace the current `popup_cmd_cmd` (pm_core/cli/session.py:popup_cmd_cmd) implementation:

    - Long-lived loop, not single `input()`.

    - Render a banner + prior buffer (read from the same persistence file) on entry.

    - Read commands with readline-style history: up/down navigate, Ctrl-R search,
    Enter submits, Ctrl-D / Esc dismisses.

    - After each command runs, append output to the in-popup buffer and to the persistence
    file''s command list.

    - Buffer is scrollable via Page Up / Page Down or by piping through `less` when
    it exceeds the popup''s visible rows.

    - Existing abort-keys behavior (Esc/Ctrl+C interrupts running command) preserved
    per-invocation.


    Implementation likely uses Python''s `readline` module plus a small ring-buffer
    renderer; or shells out to a thin tmux pane that runs an interactive `pm-popup-shell`
    REPL — pick whichever is simpler for the cap.


    ### Tab completion

    Plug into the same readline-driven input loop:

    - Top-level: pm subcommand names (`pr`, `plan`, `session`, `watcher`, `meta`,
    etc.) — sourced from Click''s command tree (each Click group exposes `commands.keys()`).

    - After `pr` / `pr edit` / `pr review` / etc., complete with PR IDs read from
    the resolved project.yaml. Include both internal IDs (`pr-f5b7eef`) and gh display
    IDs (`#193`); typing either matches the right entry.

    - After `plan` subcommands, complete with plan IDs from project.yaml.

    - After flags like `--plan`, complete with plan IDs; after `--depends-on`, complete
    with PR IDs.


    The completion source is `store.load(saved_root)` (resolved via the same `_resolve_root_from_session`
    already used for project resolution from pr-26ca427), cached per popup invocation.
    New PRs added during the session refresh on next prompt.


    Make the same completer available to the TUI command bar (Textual''s `Input` doesn''t
    do tab completion natively; subclass it or use a custom `Input` widget that consults
    the shared completer). If wiring it into Textual is non-trivial, ship the popup-side
    completer in this PR and follow up with the TUI bar.


    ### TUI command bar surface

    Extend `pm_core/tui/command_bar.py`:

    - On submit, append to the same persistence file.

    - Up/down arrow when the bar has focus walks the recalled history (currently the
    bar is Textual''s `Input` which already supports basic line editing; need to wire
    arrow keys to history walk).

    - On bar focus, populate from file so a command typed in the popup minutes ago
    is recallable here.

    - Tab completes via the shared completer (or follow-up if it''s awkward in Textual).


    ### Shared with the popup-cmd routing

    The current `popup_cmd_cmd` routes `pr qa` and `review-loop` through the TUI via
    SIGUSR2; pr-438028c removes those carve-outs once their CLI counterparts have
    proper window management. The new long-lived popup keeps the dispatch shape —
    only the input loop, output buffering, and completion change.


    ## Out of scope

    - Implementing a full PTY-based shell with interactive subprocess support (e.g.
    running editors in the popup). The popup remains a pm-command dispatch surface,
    not a general shell.

    - History deduplication / fuzzy search beyond Ctrl-R.

    - Wiring the completer into the TUI command bar if Textual integration proves
    expensive — file follow-up if so.


    ## Test

    - Open prefix+M, run several commands, dismiss with Esc → no error pause, popup
    remembers commands.

    - Reopen prefix+M, press up-arrow → previous commands scroll back. Run an old
    one → output appended to scrollback.

    - Type `pr edit ` and press Tab → list of PR IDs (internal + #N) shows; tabbing
    again cycles. Selecting one inserts it.

    - Type `#19` Tab → completes to matching gh-numbered PR(s).

    - Switch to TUI, press `/`, up-arrow → see commands typed in the popup. And vice
    versa.

    - Concurrent prefix+M from two attached clients → both append to the same file
    without corruption (file-lock test).'

- id: pr-488b748
  plan: bugs
  title: Verdict polling stalls when transcript symlink slug differs from Claude pane
    runtime cwd
  branch: pm/pr-488b748-verdict-polling-stalls-when-transcript-symlink-slu
  status: pending
  depends_on: []
  description: '## Repro / evidence


    From pr-6be8ee6 scenario 36 (`pm/qa/captures/pr-6be8ee6/scenarios/36/MANIFEST.md`):


    - Claude review pane''s actual cwd (per `tmux list-panes`): `/tmp/pm-test-1778627480/pm`

    - Claude wrote its JSONL to: `~/.claude/projects/-tmp-pm-test-1778627480-pm/<sid>.jsonl`
    (slug of the real cwd)

    - `pm pr review --review-loop` had pre-created the transcript symlink pointing
    at: `~/.claude/projects/-home-pm--pm-workdirs-pm-test-1778627480-...-c8b85d39/<sid>.jsonl`
    (slug of the *registered workdir*)

    - The two slugs never converge, so `loop_shared.poll_for_verdict` tails a symlink
    whose target directory never comes into existence. The review loop sits on iteration
    1 forever even though the pane plainly shows INPUT_REQUIRED.


    Same symptom hit scenario 35''s CP2 (nested qa_loop stalled mid-execution).


    ## Root cause


    `build_claude_shell_cmd(cwd=X, transcript=Y)` writes a symlink at the slug derived
    from X. Whether Claude later writes to that slug depends on its *runtime* cwd,
    which is determined separately by `split_pane_at` / `new_window_get_pane` (or
    by `docker exec -w` in container mode). Each launch site computes the two paths
    independently and the discipline is enforced only by convention. When the registered
    workdir and the actual pane cwd diverge — symlinks, throwaway-project layouts,
    nested pm invocations — the slugs diverge and polling stalls indefinitely.


    Affected launch sites (each picks an independent symlink-cwd + pane-cwd pair):

    - pm_core/cli/pr.py:1180-1192 (review)

    - pm_core/cli/pr.py:1017, 1501 (impl, merge)

    - pm_core/qa_loop.py:1674 (scenario worker)

    - pm_core/qa_loop.py:2380 (verifier)

    - pm_core/cli/qa.py:516

    - pm_core/cli/watcher.py:371


    ## Proposed fix


    Introduce a single `ClaudeLaunchCtx` dataclass in pm_core/claude_launcher.py that
    captures `(pane_cwd, runtime_cwd, host_write_dir, session_id)` with `for_host(workdir)`
    / `for_container(host_workdir)` factories. Make build_claude_shell_cmd, split_pane_at
    callers, and transcript_path_for all consume the same ctx so the slug is derived
    from runtime_cwd exactly once. In `for_host`, resolve workdir with `pwd -P` so
    symlinked workdirs map to the same canonical slug Claude will use. Also: after
    launch, the watcher should resolve the symlink and fail fast if the target directory
    does not appear within a short grace window, rather than polling forever.


    ## Out of scope


    Whatever drove the divergence specifically in the scenario 36 case (throwaway-project
    workdir vs. registered workdir) — fix the launcher-side discipline first; the
    upstream layout bug becomes harmless if symlink-cwd and pane-cwd are guaranteed
    equal.'

    - Per-PR override: specify a different model for a specific PR''s sessions

    - CLI override: --model flag to override for a single session launch


    ## Motivation


    - Cost optimization: use cheaper models for high-volume low-stakes work (QA scenarios)

    - Capability matching: reserve expensive models for critical work (reviews)

    - Immediate win: QA can use Sonnet instead of Opus, significantly reducing API

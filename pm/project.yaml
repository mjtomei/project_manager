- id: pr-c3bf868
  plan: bugs
  title: 'Bug: stale TUI pidfile lets picker / reload IPC silently target a dead or
    wrong process'
  branch: pm/pr-c3bf868-bug-stale-tui-pidfile-lets-picker-reload-ipc-silen
  status: pending
  depends_on: []
  description: 'The TUI''s pidfile (~/.pm/tui-<session>.pid) drives two IPC paths
    today: SIGUSR1 (reload, from pr-2173cf1) and SIGUSR2 (command queue, added later).
    Both look up the target PID by reading the pidfile, then os.kill it with the relevant
    signal. The flow assumes the pidfile points at a live TUI that knows how to handle
    the signal it''s about to receive. Three real-world failure modes break this assumption
    — all observed in a single debugging session today.


    (1) **Signal/handler version skew (the killer one).** The TUI process running
    today was started before the SIGUSR2 handler code merged. Its loaded module has
    only the SIGUSR1 handler installed; it has no SIGUSR2 handler. SIGUSR2''s default
    action when unhandled is terminate. The picker sent SIGUSR2 to it at 05:22:56,
    the kernel signaled it dead, no traceback because no Python exception was involved.
    The user noticed the dead pane and pm-respawned the TUI at 05:31:04 — the new
    TUI logs both handlers (''Installed SIGUSR1 reload + SIGUSR2 cmd-queue handlers'')
    confirming the old one had only SIGUSR1. Class of problem: any long-running TUI
    process predating a new signal handler will be killed by callers that send that
    signal.


    (2) **Stale pidfile from a crashed / SIGKILL''d predecessor.** If a TUI wrote
    the pidfile and died without graceful shutdown (or — like the case above — was
    killed by a signal it didn''t handle), the file stays. The next caller signals
    a dead PID. trigger_tui_command''s ProcessLookupError path *does* clean up here,
    but only if the kill genuinely fails. With PID reuse, the kill ''succeeds'' —
    see (3).


    (3) **PID reuse.** On a long-uptime box, the dead TUI''s PID gets reassigned to
    an unrelated process. SIGUSR1 / SIGUSR2 lands on that other process, which either
    ignores it (silent failure) or is killed by it (collateral damage). The picker
    spins on ''queued…'' forever.


    Concrete repro from today: review-loop action triggered from prefix+P picker for
    pr-177dec0 enqueued the command at ~/.pm/tui-pm-project_manager-c5a1006b.cmd-queue
    and called trigger_tui_command, which signaled the pidfile''s PID (1620979). That
    TUI predated the SIGUSR2 handler — SIGUSR2 terminated it. The picker spun on ''review-loop:
    queued…'' forever because no live TUI ever drained the queue.


    Fix has three pieces:


    **Versioned pidfile / capability check (closes mode 1).** Pidfile becomes more
    than just a number — store JSON like {pid: 1234, started_at: ..., caps: [''sigusr1'',
    ''sigusr2'', ...]}. The TUI writes its current capabilities at startup. trigger_tui_command
    and trigger_tui_reload both check that the relevant cap is present before signaling.
    If the cap is missing (older TUI), the caller surfaces ''this TUI predates the
    cmd-queue feature; restart the TUI to use it'' — never sends the signal. New TUIs
    always advertise their full set; old TUIs implicitly have an empty caps list and
    are signal-protected.


    **TUI-side pidfile takeover (closes mode 2).** On startup, before installing handlers,
    take exclusive ownership of the pidfile. If the file exists with a live PID *and*
    /proc/<pid>/cmdline indicates a pm TUI, refuse to start (another TUI owns this
    session) — print a clear error and exit. Otherwise atomically write our own descriptor.


    **Caller-side cmdline validation (closes mode 3).** trigger_tui_command and trigger_tui_reload
    validate /proc/<pid>/cmdline contains the TUI marker before signaling. On any
    of (file missing, parse error, PID dead, PID alive but wrong cmdline), treat as
    ''no TUI available'' — return False, remove the stale pidfile, let the caller
    surface the error. Picker''s _wait_for_tui_command aborts the spinner with a clear
    message rather than spinning indefinitely.


    Defensive bonus: the SIGUSR2 handler itself can also be installed unconditionally
    (even if cmd-queue logic isn''t fully wired yet) so that a no-op handler protects
    the TUI from the default-terminate semantics during version-skew windows. Cheap
    insurance and decouples ''handler exists'' from ''handler does work'', so future
    signals can be added safely.


    Files: pm_core/tui/app.py (versioned pidfile descriptor, exclusive takeover at
    startup, no-op SIGUSR* handler bootstrap), pm_core/cli/helpers.py (trigger_tui_command
    / trigger_tui_reload — read JSON pidfile, validate caps + cmdline, fail gracefully),
    pm_core/cli/session.py (picker''s _wait_for_tui_command — abort on validation
    failure with a useful message).


    Tests: TUI startup with a stale pidfile (PID dead) takes over cleanly; TUI startup
    refuses when an actual sibling TUI owns the same session; trigger_tui_command
    returns False and removes the stale pidfile when PID is dead or cmdline mismatches;
    signaling a TUI that lacks the requested capability fails fast with a ''restart
    the TUI'' message rather than killing it; TUI without yet-implemented signal handlers
    still doesn''t terminate when poked (the no-op bootstrap covers it); picker shows
    a useful error when trigger_tui_command returns False instead of spinning forever.'

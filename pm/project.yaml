- id: pr-0778fbe
  plan: plan-003
  title: Add PR ownership tracking with workdir history
  branch: pm/pr-0778fbe-add-pr-ownership-tracking-with-workdir-history
  status: pending
  depends_on: []
  description: 'Track ownership of PRs across users and machines so we know where
    workdirs live and who last worked on a PR.


    ## Fields


    - owner: GitHub username of current owner

    - owner_host: hostname where the current workdir lives

    - workdir_history: list of {github_user, host, workdir_path, timestamp} entries
    recording every workdir ever created for this PR


    ## Behavior


    - When a user runs pm pr start or takes ownership, record their GitHub user, hostname,
    and workdir path in the history and set them as current owner

    - pm pr take <pr_id>: take ownership of a PR, creating a new local workdir if
    one doesn''t exist on this machine. The previous owner''s entry stays in history

    - pm pr owners <pr_id>: show ownership history — who worked on it, from where,
    and when

    - If a PR already has a workdir on the current machine (from a previous session),
    reuse it instead of creating a new one


    ## Motivation


    - In multi-user setups, workdir paths are machine-specific — knowing which host
    has the workdir helps when debugging or reviewing

    - Ownership history lets people come back to a PR later or lets reviewers find
    where work was done

    - Taking ownership is a common workflow when picking up someone else''s PR'

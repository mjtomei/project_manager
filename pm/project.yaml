- id: pr-014f93f
  plan: null
  title: Use Claude Code hooks (idle_prompt, Stop) for verdict and session–end detection
  branch: pm/pr-014f93f-use-claude-code-hooks-idle-prompt-stop-for-verdict
  status: merged
  depends_on: []
  description: 'Replace all polling–based idle/verdict detection with Claude Code
    hooks for reliable, instant signaling.


    Currently pm polls tmux pane content every 5s (poll_for_verdict in loop_shared.py,
    PaneIdleTracker in pane_idle.py) using MD5 hashing and tail–line scanning to detect
    when Claude finishes a turn and whether a verdict keyword appeared. This is fragile:
    it requires stability polls, grace periods, prompt–text filtering, and still misses
    edge cases.


    Claude Code supports hooks in settings.json that fire shell commands on lifecycle
    events:

    – Notification with idle_prompt matcher: fires when Claude finishes its turn and
    is waiting for input. This is the exact moment to scrape for a verdict — no more
    polling/stability guessing.

    – Stop: fires when the session exits. Replaces pane–existence checks.


    Proposed approach:

    1. Configure hooks (per–session or per–project settings.json) that write a JSON
    event (timestamp, session_id, event_type) to a known file or named pipe under
    ~/.pm/hooks/.

    2. In qa_loop.py and loop_shared.py, replace the 5s poll loop with an event–wait
    on the hook output file. Fall back to polling if hooks are unavailable.

    3. On idle_prompt event: immediately scrape pane for verdict keyword (single read,
    no stability polling needed).

    4. On Stop event: mark session as exited, skip further polling.

    5. Audit pane_idle.py PaneIdleTracker — may be fully replaceable by idle_prompt
    hook for Claude panes.


    This should eliminate false positives from prompt–text matching, remove the need
    for grace periods and stability polls, and make verdict detection near–instant
    instead of up to 15s delayed.'
  agent_machine: spark-424d
  gh_pr: https://github.com/mjtomei/project_manager/pull/166
  gh_pr_number: 166

- id: pr-ca19555
  plan: improvements
  title: 'Improvement: containerize whole pm session + safer dangerously-skip-permissions
    enrollment flow with risk-aware popup gate'
  branch: pm/pr-ca19555-improvement-containerize-whole-pm-session-safer-da
  status: pending
  depends_on: []
  description: "## Goal\nTwo coupled improvements to pm's safety posture:\n\n1. **Run\
    \ the entire pm session inside a container by default after this PR lands**, not\
    \ just impl/review/QA sub-sessions. The skip-permissions blast radius is bounded\
    \ by the container; host-side keys + filesystem stay isolated from anything the\
    \ agent does.\n2. **Add a risk-reminder popup at session start when dangerously-skip-permissions\
    \ is not enabled.** Enrollment remains exactly as today — the user must manually\
    \ write the literal text `true` into `~/.pm/sessions/<tag>/dangerously-skip-permissions`.\
    \ There is no pm CLI command that does this for them. The popup explains the risks\
    \ and describes (in English, not as a copy-pasteable command) how to enable if\
    \ the user wants to. The friction of having to translate prose-instruction into\
    \ the actual file write IS the confirmation that the user understood what they're\
    \ doing.\n\n## Background\n\nToday: `~/.pm/sessions/<tag>/dangerously-skip-permissions`\
    \ containing `true` enables Claude's `--dangerously-skip-permissions` flag for\
    \ spawned sessions (pm_core/paths.py:163-188, pm_core/claude_launcher.py:106).\
    \ Skipping permissions means the agent can run any shell command, read/write any\
    \ file, exfil any data, push to any remote, hit any API the host can reach. With\
    \ API keys mounted into spawned containers, a misbehaving session could write\
    \ code that uses those keys against arbitrary infrastructure.\n\nThe pm session\
    \ itself currently runs on the host. tmux, the TUI, the watchers, and the leader\
    \ process all have host-level access. Only impl/review/QA sub-sessions are containerized.\
    \ So skip-permissions protects the bounded sub-sessions but the host-side pm process\
    \ is just as exposed to anything that escapes those bounds.\n\n## Part 1 — containerize\
    \ the whole pm session (default after this PR)\n\n`pm session` runs inside a long-lived\
    \ host container with the pm repo bind-mounted; tmux, TUI, watchers, leader all\
    \ live inside. Sub-session impl/review/QA containers become nested-podman containers\
    \ inside the host one. The bundled Dockerfile already has nested-podman scaffolding\
    \ (fuse-overlayfs + slirp4netns + uidmap + subuid/subgid; Dockerfile lines 60-65,\
    \ 34-58).\n\nBehavior:\n- After this PR lands, **the default is containerized**.\
    \ `pm session` containerizes. An opt-out flag `--no-containerize` (or setting\
    \ `session-container-mode = off`) lets users revert to host mode if they need\
    \ to.\n- Pre-existing host-mode `pm session` invocations transparently switch\
    \ to containerized mode on next start. Document this in the release notes.\n-\
    \ The container is the same pm-project base image flavor extended with tmux +\
    \ Claude Code + a python venv, all of which already work in the bundled Dockerfile.\n\
    - Network: by default the container has internet access (model API + git remote).\
    \ Network restriction lives in the follow-up safety-config PR (pr-726757e); this\
    \ PR only handles the structural containerization.\n\n## Part 2 — risk-reminder\
    \ popup, file-write as the enrollment\n\n**Enrollment stays as today.** No pm\
    \ CLI command writes the dangerously-skip-permissions file. The user enables it\
    \ by manually placing the literal text `true` into the appropriate session-config\
    \ file. This is the existing mechanism; we keep it deliberately because the friction\
    \ of doing it by hand is exactly the confirmation that the user understands what\
    \ they're enabling. Adding a `pm session enable-skip-permissions` convenience\
    \ command would erase that friction.\n\n**The popup is informational.** On every\
    \ `pm session` start where dangerously-skip-permissions is NOT enabled AND the\
    \ user hasn't permanently dismissed the popup, a tmux display-popup appears containing:\n\
    \n- A clear statement that skip-permissions is currently OFF for this session-tag.\n\
    - The risks of enabling it (described concretely, in plain language):\n  - Claude\
    \ will run shell commands without confirmation, including destructive ones.\n\
    \  - Full filesystem read/write within the session's reach.\n  - Internet access\
    \ — anything the network policy lets through (default: open).\n  - ANTHROPIC_API_KEY\
    \ and any other env-var keys are reachable from agent code that runs in this session.\n\
    \  - Without containerization, agent code has the same access as your user account\
    \ on the host.\n  - With containerization (the new default), the blast radius\
    \ is bounded by the container — but bind-mounted paths (the repo, ~/.claude config)\
    \ are still reachable.\n- A short English description of how to enable it if the\
    \ user wants to. Something like: \"If you've decided you want to skip permissions\
    \ for this session, write the literal text `true` into the dangerously-skip-permissions\
    \ file in this session's pm config directory. The pm docs describe where session\
    \ config lives.\" Do NOT print the full path. Do NOT offer to do it for them.\
    \ The user looks up the path, decides if they want to, and edits the file. That\
    \ sequence is the confirmation.\n\n**Two actions** in the popup:\n\n- `[Enter\
    \ / Esc / q]` — dismiss for this session, continue starting. Popup will appear\
    \ again on next start.\n- `[d]` — permanently disable the popup for this session-tag.\
    \ Writes a `skip-permissions-popup-disabled` marker. Does not affect skip-permissions\
    \ itself; just stops the reminder. For users who've decided they don't want skip-permissions\
    \ and don't want the popup to keep nagging.\n\nNo \"enable from popup\" action.\
    \ No copy-pasteable command in the popup text.\n\n## States at `~/.pm/sessions/<tag>/`\n\
    \n- `dangerously-skip-permissions` (existing) — contains `true` means skip-permissions\
    \ is enabled. Set only by the user writing the file by hand; no pm command writes\
    \ it.\n- `skip-permissions-popup-disabled` (new) — exists when user pressed `d`\
    \ in the popup. Suppresses the reminder. No effect on skip-permissions itself.\n\
    \n## Popup-display logic\n\nShow the popup when ALL of:\n- `dangerously-skip-permissions`\
    \ file does NOT exist or doesn't contain `true` (skip-permissions is off).\n-\
    \ `skip-permissions-popup-disabled` file does NOT exist (user hasn't suppressed\
    \ the reminder).\n\nSkip the popup when ANY of:\n- `dangerously-skip-permissions=true`\
    \ — user has already opted in via the file, no reminder needed.\n- `skip-permissions-popup-disabled`\
    \ exists — user has explicitly muted the reminder.\n\n## Acceptance criteria\n\
    - `pm session` on a session-tag with no prior decision → popup appears, lists\
    \ risks, describes enrollment in English, two actions.\n- User manually writes\
    \ `true` to the dangerously-skip-permissions file → next `pm session` start picks\
    \ it up; popup does not appear; skip-permissions is active.\n- Pressing `d` in\
    \ the popup writes the popup-disabled marker. Subsequent starts skip the popup.\
    \ Skip-permissions stays OFF.\n- `pm session` runs containerized by default. `--no-containerize`\
    \ reverts to host mode.\n- Existing `dangerously-skip-permissions=true` files\
    \ continue to work without prompting.\n- No pm CLI command writes the dangerously-skip-permissions\
    \ file.\n\n## Invariants\n- Popup MUST appear before any agent is spawned. No\
    \ \"show popup after we already opened the impl pane.\"\n- Popup MUST be modal\
    \ — blocking session start until a choice is made.\n- Popup MUST NOT enable skip-permissions\
    \ under any user action. Enrollment is exclusively user-side file-write.\n- Popup\
    \ MUST NOT print the literal file path or command. English description only —\
    \ the user looks it up.\n- Risk text MUST be loaded from a versioned file. Risk-text\
    \ bug-fixes don't force re-display; adding NEW risk categories bumps the version\
    \ and invalidates `popup-disabled` markers so users see the new risk and reconfirm\
    \ their dismissal.\n\n## Edge cases\n- User runs `pm session` over SSH from a\
    \ mobile client → popup is keyboard-only; each action is a single keypress; works\
    \ on phones.\n- Multiple concurrent `pm session` invocations on the same tag →\
    \ file reads are idempotent. No contention.\n- Container startup fails → fall\
    \ back with a clear error and a hint about `--no-containerize`; don't silently\
    \ proceed.\n- User dismisses the popup with Esc, then writes the file from inside\
    \ the session → the next session start picks it up correctly.\n\n## Verification\n\
    - Manual: fresh tag, `pm session` → popup appears. Press Esc → session starts,\
    \ no files written; second `pm session` shows popup again.\n- Manual: from a shell,\
    \ `echo true > ~/.pm/sessions/<tag>/dangerously-skip-permissions` → next `pm session`\
    \ start shows no popup; skip-permissions active.\n- Manual: fresh tag, `pm session`\
    \ → popup, press `d` → popup-disabled marker written. Subsequent `pm session`\
    \ → no popup, skip-permissions still off.\n- Manual: `pm session` on a tag with\
    \ a pre-existing dangerously-skip-permissions file → no popup, skip-permissions\
    \ active.\n- Manual: `ps` / container inspection during a `pm session` → tmux\
    \ server and TUI run inside a container.\n- Manual: `pm session --no-containerize`\
    \ → host mode, same as before this PR.\n- Audit: grep the pm codebase for any\
    \ path that writes the dangerously-skip-permissions file. Should be zero hits\
    \ (set_skip_permissions in paths.py is the existing helper; it should be removed\
    \ or restricted to test/dev use only).\n\n## Out of scope\n- Network egress restriction,\
    \ filesystem isolation, env-var redaction — these are pr-726757e (the follow-up\
    \ safety-config PR).\n- Per-command (rather than per-session) permission gates.\n\
    - Cross-host attestation of the confirmation.\n- A CLI convenience command for\
    \ enabling skip-permissions. Intentionally rejected — manual file-write is the\
    \ confirmation barrier.\n\n## Related\n- pm_core/paths.py:163-188 — current skip-permissions\
    \ get/set; extend with popup-disabled marker. Consider removing or test-restricting\
    \ `set_skip_permissions` so production code can't write the file.\n- pm_core/claude_launcher.py:106\
    \ — current consumer; unchanged.\n- pm_core/container.py — wrap_claude_cmd, container\
    \ build, env injection — touch points for whole-session containerization.\n- Dockerfile\
    \ — nested-podman setup; the session-container is the same image with tmux + Claude\
    \ Code + python venv added.\n- pr-726757e — follow-up safety-config PR that adds\
    \ firewall, filesystem-isolation, env-var-redaction profiles on top of this PR's\
    \ containerization."

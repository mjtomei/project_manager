- id: pr-b423bfd
  plan: bugs
  title: 'Bug: picker spinner shows ''review-loop: done…'' when the loop actually
    errored'
  branch: pm/pr-b423bfd-bug-picker-spinner-shows-review-loop-done-when-the
  status: merged
  depends_on: []
  description: "When the review loop ends with verdict=ERROR, the action picker pane\
    \ shows 'review-loop: done…' with a moving spinner — implying success and still\
    \ in progress. The user can't tell from the picker that the action failed. Looking\
    \ at the runtime_state state machine, the picker spinner reads cur_state from\
    \ runtime_state and renders it with a spinner; when the loop errored, set_action_state\
    \ was called with a terminal state (probably 'done' or 'failed') but the picker\
    \ treats both indistinguishably and keeps spinning.\n\nTwo issues bundled:\n\n\
    (1) **Verdict-vs-state confusion.** The runtime_state state field tracks lifecycle\
    \ (queued/launching/running/idle/waiting/done/failed) and a separate verdict field\
    \ tracks PASS/NEEDS_WORK/ERROR/etc. When the loop completes with ERROR, set_action_state\
    \ should land in state='failed' (terminal failure) not state='done' (terminal\
    \ success). Whichever code path emitted the terminal state for an ERROR verdict\
    \ is mapping incorrectly; pick one of:\n  - state='done' with verdict='ERROR':\
    \ picker should look at verdict before showing 'done'\n  - state='failed' with\
    \ verdict='ERROR': picker uses the state directly\n\nEither way, the picker should\
    \ distinguish. Today it doesn't — 'done' is shown for both PASS and ERROR.\n\n\
    (2) **Spinner should stop on terminal state.** Picker spinner today keeps rendering\
    \ frames even after the action enters a terminal state. The wait loop in session.py:_wait_for_tui_command\
    \ should check for terminal state and exit the spinner — either dismiss the popup\
    \ automatically (success path) or _wait_dismiss with the verdict so the user can\
    \ read it (failure path).\n\nConcrete fix:\n- pm_core/runtime_state.py: when the\
    \ loop reports ERROR / FAILED, set state='failed' and verdict='ERROR' (or whatever\
    \ the actual emitted verdict was).\n- pm_core/cli/session.py:_wait_for_tui_command:\
    \ when cur_state in {'done', 'failed'}, exit the spin loop. If 'failed' or verdict\
    \ in {'ERROR', 'NEEDS_WORK'}, _wait_dismiss with the verdict so the user reads\
    \ it. If 'done' with success verdict, dismiss popup as today.\n- Consider rendering\
    \ 'review-loop: failed (ERROR)' instead of 'done…' when the picker can read the\
    \ verdict.\n\nTests: a review loop that errors produces state='failed' and the\
    \ picker shows the error and waits for keypress; a review loop that PASSes produces\
    \ state='done' and the picker dismisses cleanly; a still-running loop continues\
    \ spinning until terminal."

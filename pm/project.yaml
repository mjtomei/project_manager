  description: "Add an optional quality assurance (QA) / manual testing step to the\
    \ PR lifecycle that sits between review and merge. This creates a review-QA loop:\
    \ when QA makes changes, review is re-triggered; when review makes changes, QA\
    \ is re-triggered. The loop continues until QA passes with no changes for a configurable\
    \ number of iterations (default: 1).\n\n## QA Step Behavior\n- Optional: the standard\
    \ implementation → review → merge flow still works without it\n- Triggered by\
    \ the user when they want manual/integration testing of a PR\n- The user points\
    \ to a test instruction prompt that describes how to set up and run manual tests\n\
    - The QA agent can fix bugs it finds, but any changes re-trigger review\n- If\
    \ review makes changes, that re-triggers QA\n- Loop terminates when QA completes\
    \ with no changes for N iterations (default N=1)\n\n## Test Instruction Library\n\

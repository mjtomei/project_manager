    the entry point per PR. Each main PR window includes a persistent picker pane
    (from pr-2d0588a) showing all windows for that PR (linked and unlinked).

    - **Sub-windows** (review, QA scenarios, merge, companion): linked on demand when
    navigated to, unlinked when deselected

    - **Pinned windows**: user can pin any window to keep it linked regardless of
    navigation


    ## Behavior

    - When selecting a PR in the TUI, its main impl window is always visible

    - When navigating to a sub-window (e.g. via the picker pane, or pressing r for
    review), it gets linked into the session

    - When navigating away from a sub-window to a different PR or back to the TUI,
    the sub-window gets unlinked (unless pinned)

    - Pin/unpin via a prefix key or TUI command

    - Pinned state persists in the pane registry


    ## Picker pane (per PR)

    - The picker from pr-2d0588a becomes a persistent pane in each PR''s main implementation
    window — not a popup

    - Shows all windows for that PR: impl, review, QA scenarios, merge — both linked
    and unlinked

    - Selecting an unlinked window from the picker links it and switches to it

    - Shows pin status and window category (main/review/qa/etc.)


    ## Window list

    - The tmux status bar window list stays clean: TUI + main PR windows + currently
    viewed sub-window + pins

    - Total visible windows roughly equals: 1 (TUI) + N (active PRs) + 1 (current
    sub-window) + pins


    ## Implementation

    - Track link state in pane registry (linked: bool, pinned: bool per window)

    - Hook into window selection/focus events to trigger link/unlink

    - tmux link-window -s source -t target to link, unlink-window -t target to unlink

    - Unlinked windows still exist in the base session — they are not destroyed, just
    hidden from the grouped session''s window list'

- id: pr-9603d04
  plan: plan-regression
  title: GitHub backend mock for regression tests
  branch: pm/pr-9603d04-github-backend-mock-for-regression-tests
  status: in_review
  depends_on: []
  description: 'Provide a mock/fake GitHub backend so regression tests can exercise
    the github-backend code paths (PR create, status sync, comments, merges, post-merge
    pull) without hitting the real GitHub API. Sibling of pr-abcf70f (FakeClaudeSession):
    same shape — scriptable responses, deterministic, fast — for the GitHub side of
    pm.


    Why: today the github backend (pm_core/github_backend.py and adjacent) is exercised
    end-to-end only against real GitHub, so regression coverage stops at the boundary.
    Bugs that only surface against GitHub-specific responses (rate limiting, conflict
    states, draft↔ready transitions, sync races) cannot be reproduced by the regression
    runner. With this in place, the existing Claude-driven regression tests can drive
    the github backend through scripted scenarios in CI / containers and the bug-fix
    watcher can reproduce GitHub-side bugs without poking the real API.


    Scope:

    - A FakeGitHubBackend class that implements the same surface as the real backend
    (or a transport-level fake that the real backend can talk to — pick whichever
    is less invasive after a quick design probe).

    - Scriptable response sequences (success / 4xx / 5xx / rate-limit / conflict /
    merged-elsewhere) so tests can compose realistic flows.

    - Hooks into pm pr sync and the github status polling paths so tests can advance
    simulated remote state.

    - Helpers for the common scenarios: create-draft-on-start, upgrade-on-done, merge-with-pull,
    sync-mid-flow.

    - Test fixtures that swap the real backend for the fake in regression tests, mirroring
    how pr-abcf70f swaps the Claude session.


    Out of scope:

    - Replaying real captured GitHub traffic (could be a follow-up).

    - Mocking gh CLI invocations elsewhere in the codebase that aren''t on the backend
    hot path.


    Consumed by pr-7d5d036 (regression-runner cleanup), which adds it as a dep alongside
    pr-abcf70f so regression tests can drive both Claude and GitHub deterministically.'

- id: pr-ac12b47
  plan: plan-qa
  title: Session cleanup for stale containers and push proxies
  branch: pm/pr-ac12b47-session-cleanup-for-stale-containers-and-push-prox
  status: qa
  depends_on:
  - pr-6836fad
  description: 'Add a cleanup function that removes stale containers and push proxies
    for a given session. A container or proxy is stale when the tmux window it was
    launched from no longer exists.


    Cleanup runs:

    - On TUI startup (clean up leftovers from a previous session crash)

    - On session close via tmux session-closed hook (tmux supports hooks like session-closed,
    window-closed etc. via ''set-hook -g session-closed'' or ''set-hook -g client-session-changed'')

    - Available as a CLI command: pm session cleanup


    The cleanup logic:

    1. List all containers matching the session tag prefix (pm-{session_tag}-*)

    2. For each container, derive the expected tmux window name from the container
    name

    3. Check if that window exists in the session

    4. If not, remove the container and its associated push proxy socket

    5. Also scan /tmp/pm-push-proxy-{session_tag}-* directories and remove any whose
    proxy process is dead (check PID file or socket liveness)


    Depends on pr-6836fad (session tag in container names) since cleanup relies on
    the session tag prefix to find containers belonging to a session.'

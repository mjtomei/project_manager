- id: pr-0b14f2c
  plan: plan-regression
  title: 'QA scenario planner: allow adding more scenarios mid-run or after initial
    plan'
  branch: pm/pr-0b14f2c-qa-scenario-planner-allow-adding-more-scenarios-mi
  status: pending
  depends_on:
  - pr-6be8ee6
  - pr-2680fbf
  description: '## Goal


    Let the QA scenario planner add additional scenarios to a QA run beyond the initial
    plan, and let users re-run NEEDS_WORK scenarios or replace INPUT_REQUIRED ones,
    so coverage gaps and earlier failures can be resolved without restarting QA from
    scratch. The overall QA verdict can transition from INPUT_REQUIRED or NEEDS_WORK
    back to PASS as added/replaced scenarios settle.


    ## Why


    Today the planner runs once, emits a fixed QA_PLAN_START / END block, and the
    orchestrator launches exactly those scenarios. The overall verdict is whatever
    falls out of that single batch. What''s missing:


    - Coverage gaps surfaced mid-run. Watching scenarios execute often reveals an
    angle the initial plan did not cover (a surface the planner did not know about,
    an edge case implied by a worker''s INPUT_REQUIRED, a multi-actor variant prompted
    by what a single scenario uncovered).

    - NEEDS_WORK scenarios after a fix is committed. A scenario finds a bug, the fix
    gets committed during QA, and the scenario needs to re-run against the fixed code
    to confirm. Today that means a separate QA run.

    - INPUT_REQUIRED scenarios after the blocker clears. A scenario stalled on a missing
    dependency, ambiguity, or refiner rejection; once the user addresses it, it should
    be re-pluggable as a replacement scenario without losing the rest of the run''s
    progress.

    - User-directed coverage. A human watching the run may want to request "also exercise
    X" without dropping current progress.


    ## UX


    The planner pane from the initial run sticks around. The user iterates with it
    freely (refine the request, broaden/narrow, reject and re-emit) until a plan block
    they like is sitting at the bottom of the planner pane''s transcript.


    Two actions in the scenarios pane:


    1. Add scenarios (e.g. + key) — pull in the latest plan block from the planner
    pane and append the new scenarios to the running batch. New scenarios get fresh
    indices continuing from max(existing_index) + 1.


    2. Replace a scenario (e.g. r key on the selected row) — the selected scenario,
    currently NEEDS_WORK or INPUT_REQUIRED, is removed from the batch and the latest
    plan block from the planner pane is spliced in as its replacement(s). Useful when
    you want to refine a scenario whose initial framing did not work and re-run with
    a better one.


    Re-running an existing scenario (without replacement) — i.e. driving the same
    scenario again against fresher code — is also exposed (e.g. R key) and routes
    through the same concretize -> worker -> verify pipeline.


    "Load latest" in all cases means "the most recent QA_PLAN_START / END block in
    the planner pane''s transcript at the moment the key is pressed." Intermediate
    drafts stay in the transcript and do not affect the running batch.


    ## Interaction with the regressions-as-scenarios flow


    After pr-06a96fa lands, scenarios bind to regression tests via REGRESSION: <id>;
    after pr-2680fbf lands, the planner can emit NEW_REGRESSION: <slug> and author
    a new regression test inline. Mid-run add/replace must handle both:


    - If a newly-added or replacement scenario references an existing REGRESSION:
    <id>, the standard concretize -> worker -> verify path runs against that regression.
    Same as today.


    - If a newly-added or replacement scenario emits NEW_REGRESSION: <slug>, the new-regression
    authoring sub-step runs first (drafts pm/qa/regression/<slug>.md, including mocks-awareness
    from pr-51586d2 if its constraints are met). Only after the regression file lands
    on the PR branch does the scenario itself run. The scenarios pane reflects this
    as a sub-status on the new entry (e.g. "authoring regression..." -> "running scenario...")
    so the user can see why a freshly-added scenario takes longer than a freshly-added
    existing-regression-bound one.


    - A replacement scenario that authors a new regression must NOT inherit the old
    scenario''s slug or capture directory — it gets fresh indices and a fresh workdir
    per the existing replacement semantics. The old scenario''s prior captures move
    to scenarios/<n>/prior-N/ as already specified.


    This is load-bearing: without it, adding a scenario mid-run that needs a regression
    that does not yet exist would either fail (no regression -> no run) or fall back
    to INSTRUCTION+ARTIFACT (defeats the Phase 10 redesign). Mid-run add/replace must
    use the same preferred path as initial-batch authoring.


    ## Behind the scenes


    - Orchestrator API for adding, replacing, and re-running scenarios in a live QALoopState.

    - The scenarios pane keybindings trigger the splice/replace/re-run: read the planner
    pane''s transcript, run the existing parse_qa_plan on the latest plan block, hand
    the result to the orchestrator.

    - New/replacement/re-run scenarios go through the same concretizer + worker +
    verifier pipeline as the initial batch.

    - For scenarios with NEW_REGRESSION, the orchestrator invokes the new-regression
    authoring sub-step before the concretizer (or as part of concretization, depending
    on where pr-2680fbf hooks it). The scenario only enters the worker stage after
    the drafted regression file is on the branch.

    - qa_status.json and the scenarios pane update in place, including the per-scenario
    sub-status for in-flight regression authoring.

    - Overall verdict re-aggregation. When a replacement or re-run settles with a
    different outcome than its predecessor, the aggregated overall verdict recomputes;
    state.latest_verdict can transition INPUT_REQUIRED -> PASS or NEEDS_WORK -> PASS
    as a result. The finalize pane gating updates accordingly: extends verified_scenarios
    check to cover late additions and recomputes when scenarios are replaced.

    - Replaced scenarios'' prior prompt.md / verdict.md captures are preserved (e.g.
    moved to a numbered subdir like scenarios/<n>/prior-1/) so the run history is
    not lost.


    ## Scope


    - Live-state add / replace / re-run in QALoopState + orchestrator.

    - Key bindings in the scenarios pane (qa_status.py) plus the scraping/parsing
    logic.

    - NEW_REGRESSION handoff to pr-2680fbf''s authoring sub-step for mid-run-added
    scenarios.

    - Finalize gate covers late additions and recomputed verdicts.

    - Capture preservation when a scenario is replaced.


    ## Out of scope


    - Removing scenarios from a running plan without replacement.

    - Editing existing scenario STEPS mid-run (would conflict with concretizer output
    already in flight; replace-with-fresh-plan is the supported path instead).

    - Auto-detecting new plan blocks the planner emits (the user decides when to pull
    them in).

    - Persisting follow-up-addition provenance across runs.


    ## Depends on


    - pr-6be8ee6 — uses the verdict_reasons field and shared verdict infrastructure
    that lands there.

    - pr-2680fbf — the NEW_REGRESSION authoring sub-step that mid-run add/replace
    invokes when needed.'

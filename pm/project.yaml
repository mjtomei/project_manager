  description: 'Location: pm_core/home_window/pr_list.py:_truncate (and callers in
    _render_content/_compose).


    _truncate uses len() (code-point count) to fit lines to the pane width, but format_pr_line
    (pm_core/cli/helpers.py:280) prepends a status emoji from PR_STATUS_ICONS (⏳🔨👀🧪✅🚫),

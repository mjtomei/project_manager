- id: pr-923f22b
  plan: bugs
  title: Add TUI watchdog for dead background threads and stale state
  branch: pm/pr-923f22b-add-tui-watchdog-for-dead-background-threads-and-s
  status: in_review
  depends_on: []
  description: 'Background threads (review loops, watcher) can die silently, leaving
    in-memory state flags (state.running=True) stuck, which causes stale spinners
    and blocks auto-start/merge flows. The shared poll timer (_poll_loop_state) is
    also a single point of failure — if it crashes, all verdict detection, idle polling,
    and animations break.


    Add a TUI watchdog that periodically checks:

    1. Review loop threads: compare thread.is_alive() against state.running — if thread
    dead but running=True, force running=False and announce failure

    2. Watcher loop thread: same is_alive() vs state.running check

    3. Poll timer health: track last-tick timestamp in _poll_loop_state; if watchdog
    sees it hasn''t fired in >5s, log the error and restart the timer

    4. Merge tracking sets: detect entries in _pending_merge_prs or _merge_propagation_phase
    whose merge windows no longer exist, and clean them up

    5. Auto-start subprocess health: detect if a spawned pm pr start --background
    process hung or died without completing


    The watchdog should run on its own lightweight timer (e.g. every 30s) separate
    from the main poll timer, so it can detect and recover from poll timer failures.'
  agent_machine: arch-home

- id: pr-27ce8ab
  plan: bugs
  title: 'Fix TUI crash recovery: add pane-died hook and capture stderr'
  branch: pm/pr-27ce8ab-fix-tui-crash-recovery-add-pane-died-hook-and-capt
  status: pending
  depends_on: []
  description: 'Two issues with TUI process crash recovery:


    1. **TUI process death not detected by tmux hooks** — The current `after-kill-pane`
    hook only fires when a pane is explicitly killed via tmux commands. When the TUI
    process crashes or is killed by a signal (SIGKILL, OOM, etc.), the pane is destroyed
    but the hook doesn''t fire, so auto-respawn never triggers. Fix: set `remain-on-exit
    on` for the TUI pane and use a `pane-died` hook to auto-respawn via `respawn-pane`.
    This provides belt-and-suspenders coverage alongside the watchdog (#113). Note:
    per-pane `pane-died` hooks have known inconsistencies (tmux/tmux#2483, #2882),
    so a window-level hook checking `#{pane_dead}` may be more reliable.


    2. **TUI crash stderr is lost** — When the TUI process crashes, any traceback
    or error output goes to the tmux pane which is immediately destroyed (remain-on-exit
    is off). There''s no way to diagnose what happened. Fix: redirect stderr from
    the TUI process to a log file (e.g. `~/.pm/debug/{session-tag}-tui-stderr.log`)
    so crash tracebacks are preserved for debugging. The `pm _tui` launch command
    should be wrapped to capture stderr.'

  notes:
  - id: note-00ffe14
    text: 'Pattern-deviation bug: the qa_loop status pane creation was missing the
      user_modified=False reset before calling rebalance(). The code registered panes
      and called rebalance() but didn''t reset the flag that the after-split-window
      hook sets, making rebalance() silently a no-op. This passed review because:


      1. The code looked structurally complete (register + rebalance), and the missing
      step is only meaningful if you know the hook fires in between and that rebalance
      checks the flag.


      2. The correct pattern exists in 6+ other places but is not enforced — each
      call site has to manually remember all three steps. The canonical implementation
      (launch_pane in pane_ops.py) was never extracted into a shared helper, so there
      was nothing to call incorrectly.


      What this suggests for the review/QA process:

      - Pattern consistency is hard for reviewers to catch when the pattern is spread
      across files with no shared abstraction to enforce it. A reviewer reading only
      the new code would see a plausible-looking register+rebalance pair and have
      no signal that the reset was missing.

      - The adversarial review process is well-suited to this class of bug: give the
      adversarial reviewer a list of known cross-cutting hazard patterns (e.g. ''any
      pane split must be followed by user_modified=False before rebalance'') and ask
      it to explicitly audit each new pane creation site against those patterns. This
      is distinct from normal correctness review — it''s pattern-compliance review.

      - The fix (extracting register_and_rebalance into pane_layout.py) also illustrates
      the right structural response: when a multi-step pattern must always be executed
      together, encode it as a single function so omitting a step becomes a compile-time
      or obvious omission rather than a subtle semantic error. The review prompt could
      explicitly ask: ''are there multi-step patterns in this diff that could be collapsed
      into a single helper to prevent partial application?'''
    created_at: '2026-03-21T14:42:07Z'
    last_edited: '2026-03-21T14:42:07Z'
  - id: note-9c7cc0e
    text: Many OSS repos squash on merge, so git blame on master may point to a squash
      commit covering an entire PR rather than the specific introducing commit. When
      tracing bugs, check PR branches, forks, or the GitHub PR diff to find the granular
      commit that introduced the buggy lines.
    created_at: '2026-04-07T22:57:31Z'
    last_edited: '2026-04-07T22:57:31Z'
- id: pr-ac10f03
  plan: improvements
  title: Merge abort verdict when master changes are too large for auto-merge
  branch: pm/pr-ac10f03-merge-abort-verdict-when-master-changes-are-too-la
  status: pending
  depends_on: []
  description: 'Add an ABORT_MERGE verdict to the merge/conflict resolution flow.
    When the merge prompt detects that changes on master since the PR branched are
    too significant for a safe auto-merge, the agent should return ABORT_MERGE instead
    of attempting to resolve conflicts it doesn''t fully understand.


    Current behavior: the merge agent always tries to complete the merge, even when
    master has diverged substantially. This leads to subtle integration bugs where
    conflicts are ''resolved'' by picking one side without understanding the implications.


    Desired behavior: the merge prompt evaluates the scope of changes (number of files,
    lines changed, semantic overlap with the PR''s changes) and returns ABORT_MERGE
    with an explanation when:

    - Master changes touch the same subsystems as the PR in non-trivial ways

    - Conflict resolution requires understanding architectural decisions made on master

    - The combined diff is large enough that the merge result should go through review/QA
    again


    When ABORT_MERGE is returned:

    - The merge loop stops cleanly (like PASS stops the review loop)

    - The PR status is set back to in_review or a new ''merge_blocked'' status

    - A note is added to the PR explaining what changed on master and why auto-merge
    was unsafe

    - The TUI shows the blocked state so the user can decide next steps (rebase manually,
    re-review, etc.)'

- id: pr-55c265f
  plan: null
  title: 'Bug: review-loop failure paths leave stale ''done'' state, popup reports
    success on failed launch'
  branch: pm/pr-55c265f-bug-review-loop-failure-paths-leave-stale-done-sta
  status: pending
  depends_on: []
  description: '## Symptom

    User triggers review-loop from the picker against an in-progress PR. The picker
    popup reports ''✓ review-loop: done'', but the TUI logs ''No workdir for <pr>.
    Start the PR first.'' and no review window opens. Re-running succeeds (because
    the TUI''s in-memory state has reloaded between the two tries — see companion
    bug for that side).


    ## Root cause

    `_start_loop` in pm_core/tui/review_loop_ui.py:153-200 has four early-return paths
    (no PR / no tmux / no workdir / mkdir failed). Each calls `app.log_message(...)`
    and returns without ever calling `runtime_state.set_action_state(pr_id, ''review-loop'',
    ''failed'', ...)`. The success path at line 236 transitions to ''running''.


    The popup spinner at pm_core/cli/session.py:1291-1342 polls `runtime_state.get_action_state(pr_id,
    ''review-loop'')` and short-circuits at line 1323 when state ∈ {done, failed}.
    Because review-loop completes leave ''done'' in runtime_state across loop iterations,
    a follow-up failed-launch sees the prior loop''s ''done'' immediately and prints
    ''✓ review-loop: done''.


    The bug is symmetric for any caller of _start_loop (zz d keypress, picker, command
    bar) and applies to all four early-return paths.


    ## Fix

    Each early-return in _start_loop must call `set_action_state(pr_id, ''review-loop'',
    ''failed'', error=<short reason>)` before returning. The popup spinner already
    has the failed-state path (line 1335-1338) which writes ''✗ review-loop: failed
    (<verdict>)'' and waits for dismissal — so once the state is set correctly the
    user sees the actual error rather than a misleading success.


    Optional but recommended: have the popup additionally remember the state value
    it saw on first poll. If state is already ''done''/''failed'' before the launch
    was even attempted, treat it as stale (i.e. wait one tick to see whether the launcher
    overwrites it before short-circuiting). Belt-and-suspenders against future paths
    that might miss the explicit transition.


    ## Audit other actions

    QA, review (non-loop), merge — same audit. Look for early-return paths in the
    launchers that don''t transition state and could leave the popup reading stale
    done/failed values.


    ## Test

    Repro: from picker, pick ''review-loop'' on a PR whose runtime_state has a stale
    ''done'' from a previous run AND whose workdir is unset. Expected: ''✗ review-loop:
    failed (no workdir)'' or similar; actual: ''✓ review-loop: done''.'

- id: pr-6566901
  plan: null
  title: 'Verdict-loop robustness: surface/retry when an expected verdict is never
    produced'
  branch: pm/pr-6566901-verdict-loop-robustness-surface-retry-when-an-expe
  status: pending
  depends_on: []
  description: "## Problem\n\n`loop_shared.poll_for_verdict()` (and the loops built\
    \ on it — review_loop,\nwatcher_loop, the QA loop) has no wall-clock deadline\
    \ and no handling for the\ncase where a verdict-producing session goes idle WITHOUT\
    \ ever emitting one of\nits expected verdicts. The `while True:` loop only exits\
    \ on `stop_check`, the\npane disappearing, or a matched verdict; otherwise it\
    \ waits 15s for the next\nidle hook, finds no verdict, and loops forever.\n\n\
    Discovered via QA of pr-abcf70f (FakeClaudeSession), scenario 28: a fake\nfinalize\
    \ session that emits no verdict makes the QA loop hang in finalize until\nmanually\
    \ killed. Real Claude can hit the same shape — it can go idle without the\nexpected\
    \ marker (asks a clarifying question, errors out, hits a limit) — so this\nis\
    \ a latent production robustness bug, independent of the fake.\n\n(pr-abcf70f\
    \ carries the complementary test-harness fix: fake-claude now emits a\nverdict-producing\
    \ session's default verdict instead of routing it to the\nno-verdict mock. That\
    \ removes the QA-authoring footgun but NOT the underlying\nloop hang, which this\
    \ PR addresses.)\n\n## Scope\n\nWhen a verdict is expected but not produced:\n\
    \n1. Bound the wait — add an overall deadline / max idles-without-verdict to\n\
    \   `poll_for_verdict` so it cannot spin forever.\n2. Retry the original prompt\
    \ a configurable number of times (re-send the prompt\n   to the same session)\
    \ before giving up.\n3. If still no verdict after the retries, get the user's\
    \ attention (clear\n   surfaced error / notification) instead of hanging silently.\n\
    4. Apply consistently across review_loop, watcher_loop, and the QA loop.\n\n##\
    \ Acceptance\n\n- A session that idles without emitting a verdict no longer hangs\
    \ the loop.\n- The original prompt is retried up to N times.\n- After exhausting\
    \ retries, the loop surfaces a clear, attention-getting state\n  rather than blocking\
    \ indefinitely."

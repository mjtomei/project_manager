  notes:
  - id: note-93a0dd7
    text: "Updating the 'where do the tones come from' question with literature anchor\
      \ and concrete sourcing options.\n\n## Research lineage to draw from\n\n**Earcons**\
      \ (Brewster, Blattner & Sumikawa, 1989+). Abstract musical tones with structured\
      \ parameters (pitch, timbre, rhythm, register) learned like a small vocabulary.\
      \ **Hierarchical earcons** — shared motifs grouped into families that vary by\
      \ suffix — are the right primitive for an event-class alphabet. Empirical finding\
      \ from Brewster's work: ~7 earcons reliably distinguished and learned within\
      \ an hour; beyond ~12 confusion rises. pm's planned ~9 cues is right at the\
      \ upper edge — design must enforce hierarchical structure to stay learnable.\
      \ Brewster 1994 PhD thesis at https://www.dcs.gla.ac.uk/~stephen/research/earcons/.\
      \ Blattner, Sumikawa & Greenberg 1989 'Earcons and Icons: Their Structure and\
      \ Common Design Principles' for the original framework.\n\n**Auditory icons**\
      \ (Gaver, 1986+). Alternative: everyday-sound metaphors. Easier to learn without\
      \ training but harder to design as a coherent alphabet. Most production systems\
      \ are a hybrid — auditory-icon-flavored but stylized to abstract tones. Reference:\
      \ Slack's three-tone alphabet, Discord, macOS Funk/Glass/Hero/Pop/Ping/Submarine.\n\
      \n**Material Design Sound** (Apache 2.0, https://m2.material.io/design/sound/sound-resources.html).\
      \ Designer-curated, three tonal families (positive / neutral / negative) with\
      \ documented design rationale. Maps cleanly onto pm's verdict alphabet.\n\n\
      ## Concrete sourcing options for pm\n\nThree viable paths, in order of preference:\n\
      \n1. **Vendor Material Design Sound under Apache 2.0.** Pre-built, designer-curated,\
      \ three-family structure. Map our cues onto the positive/neutral/negative families:\
      \ PASS verdicts → positive, NEEDS_WORK → neutral, FAIL / merge-conflict / INPUT_REQUIRED\
      \ → negative variations. Bundle under `pm_core/audio_cues/sounds/material/`\
      \ with the Apache 2.0 LICENSE notice. Zero design work; ships today; coherent\
      \ by construction.\n\n2. **Synthesize hierarchical earcons via `sox` at install\
      \ time.** Each cue is a 2-note motif: note 1 identifies the *category* (review\
      \ / QA / merge / watcher / lifecycle), note 2 identifies the *verdict* or *valence*\
      \ (PASS / FAIL / IN-PROGRESS / NEEDS-INPUT). Categories share a base motif;\
      \ verdicts share an interval pattern (rising for positive, falling for negative).\
      \ ~50 lines of code generates the full alphabet at install. Zero vendored binaries,\
      \ zero licensing concerns, hierarchical by construction (which is the Brewster-validated\
      \ learnability property). Concrete sketch:\n\n   - Category base notes (timbre/register\
      \ groups):\n     - review → mid sine\n     - qa → mid triangle\n     - merge\
      \ → low sine\n     - watcher → high sine\n     - lifecycle (start/cleanup) →\
      \ mid square\n   - Verdict suffix intervals:\n     - PASS → +4 semitones (major\
      \ third rising)\n     - NEEDS_WORK → 0 (held tone)\n     - FAIL / KILLED → -4\
      \ semitones (descending)\n     - INPUT_REQUIRED → +7 then -7 (attention oscillation)\n\
      \     - SUCCESS-TERMINAL (merge-merged) → +4, +7 (rising arpeggio)\n     - CONFLICT\
      \ → minor-second tritone (intentional dissonance)\n   - sox invocation per cue:\
      \ `sox -n cue.wav synth 0.15 <category> 0.15 <verdict-target> fade 0 0.3 0.05`\
      \ with appropriate frequencies.\n\n3. **Hand-pick clips from freesound.org under\
      \ CC0.** Most flexible but most curation work. Skip unless 1 and 2 don't fit\
      \ (e.g. licensing concerns with Material Design's broader Apache-2.0 conditions,\
      \ or sox not available on the target platform).\n\n## Recommendation\n\nDefault\
      \ to option 2 (sox-synthesized hierarchical earcons). Reasons:\n\n- Grounds\
      \ the design in the empirically-validated hierarchical-earcon literature, not\
      \ in someone's taste.\n- Zero external assets, zero licensing footprint, deterministic\
      \ and reproducible.\n- The hierarchy doubles as documentation — the design rationale\
      \ IS the synthesis spec.\n- sox is on most Linux installs and trivially installable\
      \ on macOS via brew.\n- If sox is missing on a host, fall back to silent operation\
      \ (no cue played) with a clear log warning — same fallback as 'no audio device.'\n\
      \nOption 1 (Material Design vendoring) as the backup if sox isn't reliably available\
      \ across pm's target platforms.\n\nThe earcon literature also gives the user\
      \ a sharp objective measure for whether the design works: a small user-study\
      \ (10 minutes per participant, 3-5 participants) where users listen to randomly-played\
      \ cues and identify the event. Brewster's bar is 'reliably distinguished after\
      \ one hour of use' — we should hit that. If we don't, we re-tune the synthesis\
      \ parameters before adding cues to the alphabet rather than shipping a confusing\
      \ set."

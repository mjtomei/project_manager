- id: pr-4db3696
  plan: null
  title: Add pm pr split command for breaking large PRs into smaller pieces
  branch: pm/pr-4db3696-add-pm-pr-split-command-for-breaking-large-prs-int
  status: in_review
  depends_on: []
  description: "Add a 'pm pr split' command (CLI + TUI keybinding) that launches a\
    \ Claude session to decompose a large PR into multiple smaller PRs.\n\nWorkflow:\n\
    1. User selects a PR in the TUI and triggers split (or runs 'pm pr split <pr_id>'\
    \ from CLI)\n2. Opens a new window with a Claude session that:\n   a. Reads the\
    \ PR's current diff/branch, spec file, and plan context\n   b. Works with the\
    \ user to decide how to split the work\n   c. Creates new child PRs (with plan\
    \ and depends_on set) and writes spec files for each\n   d. Transitions the original\
    \ PR to planning-only: resets its branch so the only changes are the new spec\
    \ files\n3. After merging the planning PR, the user can start implementation/review\
    \ on each child PR independently\n\nKey design points:\n- The original PR becomes\
    \ a planning-only PR — its branch is rewritten to contain only the new specs in\
    \ pm/specs/\n- Child PRs get the original PR's plan field set, so plan review\
    \ sees them\n- Child PRs get depends_on wired up between them as needed\n- The\
    \ split prompt should be aware of the spec file format and write proper impl specs\
    \ for each child\n- No code relies on deriving PR IDs from branch names, so child\
    \ PRs with new branches work fine\n- Plan markdown reconciliation happens naturally\
    \ via 'pm plan review' since the review prompt pulls PRs from project.yaml not\
    \ the markdown"

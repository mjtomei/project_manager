- id: pr-c1f8086
  plan: null
  title: 'Bug: popup spinner watches wrong window because _wait_for_tui_command reads
    project.yaml via cwd-walk, hits stale workdir yaml'
  branch: pm/pr-c1f8086-bug-popup-spinner-watches-wrong-window-because-wai
  status: in_review
  depends_on: []
  description: "## Symptom\nPressing zz d (or any picker action) from a pane whose\
    \ cwd is inside a PR workdir produces a popup spinner that watches a window name\
    \ derived from the *workdir's* stale project.yaml — typically the internal PR\
    \ id (`review-pr-XXXX`) — while the launcher subprocess uses the master yaml and\
    \ creates a window named after the gh number (`review-#NNN`). The names don't\
    \ match, so the spinner never sees the new window appear, never fires its window-open\
    \ switch, and spins on 'running…' indefinitely until the user dismisses with q.\n\
    \nConfirmed by the new spinner logging (pr-813cc19) on 2026-05-05:\n- For pr-f74988c\
    \ (#200): spinner watched `target_window=review-pr-f74988c`; launcher created\
    \ `review-#200` (window @737). User saw 'running…' forever until pressing q.\n\
    - For pr-fcaa434 (#202): same shape. spinner watched `target_window=review-pr-fcaa434`;\
    \ launcher created `review-#202`.\n\nMaster yaml has `gh_pr_number` set for both;\
    \ workdir's clone-time yaml does not.\n\n## Root cause\n`_wait_for_tui_command`\
    \ at pm_core/cli/session.py:1247-1259 resolves the PR's display_id via:\n\n  \
    \  root = state_root()\n    data = store.load(root)\n    for p in data.get('prs')\
    \ or []:\n        if p.get('id') == pr_id:\n            display_id = _pr_display_id(p)\n\
    \    target_window = pattern.format(display_id=display_id) ...\n\n`state_root()`\
    \ (cli/helpers.py:236) returns the `-C`/`PM_PROJECT` override if set, otherwise\
    \ calls `store.find_project_root()` which walks up from cwd. When the popup runs\
    \ from a workdir cwd, that walk lands inside the workdir and loads the workdir's\
    \ stale clone-time yaml — which doesn't yet have `gh_pr_number` for the PR being\
    \ acted on.\n\nAdjacent code already solved this. `popup_picker_cmd` (session.py:1554-1563)\
    \ uses `_resolve_root_from_session(session)` (added in pr-26ca427) which reads\
    \ `~/.pm/sessions/<tag>/pm_root` — the project root the session was started with\
    \ — and falls back to cwd-walk only when no record exists. The picker also sets\
    \ `os.environ[\"PM_PROJECT\"]` so subprocesses inherit the right root. But `_wait_for_tui_command`\
    \ runs in the same process as the picker; `os.environ` is set, but `state_root()`\
    \ doesn't re-read `PM_PROJECT` — its only env-var path is via click's top-level\
    \ `-C` option parsing, which has already happened.\n\nSo the spinner code path\
    \ drops through to `store.find_project_root()` and walks cwd, picking the stale\
    \ workdir yaml.\n\n## Fix\nOne-line change at `_wait_for_tui_command`'s root resolution:\
    \ use `_resolve_root_from_session(session)` first, fall back to `state_root()`\
    \ only when no session record exists. Mirrors what `popup_picker_cmd` already\
    \ does at session.py:1554-1556.\n\n    saved_root = _resolve_root_from_session(session)\n\
    \    root = saved_root if saved_root is not None else state_root()\n    data =\
    \ store.load(root)\n\nAfter the fix:\n- Spinner reads master's yaml, sees `gh_pr_number:\
    \ 200` (or whatever), computes `display_id=#200`, watches `target_window=review-#200`,\
    \ matches the launcher's window name, fires the switch on first appearance.\n\n\
    ## Out of scope\n- Refactoring `state_root()` to honor `PM_PROJECT` env in all\
    \ callers. That's a broader change with its own risk surface; targeted spinner\
    \ fix is small and obvious.\n- Auditing other in-process callers of `state_root()`\
    \ for the same bug. (There may be others; flag as a follow-up if found.)\n\n##\
    \ Test\n- From a pane with cwd inside a workdir whose yaml lacks `gh_pr_number`,\
    \ fire zz d → spinner logs should show `target_window=review-#NNN` (gh-prefixed),\
    \ not `review-pr-XXXX`. Window appears → spinner exits with `reason=window_open`\
    \ and switches the user.\n- Cross-check the four cases enumerated in pr-f27b882's\
    \ description (no window / running / done on review window / done on different\
    \ window) — all should still behave correctly.\n\n## Related\n- pr-26ca427 — fixed\
    \ the equivalent bug for `_popup-picker` via session-metadata resolution.\n- pr-f27b882\
    \ — fixed the stale-terminal-state spinner short-circuit. The window-name-mismatch\
    \ bug here is distinct: even with no stale terminal state, the spinner would never\
    \ switch because the window name it's watching for doesn't exist.\n- pr-813cc19\
    \ — the spinner logging that made this diagnosable in two log lines."
